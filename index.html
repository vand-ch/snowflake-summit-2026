akes the case that agents belong inside a knowledge layer that spans platforms, preserves institutional IP and improves accuracy through continuous evaluation.","type": "Theater Session","date": "2026-06-04","day_name": "Thursday","start_time": "10:30 AM","end_time": "10:50 AM","duration_mins": "20.0","room": "Basecamp South Theater 2 (Basecamp, South Hall A)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "General Theaters","topics": "Interoperability","features": "Other","personas": "IT / DBA","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Jonathan Bruce","speaker_companies": "Alation","speaker_titles": "VP, Field CTO","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AD212","title": "Zero-ETL Citizen Development on Snowflake: Apps with Postgres and SPCS","abstract": "Business teams need to build applications faster while keeping their data ready for analytics and AI. This session presents a modern application stack on Snowflake that connects applications and data on a single platform. It explores how Snowflake Postgres and Snowpark Container Services enable new application patterns, and how open-source ecosystems and multiple technical communities \u2014 PostgreSQL, low-code OSS and the Snowflake community \u2014 can collaborate to accelerate innovation. The session highlights Snowflake\u2019s evolution beyond analytics into a unified platform for applications, data and community-driven development.","type": "Breakout Session","date": "2026-06-04","day_name": "Thursday","start_time": "10:30 AM","end_time": "11:15 AM","duration_mins": "45.0","room": "Room 215 (Moscone South, Level 2)","capacity": "226","track": "Application Development","session_type": "Breakout Session","location": "","topics": "System Integrations / Synchronizations","features": "Snowflake Postgres","personas": "Data Engineer","industry": "Not industry-specific","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Kosuke Kida","speaker_companies": "Independent / Community-based","speaker_titles": "Chair, Japan PostgreSQL User Group","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "L3","title": "When Agents Are Your Users: Architecting the New Application Layer","abstract": "AI agents are the new end-users. In this luminary talk, Vercel CTO Malte Ubl will break down the new application layer \u2014 where autonomous agents are rapidly becoming the primary consumers of your code. Malte will share a builder-focused framework for the agent archetypes working in production today. Learn to architect systems that compress research pipelines, query fragmented data and automate boilerplate workflows. What happens to your APIs and UIs when they are used by agents rather than humans? Join us to learn how to adapt your stack for the agentic era and transition from writing static syntax to orchestrating systems.","type": "Dev Day Luminary Talk","date": "2026-06-04","day_name": "Thursday","start_time": "10:40 AM","end_time": "11:00 AM","duration_mins": "20.0","room": "Builders Hub Theater (Basecamp, South Hall D)","capacity": "443","track": "Generative AI & Agents","session_type": "Dev Day Luminary Talk","location": "Builder's Hub Theater","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "","delivery_method": "OnDemand","speaker_names": "Matle Ubl","speaker_companies": "Vercel","speaker_titles": "CTO","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI107","title": "Accelerating AI-Ready Data with Open Semantic Interchange","abstract": "As data, BI and AI converge, enterprises need a shared semantic foundation that works across tools, models, and workloads. Explore how the Open Semantic Interchange (OSI) creates a vendor-neutral semantic standard that lets BI, analytics and AI tools speak the same language for reliable, consistent data interpretation. This session will explore how OSI supports dimensional BI models, enabling a durable way to define semantics once and use them everywhere. Learn how this standard insulates your models from schema drift and accelerates cross-system integration in Snowflake, ensuring your traditional BI dashboards and new AI applications always agree on the numbers.","type": "Breakout Session","date": "2026-06-04","day_name": "Thursday","start_time": "11:00 AM","end_time": "11:45 AM","duration_mins": "45.0","room": "Room 151 (Moscone South, Upper Mezzanine)","capacity": "204","track": "BI & Analytics","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Other","personas": "BI / Analyst","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "OnDemand","speaker_names": "Josh Klahr | Khushboo Bhatia","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Director of Product Management | Principal Software Engineer, Snowflake","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "ML104","title": "Batch Inference on Multimodal Models","abstract": "Join this session to learn how Snowflake ML enables teams to deploy multimodal models \u2014 from Hugging Face or custom builds \u2014 directly within Snowflake. By natively supporting image, audio and text, organizations can run large-scale inference on unstructured data without managing complex infrastructure.","type": "Breakout Session","date": "2026-06-04","day_name": "Thursday","start_time": "11:00 AM","end_time": "11:45 AM","duration_mins": "45.0","room": "Room 208 (Moscone South, Level 2)","capacity": "197","track": "Machine Learning","session_type": "Breakout Session","location": "","topics": "MLOps","features": "Snowflake ML","personas": "MLOps","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "OnDemand","speaker_names": "Avinash Joshi | Pradeep Dorairaj","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Senior Product Manager | Engineering Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE305","title": "Best Practices for Building Real-Time AI Experiences with Snowflake Streaming","abstract": "Agentic AI applications demand continuous and up-to-date data to make autonomous decisions and deliver personalized experiences. But building reliable real-time pipelines remains one of the hardest problems in data engineering. In this session, learn how Snowflake's streaming capabilities including Snowpipe Streaming, Dynamic Tables and native Kafka integration provide a simple, scalable and cost-effective foundation for real-time AI workloads. We'll walk through common architecture patterns and real customer examples so you can start building real-time AI applications today.","type": "Breakout Session","date": "2026-06-04","day_name": "Thursday","start_time": "11:00 AM","end_time": "11:45 AM","duration_mins": "45.0","room": "Room 216 (Moscone South, Level 2)","capacity": "197","track": "Data Engineering & Pipelines","session_type": "Breakout Session","location": "","topics": "Interoperability","features": "Snowflake Openflow","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Advanced","delivery_method": "Live","speaker_names": "Tyler Jones Jones | Sai Maddali","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Principal Software Engineer I | Principal Product Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI252","title": "From Vision to Intelligence: How Cortex AI Accelerates FSFB\u2019s AI Journey","abstract": "Join Fundaci\u00f3n Santa Fe de Bogot\u00e1 (FSFB), a top-250 global hospital, to see how it is empowering clinicians with generative AI. This session explores FSFB's NEXUS engine, built on Snowflake, which interprets and structures complex clinical data. By leveraging Snowflake Cortex Search, FSFB has enabled doctors to \"chat with the EHR\" to get instant patient summaries in the ER and identify cancer suspicions. This early detection saves lives by allowing for more effective, less aggressive treatments with better outcomes. The result: Processing 5,000 clinical records now takes six hours, not 583. AI doesn't replace doctors; it empowers their ability to save lives.","type": "Theater Session","date": "2026-06-04","day_name": "Thursday","start_time": "11:00 AM","end_time": "11:20 AM","duration_mins": "20.0","room": "Vertical Village Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "Vertical Village","topics": "Other","features": "Cortex AI Functions","personas": "BI / Analyst","industry": "Healthcare and Life Sciences","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Humberto Higuera","speaker_companies": "Fundaci\u00f3n Santa Fe de Bogot\u00e1","speaker_titles": "Head of Data and AI","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "GO233","title": "How DraftKings Ensures Regulatory Compliance at Scale Using Snowflake","abstract": "DraftKings operates in one of the most heavily regulated digital industries, where data accuracy, lineage and timeliness are nonnegotiable. In this session, we\u2019ll share how DraftKings designed its data architecture to meet the demands of operating across multiple highly regulated jurisdictions, with Snowflake as the core platform that enables scale and consistency. We\u2019ll walk through how data is ingested, standardized and transformed, how compute is orchestrated, and how Snowflake\u2019s native security, governance via Horizon Catalog, and observability features enable consistent, repeatable compliance across all our jurisdictions.","type": "Breakout Session","date": "2026-06-04","day_name": "Thursday","start_time": "11:00 AM","end_time": "11:45 AM","duration_mins": "45.0","room": "Room 212 (Moscone South, Level 2)","capacity": "101","track": "Governance & Security","session_type": "Breakout Session","location": "","topics": "System Integrations / Synchronizations","features": "Gen 2 Warehouses","personas": "Data Engineer","industry": "Other","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Ronak Mistry | Emily Gonzales","speaker_companies": "DraftKings | DraftKings","speaker_titles": "Principal Data Engineer | Sr Data Engineer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "PO201","title": "How DTCC Enabled AI-Driven Data Cataloguing at Scale with Cortex and Streamlit","abstract": "Scaling intelligent metadata tagging across a modern data estate is one of the most persistent challenges in enterprise data management. This session demonstrates how the Depository Trust and Clearing Corporation (DTCC) used Snowflake Cortex AI and Streamlit to automate the creation, approval and management of business definitions from structured and unstructured data. Learn how DTCC eliminated manual cataloguing bottlenecks with scalable architecture, intuitive workflows and an AI-powered hub that drives metadata consistency and visibility across the enterprise \u2014 marking their first gen AI application in production and driving $1.2 million in cost avoidance.","type": "Breakout Session","date": "2026-06-04","day_name": "Thursday","start_time": "11:00 AM","end_time": "11:45 AM","duration_mins": "45.0","room": "Room 210 (Moscone South, Level 2)","capacity": "101","track": "Performance & Cost Optimization","session_type": "Breakout Session","location": "","topics": "Catalogs / Discovery","features": "Cortex Code","personas": "Marketing Practitioner","industry": "Telecom","department": "Supply Chain","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Rohit Sharma | Sukanya Joshi","speaker_companies": "Depository Trust and Clearance Corporation (DTCC) | Snowflake","speaker_titles": "Director of Enterprise Data | Solutions Architect, AI/ML","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI103","title": "Make Data Work for Agentic AI: Ingersoll Rand Blueprint from Qlik and Snowflake","abstract": "Agentic AI is no longer hype \u2014 it\u2019s the next battleground for growth. Winning with agentic AI means the ability to create autonomous, goal-oriented systems and wield data effectively. Companies that execute will outpace the competition; those that don\u2019t will be left behind explaining why they hesitated ... if they\u2019re around at all. Join Qlik to discover how Ingersoll Rand is using Qlik and Snowflake to make data AI ready and accelerate insights, then improve decision-making with AI to increase productivity. Learn how Ingersoll Rand delivers real competitive advantages while fulfilling its strategic vision of tomorrow\u2019s AI-powered analytics.","type": "Breakout Session","date": "2026-06-04","day_name": "Thursday","start_time": "11:00 AM","end_time": "11:45 AM","duration_mins": "45.0","room": "Room 214 (Moscone South, Level 2)","capacity": "101","track": "BI & Analytics","session_type": "Breakout Session","location": "","topics": "Snowflake Partners","features": "Gen 2 Warehouses","personas": "Data Engineer","industry": "Manufacturing","department": "Supply Chain","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Ryan Welsh","speaker_companies": "Qlik","speaker_titles": "Field CTO - Generative AI","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI302","title": "Scaling a Research Data Platform on Snowflake","abstract": "This session walks through how we use Snowflake to scale our Research Data Platform to support state-of-the-art research workloads, with a particular focus on reasoning-centric use cases. We will discuss key architectural decisions across data modeling, Snowflake-native capabilities, and supporting design patterns that enable high concurrency, rapid iteration and reliable access for diverse research users. These approaches power one of the most heavily used internal analytics and visualization platforms at OpenAI built using Streamlit.","type": "Breakout Session","date": "2026-06-04","day_name": "Thursday","start_time": "11:00 AM","end_time": "11:45 AM","duration_mins": "45.0","room": "Room 152 (Moscone South, Upper Mezzanine)","capacity": "204","track": "BI & Analytics","session_type": "Breakout Session","location": "","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "Advanced","delivery_method": "OnDemand","speaker_names": "Bohan Zhang | Gowrishankar Sunder","speaker_companies": "OpenAI | OpenAI","speaker_titles": "Member of Technical Staff | Member of Technical Staff","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "WN211T","title": "What\u2019s New: Innovate at Scale: Powering a Secure and Resilient AI Estate","abstract": "This session unveils Snowflake innovations designed to protect sensitive AI assets and ensure continuity. Explore what\u2019s new in security for AI, featuring capabilities to secure Cortex flows, Snowflake Intelligence and Cortex Code. We\u2019ll cover AI security posture in the Trust Center, adaptive guardrails against prompt injection and sandboxing to mitigate local risks. Learn about new data movement policies to prevent exfiltration and seamless agent access via agentic identity and JIT provisioning as well as Account Replication 2.0, the next evolution of our BCDR engine. Join us to see these features in action and build a bulletproof, AI-ready estate.","type": "Theater Session","date": "2026-06-04","day_name": "Thursday","start_time": "11:00 AM","end_time": "11:20 AM","duration_mins": "20.0","room": "Basecamp South Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "What's New in Snowflake","session_type": "Theater Session","location": "General Theaters","topics": "AI Agents / Data Agents","features": "Cortex AI Functions","personas": "Security Practitioner","industry": "","department": "R&D","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Radhika Janardanan | Nitika Gupta","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Sr Product Marketing Manager Platform | Director of Product Management","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "L4","title": "The End of Coding as We Know It: How Agent Systems Will Change Software Development","abstract": "As AI agents evolve from assistants to autonomous collaborators, software engineering is undergoing its biggest transformation since the rise of the cloud. In this talk, Tido Carriero, VP of Engineering at Cursor, explores what it means to build software in a world where agents \u2014 not code \u2014 are the atomic unit. He\u2019ll highlight how agent-driven workflows are reshaping the software development lifecycle, team dynamics and developer productivity. This session offers a forward-looking perspective on agent systems and how builders can adapt to an AI-native world.","type": "Dev Day Luminary Talk","date": "2026-06-04","day_name": "Thursday","start_time": "11:10 AM","end_time": "11:30 AM","duration_mins": "20.0","room": "Builders Hub Theater (Basecamp, South Hall D)","capacity": "443","track": "Generative AI & Agents","session_type": "Dev Day Luminary Talk","location": "Builder's Hub Theater","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "","delivery_method": "OnDemand","speaker_names": "Tido Carriero","speaker_companies": "Cursor","speaker_titles": "VP of Engineering, Product & Design","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI279","title": "A Framework for Assessing and Improving AI Readiness","abstract": "The Snowflake product team is sharing their framework and scorecard for AI readiness to help others assess and improve their own AI data posture. The session will cover the importance of reliable, well-structured data, clean semantics, governance and security. Data structure, health and performance: Learn how to address \"not-ready\" signals like long-running queries and missing data tests. Focus on transforming data into performant, well-structured models that reflect key business concepts. Semantic layering: Get your data AI-legible by encapsulating its meaning in a high-quality semantic layer. We highlight how each component unlocks more power from AI and democratizes data across your organization.","type": "Breakout Session","date": "2026-06-04","day_name": "Thursday","start_time": "11:30 AM","end_time": "12:15 PM","duration_mins": "45.0","room": "Room 209 (Moscone South, Level 2)","capacity": "197","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Cortex Code","personas": "MLOps","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Mark Huberty | Tyler Richards","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Principal Data Scientist | Staff Data Scientist","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI116","title": "From Documents to Decisions: Agentic AI for Document-Driven Workflows","abstract": "Many business workflows run on documents \u2014 from onboarding forms and contracts to compliance reports and operational records. Yet most AI systems treat document processing as simple extraction rather than part of a production data pipeline. In this session, we demonstrate how agentic workflows transform multimodal documents into grounded, structured data for downstream analytics and enterprise systems. We\u2019ll highlight a financial services example and share best practices for building reliable, auditable workflows that integrate document intelligence into modern data platforms.","type": "Theater Session","date": "2026-06-04","day_name": "Thursday","start_time": "11:30 AM","end_time": "11:50 AM","duration_mins": "20.0","room": "Basecamp South Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "General Theaters","topics": "AI Agents / Data Agents","features": "Native Apps","personas": "MLOps","industry": "Not industry-specific","department": "Operations","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Teon Rosandic","speaker_companies": "LandingAI","speaker_titles": "GM EMEA","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DM104","title": "Millions Saved: Unity's Native Apps, Data Sharing and AI Strategy ","abstract": "Learn how Unity, known for its industry-leading game engine, transformed its analytics platform with Snowflake, delivering seamless data and app sharing with cost-efficient scalability. Discover how Unity's native application solution saved millions annually and enhanced customer experience. See how it's incorporating Cortex Agents with Streamlit to enable conversational analytics, helping customers maximize the value of their data. Walk away with insights on building native apps that deliver customer value while driving significant cost savings.","type": "Theater Session","date": "2026-06-04","day_name": "Thursday","start_time": "11:30 AM","end_time": "11:50 AM","duration_mins": "20.0","room": "Vertical Village Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Data Sharing & Marketplace","session_type": "Theater Session","location": "Vertical Village","topics": "AI Agents / Data Agents","features": "Cortex AI Functions","personas": "Data Engineer","industry": "Other","department": "Operations","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Keir Sweeney","speaker_companies": "Unity Technologies","speaker_titles": "Staff Software Engineer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE206","title": "Modernizing Banking: From Legacy Spark to Near Real Time with Snowflake Openflow","abstract": "UnionBank Philippines\u2019 Quickloans workflows were constrained by a legacy Apache Spark provider. By refactoring and migrating these complex pipelines to Snowflake Openflow\u2019s native constructs, the team fully preserved business rules while materially boosting processing speed. The new design proved stable with low latency during peak windows (for example, paydays), outperforming the previous solution. This outcome validated retiring the previous solution and enabled a full move to a scalable, cloud-native Snowflake data architecture.","type": "Breakout Session","date": "2026-06-04","day_name": "Thursday","start_time": "11:30 AM","end_time": "12:15 PM","duration_mins": "45.0","room": "Room 160 (Moscone South, Upper Mezzanine)","capacity": "232","track": "Data Engineering & Pipelines","session_type": "Breakout Session","location": "","topics": "System Integrations / Synchronizations","features": "Snowflake Openflow","personas": "Data Engineer","industry": "Financial Services","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Gil Mangussad | Senthilnathan Jegadeeswaran","speaker_companies": "Unionbank of the Philippines | Snowflake","speaker_titles": "AI/ML Platform Head | Senior Solutions Architect","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AR225","title": "What Apache Iceberg Is Bad at Doing \u2026 for Now","abstract": "Apache Iceberg is rapidly becoming the open source table standard, but popularity doesn\u2019t mean everyone is using it efficiently. The format has some strong features \u2014 ACID, metric pushdowns and hidden partitioning \u2014 but it also has some dangerous anti-patterns. In this talk we\u2019ll go over bloated metadata, inefficient metrics and missing maintenance bogging down query planning. You\u2019ll learn why these issues plague users of Iceberg tables and how to avoid them. Finally, we\u2019ll also go through how some of these problems won\u2019t even be an issue in version 4 with new proposals like \u201csingle file commits.\u201d Come and learn to avoid pitfalls like a pro and get a preview of what\u2019s coming next!","type": "Breakout Session","date": "2026-06-04","day_name": "Thursday","start_time": "11:30 AM","end_time": "12:15 PM","duration_mins": "45.0","room": "Room 206 (Moscone South, Level 2)","capacity": "101","track": "Architectures & Interoperability","session_type": "Breakout Session","location": "","topics": "Interoperability","features": "Apache Spark\u2122","personas": "Data Engineer","industry": "Not industry-specific","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Russell Spitzer","speaker_companies": "Snowflake","speaker_titles": "Principal Software Engineer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "WN217B","title": "What's New: Snowflake Intelligence and Cortex Agents for Real Business Impact","abstract": "AI is only as powerful as the context it understands. In this session, discover what\u2019s new in Snowflake Intelligence, the enterprise intelligence agent built to turn all your knowledge into trusted business decisions. Learn how organizations are moving beyond dashboards to uncover the critical \u201cwhy,\u201d grounded in governed enterprise data and shared business definitions. Discover how Snowflake Intelligence and Cortex Agents work together to move teams beyond static insights, enabling natural language intelligence, trusted reasoning and actionable workflows that help organizations analyze, act and drive outcomes with confidence.","type": "Breakout Session","date": "2026-06-04","day_name": "Thursday","start_time": "11:30 AM","end_time": "12:15 PM","duration_mins": "45.0","room": "Room 158 (Moscone South, Upper Mezzanine)","capacity": "583","track": "What's New in Snowflake","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Cortex AI Functions","personas": "Product Manager","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "OnDemand","speaker_names": "Effie Goenawan | Kelvin So | Mark Bishop","speaker_companies": "Snowflake | Snowflake | United Rentals","speaker_titles": "Principal Product Manager | Software Engineer | Director, Enterprise Reporting & Analytics","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "GO214","title": "Write Once, Enforce Everywhere: Interoperable Governance with Iceberg","abstract": "Interoperable governance means enforcing consistent row- and column-level security across all engines without fragmenting policies. How do you achieve this when engines differ? This talk presents two approaches via Apache Iceberg: Catalog-enforced FGAC using scan planning to return policy-enforced files ReadRestrictions standardization where catalogs return policy expressions engines interpreted for deeper integration You'll learn catalog-side architecture, including scan planning and policy evaluation. You'll also learn about two paths: transparent enforcement vs ReadRestrictions standardization \u2014 and trade-offs around interoperable governance.","type": "Breakout Session","date": "2026-06-04","day_name": "Thursday","start_time": "11:30 AM","end_time": "12:15 PM","duration_mins": "45.0","room": "Room 213 (Moscone South, Level 2)","capacity": "226","track": "Governance & Security","session_type": "Breakout Session","location": "","topics": "Catalogs / Discovery","features": "Apache Polaris","personas": "Data Engineer","industry": "Travel & Hospitality","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Vishwa Lakkundi | Prashant Singh","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Sr manager | Senior Software Engineer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AD101","title": "Snowflake Startup Challenge Finale","abstract": "Experience the 2026 Snowflake Startup Challenge Finale, held during Snowflake Dev Day in San Francisco. This annual competition draws hundreds of early-stage startups Powered by Snowflake, all vying to fuel AI innovation, gain global exposure and compete for up to $1 million in investments from Snowflake Ventures. Now in its sixth year, the Snowflake Startup Challenge \u2014 sponsored in partnership with the New York Stock Exchange \u2014 continues to spotlight and invest in the most innovative startups building on Snowflake. Join us as the top three finalists present their groundbreaking AI-driven solutions to an expert panel of judges, leading to the exciting announcement of this year\u2019s grand prize winner.","type": "Theater Session","date": "2026-06-04","day_name": "Thursday","start_time": "11:40 AM","end_time": "12:40 PM","duration_mins": "60.0","room": "Builders Hub Theater (Basecamp, South Hall D)","capacity": "443","track": "Application Development","session_type": "Theater Session","location": "Builder's Hub Theater","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "Introductory","delivery_method": "OnDemand","speaker_names": "Denise Persson | Benoit Dageville | Ajay Singh | Jon Herrick | Jon Barad | Yuval Carmel | Jeff Albrecht","speaker_companies": "Snowflake | Snowflake | Airrived | NYSE | Capital One Ventures | Twine Security | LGND AI","speaker_titles": "(CMO) Chief Marketing Officer | Co-Founder and President, Product | CTO | Chief Product Officer | Partner | VP R&D | Head of Engineering","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "MI202","title": "A Unified Data Foundation: iSpot's Move from Redshift to Snowflake on AWS","abstract": "Evolving a data platform is about more than migration \u2014 it\u2019s about building a unified foundation for scale. As iSpot grew, rising costs, system instability and duplicated data in Amazon Redshift increased operational overhead and led to customer-facing data issues. In this session, iSpot shares why they are consolidating on Snowflake on AWS, how they approached the migration amid growing AI investment, and what they learned. The shift improves platform stability, enables more consistent data delivery, and streamlines data quality processes while reducing duplication and support burden, laying the groundwork for scalable analytics and future AI innovation.","type": "Breakout Session","date": "2026-06-04","day_name": "Thursday","start_time": "12:00 PM","end_time": "12:45 PM","duration_mins": "45.0","room": "Room 152 (Moscone South, Upper Mezzanine)","capacity": "204","track": "Migrations & Modernization","session_type": "Breakout Session","location": "","topics": "Data Warehouse","features": "SnowConvert AI","personas": "BI / Analyst","industry": "Retail & Consumer Goods","department": "IT","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Federico Zoufaly Boldrini | Lucas Crowley","speaker_companies": "Snowflake | iSpot.tv","speaker_titles": "Director, Migrations & Modernizations | Senior Engineering Manager, Brands Audiences & Outcomes","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AD209","title": "Build an AI Agent with Streamlit and Postgres","abstract": "In this hands-on lab, we put you in the driver\u2019s seat of the modern AI application stack. Together we will build a powerful, data-friendly Python application using just two core technologies: Streamlit\u2019s \u201cpure Python\" approach for a rapid, beautiful frontend, and Postgres for robust data handling and semantic search. We will build a functional AI agent that allows users to query data using Snowflake Cortex AI. You will learn how to build a Streamlit interface, connect to an agent, and add interactive, data-driven elements like charts, graphs and maps. You\u2019ll leave this session with the tools to unlock value by turning existing data and static text into an interactive AI agent.","type": "Hands-on Lab","date": "2026-06-04","day_name": "Thursday","start_time": "12:00 PM","end_time": "01:30 PM","duration_mins": "90.0","room": "Hands-on Labs 1 (Basecamp, Hall E)","capacity": "299","track": "Application Development","session_type": "Hands-on Lab","location": "","topics": "AI Agents / Data Agents","features": "Snowflake Postgres","personas": "Software Developer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Chanin Nantasenamat | Elizabeth Christensen Christensen","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Lead Developer Advocate | Developer Advocate","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE109","title": "Eliminate the Integration Backlog: Automating Snowflake Data Connectors with AI","abstract": "Your AI is only as good as the data feeding it, yet 83% of firms struggle to ingest the diverse sources they need. Why? Because manual integration is a resource-heavy grind that stalls innovation. If your team is stuck maintaining legacy pipelines instead of building the future, this session is for you. We\u2019re introducing a new paradigm: the Boomi data connector agent. Discover how to use AI to autonomously generate data connectors against any source. See a live look at how to build, deploy and automate maintenance-free pipelines that scale with your Snowflake environment. Walk away with a blueprint to transform your team from swamped to strategic using AI-driven automation.","type": "Theater Session","date": "2026-06-04","day_name": "Thursday","start_time": "12:00 PM","end_time": "12:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Data Engineering & Pipelines","session_type": "Theater Session","location": "General Theaters","topics": "Snowflake Partners","features": "Other","personas": "MLOps","industry": "Technology","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Jeffrey Li","speaker_companies": "Boomi","speaker_titles": "Technical Product Marketing Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "ML218","title": "From Tecton to Snowflake: How Attentive Powers Production ML at Scale","abstract": "Production ML relies on features that are consistent, governed and available in real time. In this session, we share what\u2019s new in Snowflake Feature Store and how teams productionize large-scale ML with minimal operational overhead. We'll highlight new product capabilities that simplify feature reuse and improve freshness, reliability and performance around efficient aggregations. You will hear about Attentive's customer journey efficiently migrating its feature store to Snowflake for streamlined production-grade ML across the organization at scale.","type": "Breakout Session","date": "2026-06-04","day_name": "Thursday","start_time": "12:00 PM","end_time": "12:45 PM","duration_mins": "45.0","room": "Room 151 (Moscone South, Upper Mezzanine)","capacity": "204","track": "Machine Learning","session_type": "Breakout Session","location": "","topics": "System Integrations / Synchronizations","features": "Snowflake ML","personas": "MLOps","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Scott Totten | Ravi Kumar Suresh Babu","speaker_companies": "Attentive Mobile | Snowflake","speaker_titles": "Staff Software Engineer - ML Platform | Staff Software Engineer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE220","title": "How Canva Uses Event-Driven APIs and Scalable Pipelines with Snowflake Openflow","abstract": "Polling for data is inefficient, and manual resource management breaks at scale. This deep dive, co-presented wtih Canva, explores how Snowflake Openflow evolves into a programmable layer of the AI Data Cloud. We'll show how to design event-based flows with Snowflake Openflow Endpoints, a new capability that exposes listeners to handle inbound events. Participants will learn how to design \"push-based\" architectures that react instantly, backed by the new Snowflake Openflow APIs. We'll demonstrate how to programmatically manage the lifecycle of Runtimes and Connectors using the new API. Join us to build a system that's not only event-driven but fully deployable via code.","type": "Breakout Session","date": "2026-06-04","day_name": "Thursday","start_time": "12:00 PM","end_time": "12:45 PM","duration_mins": "45.0","room": "Room 205 (Moscone South, Level 2)","capacity": "226","track": "Data Engineering & Pipelines","session_type": "Breakout Session","location": "","topics": "System Integrations / Synchronizations","features": "Snowflake Openflow","personas": "Data Engineer","industry": "Not industry-specific","department": "Operations","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Inam Imthiyaz | Sam Lachterman","speaker_companies": "Canva | Snowflake","speaker_titles": "Senior Analytics Engineer | Senior Manager, Product","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AR230","title": "Interoperable Lakehouse 101: Single Governed Data Copy for AI Readiness","abstract": "Stop the data silo and fragmentation tax. In this introductory hands-on lab, you will learn how to work on a single governed data copy that slashes costs and engineering effort. You will create Apache Iceberg tables in Snowflake Storage, apply Snowflake Horizon governance and secure multi-engine, and build Semantic Views to use AI to query your lakehouse with natural language. Achieve true data autonomy over your data and make your architecture AI-ready.","type": "Hands-on Lab","date": "2026-06-04","day_name": "Thursday","start_time": "12:00 PM","end_time": "01:30 PM","duration_mins": "90.0","room": "Hands-on Labs 3 (Basecamp, Hall E)","capacity": "133","track": "Architectures & Interoperability","session_type": "Hands-on Lab","location": "","topics": "Catalogs / Discovery","features": "Apache Polaris","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Shyamala Jayabalan | Sahil Walia","speaker_companies": "Snowflake Inc. | Snowflake Inc.","speaker_titles": "solutions architect | Solutions Architect - Data Eng. & AI","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "PO219","title": "The Optima Vision: Making it Impossible to Run Inefficiently on Snowflake","abstract": "Snowflake Optima is our new optimization engine that represents a paradigm shift in effortless performance. It leverages deep intelligence, automatically analyzes your workload history and delivers intelligent optimizations that automatically accelerate performance. The result: industry-leading performance, made even simpler. This session dives deep into how Optima automatically optimizes your workloads and announces exciting new Optima features.","type": "Theater Session","date": "2026-06-04","day_name": "Thursday","start_time": "12:00 PM","end_time": "12:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 2 (Basecamp, South Hall A)","capacity": "150","track": "Performance & Cost Optimization","session_type": "Theater Session","location": "General Theaters","topics": "Data Warehouse","features": "Snowflake Optima","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Tim Sander | Julian Weise","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Senior Product Manager | Senior Software Engineer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DH16","title": "User Group Meetup: US / Bay Area","abstract": "Join us at the AI Pop Up for the Bay Area User Group Meetup! Connect with Snowflake practitioners from one of the world\u2019s most vibrant tech communities. Whether you\u2019re building AI-powered applications, scaling data pipelines or exploring new Snowflake capabilities, this is your chance to meet peers, share insights and grow your local network.","type": "AI Pop Up","date": "2026-06-04","day_name": "Thursday","start_time": "12:00 PM","end_time": "01:00 PM","duration_mins": "60.0","room": "AI Pop Up (Basecamp, South, Hall D)","capacity": "0","track": "","session_type": "AI Pop Up","location": "","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "","delivery_method": "","speaker_names": "","speaker_companies": "","speaker_titles": "","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI272","title": "Your Data Already Has Answers \u2014 Build an Agent to Find Them","abstract": "Build a Cortex Agent using Cortex Code in the Snowsight interface. You'll configure the agent with Snowflake Cortex Analyst for structured data querying and Snowflake Cortex Search for document Q&A, web search, a custom tool and more \u2014 creating an agent that answers questions across both structured and unstructured sources.","type": "Hands-on Lab","date": "2026-06-04","day_name": "Thursday","start_time": "12:00 PM","end_time": "01:30 PM","duration_mins": "90.0","room": "Hands-on Labs 2 (Basecamp, Hall E)","capacity": "139","track": "Generative AI & Agents","session_type": "Hands-on Lab","location": "","topics": "AI Agents / Data Agents","features": "Cortex Code","personas": "","industry": "Not industry-specific","department": "","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "James Cha-Earley | Dash Desai","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Senior Developer Advocate | Principal Developer Advocate","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE233","title": "From Customer to Co\u2011Creator: Aviv\u2019s Role in Shaping dbt Projects on Snowflake","abstract": "When a KKR\u2011backed European classifieds group committed to rebuilding its data platform in under six months, it also reframed Snowflake as a co\u2011builder rather than a vendor. Aviv and Snowflake formed a joint squad of product managers, engineers and data practitioners focused on dbt Projects on Snowflake. Aviv gained faster, cleaner delivery of five revenue\u2011critical data products and a single governed way of working. Attendees will see how Snowflake gained a demanding early adopter whose real\u2011world requirements and design reviews directly shaped the maturity, usability and roadmap of dbt Projects.","type": "Breakout Session","date": "2026-06-04","day_name": "Thursday","start_time": "12:30 PM","end_time": "01:15 PM","duration_mins": "45.0","room": "Room 211 (Moscone South, Level 2)","capacity": "226","track": "Data Engineering & Pipelines","session_type": "Breakout Session","location": "","topics": "Other","features": "Snowpipe Streaming / Dynamic Tables","personas": "Data Engineer","industry": "Not industry-specific","department": "IT","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Uche Nkadi | Ant\u00f3nio Costa","speaker_companies": "Snowflake | Aviv Group","speaker_titles": "Senior Product Manager | Director of Data Engineering (reporting into Chief Data and AI Officer)","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI284","title": "The Agentic Enterprise: How Snowflake AI Is Redefining Work","abstract": "Your enterprise data already holds the answers. The challenge is getting AI to understand it and act on it securely. In this session, our head of AI product shares Snowflake's vision for the agentic enterprise: where every user has a personal work agent that builds context from your data automatically, works across structured and unstructured sources, and operates within full governance. See how customers build sales call analyzers, automate financial reporting and deploy customer-facing agents in minutes. Whether you're building agents with Cortex Code or using them through Snowflake Intelligence, you'll leave knowing how to put governed, model-agnostic AI to work.","type": "Breakout Session","date": "2026-06-04","day_name": "Thursday","start_time": "12:30 PM","end_time": "01:15 PM","duration_mins": "45.0","room": "Room 160 (Moscone South, Upper Mezzanine)","capacity": "232","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Baris Gultekin","speaker_companies": "Snowflake","speaker_titles": "VP, Product Management","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AR216","title": "The Enterprise Intelligence Stack: How AI Agents Turn Data into Decision","abstract": "Data platforms are evolving from powering dashboards to powering AI-driven decisions. In this session, we introduce the Enterprise Intelligence Stack, an architecture that connects AI assistants and agents to governed enterprise data through an agentic control plane. See how organizations access hybrid data across Snowflake and Iceberg lakehouses using open analytics engines, then layer data products, governance and AI agents to automate discovery, generate insights and trigger action, all without replatforming.","type": "Theater Session","date": "2026-06-04","day_name": "Thursday","start_time": "12:30 PM","end_time": "12:50 PM","duration_mins": "20.0","room": "Basecamp South Theater 2 (Basecamp, South Hall A)","capacity": "150","track": "Architectures & Interoperability","session_type": "Theater Session","location": "General Theaters","topics": "Interoperability","features": "Cortex AI Functions","personas": "MLOps","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Jitender Aswani","speaker_companies": "Starburst","speaker_titles": "Senior Vice President Engineering","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI270","title": "Using Cortex Agents for Monitoring Pipelines","abstract": "The product data science team at Snowflake is redefining the data engineering lifecycle with Cortex Agents. As ecosystems scale, manual pipeline management becomes a bottleneck; our solution is an AI-driven orchestrator built to manage an unlimited number of dbt pipelines. This session explores how the agent automates the entire journey: generating optimized code from scratch, \"auto-healing\" failing DAGs via intelligent troubleshooting and enforcing best practices. We will demonstrate how Snowflake Cortex AI handles automated quality testing, allowing teams to move beyond manual oversight. Discover how Snowflake is making AI-native engineering the standard for reliability and scale.","type": "Breakout Session","date": "2026-06-04","day_name": "Thursday","start_time": "12:30 PM","end_time": "01:15 PM","duration_mins": "45.0","room": "Room 215 (Moscone South, Level 2)","capacity": "226","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Semantic Views","personas": "Data Engineer","industry": "Not industry-specific","department": "IT","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Zachary Blackwood","speaker_companies": "Snowflake","speaker_titles": "Staff Data Scientist","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "WN215T","title": "What\u2019s New: Build and Deploy Apps at Lightning Speed","abstract": "Bring your code to your data, and go from ideas to apps in minutes. Snowflake Apps is evolving to bridge the gap between your code and the enterprise data ecosystem. We\u2019ll unveil the launch of native support for modern frontend frameworks like React and showcase new integrations with AI-powered development workflows. Discover how to move from a natural language prompt to a secure, production-ready app in record time, and hear from companies that are already building faster on Snowflake.","type": "Theater Session","date": "2026-06-04","day_name": "Thursday","start_time": "12:30 PM","end_time": "12:50 PM","duration_mins": "20.0","room": "Basecamp South Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "What's New in Snowflake","session_type": "Theater Session","location": "General Theaters","topics": "Data Warehouse","features": "Streamlit / Streamlit in Snowflake","personas": "Product Manager","industry": "Not industry-specific","department": "R&D","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Dinesh Kulkarni | Abhi Saini","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Product Manager | Manager of Product Management","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI255","title": "What's New in Snowflake AI Research","abstract": "Snowflake AI Research is focused on delivering high-quality, efficient AI for real enterprise workloads \u2014 bridging state-of-the-art research with practical product impact. In this session, we\u2019ll share what\u2019s new across our research agenda, highlighting key directions including model-agent co-design to improve task success and reliability, vertical models specialized for enterprise use cases, and advanced training and inference systems that enhance usability and performance while reducing cost and latency. We\u2019ll also share principles and lessons learned, and how research transitions into production to help teams build trustworthy AI applications on governed data at scale.","type": "Breakout Session","date": "2026-06-04","day_name": "Thursday","start_time": "12:30 PM","end_time": "01:15 PM","duration_mins": "45.0","room": "Room 159 (Moscone South, Upper Mezzanine)","capacity": "213","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Cortex AI Functions","personas": "Data Engineer","industry": "Not industry-specific","department": "R&D","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Samyam Rajbhandari | Yuxiong He","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Principal Architect | Senior Director","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI274","title": "An AI\u2010Native Operating Model: Lessons from Building Snowflake Cortex Code","abstract": "Becoming AI-native involves redesigning how your organization makes decisions, learns and ships software. In this session, we use the story of building Snowflake Cortex Code to illustrate an end-to-end AI-first operating model. We\u2019ll cover framing problems with AI as a thinking partner, cross-functional co-creation in code and agents, and using AI to automate reviews and research. We\u2019ll share the concrete structures that helped us move fast without losing trust: one-week ship cycles, outcome-oriented dashboards and a shared map for AI-native roles. You\u2019ll leave with a reference architecture, organizational structure and tooling to guide your AI transformation.","type": "Breakout Session","date": "2026-06-04","day_name": "Thursday","start_time": "01:00 PM","end_time": "01:45 PM","duration_mins": "45.0","room": "Room 208 (Moscone South, Level 2)","capacity": "197","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "Snowflake on Snowflake","features": "Cortex Code","personas": "Product Manager","industry": "Not industry-specific","department": "Operations","technical_level": "Introductory","delivery_method": "OnDemand","speaker_names": "Evelyn Kim | Umesh Unnikrishnan","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Head of Product Design | Head of Developer Experiences","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AR215","title": "Apache Polaris in Practice: Open Catalogs, Open Formats, Open Community","abstract": "Learn how Apache Polaris is becoming the open catalog layer for every engine and format. Engineers from Snowflake and other organizations will walk through new capabilities including S3-compatible on-prem storage, generic tables, a built-in policy store, audit logs and events, catalog federation and the evolving Polaris REST catalog spec. A customer and a partner will demonstrate how they use and contribute to Polaris, including Delta, Lance format support beyond Iceberg and concrete ways you can get involved.","type": "Breakout Session","date": "2026-06-04","day_name": "Thursday","start_time": "01:00 PM","end_time": "01:45 PM","duration_mins": "45.0","room": "Room 210 (Moscone South, Level 2)","capacity": "101","track": "Architectures & Interoperability","session_type": "Breakout Session","location": "","topics": "Catalogs / Discovery","features": "Apache Polaris","personas": "MLOps","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Vishwa Lakkundi | Lei Xu","speaker_companies": "Snowflake | LanceDB","speaker_titles": "Sr manager | Co-Founder & CTO","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AD203","title": "Build REST APIs for your Data Product with Snowpark Container Services","abstract": "Data products evolve, and so must their APIs. This session focuses on how Snowflake SPCS empowers developers to host and run data applications, including custom services, directly alongside their data. The core theme is offering your data applications as seamless REST APIs to consumers. We'll show a practical example of wrapping a data product in an API and allowing partners or customers to consume the service instantly via standard HTTP requests, completely bypassing the need for installing connectors and drivers. This approach drastically simplifies consumption and opens new avenues for data monetization and Secure Data Sharing.","type": "Theater Session","date": "2026-06-04","day_name": "Thursday","start_time": "01:00 PM","end_time": "01:20 PM","duration_mins": "20.0","room": "Vertical Village Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Application Development","session_type": "Theater Session","location": "Vertical Village","topics": "System Integrations / Synchronizations","features": "Snowpark / Snowpark Connect","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Ovi Hutuleac","speaker_companies": "Snowflake","speaker_titles": "Solutions Architect","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "L5","title": "Grow Your Career in the Age of AI - AMA","abstract": "The workforce is at a breaking point. Between a volatile tech market and the rise of autonomous AI, the traditional career ladder has been shifting and considered a moving target. But disruption is the greatest catalyst for growth. We are entering the agentic era \u2014 a frontier where AI doesn't just assist but acts. This session explores how industry veterans and newcomers alike can stop playing defense, master the art of AI collaboration and pivot their skill sets to thrive in the new economy. Where there is disruption there is massive opportunity. This is the moment to reskill and pivot to meet the demands of the rapidly expanding landscape created by the agentic era. Join Snowflake\u2019s Chief People Officer, Arnnon Geshuri, as he leads a cross-disciplinary panel of luminaries covering venture capital, academia and the economy. They share their insights and answer your questions in an interactive and candid AMA.","type": "Dev Day Luminary Talk","date": "2026-06-04","day_name": "Thursday","start_time": "01:00 PM","end_time": "01:50 PM","duration_mins": "50.0","room": "Builders Hub Theater (Basecamp, South Hall D)","capacity": "443","track": "Generative AI & Agents","session_type": "Dev Day Luminary Talk","location": "Builder's Hub Theater","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "","delivery_method": "OnDemand","speaker_names": "Arnnon Geshuri | Grace Gong | Scott Budman | Sanjiv Das","speaker_companies": "Snowflake | Smart Venture Media | NBC News | Santa Clara University","speaker_titles": "Chief People Officer | Founder & CEO | Tech Reporter | Professor of Finance and Data Science","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI222B","title": "How We Made Snowflake 10x Faster for Real-Time Interactive Analytics","abstract": "This session will cover Snowflake Interactive, including how we made it to be 10x higher in concurrency and 15x lower on ingestion latency. We'll provide ideal business use cases, a technical overview, a deep dive and a demo.","type": "Breakout Session","date": "2026-06-04","day_name": "Thursday","start_time": "01:00 PM","end_time": "01:45 PM","duration_mins": "45.0","room": "Room 212 (Moscone South, Level 2)","capacity": "101","track": "BI & Analytics","session_type": "Breakout Session","location": "","topics": "Data Warehouse","features": "Interactive Tables","personas": "Data Engineer","industry": "Not industry-specific","department": "","technical_level": "","delivery_method": "Live","speaker_names": "Will Xu","speaker_companies": "Snowflake","speaker_titles": "Principal product manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AD301","title": "Making Medicine Computable: Scaling Multimodal Foundation Models on Snowflake","abstract": "We introduce APOLLO, a multimodal clinical foundation model trained on 25 billion longitudinal records from Mass General Brigham for advanced similarity search and outcome prediction. Aevius will showcase a Snowflake Native App that generates APOLLO embeddings within a client\u2019s secure environment \u2014 enabling hospitalwide search without exposing PHI. This deployment provides a roadmap for enterprise intelligence, using agentic workflows and reasoning to automate complex analytical tasks.","type": "Breakout Session","date": "2026-06-04","day_name": "Thursday","start_time": "01:00 PM","end_time": "01:45 PM","duration_mins": "45.0","room": "Room 205 (Moscone South, Level 2)","capacity": "226","track": "Application Development","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Cortex Agents","personas": "Data Scientist","industry": "Healthcare and Life Sciences","department": "R&D","technical_level": "Advanced","delivery_method": "OnDemand","speaker_names": "Rowland Pettit | Murali Gandhirajan Gandhirajan | Max Lu","speaker_companies": "Aevius | Snowflake | Aevius Labs","speaker_titles": "Co-Founder, CEO | Global Regulated Industries CTO | CTO","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI120","title": "Onboarding AI: From Business Ambiguity to AI Accuracy with Semantic Models","abstract": "AI initiatives often stall not because of algorithms but because underlying data lacks structure, meaning and governance. Without a semantic foundation, AI agents and analytics tools struggle to interpret business context. In this session, we explore how semantic modeling bridges the gap between business meaning and AI-ready data. Learn how modern data teams use structured semantic layers, governed data models and collaborative design workflows to turn ambiguous business questions into accurate AI outputs, enabling trusted analytics, reliable AI agents and scalable data products on Snowflake.","type": "Theater Session","date": "2026-06-04","day_name": "Thursday","start_time": "01:00 PM","end_time": "01:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "General Theaters","topics": "Catalogs / Discovery","features": "Semantic Views","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Serge Gershkovich","speaker_companies": "SqlDBM","speaker_titles": "Head of Product","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI206","title": "PagerDuty Uses Snowflake Cortex AI for Efficient, Consistent Customer Engagement","abstract": "PagerDuty, in collaboration with Snowflake Professional Services, has transformed how its leadership, sales and field teams access information and make decisions, thanks to the implementation of Snowflake Cortex AI services. The solution leverages Cortex Agents, Cortex Analyst and Cortex Search to gather data from multiple sources on the customer's next best action, contact information and recommended next steps. This information is then concisely summarized and presented in a unified, actionable format. PagerDuty estimates this initiative will result in multi-million-dollar savings while ensuring organizational consistency in customer interactions throughout the customer lifecycle.","type": "Theater Session","date": "2026-06-04","day_name": "Thursday","start_time": "01:00 PM","end_time": "01:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 2 (Basecamp, South Hall A)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "General Theaters","topics": "AI Agents / Data Agents","features": "Other","personas": "Product Manager","industry": "Not industry-specific","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Manu Raj | Nick DiRienzo","speaker_companies": "Pagerduty | Snowflake","speaker_titles": "Sr Director - Enterprise Data & AI | Lead Manager - Solutions Architecture","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "ML102","title": "Turning AI Predictions into Real-World Water Solutions","abstract": "Water is our most vital resource, yet its quality remains a global puzzle. Using some of the 26 million data points from the UN Environment Programme, participants of the 2026 EY AI and Data Challenge developed ML models to uncover the environmental drivers of water quality. But how do we move from a challenge competition to real-world usability? This panel explores the commercialization roadmap for water-quality AI. We address: Expanded data needs Improvements to model accuracy Funding and partnerships","type": "Breakout Session","date": "2026-06-04","day_name": "Thursday","start_time": "01:00 PM","end_time": "01:45 PM","duration_mins": "45.0","room": "Room 216 (Moscone South, Level 2)","capacity": "197","track": "Machine Learning","session_type": "Breakout Session","location": "","topics": "Snowflake Partners","features": "Geospatial functions","personas": "Product Manager","industry": "Public Sector","department": "R&D","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Brian Killough | Matt Finkle | Allie Janoch | Felipe Jorquera Diaz","speaker_companies": "EY | Imagine H2O | Mapistry | EY","speaker_titles": "EY AI & Data Challenge Director | Senior Portfolio Associate | Cofounder & CEO | EY AI & Data Challenge 2026 Winner","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "WN214B","title": "What's New: Agentic ML in Snowflake","abstract": "Learn how the latest agentic capabilities in Snowflake ML accelerate productivity for your ML teams. Join us for new feature overviews and a live demo showcasing our latest innovations.","type": "Breakout Session","date": "2026-06-04","day_name": "Thursday","start_time": "01:00 PM","end_time": "01:45 PM","duration_mins": "45.0","room": "Room 158 (Moscone South, Upper Mezzanine)","capacity": "583","track": "What's New in Snowflake","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Cortex Code","personas": "MLOps","industry": "Not industry-specific","department": "R&D","technical_level": "Introductory","delivery_method": "OnDemand","speaker_names": "Pavan Pothukuchi | Jeffrey Geevarghese","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Director, Product Management | Sr Engineering Manager, AI/ML Platforms","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "GO216","title": "Zero PII, Full Insights: Cortex AI Transforms Insurance Claims Processing","abstract": "How do you unlock analytics from claims data packed with sensitive PII? Global Excel Management leverages Cortex and Horizon Catalog's AI_REDACT to automatically detect and redact personal information at scale. Join us to see our real-world architecture, chunking strategies for long documents, and how we combined AI_REDACT with other Cortex functions to build a compliant, insight-rich claims pipeline. Learn practical strategies for chunking long documents, handling edge cases and building a privacy-first data pipeline that satisfies regulators while unlocking AI-driven insights.","type": "Theater Session","date": "2026-06-04","day_name": "Thursday","start_time": "01:00 PM","end_time": "01:20 PM","duration_mins": "20.0","room": "Vertical Village Theater 2 (Basecamp, South Hall B)","capacity": "150","track": "Governance & Security","session_type": "Theater Session","location": "Vertical Village","topics": "Interoperability","features": "Cortex AI Functions","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Walid Elguebaly","speaker_companies": "Global Excel Management","speaker_titles": "Head Data, Analytics & AI","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI234","title": "3 Essentials for Building Winning AI Projects","abstract": "Many AI projects fail not because of models but because the data lacks context. AI success relies on knowing where data lives, what it means and whether it is fresh. Without enterprise context, applications and agents fail. Join Cloudera and Sanjeev Mohan, Analyst at SanjMo, to explore three essentials to give AI the context it needs: Connected data across your ecosystem Trusted governance for secure access Real-time pipelines for fresh knowledge Learn how Cloudera and Snowflake provide the data foundation to discover and securely access the right data. Move from isolated experiments to AI projects that deliver measurable, business-ready outcomes.","type": "Theater Session","date": "2026-06-04","day_name": "Thursday","start_time": "01:30 PM","end_time": "01:50 PM","duration_mins": "20.0","room": "Vertical Village Theater 2 (Basecamp, South Hall B)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "Vertical Village","topics": "Interoperability","features": "Apache Polaris","personas": "Data Engineer","industry": "Telecom","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Sanjeev Mohan | Navita Sood","speaker_companies": "Sanjmo | Cloudera","speaker_titles": "Principal | Director Product Marketing, Data and AI","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DH17","title": "Women X AI","abstract": "Join us at the AI Pop Up for a session with Women X AI, a community dedicated to amplifying women\u2019s voices, leadership and impact in artificial intelligence. Learn about their network of founders, researchers and builders working to ensure women are not just included in AI \u2014 but leading it. Whether you\u2019re a builder, strategist or just getting started, come connect, get inspired and discover how to get involved.","type": "AI Pop Up","date": "2026-06-04","day_name": "Thursday","start_time": "01:30 PM","end_time": "02:30 PM","duration_mins": "60.0","room": "AI Pop Up (Basecamp, South, Hall D)","capacity": "0","track": "","session_type": "AI Pop Up","location": "","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "","delivery_method": "","speaker_names": "","speaker_companies": "","speaker_titles": "","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI271","title": "Accelerate AI Development: Build and Evaluate a RAG App with Cortex Code","abstract": "Across three modules, participants progress from foundational LLM concepts to a fully evaluated retrieval-augmented generation (RAG) pipeline and a natural language text-to-SQL interface. Throughout, Cortex Code serves as an AI coding assistant, helping participants generate, understand and debug Snowflake SQL and Python in real time. By the end of this lab, you will be able to: Build a production RAG pipeline using Snowflake Cortex Search and Snowflake Notebooks Use Cortex Code to accelerate development with AI-generated SQL and Python Implement text-to-SQL to give business users natural language access to structured data Evaluate LLM response quality using an LLM-as-judge scoring framework","type": "Hands-on Lab","date": "2026-06-04","day_name": "Thursday","start_time": "02:00 PM","end_time": "03:30 PM","duration_mins": "90.0","room": "Hands-on Labs 2 (Basecamp, Hall E)","capacity": "139","track": "Generative AI & Agents","session_type": "Hands-on Lab","location": "","topics": "AI Agents / Data Agents","features": "Cortex Code","personas": "MLOps","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Chris Caudill","speaker_companies": "Snowflake","speaker_titles": "Senior AI/ML Architect, AFE","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI307","title": "Building an End-to-End AI Application on Snowflake: From Data to Intelligence","abstract": "Build a complete AI retail app entirely in Snowflake. Start by using Cortex Code to generate SQL and dbt models for metrics such as CLV. Next, train a GPU-accelerated XGBoost model in Snowflake Notebooks, register it, and deploy it as a service. To handle OLTP, use Snowflake Postgres and sync data to Apache Iceberg on S3, demonstrating lakehouse interoperability with pg_lake. Finally, unify the stack with Snowflake Intelligence, a conversational interface orchestrating Snowflake Cortex Analyst, Snowflake Cortex Search and your ML models for a seamless analytical experience.","type": "Hands-on Lab","date": "2026-06-04","day_name": "Thursday","start_time": "02:00 PM","end_time": "03:30 PM","duration_mins": "90.0","room": "Hands-on Labs 1 (Basecamp, Hall E)","capacity": "299","track": "Generative AI & Agents","session_type": "Hands-on Lab","location": "","topics": "Interoperability","features": "Snowflake Intelligence","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Advanced","delivery_method": "Live","speaker_names": "Dash Desai | Arun Agarwal","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Principal Developer Advocate | Product Marketing Lead, AI / ML","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "L6","title": "The Autonomy Paradox: Will Humans Always Be in the Loop?","abstract": "The industry is racing toward fully autonomous agents, yet enterprise deployments keep hitting the same barrier: production-grade confidence. Is full autonomy really the end goal, or will human-in-the-loop remain a permanent and essential layer of enterprise AI? And beyond autonomy, what other paths can give enterprises the confidence required for production use?","type": "Dev Day Luminary Talk","date": "2026-06-04","day_name": "Thursday","start_time": "02:00 PM","end_time": "02:20 PM","duration_mins": "20.0","room": "Builders Hub Theater (Basecamp, South Hall D)","capacity": "443","track": "Generative AI & Agents","session_type": "Dev Day Luminary Talk","location": "Builder's Hub Theater","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "","delivery_method": "OnDemand","speaker_names": "Jo\u00e3o Moura | Anahita Tafvizi","speaker_companies": "CrewAI | Snowflake","speaker_titles": "CEO & CoFounder | Chief Data & AI Officer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI214","title": "The Builder\u2019s Guide to Sigma AI Apps: Workflows, Cortex Agents and AI Functions","abstract": "What separates an AI app from a chatbot? Action tools that write data, control the UI and send notifications. This lab teaches data professionals to build code-free agentic workflows. Step into the shoes of a Sigma AI app developer to build a \"Sales Pipeline Analyzer\" similar to the one that Sigma uses internally. You will orchestrate Snowflake Cortex Agents to parse unstructured transcripts and extract insights like deal health and risks. Using Cortex AI Functions and Sigma's native writeback, you will land newly structured data securely in your warehouse. Finally, configure action tools to escalate at-risk deals via email and dynamically reconfigure the dashboard.","type": "Hands-on Lab","date": "2026-06-04","day_name": "Thursday","start_time": "02:00 PM","end_time": "03:30 PM","duration_mins": "90.0","room": "Hands-on Labs 3 (Basecamp, Hall E)","capacity": "133","track": "BI & Analytics","session_type": "Hands-on Lab","location": "" l inevitably break down. Today's enterprise tech stacks were built exclusively for human engineers. So what happens when your most active code contributors become machines? In this session, Factory's CEO, Matan Grinberg, explores the fundamental infrastructure shift required to support an autonomous engineering workforce. Moving beyond simple code generation, Matan discusses the industry-wide necessity of \"paving the roads\" for agentic systems. He illustrates how the entire software development lifecycle (SDLC) must evolve, offering builders a practical framework for transitioning to agent-native environments. Attendees learn how to establish the deterministic guardrails, AI-readable APIs and robust data foundations necessary for autonomous systems to build, test and deploy at full speed.","type": "Dev Day Luminary Talk","date": "2026-06-04","day_name": "Thursday","start_time": "03:00 PM","end_time": "03:20 PM","duration_mins": "20.0","room": "Builders Hub Theater (Basecamp, South Hall D)","capacity": "443","track": "Generative AI & Agents","session_type": "Dev Day Luminary Talk","location": "Builder's Hub Theater","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "","delivery_method": "OnDemand","speaker_names": "Eno Reyes","speaker_companies": "Factory","speaker_titles": "CTO & Co-Founder","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "L9","title": "Winning When Code Is Free: How Developers Build AI Startups That Scale","abstract": "As coding costs approach zero and technical moats disappear, the advantage shifts from engineering to strategy. This talk shows developers how to build companies that win through product-led growth, distribution, network effects and community integration, and how these factors align with what investors look for in scalable AI startups.","type": "Dev Day Luminary Talk","date": "2026-06-04","day_name": "Thursday","start_time": "03:30 PM","end_time": "03:50 PM","duration_mi
