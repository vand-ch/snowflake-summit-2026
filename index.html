in us for an intimate fireside chat with Parag Agrawal, Founder of Parallel and former CEO/CTO at Twitter. No slides or pitch decks necessary - just real talk about the challenges and opportunities in modern data engineering, AI, and building data-driven organizations. Perfect networking opportunity with peers and industry leaders.","type": "Fireside Chat","date": "2026-06-02","day_name": "Tuesday","start_time": "04:30 PM","end_time": "06:00 PM","duration_mins": "90.0","room": "Club Hex (667 Howard St)","capacity": "150","track": "Social & Networking","session_type": "Fireside Chat & Networking","location": "Club Hex","topics": "Data Leadership, Engineering Culture, AI Strategy","features": "Networking, Industry Insights","personas": "Data Leaders, Engineering Leaders","industry": "All","department": "All","technical_level": "All Levels","delivery_method": "Live","speaker_names": "Parag Agrawal","speaker_companies": "Parallel (Former Twitter CEO/CTO)","speaker_titles": "Founder, Former CEO & CTO of Twitter","status": "Accepted","modified": "2026-05-22T18:00:00Z"}],"tracks": ["Application Development","Architectures & Interoperability","BI & Analytics","Data Engineering & Pipelines","Data Sharing & Marketplace","Generative AI & Agents","Governance & Security","Industry Innovation","Machine Learning","Migrations & Modernization","Performance & Cost Optimization","What's New in Snowflake","Product & Platform","Social & Networking"],"types": ["AI Pop Up","Activity","Breakout Session","CTO Circle","Dev Day Luminary Talk","Engineering Advocate Program","Executive Content","Hands-on Lab","Keynote","Snowflake Training","Theater Session"]};

        const DATA_PLACEHOLDER = "DATA_WILL_BE_INSERTED_HERE";
        let allSessions = [];
        let currentDay = '2026-06-01';
        let selectedSessions = new Set();

        function parseTime(timeStr) {
            // Parse "09:00 AM" format to minutes since midnight
            if (!timeStr) return 0;
            const match = timeStr.match(/(\d+):(\d+)\s*(AM|PM)/i);
            if (!match) return 0;

            let hours = parseInt(match[1]);
            const minutes = parseInt(match[2]);
            const period = match[3].toUpperCase();

            if (period === 'PM' && hours !== 12) hours += 12;
            if (period === 'AM' && hours === 12) hours = 0;

            return hours * 60 + minutes;
        }

        function getSessionTimeRange(session) {
            const start = parseTime(session.start_time);
            const duration = parseFloat(session.duration_mins) || 0;
            return {
                start: start,
                end: start + duration,
                date: session.date
            };
        }

        function hasTimeConflict(session1, session2) {
            if (session1.date !== session2.date) return false;

            const r1 = getSessionTimeRange(session1);
            const r2 = getSessionTimeRange(session2);

            // Check if time ranges overlap
            return !(r1.end <= r2.start || r2.end <= r1.start);
        }

        function getConflictingSessions() {
            const conflicts = new Set();

            // Get all selected sessions
            const selected = allSessions.filter(s => selectedSessions.has(s.code));

            // For each session, check if it conflicts with any selected session
            allSessions.forEach(session => {
                if (selectedSessions.has(session.code)) return; // Don't mark selected as conflict

                selected.forEach(selectedSession => {
                    if (hasTimeConflict(session, selectedSession)) {
                        conflicts.add(session.code);
                    }
                });
            });

            return conflicts;
        }

        function init() {
            // Load data
            if (typeof SUMMIT_DATA !== 'undefined') {
                allSessions = SUMMIT_DATA.sessions;
                initFilters(SUMMIT_DATA.tracks);
            }

            // Load saved selections
            const saved = localStorage.getItem('summit_selected');
            if (saved) selectedSessions = new Set(JSON.parse(saved));

            // Check for URL parameter to load CSV
            const urlParams = new URLSearchParams(window.location.search);
            const csvFile = urlParams.get('load');
            if (csvFile) {
                loadCSVFromURL(csvFile);
            }

            // Event listeners
            document.getElementById('search').addEventListener('input', render);
            document.getElementById('trackFilter').addEventListener('change', render);
            document.getElementById('starredFilter').addEventListener('change', render);

            switchDay(currentDay);
        }

        function initFilters(tracks) {
            const select = document.getElementById('trackFilter');
            tracks.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t;
                opt.textContent = t;
                select.appendChild(opt);
            });
        }

        function switchDay(day) {
            currentDay = day;
            render();
        }

        function getFiltered() {
            const search = document.getElementById('search').value.toLowerCase();
            const track = document.getElementById('trackFilter').value;
            const showStarred = document.getElementById('starredFilter').value === 'starred';

            return allSessions.filter(s => {
                // Show all days now - removed date filter
                if (showStarred && !selectedSessions.has(s.code)) return false;
                if (track && s.track !== track) return false;
                if (search && !`${s.title} ${s.abstract} ${s.code}`.toLowerCase().includes(search)) return false;
                return true;
            });
        }

        function groupByTime(sessions) {
            const groups = {};
            sessions.forEach(s => {
                const key = s.start_time || 'TBD';
                if (!groups[key]) groups[key] = [];
                groups[key].push(s);
            });
            return groups;
        }

        function render() {
            const filtered = getFiltered();
            const conflicts = getConflictingSessions();

            // Group by day first, then by time
            const days = [
                {date: '2026-06-01', label: 'Monday, June 1, 2026'},
                {date: '2026-06-02', label: 'Tuesday, June 2, 2026'},
                {date: '2026-06-03', label: 'Wednesday, June 3, 2026'},
                {date: '2026-06-04', label: 'Thursday, June 4, 2026'}
            ];

            const calendar = document.getElementById('calendar');
            calendar.innerHTML = '';

            days.forEach(day => {
                const daySessions = filtered.filter(s => s.date === day.date);
                if (daySessions.length === 0) return; // Skip days with no sessions

                // Day header (spans both columns)
                const dayHeader = document.createElement('div');
                dayHeader.style.gridColumn = '1 / -1';
                dayHeader.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
                dayHeader.style.color = 'white';
                dayHeader.style.padding = '1rem';
                dayHeader.style.fontSize = '1.25rem';
                dayHeader.style.fontWeight = '700';
                dayHeader.style.marginTop = '1rem';
                dayHeader.style.borderRadius = '8px';
                dayHeader.textContent = day.label;
                calendar.appendChild(dayHeader);

                // Group this day's sessions by time
                const grouped = groupByTime(daySessions);
                const times = Object.keys(grouped).sort((a, b) => {
                    return parseTime(a) - parseTime(b);
                });

                times.forEach(time => {
                    // Time label
                    const timeLabel = document.createElement('div');
                    timeLabel.className = 'time-label';
                    timeLabel.textContent = time;
                    calendar.appendChild(timeLabel);

                    // Sessions row
                    const timeRow = document.createElement('div');
                    timeRow.className = 'time-row';

                    grouped[time].forEach(s => {
                        const isConflict = conflicts.has(s.code);
                        const session = createSessionEl(s, isConflict);
                        timeRow.appendChild(session);
                    });

                    calendar.appendChild(timeRow);
                });
            });

            // Update stats
            document.getElementById('visibleCount').textContent = filtered.length;
            document.getElementById('starredCount').textContent = selectedSessions.size;
        }

        function createSessionEl(s, isConflict) {
            const el = document.createElement('div');
            el.className = 'session';
            if (selectedSessions.has(s.code)) el.classList.add('starred');
            if (isConflict) el.classList.add('conflict');

            el.onclick = (e) => {
                if (!e.target.classList.contains('star-btn') && !e.target.classList.contains('conflict-badge')) {
                    showModal(s);
                }
            };

            const star = document.createElement('button');
            star.className = 'star-btn';
            star.textContent = selectedSessions.has(s.code) ? '⭐' : '☆';
            star.onclick = (e) => {
                e.stopPropagation();
                toggleStar(s.code);
            };
            el.appendChild(star);

            if (isConflict) {
                const conflictBadge = document.createElement('div');
                conflictBadge.className = 'conflict-badge';
                conflictBadge.textContent = 'CONFLICT';
                conflictBadge.style.right = '2rem'; // Move left of star
                el.appendChild(conflictBadge);
            }

            const code = document.createElement('div');
            code.className = 'session-code';
            code.textContent = s.code;
            el.appendChild(code);

            const title = document.createElement('div');
            title.className = 'session-title';
            title.textContent = s.title;
            el.appendChild(title);

            const meta = document.createElement('div');
            meta.className = 'session-meta';
            if (s.duration_mins) {
                const badge = document.createElement('span');
                badge.className = 'badge';
                badge.textContent = `${s.duration_mins}m`;
                meta.appendChild(badge);
            }
            if (s.session_type) {
                const badge = document.createElement('span');
                badge.className = 'badge';
                badge.textContent = s.session_type;
                meta.appendChild(badge);
            }
            el.appendChild(meta);

            return el;
        }

        function toggleStar(code) {
            if (selectedSessions.has(code)) {
                selectedSessions.delete(code);
            } else {
                selectedSessions.add(code);
            }
            localStorage.setItem('summit_selected', JSON.stringify([...selectedSessions]));
            render();
        }

        function showModal(s) {
            const modal = document.getElementById('modal');
            const body = document.getElementById('modalBody');

            let html = `
                <div class="session-code">${s.code}</div>
                <h2 class="modal-title">${s.title}</h2>
                <div style="margin: 1rem 0; color: #6c757d;">
                    <strong>${s.start_time} - ${s.end_time}</strong> (${s.duration_mins} min)
                </div>
            `;

            if (s.abstract) {
                html += `<div class="modal-section">
                    <div class="modal-label">Abstract</div>
                    <p>${s.abstract}</p>
                </div>`;
            }

            if (s.speaker_names) {
                html += `<div class="modal-section">
                    <div class="modal-label">Speakers</div>
                    <div>${s.speaker_names}</div>
                    ${s.speaker_companies ? `<div style="color: #6c757d; margin-top: 0.25rem;">${s.speaker_companies}</div>` : ''}
                </div>`;
            }

            if (s.room) {
                html += `<div class="modal-section">
                    <div class="modal-label">Location</div>
                    <div>📍 ${s.room}</div>
                </div>`;
            }

            const details = [];
            if (s.track) details.push(`Track: ${s.track}`);
            if (s.topics) details.push(`Topics: ${s.topics}`);
            if (s.technical_level) details.push(`Level: ${s.technical_level}`);

            if (details.length) {
                html += `<div class="modal-section">
                    <div class="modal-label">Details</div>
                    <div style="font-size: 0.9rem;">${details.join('<br>')}</div>
                </div>`;
            }

            body.innerHTML = html;
            modal.classList.add('show');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('show');
        }


        function loadCSVFromURL(csvPath) {
            fetch(csvPath)
                .then(response => {
                    if (!response.ok) throw new Error('CSV file not found');
                    return response.text();
                })
                .then(csvText => {
                    const lines = csvText.split('\n');

                    // Skip header row, extract session codes
                    const codes = [];
                    for (let i = 1; i < lines.length; i++) {
                        const line = lines[i].trim();
                        if (!line) continue;

                        // Extract code (first column)
                        const match = line.match(/^([A-Z0-9-]+)/);
                        if (match) {
                            codes.push(match[1]);
                        }
                    }

                    // Clear existing selections
                    selectedSessions.clear();

                    // Add imported codes
                    let foundCount = 0;
                    codes.forEach(code => {
                        const session = allSessions.find(s => s.code === code);
                        if (session) {
                            selectedSessions.add(code);
                            foundCount++;
                        }
                    });

                    // Save and render
                    localStorage.setItem('summit_selected', JSON.stringify([...selectedSessions]));
                    render();

                    console.log(`✅ Auto-loaded ${foundCount} sessions from ${csvPath}`);
                })
                .catch(error => {
                    console.error('Error loading CSV:', error);
                });
        }

        function importSchedule(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const csvText = e.target.result;
                    const lines = csvText.split('\n');

                    // Skip header row, extract session codes
                    const codes = [];
                    for (let i = 1; i < lines.length; i++) {
                        const line = lines[i].trim();
                        if (!line) continue;

                        // Extract code (first column)
                        const match = line.match(/^([A-Z0-9-]+)/);
                        if (match) {
                            codes.push(match[1]);
                        }
                    }

                    // Clear existing selections
                    selectedSessions.clear();

                    // Add imported codes
                    let foundCount = 0;
                    let notFoundCodes = [];

                    codes.forEach(code => {
                        const session = allSessions.find(s => s.code === code);
                        if (session) {
                            selectedSessions.add(code);
                            foundCount++;
                        } else {
                            notFoundCodes.push(code);
                        }
                    });

                    // Save and render
                    localStorage.setItem('summit_selected', JSON.stringify([...selectedSessions]));
                    render();

                    // Show results
                    let message = `✅ Imported ${foundCount} session(s) from CSV`;
                    if (notFoundCodes.length > 0) {
                        message += `\n⚠️ ${notFoundCodes.length} code(s) not found: ${notFoundCodes.slice(0, 5).join(', ')}${notFoundCodes.length > 5 ? '...' : ''}`;
                    }
                    alert(message);

                    // Reset file input
                    event.target.value = '';

                } catch (error) {
                    alert('❌ Error reading CSV file: ' + error.message);
                    console.error(error);
                }
            };
            reader.readAsText(file);
        }

        function exportSchedule() {
            const selected = allSessions.filter(s => selectedSessions.has(s.code));
            if (selected.length === 0) {
                alert('No sessions selected! Star some sessions first.');
                return;
            }

            // Sort by date and time
            selected.sort((a, b) => {
                if (a.date !== b.date) return a.date.localeCompare(b.date);
                return parseTime(a.start_time) - parseTime(b.start_time);
            });

            const csv = [
                ['Code', 'Title', 'Date', 'Day', 'Time', 'Duration', 'Room', 'Track', 'Speakers'].join(','),
                ...selected.map(s => [
                    s.code,
                    `"${(s.title || '').replace(/"/g, '""')}"`,
                    s.date,
                    s.day_name,
                    `${s.start_time}-${s.end_time}`,
                    `${s.duration_mins} min`,
                    `"${(s.room || '').replace(/"/g, '""')}"`,
                    s.track || '',
                    `"${(s.speaker_names || '').replace(/"/g, '""')}"`
                ].join(','))
            ].join('\n');

            const blob = new Blob([csv], {type: 'text/csv'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'my_summit_schedule.csv';
            a.click();
        }


        let currentView = 'calendar';

        function switchView(view) {
            currentView = view;

            // Update view tabs
            document.querySelectorAll('.view-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');

            // Update views
            document.querySelectorAll('.schedule-view').forEach(v => {
                v.classList.remove('active');
            });

            if (view === 'calendar') {
                document.getElementById('calendarView').classList.add('active');
                // Show/hide controls
                document.getElementById('search').style.display = 'block';
                document.getElementById('trackFilter').style.display = 'block';
                document.getElementById('starredFilter').style.display = 'block';
            } else {
                document.getElementById('scheduleView').classList.add('active');
                renderMySchedule();
                // Hide calendar-specific controls
                document.getElementById('search').style.display = 'none';
                document.getElementById('trackFilter').style.display = 'none';
                document.getElementById('starredFilter').style.display = 'none';
            }
        }

        function renderMySchedule() {
            const container = document.getElementById('mySchedule');
            const selected = allSessions.filter(s => selectedSessions.has(s.code));

            if (selected.length === 0) {
                container.innerHTML = `
                    <div class="empty-schedule">
                        <div class="empty-schedule-icon">📅</div>
                        <div class="empty-schedule-text">No sessions selected yet</div>
                        <div class="empty-schedule-hint">Switch to Calendar view and star some sessions to build your schedule!</div>
                    </div>
                `;
                return;
            }

            // Group by day and sort
            const byDay = {};
            const days = [
                {date: '2026-06-01', label: 'Monday, June 1, 2026'},
                {date: '2026-06-02', label: 'Tuesday, June 2, 2026'},
                {date: '2026-06-03', label: 'Wednesday, June 3, 2026'},
                {date: '2026-06-04', label: 'Thursday, June 4, 2026'}
            ];

            selected.forEach(session => {
                if (!byDay[session.date]) byDay[session.date] = [];
                byDay[session.date].push(session);
            });

            // Sort each day by time
            Object.keys(byDay).forEach(date => {
                byDay[date].sort((a, b) => parseTime(a.start_time) - parseTime(b.start_time));
            });

            let html = '';

            days.forEach(day => {
                const sessions = byDay[day.date];
                if (!sessions || sessions.length === 0) return;

                html += `<div class="schedule-day-section">
                    <div class="schedule-day-header">${day.label}</div>`;

                sessions.forEach(s => {
                    html += `
                        <div class="schedule-session-card" onclick="showDetails('${s.code}')">
                            <div class="schedule-time">⏰ ${s.start_time} - ${s.end_time} (${s.duration_mins} min)</div>
                            <div class="schedule-code">${s.code}</div>
                            <div class="schedule-title">${s.title}</div>
                            <div class="schedule-meta">`;

                    if (s.room) {
                        html += `<div class="schedule-meta-item">📍 ${s.room}</div>`;
                    }
                    if (s.track) {
                        html += `<div class="schedule-meta-item">🏷️ ${s.track}</div>`;
                    }
                    if (s.speaker_names) {
                        html += `<div class="schedule-meta-item">👤 ${s.speaker_names}</div>`;
                    }

                    html += `    </div>
                        </div>`;
                });

                html += '</div>';
            });

            if (html === '') {
                html = `
                    <div class="empty-schedule">
                        <div class="empty-schedule-icon">📅</div>
                        <div class="empty-schedule-text">No sessions selected yet</div>
                        <div class="empty-schedule-hint">Switch to Calendar view and star some sessions to build your schedule!</div>
                    </div>
                `;
            }

            container.innerHTML = html;
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
