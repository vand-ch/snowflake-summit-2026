\u2019s unified compute platform using Snowpark Connect. By eliminating external infrastructure management while maintaining Python-based flexibility, BNC streamlined its operations and simplified data oversight. This session explores the technical architecture of the migration, strategies for handling complex dependency management, and benchmark results comparing their legacy Spark environment to the new, optimized Snowflake implementation.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "12:30 PM","end_time": "12:50 PM","duration_mins": "20.0","room": "Basecamp South Theater 4 (Basecamp, South Hall C)","capacity": "150","track": "Data Engineering & Pipelines","session_type": "Theater Session","location": "General Theaters","topics": "Data Warehouse","features": "SnowConvert AI","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Renan Waroux | Ganesh Mahadevan","speaker_companies": "National Bank of Canada | Snowflake","speaker_titles": "AI Lead | Solutions Architect","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI133","title": "Get More Done with OpenAI Agents Powered by Snowflake Data","abstract": "What does it take to get more done with agents built on OpenAI and Snowflake? In this live demo, see Codex use governed Snowflake data to turn a customer signal into product action: analyze demand, spot a growth opportunity, plan the response, and build an app feature a team can preview, review and ship.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "12:30 PM","end_time": "12:50 PM","duration_mins": "20.0","room": "Vertical Village Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "Vertical Village","topics": "AI Agents / Data Agents","features": "Other","personas": "Product Manager","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Evan Weise","speaker_companies": "OpenAI","speaker_titles": "Demo Studio Lead","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "IN102","title": "How Tripadvisor Unlocked Its Data to Make Every Traveler Better","abstract": "Tripadvisor set out to make every traveler's experience more personal \u2014 but their legacy CDP was holding them back. In this session, learn how Tripadvisor migrated to a composable CDP on Snowflake, centralizing complete customer and event data while giving marketers true self-serve access. Hear the challenges they faced along the way, and the results that followed: AI-powered real-time decisions, lower acquisition costs, a thriving retail media network, and richer, more personalized experiences that make every traveler better.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "12:30 PM","end_time": "01:15 PM","duration_mins": "45.0","room": "Room 214 (Moscone South, Level 2)","capacity": "101","track": "Industry Innovation","session_type": "Breakout Session","location": "","topics": "Snowflake Partners","features": "Apache Iceberg\u2122","personas": "Marketing Practitioner","industry": "Not industry-specific","department": "Operations","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Victor Davidson | Kashish Gupta","speaker_companies": "Tripadvisor | Hightouch","speaker_titles": "Sr. Director Data & AI Strategy and Ops | CEO","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI122","title": "Make Your Snowflake Data AI Ready with Cortex Code and Bigeye","abstract": "AI is only as trustworthy as the data underneath it. Most teams don't know if their data is monitored, classified and governed well enough for AI until something breaks. We'll show how Bigeye's Cortex Code integration makes data AI ready as a native part of your Snowflake workflow. Using Bigeye agent skills and MCP tools, Cortex Code can assess monitoring coverage, recommend and deploy monitors, check data classifications and apply native Snowflake tags that work with your governance and masking rules. We'll walk through a live demo of an agent that evaluates a data set's AI readiness, takes action to make it ready and enforces the guardrails that keep sensitive data protected.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "12:30 PM","end_time": "12:50 PM","duration_mins": "20.0","room": "Basecamp South Theater 3 (Basecamp, South Hall C)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "General Theaters","topics": "Data Warehouse","features": "Cortex Code","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Eleanor Treharne-Jones","speaker_companies": "Bigeye","speaker_titles": "CEO","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DH7","title": "Meet a Data Superhero: AI Agents \u2014 From Prototype to Production","abstract": "Join us at the AI Pop Up to meet Data Superheroes who\u2019ve built agent-powered solutions on Snowflake. This is an open, informal session \u2014 no presentations, just honest conversation about what works, what doesn\u2019t and what they\u2019ve learned along the way. Bring your questions about AI agents and connect with like-minded practitioners.","type": "AI Pop Up","date": "2026-06-02","day_name": "Tuesday","start_time": "12:30 PM","end_time": "01:30 PM","duration_mins": "60.0","room": "AI Pop Up (Basecamp, South, Hall D)","capacity": "0","track": "","session_type": "AI Pop Up","location": "","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "","delivery_method": "","speaker_names": "Pooja Sahu Sahu | Ruchi Soni | Karthik Raman | Rajiv Gupta | Pascal Pf\u00e4ffle","speaker_companies": "Schroders | Accenture | LTM | Kipi.ai | INFOMOTION GmbH","speaker_titles": "Data Engineer | Snowflake Global Practice Lead | Head of Snowflake Practice | VP of Technology | Data Architect, Snowflake Data Superhero","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "GO236","title": "Modern Data Governance and Security at Scale with Snowflake at T-Mobile","abstract": "As data, AI and analytics adoption accelerates across T-Mobile\u2019s Snowflake environment \u2014 supporting over 4,000 users, 3,100+ virtual warehouses and more than 10 petabytes of data \u2014 strong governance and security are essential to enabling trust, scale and innovation. This session explores our security strategy, including the move away from passwords toward stronger authentication mechanisms, continuous monitoring of security posture, network access controls and SOX controls. We will also highlight how T-Mobile enables emerging AI security considerations and governed data sharing across all departments through an internal data marketplace that balances accessibility with enterprise-grade governance.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "12:30 PM","end_time": "01:15 PM","duration_mins": "45.0","room": "Room 205 (Moscone South, Level 2)","capacity": "226","track": "Governance & Security","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Snowflake Intelligence","personas": "Product Manager","industry": "Not industry-specific","department": "Operations","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Chris James | Rathnakar Chinthala","speaker_companies": "T-Mobile USA | T-Mobile USA","speaker_titles": "Principal Architect | Sr Platform Engineer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "IN117","title": "New Opportunities in the Consumer Goods Industry with AI and Accessible Data","abstract": "The consumer goods industry is unlocking new opportunities with AI and technological advancements. This session will explore emerging trends shaping the market and how brands are leveraging data-driven strategies to drive growth, improve efficiency and enhance consumer engagement. Leading experts will provide industry insights, followed by a discussion with a consumer goods executive on how to harness AI and data analytics to transform the company. Join us to discover how leading companies stay agile, competitive and future-ready in a rapidly evolving market.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "12:30 PM","end_time": "01:15 PM","duration_mins": "45.0","room": "Room 152 (Moscone South, Upper Mezzanine)","capacity": "204","track": "Industry Innovation","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Other","personas": "BI / Analyst","industry": "Retail & Consumer Goods","department": "Not department-specific","technical_level": "Introductory","delivery_method": "OnDemand","speaker_names": "Sam Wong | Ryan Wolbeck | Freddy Guard Guard | Amit Gupta","speaker_companies": "Mark Anthony Group | Kraft Heinz | Snowflake | Snowflake","speaker_titles": "Senior Director, Data & AI | Head of AI and MLE Platform | Global Vertical Lead - Consumer Goods | Global Field CTO","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI309","title": "Ontology on Snowflake: From Unified Data to AI-Powered Intelligence","abstract": "Discover how Snowflake\u2019s ontology-driven architecture unifies data, semantics and AI. This session explores how to model real-world knowledge directly on Snowflake using metadata, inference rules and ontology layers \u2014 then reason over it with Snowflake Cortex Analyst and Snowflake Intelligence. See how consistent semantics enable context-aware analytics, natural language reasoning and a foundation for truly intelligent data applications \u2014 all built natively on Snowflake.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "12:30 PM","end_time": "12:50 PM","duration_mins": "20.0","room": "Builders Hub Theater (Basecamp, South Hall D)","capacity": "192","track": "Generative AI & Agents","session_type": "Theater Session","location": "Builder's Hub Theater","topics": "AI Agents / Data Agents","features": "Snowflake Intelligence","personas": "Data Scientist","industry": "Not industry-specific","department": "Supply Chain","technical_level": "Advanced","delivery_method": "OnDemand","speaker_names": "Tianxia Jia","speaker_companies": "Snowflake","speaker_titles": "Principal AI Architect","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "GO205","title": "Snowflake, Secured: Protecting Sensitive Member Data at Scale","abstract": "Summit Credit Union is a large, member-owned financial cooperative founded in 1935 with about $8 billion in assets and more than 270,000 members. As they set out to modernize their data strategy, they selected Snowflake for its scalability and simplicity \u2014 but with one critical requirement: protecting sensitive member data at every layer. In this session, Summit will share how they protected their data using data tokenization, final architecture, and offers tips and keys to success.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "12:30 PM","end_time": "12:50 PM","duration_mins": "20.0","room": "Basecamp South Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Governance & Security","session_type": "Theater Session","location": "General Theaters","topics": "System Integrations / Synchronizations","features": "Snowpark / Snowpark Connect","personas": "Data Engineer","industry": "Travel & Hospitality","department": "IT","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Matt Meis | Andrew Black","speaker_companies": "Summit Credit Union | Capital One Software","speaker_titles": "Cyber Fraud and Data Manager | Sr. Director, Business Development","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "IN216","title": "The Healthcare and Life Sciences Executive Panel","abstract": "Join this candid conversation with healthcare and life sciences innovators and leaders as they discuss how they are leveraging the power of data and AI to address critical industry challenges and enable better downstream healthcare outcomes. This panel session will explore approaches to modernizing your data estate, preparing for AI and unleashing the power of enterprise agents to accelerate key healthcare and life sciences use cases.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "12:30 PM","end_time": "01:15 PM","duration_mins": "45.0","room": "Room 151 (Moscone South, Upper Mezzanine)","capacity": "204","track": "Industry Innovation","session_type": "Breakout Session","location": "","topics": "Interoperability","features": "Snowflake Intelligence","personas": "Business Executive","industry": "Healthcare and Life Sciences","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Brooke Mcculley | Tom Blakeley | Tina Esposito | Rich Fisher","speaker_companies": "Snowflake | Vertex Pharmaceuticals | Advocate Health | United Healthcare Services, Inc.","speaker_titles": "RVP, Majors | Executive Director, Data Platforms & Engineering | SVP, Chief Data Officer | Chief Architect - Chief Data Office","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DM220","title": "The Latest AI Tools on Snowflake Marketplace: Data Agents and Beyond","abstract": "Discover how marketplace data becomes an agentic offering through data agents that enable natural language interaction. Learn to enrich agents with third-party expertise using Snowflake Cortex Knowledge Extensions, leverage shared semantic views that make complex data instantly queryable, and preview MCP server sharing for connecting AI systems to marketplace data. See how to deploy prebuilt solutions from leading providers that transform static data sets into intelligent, interactive tools.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "12:30 PM","end_time": "01:15 PM","duration_mins": "45.0","room": "Room 208 (Moscone South, Level 2)","capacity": "197","track": "Data Sharing & Marketplace","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Snowflake Intelligence","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Ben Srour | Shayak Banerjee","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Principal Product Manager | Senior Product Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI225","title": "When the Interface Is an Agent: Re-imagining Your Customer Context Layer","abstract": "Customer-facing agents are replacing digital interfaces at companies like Booking.com, Amazon and Canva, breaking customer data infrastructure at both ends: On collection: Pages are no longer the schema, but user intent in natural language is richer than anything before. On activation: Agents need context that is compressed, information-dense, real-time and relevant to in-session behavior. This session covers how Snowplow is re-imagining the customer context layer for the agentic era: agent-side tracking, bot detection and Snowplow Signals \u2014 behavioral intelligence that fuels both customer-facing agents and Snowflake Intelligence, built on Snowflake.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "12:30 PM","end_time": "12:50 PM","duration_mins": "20.0","room": "Vertical Village Theater 2 (Basecamp, South Hall B)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "Vertical Village","topics": "System Integrations / Synchronizations","features": "Cortex AI Functions","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Yali Sassoon Sassoon","speaker_companies": "Snowplow","speaker_titles": "CTO","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "ML202","title": "A Computation-First Architecture for Real-Time ML Feature Stores","abstract": "Snowflake has become the backbone for model development and analytical workloads. As production ML systems increasingly depend on signals that change continuously and live outside warehouse tables, traditional feature store architectures built around prematerialized pipelines introduce latency, duplication and training inference drift. In this talk, Chalk's Co-Founder, Elliot Marx, unveils a computation-first feature store architecture where Chalk extends Snowflake into real-time decision systems. By executing Python feature definitions directly against warehouse and live data sources, this ensures that consistency and freshness are properties of the system rather than downstream optimizations.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "01:00 PM","end_time": "01:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 2 (Basecamp, South Hall A)","capacity": "150","track": "Machine Learning","session_type": "Theater Session","location": "General Theaters","topics": "Snowflake Partners","features": "Gen 2 Warehouses","personas": "MLOps","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Elliot Marx","speaker_companies": "Chalk","speaker_titles": "Co-Founder","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI262","title": "Context Layer? Semantic Layer? Ontology? Knowledge Graph? A Spicy Debate","abstract": "Context layer. Semantic layer. Ontology. Knowledge graph. Context graph. GraphRAG. If you've been in an architecture meeting, you've heard all of these terms. If you've tried to figure out which one you need, you've probably given up. Are these different things? Buzzwords? A semantic layer in a trench coat? Or genuinely different approaches to the same problem: making AI understand your business? Join Atlan and industry experts who actually disagree with each other for the spiciest 20 minutes at Snowflake Summit. No slides. No consensus. Just strong opinions, real arguments and a chance to finally understand where these terms diverge \u2014 and whether any of them matter for your AI strategy.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "01:00 PM","end_time": "01:20 PM","duration_mins": "20.0","room": "Vertical Village Theater 2 (Basecamp, South Hall B)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "Vertical Village","topics": "Catalogs / Discovery","features": "Apache Iceberg\u2122","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Prukalpa Sankar | Jessica Talisman | Cindi Howson | Austin Kronz","speaker_companies": "Atlan | Ontology Pipeline | ThoughtSpot | Atlan","speaker_titles": "Co-Founder | Principal | Chief Data & AI Strategy Officer | Director of AI and Data Strategy","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "E23","title": "Executive Industry Summit Tour \u2014 Manufacturing","abstract": "Join an exclusive, guided tour of the Snowflake AI Data Cloud and its premier partner ecosystem, tailored for leaders in manufacturing. This immersive experience will take you through five curated stops that showcase the art of the possible \u2014 real-world solutions, cutting-edge AI use cases and data-driven innovations transforming your industry today. Gain direct access to experts, see industry-leading technology in action and leave with actionable inspiration to accelerate your data strategy. Space is extremely limited \u2014 registration is first come, first served. Please note that this experience includes walking between stops; comfortable footwear is recommended. Please note that the Executive Booth Tours are reserved for customers only \u2014 we kindly ask our partners not to register.","type": "Executive Content","date": "2026-06-02","day_name": "Tuesday","start_time": "01:00 PM","end_time": "02:30 PM","duration_mins": "90.0","room": "Vertical Village (Basecamp, South Hall B)","capacity": "15","track": "","session_type": "Executive Content","location": "","topics": "","features": "","personas": "","industry": "Manufacturing","department": "","technical_level": "","delivery_method": "","speaker_names": "","speaker_companies": "","speaker_titles": "","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AR201","title": "How Capital One Architected for Interoperability in a Multi-Catalog/Table Setup","abstract": "As one of Snowflake's earliest and largest adopters, Capital One has continually driven innovation in cloud data management, focusing on optimizing cost and governance at a massive scale. This session details our strategic journey toward a Bring Your Own Compute model, illustrating how we evolved our architecture to meet rigorous security, governance and cost optimization requirements in a federated data environment. A core component of this evolution was implementing a sophisticated architecture that allows data consumers flexibility while maintaining central control via multi-catalog and multi-table format architecture, achieving data residency and compliance, and maximizing finops efficiency.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "01:00 PM","end_time": "01:45 PM","duration_mins": "45.0","room": "Room 159 (Moscone South, Upper Mezzanine)","capacity": "213","track": "Architectures & Interoperability","session_type": "Breakout Session","location": "","topics": "Catalogs / Discovery","features": "Apache Iceberg\u2122","personas": "Data Engineer","industry": "Financial Services","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Temesgen (Teme) Meheret | Kajal Wood","speaker_companies": "Capital One | Capital One","speaker_titles": "Director, Data Platform | VP, Software Engineering Enterprise Data","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI202","title": "How CarGurus Freed 24K Engineering Hours to Allow Data Teams to Build Cool Sh*t","abstract": "CarGurus runs a hub-and-spoke data organization \u2014 a central team with embedded analytics teams across the business. That model created friction: PR bottlenecks, inconsistent standards and inefficient backfills consuming engineering capacity. This session covers how CarGurus deployed the dbt Fusion engine on Snowflake to intelligently optimize builds, reclaim 24,000 annual engineering hours and maximize business value, achieving ROI in just five months. We also cover how that recovered capacity is fueling AI experimentation with Snowflake Cortex AI, Streamlit and the dbt semantic layer.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "01:00 PM","end_time": "01:45 PM","duration_mins": "45.0","room": "Room 211 (Moscone South, Level 2)","capacity": "226","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "Snowflake Partners","features": "Cortex Agents","personas": "MLOps","industry": "Technology","department": "IT","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Parag Shah","speaker_companies": "Cargurus","speaker_titles": "VP of Data","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AR227","title": "Postgres and Snowflake Open Lakehouse: ETL is dead, ELT is dead. T lives on.","abstract": "Learn how data engineering roles continue to evolve as the world of OLTP and OLAP merge with Snowflake new capabilities. With increasing integration between Snowflake and Postgres, this session demonstrates new architectures that are now feasible with Snowflake and Postgres. You'll see how new features like pg_lake, in combination with Iceberg, will bridge the divide between Snowflake and Postgres as you say goodbye to older extract and load design patterns.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "01:00 PM","end_time": "01:20 PM","duration_mins": "20.0","room": "Builders Hub Theater (Basecamp, South Hall D)","capacity": "192","track": "Architectures & Interoperability","session_type": "Theater Session","location": "Builder's Hub Theater","topics": "System Integrations / Synchronizations","features": "Snowflake Postgres","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Firvin Janardanan | Elizabeth Christensen Christensen","speaker_companies": "Snowflake Inc. | Snowflake","speaker_titles": "Sr. Solutions Architect | Developer Advocate","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI223","title": "Practice 360: Unifying Practice Leadership Metrics on Snowflake","abstract": "Healthcare is one of the most data-intensive industries, yet leadership teams often lack a single, trusted view of enterprise performance. Florida Cancer Specialists & Research Institute (FCS) built Practice 360 on Snowflake to deliver a governed source of truth for leadership metrics across finance, clinical operations, revenue cycle, workforce and quality. Snowflake enabled FCS to centralize structured and semi-structured data, standardize KPIs, isolate workloads and scale real-time analytics across 100+ clinics without performance tradeoffs. Practice 360 is now the executive system of record, enabling faster decisions, benchmarking and scalable growth.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "01:00 PM","end_time": "01:45 PM","duration_mins": "45.0","room": "Room 206 (Moscone South, Level 2)","capacity": "101","track": "BI & Analytics","session_type": "Breakout Session","location": "","topics": "System Integrations / Synchronizations","features": "Semantic Views","personas": "Data Engineer","industry": "Healthcare and Life Sciences","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Sanitha Mugala | Aya Alajrash","speaker_companies": "Florida Cancer Specialists and Research Institute | Florida Cancer Specialists","speaker_titles": "Manager, Advanced Analytics | Clinical Data Engineer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AR107","title": "Scale Intelligence, Not Infrastructure: Unify Your Data Estate with Microsoft","abstract": "Stop managing infrastructure and start scaling intelligence. Data silos shouldn't hold your AI initiatives and business insights hostage. In this session, you\u2019ll learn how Microsoft and Snowflake make it easy to unify your data estate with native integrations that embrace interoperability, powering your analytics, AI and business applications \u2014 without complex infrastructure maintenance. We\u2019ll showcase the latest advancements in connecting Snowflake with Power BI, Microsoft Fabric, Microsoft 365 Copilot and Teams to fuel everyday workflows, enhance productivity and drive business transformation.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "01:00 PM","end_time": "01:20 PM","duration_mins": "20.0","room": "Vertical Village Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Architectures & Interoperability","session_type": "Theater Session","location": "Vertical Village","topics": "Catalogs / Discovery","features": "Apache Polaris","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Shankar Narayanan SGS","speaker_companies": "Microsoft","speaker_titles": "Principal Architect","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI250","title": "Scaling AI Product Analytics with Snowflake: Building Data-Informed AI","abstract": "As organizations race to embed AI into their products, many face a core challenge: measuring AI feature performance \u2014 both algorithmically and in terms of customer impact \u2014 without significantly growing analytics teams. In this session, we share how we\u2019re building an AI analytics foundation that enables data-informed AI product development at scale. Our work focuses on robust instrumentation, telemetry and analytics layers that support both model-level insights and customer-facing product insights. With a small team, we\u2019ve leaned on Snowflake\u2019s AI and analytics capabilities to accelerate insight generation, reduce manual overhead and scale impact without adding headcount.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "01:00 PM","end_time": "01:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 3 (Basecamp, South Hall C)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "General Theaters","topics": "AI Agents / Data Agents","features": "Cortex AI Functions","personas": "Data Engineer","industry": "Not industry-specific","department": "Other","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Maryam Agahi | Hootan Kamran","speaker_companies": "SailPoint | SailPoint","speaker_titles": "Sr. Engineering Manager, AI | Staff Data Scientist","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI216","title": "Someone Will: Building AI Agents on Snowflake Before Your Competitors Do","abstract": "Google had the model but was too cautious to ship a chatbot. OpenAI said \u201cWhy not?\u201d and turned hesitation into a $300 billion company. Data teams on Snowflake are at the same inflection point: Should they keep AI as a smarter BI layer or use Cortex Agents to roam their Snowflake estates, testing hypotheses and surfacing revenue, savings and risk signals? In this session, Vincent Yates, Chief Solutions Officer at phData and former data leader at Uber, GE and Microsoft, shows how he uses agents and the Snowflake AI Data Cloud to encode business logic, wrap it in governance guardrails and measure impact so that agents don\u2019t just answer questions; they create compounding advantage.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "01:00 PM","end_time": "01:45 PM","duration_mins": "45.0","room": "Room 215 (Moscone South, Level 2)","capacity": "226","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Snowflake ML","personas": "MLOps","industry": "Not industry-specific","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Vincent Yates","speaker_companies": "phData","speaker_titles": "Chief Strategy Officer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "E2","title": "The CIO\u2019s Guide to AI ROI: An Executive Panel","abstract": "While 2025 was the year of AI implementation, 2026 is the year AI ROI becomes real. This executive panel brings together seasoned data leaders to share a tactical playbook for proving AI ROI. Drawing from real-world transformations from companies across different verticals, this session explores how to transition from foundational metrics \u2014 like throughput and speed \u2014 to the holy grail of measurable business impact. We will explore moving beyond productivity gains to hard financial impact. Learn how to leverage Snowflake\u2019s unified platform to scale agentic workflows, bridge the gap from pilot to production and articulate a value story that resonates in the boardroom.","type": "Executive Content","date": "2026-06-02","day_name": "Tuesday","start_time": "01:00 PM","end_time": "01:30 PM","duration_mins": "30.0","room": "Alpine Clubhouse Theater (Moscone South, Level 3)","capacity": "70","track": "","session_type": "Executive Content","location": "","topics": "AI Agents / Data Agents","features": "","personas": "Business Executive","industry": "","department": "","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Mike Blandina | Dan Lemont | Scott Jessee","speaker_companies": "Snowflake | Ally | Delta Dental Plans Association","speaker_titles": "Chief Information Officer | CIO - Enterprise Data & AI | Chief Information Officer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI265","title": "The Future of Sales: How Agentic AI Is Reinventing B2B Sales","abstract": "Discover how EY, in collaboration with Snowflake and Canva, is revolutionizing enterprise sales with an agentic AI platform that is enabling sellers to sell more, faster and better, while significantly increasing the time they spend actually selling to customers through an agentic AI-orchestrated and AI-driven platform.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "01:00 PM","end_time": "01:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "General Theaters","topics": "Snowflake Partners","features": "Cortex Code","personas": "MLOps","industry": "Not industry-specific","department": "Sales & Marketing","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Mark Rupert | Duncan Avis","speaker_companies": "Canva | Ernst & Young","speaker_titles": "Americas GM / VP of Sales | EY STudio+, Partner","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE106","title": "Unifying Data and AI Orchestration with Apache Airflow","abstract": "In a high-pressure kitchen, great service depends on mise en place: everything prepared, organized and ready before the rush. Production AI demands the same discipline. This talk shows how Apache Airflow unifies data pipelines and AI workflows in one observable control plane and system of record, replacing fragmented observability, failure handling and team handoffs. We'll walk through real projects covering multi-agent orchestration, AI-driven pipeline branching and vision model integration, each illustrating a distinct production pattern, all running on Airflow. The best kitchens don't just execute recipes, they make the rush look effortless.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "01:00 PM","end_time": "01:45 PM","duration_mins": "45.0","room": "Room 213 (Moscone South, Level 2)","capacity": "226","track": "Data Engineering & Pipelines","session_type": "Breakout Session","location": "","topics": "System Integrations / Synchronizations","features": "Other","personas": "MLOps","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Volker Janz","speaker_companies": "Astronomer","speaker_titles": "Senior Developer Advocate","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "WN201B","title": "What\u2019s New: AI-Powered Observability at Scale with Observe by Snowflake","abstract": "Snowflake is redefining observability with Observe by Snowflake, a lakehouse-native observability platform. Learn how organizations can scale cost-effectively to hundreds of terabytes of telemetry per day and share data across business and operational contexts using Apache Iceberg on a telemetry lakehouse foundation. We will demo AI SRE, an AI agent that accelerates enterprise reliability workflows, and show how teams can engage with it through the Observe UI or coding agents to boost engineering productivity.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "01:00 PM","end_time": "01:45 PM","duration_mins": "45.0","room": "Room 158 (Moscone South, Upper Mezzanine)","capacity": "583","track": "What's New in Snowflake","session_type": "Breakout Session","location": "","topics": "Observability","features": "Other","personas": "DevOps","industry": "Not industry-specific","department": "IT","technical_level": "Introductory","delivery_method": "OnDemand","speaker_names": "Gabriel Tavridis | Kevin Leong","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Head of Product, Observability | Sr. Director, Product Marketing","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "WN213T","title": "What's New: Analytics in the Age of AI","abstract": "Modern analytics is being reshaped by AI. In this session, we'll share what's new in analytics on Snowflake and how these innovations are changing how organizations explore, understand and act on their data. Discover how teams are delivering sub-second analytics with high concurrency using Interactive Analytics and using semantic views to let anyone gain value from AI on all the data Snowflake has access to. We'll also cover the latest in performance and AI-powered migration tools that make analytics accessible to every user. You'll leave with a clear view of Snowflake's analytics vision, how it's evolving, what's possible today, and how to build data experiences that are faster, more flexible and ready for the age of AI.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "01:00 PM","end_time": "01:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 4 (Basecamp, South Hall C)","capacity": "150","track": "What's New in Snowflake","session_type": "Theater Session","location": "General Theaters","topics": "System Integrations / Synchronizations","features": "Cortex Code","personas": "Software Developer","industry": "Not industry-specific","department": "Operations","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Rima Mutreja | Carl Perry","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Principal Product Manager | Head of Analytics","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "WN207B","title": "What's New: Connectivity for AI-Ready Pipelines, with AI","abstract": "To power AI, your data needs a nerve system. For data engineers, the challenge is going beyond the cost of moving data to focus on the instant value of AI activation. This session explores how Snowflake\u2019s connectivity offerings act as the connective tissue for your entire data estate, transforming pipelines from a bottleneck into a strategic enabler. We\u2019ll dive into our AI-driven approach to automation and the latest engineering breakthroughs including Openflow, streaming, file processing and zero-copy integration. Learn how to build the connective tissue required to light up AI across the enterprise.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "01:00 PM","end_time": "01:45 PM","duration_mins": "45.0","room": "Room 160 (Moscone South, Upper Mezzanine)","capacity": "232","track": "What's New in Snowflake","session_type": "Breakout Session","location": "","topics": "System Integrations / Synchronizations","features": "Snowflake Openflow","personas": "Data Engineer","industry": "Not industry-specific","department": "IT","technical_level": "Introductory","delivery_method": "OnDemand","speaker_names": "Saptarshi Mukherjee | Michael Waller | Gilberto Hernandez","speaker_companies": "Snowflake | ExodusPoint | Snowflake","speaker_titles": "Senior Director of Product Management | Global Head of Data | Lead Developer Advocate","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI112","title": "Batch Data Extraction at Scale with Cortex AI Functions","abstract": "Unlock insights trapped in unstructured data using Cortex AI Functions. In this hands-on lab, you'll build batch extraction pipelines that process documents, images and audio \u2014 all with SQL. Load files to Snowflake stages, then use AI_PARSE_DOCUMENT to extract text from PDFs, AI_EXTRACT to pull structured fields from text and images, AI_CLASSIFY to categorize content, and AI_TRANSCRIBE to convert audio to text. Build automated pipelines with Dynamic Tables that process new data as it arrives. By the end, you'll transform unstructured files into queryable tables \u2014 extracting entities, classifying documents, and structuring data for analytics or downstream AI.","type": "Hands-on Lab","date": "2026-06-02","day_name": "Tuesday","start_time": "01:30 PM","end_time": "03:00 PM","duration_mins": "90.0","room": "Hands-on Labs 1 (Basecamp, Hall E)","capacity": "299","track": "Generative AI & Agents","session_type": "Hands-on Lab","location": "","topics": "Data Warehouse","features": "Cortex AI Functions","personas": "MLOps","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Sho Tanaka | Jessie E Felix Felix","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Lead Developer Advocate | Staff Product Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "IN107","title": "Enabling Enterprise AI at Scale: Mitsui\u2019s Federated AI Mesh","abstract": "Mitsui & Co. is tackling one of the biggest barriers to enterprise AI: fragmented data spread across independently operated businesses. In this session, Mitsui and NTT DATA will demonstrate how they are leveraging Snowflake to build a \"Federated AI Mesh\" \u2014 a solution that makes data AI-ready without the need for forced centralization. Attendees will walk away with a practical blueprint for scaling AI, enabling use-case sharing across 25+ group companies globally, and accelerating agentic AI and BI using Secure Data Sharing, Snowflake Openflow and Cortex AI.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "01:30 PM","end_time": "01:50 PM","duration_mins": "20.0","room": "Basecamp South Theater 2 (Basecamp, South Hall A)","capacity": "150","track": "Industry Innovation","session_type": "Theater Session","location": "General Theaters","topics": "Snowflake Partners","features": "Snowflake Openflow","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Yuki Yaguchi | Ryo Shibuya","speaker_companies": "Mitsui & Co., Ltd. | NTT DATA","speaker_titles": "General Manager, DDM Strategy Dept. | Director, Data & AI | Snowflake Data Superhero","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI246","title": "Gaming at Scale: How NEXON Built an End-to-End AI Platform on Snowflake","abstract": "NEXON operates 40+ live games serving over 1.9 billion users worldwide. To overcome analytics limits at unprecedented scale, we built the gaming industry\u2019s first end-to-end AI automation platform on the AI Data Cloud. Our three-tier architecture empowers nontechnical teams with natural language analytics via Snowflake Intelligence, processes unstructured data through Cortex AI Functions for real-time game balancing, and integrates external data using Snowflake Openflow. Cortex Agents now handle 12% of the workforce, delivering 52% productivity gains, 65% faster decision-making and ~220 hours in monthly savings. This session shows how we scaled AI from experimentation to production across our portfolio.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "01:30 PM","end_time": "01:50 PM","duration_mins": "20.0","room": "Builders Hub Theater (Basecamp, South Hall D)","capacity": "192","track": "Generative AI & Agents","session_type": "Theater Session","location": "Builder's Hub Theater","topics": "System Integrations / Synchronizations","features": "Snowflake Openflow","personas": "Data Engineer","industry": "Technology","department": "R&D","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Jaemyoun Lee","speaker_companies": "NEXON","speaker_titles": "Data Engineering Team Lead","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI222T","title": "How We Made Snowflake 10x Faster for Real-Time Interactive Analytics","abstract": "This session will cover Snowflake Interactive, including how we made it to be 10x higher in concurrency and 15x lower on ingestion latency. We'll provide ideal business use cases, a technical overview, a deep dive and a demo.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "01:30 PM","end_time": "01:50 PM","duration_mins": "20.0","room": "Basecamp South Theater 4 (Basecamp, South Hall C)","capacity": "150","track": "BI & Analytics","session_type": "Theater Session","location": "General Theaters","topics": "Data Warehouse","features": "Interactive Tables","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Will Xu","speaker_companies": "Snowflake","speaker_titles": "Principal product manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI116","title": "Intuitive Surgical\u2019s AI for BI: Moving from Dashboards to Agentic Analytics","abstract": "Intuitive Surgical leads the minimally invasive care sector with innovative robotic devices and an emphasis on data-driven insights. To advance this aim, it is launching AI for Numbers \u2014 a cutting-edge project that merges generative AI and natural-language queries with business intelligence tools. By leveraging Snowflake and ThoughtSpot, Intuitive is transitioning from static dashboards to dynamic, agent-based analytics, allowing teams to pose complex questions and get immediate, actionable answers at scale. This session outlines the technical infrastructure, strategic benefits and lessons learned from this initiative.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "01:30 PM","end_time": "01:50 PM","duration_mins": "20.0","room": "Vertical Village Theater 2 (Basecamp, South Hall B)","capacity": "150","track": "BI & Analytics","session_type": "Theater Session","location": "Vertical Village","topics": "Snowflake Partners","features": "Semantic Views","personas": "Business Executive","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "AJ Rao","speaker_companies": "Intuitive Surgical","speaker_titles": "Director of Biz Intelligence & AI","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DM107","title": "Modernizing Public Health: The State of Illinois' AI and Data-Sharing Strategy ","abstract": "Public health agencies have long relied on traditional, siloed informatics platforms that hinder data sharing, collaboration and real-time decision-making. The Illinois Department of Public Health (IDPH) is addressing these challenges through the CDC Data Modernization Initiative \u2014 a comprehensive effort to enhance data collection, integration, analysis and dissemination. To support this transformation, IDPH is leveraging Snowflake\u2019s leading-edge cloud-native platform features to create a scalable, interoperable and AI-driven data ecosystem. This session explores IDPH\u2019s strategic approach to modernizing public health data infrastructure and how Snowflake is helping achieve these goals.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "01:30 PM","end_time": "01:50 PM","duration_mins": "20.0","room": "Vertical Village Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Data Sharing & Marketplace","session_type": "Theater Session","location": "Vertical Village","topics": "Data Warehouse","features": "Cortex AI Functions","personas": "Data Engineer","industry": "Not industry-specific","department": "Operations","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Dejan Jovanov","speaker_companies": "IL Department of Public Health","speaker_titles": "Chief Data and Informatics Officer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI128","title": "Move Faster with Cortex Code and Deloitte: From Data Discovery to Delivery","abstract": "Data engineering used to mean climbing from syntax up to intent. You wrote the code and hoped it expressed what you meant. Snowflake Cortex Code inverts that stack. You start with intent, and the AI handles the implementation. In this 90-minute hands-on lab, working directly in Snowsight interface against live data, you will move from raw curiosity to a deployed Streamlit dashboard \u2014 just you, your data and an AI that already knows your schema. You will leave with three things: a working Streamlit app you built during the session, a prompt pattern library of five reusable templates for data engineering work and a mental model for intent-first development that you can apply on Monday morning.","type": "Hands-on Lab","date": "2026-06-02","day_name": "Tuesday","start_time": "01:30 PM","end_time": "03:00 PM","duration_mins": "90.0","room": "Hands-on Labs 3 (Basecamp, Hall E)","capacity": "133","track": "Generative AI & Agents","session_type": "Hands-on Lab","location": "","topics": "AI Agents / Data Agents","features": "Cortex Code","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Rupesh Dandekar","speaker_companies": "Deloitte Consulting LLP","speaker_titles": "CTO","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AR102","title": "Power Analytics and AI Wherever Your Data Lives","abstract": "Connect to Apache Iceberg tables in AWS S3 via Catalog Linked Databases with zero data movement. Register existing AWS Glue catalogs in seconds, making external tables instantly discoverable and queryable. With support for Apache Iceberg V3 tables, Snowflake supports the VARIANT data type, enabling efficient storage and querying of semi-structured data. Apply Snowflake Horizon governance including RBAC and dynamic masking policies to your Iceberg tables. Then leverage Snowflake Intelligence to ask natural language questions against your lakehouse with AI-generated verifiable SQL at enterprise scale.","type": "Hands-on Lab","date": "2026-06-02","day_name": "Tuesday","start_time": "01:30 PM","end_time": "03:00 PM","duration_mins": "90.0","room": "Hands-on Labs 2 (Basecamp, Hall E)","capacity": "139","track": "Architectures & Interoperability","session_type": "Hands-on Lab","location": "","topics": "Catalogs / Discovery","features": "Apache Iceberg\u2122","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Vino Duraisamy Duraisamy","speaker_companies": "Snowflake","speaker_titles": "Senior Developer Advocate","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "GO207","title": "Safe to Share: Using Consented Clean Rooms to Power Marketing and AI","abstract": "Data clean rooms are transforming how organizations collaborate and activate customer data \u2014 but only when consent and governance are enforced end to end. In this 20\u2011minute theater session, we\u2019ll show how consent\u2011first data clean rooms help marketing and data teams safely use, share and analyze customer data for targeting, measurement and AI\u2011driven use cases. You\u2019ll learn how organizations break down data silos while enforcing consent, age\u2011based controls and privacy policies directly within the Snowflake AI Data Cloud \u2014 using native policy enforcement to ensure data is activated only as permitted. The result: compliant collaboration at scale, without slowing the business.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "01:30 PM","end_time": "01:50 PM","duration_mins": "20.0","room": "Basecamp South Theater 3 (Basecamp, South Hall C)","capacity": "150","track": "Governance & Security","session_type": "Theater Session","location": "General Theaters","topics": "Data Warehouse","features": "Cortex AI Functions","personas": "Product Manager","industry": "Not industry-specific","department": "R&D","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "DV Lamba | Arshdeep Sood","speaker_companies": "OneTrust | OneTrust","speaker_titles": "Chief Product and Technology Officer | Manager, Solutions Engineering","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "IN121","title": "A Conversation with Alysa Liu","abstract": "Join Deloitte\u2019s Dounia Senawi, US Chief Commercial Officer, for a candid conversation with Olympic champion Alysa Liu, one of figure skating\u2019s most compelling voices on reinvention. From becoming the youngest U.S. champion at age 13 to stepping away at the height of global attention, Alysa chose a different path \u2014 one that led her back to the sport on her own terms. Now an Olympic gold medalist, she reflects on rediscovering joy, redefining success and competing with freedom. This session offers an authentic look at resilience, pressure and the power of choosing your own path.","type": "Executive Content","date": "2026-06-02","day_name": "Tuesday","start_time": "02:00 PM","end_time": "02:45 PM","duration_mins": "45.0","room": "Room 216 (Moscone South, Level 2)","capacity": "140","track": "Industry Innovation","session_type": "Executive Content","location": "","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "Introductory","delivery_method": "","speaker_names": "Alysa Liu | Dounia Senawi","speaker_companies": "Deloitte","speaker_titles": "US Chief Commercial Officer","status": "Accepted","modified": "2026-05-14T18:18:39Z"},{"code": "AD201","title": "Audience Flow Intelligence","abstract": "Every night, audiences make split-second decisions about what to watch. Audience Flow AI helps teams understand why. By connecting minute-by-minute ratings with AI-analyzed video, content segmentation and social reaction, the platform shows what was on when viewership rose, dipped or shifted \u2014 across both Disney programming and competitors. Instead of just reporting audience movement, it explains it, giving content teams a clearer view of what held attention, what lost it and what drove conversation.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "02:00 PM","end_time": "02:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 4 (Basecamp, South Hall C)","capacity": "150","track": "Application Development","session_type": "Theater Session","location": "General Theaters","topics": "Data Warehouse","features": "Snowflake ML","personas": "MLOps","industry": "Media, Entertainment & Advertising","department": "Sales & Marketing","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "JD Paletto | Jaclyn Mathai","speaker_companies": "Disney | The Walt Disney Company","speaker_titles": "Executive Director, Data | Senior Manager, Data Science","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE305","title": "Best Practices for Building Real-Time AI Experiences with Snowflake Streaming","abstract": "Agentic AI applications demand continuous and up-to-date data to make autonomous decisions and deliver personalized experiences. But building reliable real-time pipelines remains one of the hardest problems in data engineering. In this session, learn how Snowflake's streaming capabilities including Snowpipe Streaming, Dynamic Tables and native Kafka integration provide a simple, scalable and cost-effective foundation for real-time AI workloads. We'll walk through common architecture patterns and real customer examples so you can start building real-time AI applications today.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "02:00 PM","end_time": "02:45 PM","duration_mins": "45.0","room": "Room 210 (Moscone South, Level 2)","capacity": "101","track": "Data Engineering & Pipelines","session_type": "Breakout Session","location": "","topics": "Interoperability","features": "Snowflake Openflow","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Advanced","delivery_method": "Live","speaker_names": "Tyler Jones Jones | Sai Maddali","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Principal Software Engineer I | Principal Product Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI269","title": "Building Finance Apps at Blackstone with Sigma and Snowflake","abstract": "Blackstone has built one of the most advanced analytics environments in finance, with more production data apps on Sigma than any other customer. By working directly on governed Snowflake data, teams enable self-service analysis, writeback workflows and operational applications at scale. In this session, Han Zhang shares the ways Blackstone designed and deployed these apps, lessons from early AI experiments that required rethinking their approach and how Blackstone is now testing new capabilities. Learn how Blackstone is integrating data into finance workflows and laying the foundation for the next generation of intelligent applications.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "02:00 PM","end_time": "02:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 2 (Basecamp, South Hall A)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "General Theaters","topics": "Snowflake Partners","features": "Cortex AI Functions","personas": "Data Engineer","industry": "Financial Services","department": "Finance","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Han Zhang | Anthony Cafiero","speaker_companies": "Blackstone | Sigma","speaker_titles": "Senior Vice President | Principal Solution Engineer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI104","title": "Checking into the Data Cloud: How Marriott Built Their Intelligence Portal","abstract": "Marriott International operates 10,000+ properties and serves 200M+ Bonvoy members, creating a complex global data environment. To deliver trusted insights at scale, Marriott built a modern platform that unifies data, supports real-time and batch analytics, and enforces strong governance. In this session, VP Julia Morrison shares how Marriott consolidated fragmented sources, implemented a governed semantic layer and launched a self-service Intelligence Portal. Learn key challenges, solutions and outcomes including faster insights, broader adoption and improved efficiency.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "02:00 PM","end_time": "02:45 PM","duration_mins": "45.0","room": "Room 208 (Moscone South, Level 2)","capacity": "197","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Snowflake Intelligence","personas": "Data Scientist","industry": "Travel & Hospitality","department": "Operations","technical_level": "Introductory","delivery_method": "OnDemand","speaker_names": "Julia Morrison | Scott Reed","speaker_companies": "Marriott International | Snowflake","speaker_titles": "VP Data Technology | Principal Solutions Engineer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "ENG","title": "Engineering Advocate Program","abstract": "This session is designed specifically for our Engineering Advocate Program members to interact with core Snowflake engineers and product managers, including Snowflake\u2019s founders. In this session, attendees will also have the opportunity to network with Snowflake customers interested in a variety of topics including Snowflake Cortex AI and Snowflake ML, data lake, data ingestion, data pipelines, data lake/Iceberg, SQL, SPCS and more.","type": "Engineering Advocate Program","date": "2026-06-02","day_name": "Tuesday","start_time": "02:00 PM","end_time": "04:30 PM","duration_mins": "150.0","room": "Room 154 (Moscone South, Upper Mezzanine)","capacity": "0","track": "","session_type": "Engineering Advocate Program","location": "","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "","delivery_method": "Live","speaker_names": "","speaker_companies": "","speaker_titles": "","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI105","title": "Enterprise Data Agents for Public Safety: Insights from Virginia State Police","abstract": "Public safety agencies must navigate a complex landscape of legacy systems, evolving threats, and increasing demands for transparency and efficiency. This session will explore the real-world challenges and strategic decisions involved in transforming data infrastructure within a law enforcement environment. Attendees will gain practical insights into balancing innovation with compliance, improving data accessibility without compromising security, and aligning IT initiatives with the broader goals of public service. Whether you're in the public or private sector, this talk will offer valuable takeaways on leading data transformation in high-integrity environments.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "02:00 PM","end_time": "02:20 PM","duration_mins": "20.0","room": "Vertical Village Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "BI & Analytics","session_type": "Theater Session","location": "Vertical Village","topics": "Data Warehouse","features": "Cortex AI Functions","personas": "BI / Analyst","industry": "Public Sector","department": "Operations","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Steve MacLauchlan","speaker_companies": "Virginia State Police","speaker_titles": "Chief Data Officer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "ML308","title": "How BetterHelp Modernized Real-Time Personalization with Snowflake Feature Store","abstract": "Achieving real-time ML requires low-latency feature retrieval and support for streaming sources. In this session, we showcase how Snowflake\u2019s online feature store unifies batch, streaming and on-demand feature views all in one platform. Join to learn how we deconstruct engineering hurdles \u2014 from optimizing high-throughput streaming to managing synchronization with the offline feature store. Expect raw benchmarks, architectural trade-offs and a close-up look at how we built our serving engine. We will present a case study of how a customer migrated a real-time ML workload from Tecton to Snowflake in production.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "02:00 PM","end_time": "02:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 3 (Basecamp, South Hall C)","capacity": "150","track": "Machine Learning","session_type": "Theater Session","location": "General Theaters","topics": "System Integrations / Synchronizations","features": "Snowflake Postgres","personas": "MLOps","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Advanced","delivery_method": "Live","speaker_names": "John Kew | Pouria Tohidi","speaker_companies": "Snowflake | BetterHelp","speaker_titles": "Principal Engineer | Machine Learning Engineer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE231","title": "RGA's Journey: Scaling High-Volume Risk Models with Snowpark","abstract": "This session explores how RGA transformed its large-scale risk model pipeline by migrating from a complex Spark and Docker architecture to a unified, Snowflake-native solution. By leveraging Snowpark and user-defined table functions, RGA eliminated data movement and the security risks of external processing. Attendees will learn how consolidating onto a single platform simplified infrastructure while improving performance, security and operational manageability. We will highlight how this streamlined architecture provides a highly scalable framework built to handle massive volume growth, ensuring the pipeline remains resilient as data demands increase.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "02:00 PM","end_time": "02:45 PM","duration_mins": "45.0","room": "Room 214 (Moscone South, Level 2)","capacity": "101","track": "Data Engineering & Pipelines","session_type": "Breakout Session","location": "","topics": "Data for Good & Community","features": "Apache Spark\u2122","personas": "Data Engineer","industry": "Financial Services","department": "IT","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Ganesh Mahadevan | Drew Marco","speaker_companies": "Snowflake | RGA","speaker_titles": "Solutions Architect | Executive Director, AI Enalbement","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "IN229","title": "The Future of Financial Services: Agents with Industry Context and Connectivity","abstract": "Financial services is entering a new operating era, one where AI is embedded into core workflows, grounded in industry context, governed by enterprise controls and securely connected across systems. The focus has shifted from pilots to execution at scale. In this keynote, leading institutions will share how they are deploying agentic AI across front-office decisions, risk oversight, compliance and operations to deliver real-time, measurable impact. Join industry innovators as they explore how context-aware, connected AI is redefining how financial services organizations operate, and why becoming agent-native is the next strategic imperative.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "02:00 PM","end_time": "02:45 PM","duration_mins": "45.0","room": "Room 152 (Moscone South, Upper Mezzanine)","capacity": "204","track": "Industry Innovation","session_type": "Breakout Session","location": "","topics": "","features": "","personas": "","industry": "Financial Services","department": "","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Mallik Yemme | Rinesh Patel Patel | Sachin Mehta Mehta","speaker_companies": "JP Morgan Chase | Snowflake | U.S. Bank","speaker_titles": "Managing Director | Global Industry GTM Lead, Financial Services | EVP, Chief Data Product Officer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "IN104","title": "The Future of Media: Composable Solutions for People and Agents","abstract": "The media, entertainment and marketing industries are entering a new era shaped by AI agents, real-time audience personalization and intelligence, and composable data and app ecosystems. Navigating this disruption requires a strong data foundation, a focused AI strategy, and clarity about use cases that will deliver the highest measurable ROI for your business. Join Dennis Buchheim at the media, entertainment and marketing technology keynote at Snowflake Summit 2026 to see how leading organizations are working with Snowflake and partners to modernize data platforms, power advanced advertising and media experiences, and unlock new revenue opportunities with agentic AI.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "02:00 PM","end_time": "02:45 PM","duration_mins": "45.0","room": "Room 151 (Moscone South, Upper Mezzanine)","capacity": "204","track": "Industry Innovation","session_type": "Breakout Session","location": "","topics": "Interoperability","features": "Cortex Code","personas": "Product Manager","industry": "Media, Entertainment & Advertising","department": "Sales & Marketing","technical_level": "Introductory","delivery_method": "OnDemand","speaker_names": "Dennis Buchheim | Derek Leonard | Mike Jones | Sherene Hial | NATHAN McCarthy | Eric Bosco","speaker_companies": "Snowflake | Netflix | Warner Music Group | SiriusXM Pandora | DIRECTV | The Trade Desk","speaker_titles": "RVP & Global Industry GTM Lead, ACME | Clean Room Product Manager | Senior Director of Software Engineering | Chief Advertising Product Officer | AVP, Technical Solutions & BI | VP, Product","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AR106","title": "Transform Your Data Estate for Agentic AI and Apps with Snowflake and Microsoft","abstract": "Whether you\u2019re running advanced analytics or developing AI applications, Snowflake and Microsoft have the platform and solutions to make your job easier. In this session, we\u2019ll show you how you can interoperate on one copy of data between Microsoft Fabric OneLake and Snowflake via open source Apache Iceberg, without the need for data replication. You\u2019ll also learn how to enhance your enterprise AI apps and workflows developed with knowledge from Snowflake. Finally, we\u2019ll show you how you can make AI accessible for all your users by leveraging Snowflake Cortex Agents within Microsoft 365 Copilot and Microsoft Teams.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "02:00 PM","end_time": "02:45 PM","duration_mins": "45.0","room": "Room 212 (Moscone South, Level 2)","capacity": "101","track": "Architectures & Interoperability","session_type": "Breakout Session","location": "","topics": "System Integrations / Synchronizations","features": "Apache Polaris","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Matt Hicks | Narendra Joshi","speaker_companies": "Microsoft | Microsoft","speaker_titles": "Principal Product Manager | Principal Cloud Solution Architect","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DH8","title": "User Group Meetup: Canada","abstract": "Join us at the AI Pop Up for the Canada User Group Meetup! This session brings together Snowflake community members from across all Canadian chapters. Whether you\u2019re in Toronto, Montreal, Vancouver or anywhere in between, come connect with peers, share what you\u2019re working on and help shape the future of the Canadian Snowflake community.","type": "AI Pop Up","date": "2026-06-02","day_name": "Tuesday","start_time": "02:00 PM","end_time": "03:00 PM","duration_mins": "60.0","room": "AI Pop Up (Basecamp, South, Hall D)","capacity": "0","track": "","session_type": "AI Pop Up","location": "","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "","delivery_method": "","speaker_names": "Ryan Ovas | Augusto Rosa | Fred L'Anglais | Phillip Lim Lim","speaker_companies": "Polar Labs Development Inc. | Archetype Consulting | Snowflake | Snowflake","speaker_titles": "CEO & Tech Lead | Head of Data and Cloud Architecture | Senior Manager, Solution Engineering | CPE Manager, APJ","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "WN208T","title": "What's New: Power Real-Time Apps and AI Without Complex Data Movement","abstract": "Stop wrestling with pipelines to move data between transactional and analytical silos. Discover how Snowflake is unifying these worlds into a single, high-performance platform where your data is seamlessly connected and ready for action. We\u2019ll dive into the latest breakthroughs in Snowflake Postgres and Unistore that allow you to build responsive, real-time apps and AI experiences without the friction of complex ETL. Join us to see live demos and hear from customers who are already leveraging Snowflake to reduce latency, slash architectural complexity and ship AI-native products faster than ever.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "02:00 PM","end_time": "02:20 PM","duration_mins": "20.0","room": "Builders Hub Theater (Basecamp, South Hall D)","capacity": "192","track": "What's New in Snowflake","session_type": "Theater Session","location": "Builder's Hub Theater","topics": "System Integrations / Synchronizations","features": "Snowflake Postgres","personas": "DevOps","industry": "Not industry-specific","department": "R&D","technical_level": "Introductory","delivery_method": "OnDemand","speaker_names": "Phillip Coletti | Christopher Heim","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Senior Manager, Product Management | Staff Product Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI102","title": "Your Marketing ROI in Under Eight Minutes: Powered by Snowflake Intelligence","abstract": "Marketing mix modeling used to mean months of agency work and eye-watering fees. Domo MMM, built on Snowflake Intelligence and developed in partnership with Stella Growth Intelligence, compresses that timeline dramatically. This session walks through how we architected and delivered a production-ready MMM solution using Domo's 1,000 connectors, ETL, Snowflake integration and Snowflake Intelligence, as well as built out the supporting Snowflake Native App fully integrated into Snowflake Cortex AI. Come and see how we can deliver true insights into your marketing spend quicker than this session will actually run!","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "02:00 PM","end_time": "02:20 PM","duration_mins": "20.0","room": "Vertical Village Theater 2 (Basecamp, South Hall B)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "Vertical Village","topics": "Snowflake Partners","features": "Snowflake ML","personas": "Marketing Practitioner","industry": "Not industry-specific","department": "Operations","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Dan Wentworth","speaker_companies": "Domo","speaker_titles": "Solution Engineering Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI209","title": "Beyond Dashboards: How Medtronic Is Transforming BI with AI Agents","abstract": "Medtronic is transforming how 90,000+ employees interact with data \u2014 moving from 50,000+ Power BI and Tableau dashboards to fewer than 5,000 by 2027. Join Ravi Achukola, Head of Data & AI Platforms, to learn how Medtronic is using Cortex Code to build an Agentic Semantic Layer that centralizes business logic in Snowflake, eliminating fragmentation across legacy BI tools. Built on this foundation, Snowflake Intelligence and Cortex Agents deliver conversational experiences, enabling users to ask deeper questions and take action without ever opening a dashboard. Hear the architectural decisions, change management challenges and early wins from medtech's most ambitious BI transformation.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "02:30 PM","end_time": "02:50 PM","duration_mins": "20.0","room": "Vertical Village Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "Vertical Village","topics": "Data Warehouse","features": "SnowConvert AI","personas": "Data Scientist","industry": "Manufacturing","department": "Supply Chain","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Ravi Achukola","speaker_companies": "Medtronic","speaker_titles": "Executive IT Director, D&A","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "IN218","title": "Built with Care: Powering the Next Wave of Healthcare Technology on Snowflake","abstract": "Healthcare and life sciences organizations rely on their technology partners to operationalize so many of their business-critical workflows. From clinical trial management to electronic health records to claims management and billing, healthcare runs on technology. Join this panel discussion to hear from healthcare and life sciences technology innovators on how they are leveraging the power of data, AI and the Snowflake platform to build solutions that accelerate customer success. You\u2019ll hear examples and see demonstrations of real applications powered by Snowflake AI Data Cloud for Healthcare and Life Sciences that drive efficiency in healthcare.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "02:30 PM","end_time": "03:15 PM","duration_mins": "45.0","room": "Room 159 (Moscone South, Upper Mezzanine)","capacity": "213","track": "Industry Innovation","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Snowflake ML","personas": "IT / DBA","industry": "Healthcare and Life Sciences","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Kate Eshelman, MD, MPH Eshelman | Todd Crosslin | Inderpreet Kambo | Alicia Bassolino | Fawad Butt","speaker_companies": "Inovalon | Snowflake | Improzo | athenahealth | Penguin Ai","speaker_titles": "VP Medical Informatics | Global Industry Principal HCLS | CEO, Improzo | VP, Analytics & AI | Chief Executive Officer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI226","title": "Data Orchestration to Activation for Snowflake with Enterprise MCP & Agentic AI","abstract": "Snowflake is where your most trusted data lives. But maximizing its value means solving two things: getting data in efficiently and getting intelligence back out in real time. In this session, Workato's Field CTO for Data, Avinash Deshpande, walks through end-to-end Snowflake orchestration, from high-performance ingestion and native push-down transformations to reverse ETL and enterprise MCP servers that let AI agents query and act on trusted Snowflake data instantly.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "02:30 PM","end_time": "02:50 PM","duration_mins": "20.0","room": "Basecamp South Theater 3 (Basecamp, South Hall C)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "General Theaters","topics": "System Integrations / Synchronizations","features": "Cortex AI Functions","personas": "Data Engineer","industry": "Not industry-specific","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Avi Deshpande","speaker_companies": "Workato","speaker_titles": "Field CDO","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE201","title": "Driving Fan Engagement with the NBA\u2019s Fan Data Platform on Snowflake","abstract": "The NBA's Fan Data Platform (FDP) is the central hub for collecting, mastering and activating fan interactions across the entire NBA ecosystem. In this session, we'll showcase how Snowflake powers the FDP using a modified medallion architecture, Dynamic Tables and a configuration-driven approach to manage diverse ingests and processing pipelines, minimizing custom work and maximizing flexibility. We\u2019ll share lessons from our migration from Databricks to Snowflake. Attendees will see how the FDP enables downstream reporting, integrations and activations
