: "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Gareth Campbell","speaker_companies": "BioCatch","speaker_titles": "VP of Threat Analytics","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AR206","title": "GEICO's Journey to Unified Enterprise Lakehouse Governance with Horizon, Polaris","abstract": "GEICO, a leading insurer, struggled with data fragmentation across its multi-engine open-source lakehouse (Iceberg, Spark, Flink, Trino) and its EDW. Managing consistent security and governance across these disparate systems where Polaris served as the lakehouse catalog and Horizon governed the EDW created complexity. We'll showcase GEICO\u2019s implementation of new Horizon features: full embedding of Polaris and support for IRC. This provides a single, universal governance layer, enforcing consistent FGAC, tagging and lineage across all data assets (OSS or Snowflake) achieving a true enterprise lakehouse, ensuring secure, multi-engine Iceberg access for AI-ready data discovery, without vendor lock-in.","type": "Breakout Session","date": "2026-06-01","day_name": "Monday","start_time": "04:00 PM","end_time": "04:45 PM","duration_mins": "45.0","room": "Room 208 (Moscone South, Level 2)","capacity": "197","track": "Architectures & Interoperability","session_type": "Breakout Session","location": "","topics": "Catalogs / Discovery","features": "Apache Polaris","personas": "Data Engineer","industry": "Not industry-specific","department": "IT","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Kenneth Kang | Anthony Asta","speaker_companies": "GEICO | GEICO","speaker_titles": "Distinguished Engineer | Senior Director Software Engineering","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI219","title": "Hex: From Bottleneck to Breakthrough \u2014 How Neo Financial Scaled Data Self-Serve","abstract": "Canada's fastest-growing fintech couldn't afford to wait for answers. As Neo Financial scaled to nearly 2 million customers, it needed business users to access insights faster. In this session, data leader Brandon Rochon shares how he transformed Neo Financial's data culture using Hex's agentic analytics on Snowflake. With Hex's OAuth integration, every query runs under the user's own Snowflake credentials, so viral adoption didn't come at the cost of security. It happened because of it.","type": "Theater Session","date": "2026-06-01","day_name": "Monday","start_time": "04:00 PM","end_time": "04:20 PM","duration_mins": "20.0","room": "Vertical Village Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "BI & Analytics","session_type": "Theater Session","location": "Vertical Village","topics": "AI Agents / Data Agents","features": "Workspaces / Notebooks","personas": "Data Engineer","industry": "Financial Services","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Brandon Rochon","speaker_companies": "Neo Financial","speaker_titles": "Vice President, Data & Analytics","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "PO221","title": "How Customers Are Running an Efficient Snowflake Environment","abstract": "This panel brings together real-world lessons from CrowdStrike, Zendesk and DTCC on how to maximize performance and economic value at scale in Snowflake. Panelists share battle-tested strategies for optimizing cost and performance using Gen2 warehousing, intelligent scaling, and query and data design best practices, resulting in millions in savings and faster, more real-time analytics.","type": "Breakout Session","date": "2026-06-01","day_name": "Monday","start_time": "04:00 PM","end_time": "04:45 PM","duration_mins": "45.0","room": "Room 152 (Moscone South, Upper Mezzanine)","capacity": "204","track": "Performance & Cost Optimization","session_type": "Breakout Session","location": "","topics": "System Integrations / Synchronizations","features": "Gen 2 Warehouses","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Mark Howerton | Adi Glasman | Arjun Puri | Douglas Gallagher","speaker_companies": "CrowdStrike | Zendesk | Depository Trust & Clearing Corporation | Snowflake","speaker_titles": "Sr Manager of Data Operations | VP Engineering | Data / AI | Director, Analytics and AI | Global Head of Value Advisory & Bid Mgmt","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI253","title": "How Cyera Enables Semantic Data Layers for Analytics and AI with Secure Sharing","abstract": "Modern SaaS products generate a flood of operational metadata that customers want to explore in BI \u2014 and now feed into AI. Instead of fragile CSV exports or one-off REST pulls, Snowflake Secure Data Sharing lets you publish governed, continuously updated data layers at scale for clients.","type": "Breakout Session","date": "2026-06-01","day_name": "Monday","start_time": "04:00 PM","end_time": "04:45 PM","duration_mins": "45.0","room": "Room 214 (Moscone South, Level 2)","capacity": "101","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "Data Warehouse","features": "Secure Data Sharing","personas": "MLOps","industry": "Telecom","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Shaun Chaudhary","speaker_companies": "Cyera","speaker_titles": "VP of Data & Analytics","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "ML210","title": "How Norwegian Cruise Line Optimizes Fuel, Compliance and Costs in Snowflake ML","abstract": "Norwegian Cruise Line Holdings (NCLH) built a first-of-its-kind, innovative Snowflake native fuel forecasting platform using Snowflake ML, unlocking millions of dollars in annual savings and strengthening regulatory compliance and procurement strategy. By unifying massive volumes of Internet of Things, routing and climatology data in Snowflake, NCLH trains and deploys ML models that predict fuel use for every ship, leg and port call with minute-by-minute granularity. The solution enables accurate procurement planning, reduced carbon credit exposure and near real-time insights \u2014 all powered end to end by Snowflake ML.","type": "Breakout Session","date": "2026-06-01","day_name": "Monday","start_time": "04:00 PM","end_time": "04:45 PM","duration_mins": "45.0","room": "Room 151 (Moscone South, Upper Mezzanine)","capacity": "204","track": "Machine Learning","session_type": "Breakout Session","location": "","topics": "System Integrations / Synchronizations","features": "Geospatial functions","personas": "MLOps","industry": "Travel & Hospitality","department": "Supply Chain","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Mike Planicka | Artem Matskevych","speaker_companies": "Norwegian Cruise Line Holdings Ltd. | Norwegian Cruise Line Holdings Ltd.","speaker_titles": "Director Energy Conservation Analytics | Manager: Marine Comp Intelligence","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI204","title": "Is Context Engineering the New Analytics Engineering?","abstract": "Analytics engineers built transformations to define metrics and share them in the data warehouse. But AI agents need more than definitions. They need context. At Checkr, the analytics engineering team treats context engineering as the next evolution of their practice. This session covers what it looks like to engineer context, organizational knowledge and governance into AI systems \u2014 including what semantic layers usually miss; how to accelerate with LLM-assisted tooling; how to build a feedback loop that makes AI smarter over time; and why this discipline is becoming the core of the analytics engineering role, not a side project.","type": "Theater Session","date": "2026-06-01","day_name": "Monday","start_time": "04:00 PM","end_time": "04:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 4 (Basecamp, South Hall C)","capacity": "150","track": "BI & Analytics","session_type": "Theater Session","location": "General Theaters","topics": "Snowflake Partners","features": "Cortex AI Functions","personas": "Data Engineer","industry": "Not industry-specific","department": "Other","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Jamie Davidson | Sarah Fischbach","speaker_companies": "Omni | Checkr","speaker_titles": "Co-founder & President | Staff Analytics Engineer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI230","title": "Ohio Tax: Call Center Analytics, Call Transcription and Agentic Workloads","abstract": "The Ohio Department of Taxation administers most state and many local taxes for Ohio, including income, sales and business taxes. This year, it's standing up a Snowflake environment in Commercial Gov to run a Snowflake Cortex AI POC focused on call-center call quality analytics and a taxpayer chatbot, ahead of full FedRAMP High feature parity. Expected outcomes are faster, more consistent taxpayer support, better insight into call drivers and a reusable AI pattern for future tax and fraud analytics.","type": "Breakout Session","date": "2026-06-01","day_name": "Monday","start_time": "04:00 PM","end_time": "04:45 PM","duration_mins": "45.0","room": "Room 212 (Moscone South, Level 2)","capacity": "101","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "Data Warehouse","features": "Cortex AI Functions","personas": "Security Practitioner","industry": "Public Sector","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Budwhite Zhang","speaker_companies": "State of Ohio Department of Tax","speaker_titles": "CDO and Deputy CIO","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "E6","title": "Trust at AI Speed: Governance and Security for the Enterprise","abstract": "Despite high AI adoption, few enterprises see meaningful impact because traditional governance and security methods slow innovation. For most, governance lives outside the platform, in workflows that operate at human speed. To bridge the gap between investment and impact, enterprises must embed governance and protection into the data platform. In this session we will discuss: Governing and protecting what AI models learn from, so sensitive data can fuel training without surfacing in outputs Lineage, accountability and protection when AI agents act on enterprise data Keeping governance and protection consistent as data moves across clouds Unstructured data as the new risk surface","type": "Executive Content","date": "2026-06-01","day_name": "Monday","start_time": "04:00 PM","end_time": "04:30 PM","duration_mins": "30.0","room": "Alpine Clubhouse Theater (Moscone South, Level 3)","capacity": "70","track": "Governance & Security","session_type": "Executive Content","location": "","topics": "Governance","features": "Other","personas": "Business Executive","industry": "Other","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Jeff Chou | Paul Zajdel","speaker_companies": "Capital One Software | CDW","speaker_titles": "VP of AI and Head of Product | VP Data & Analytics","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI210","title": "Turn Conversation into AI Pipelines with Dataiku and Snowflake","abstract": "What if AI development started with natural language collaboration instead of being code-first? With Dataiku\u2019s Cobuild and Snowflake Cortex AI, natural language prompts can generate visual pipelines and production-ready AI workflows directly on Snowflake. Join this session to see how organizations enable data teams and domain experts to co-build AI applications faster. Discover how enterprises are expanding who can build AI while maintaining the governance, performance and scalability required by CIOs, CAIOs and CDOs.","type": "Theater Session","date": "2026-06-01","day_name": "Monday","start_time": "04:00 PM","end_time": "04:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "General Theaters","topics": "AI Agents / Data Agents","features": "Cortex AI Functions","personas": "MLOps","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Jed Dougherty | Patrick Phrayme","speaker_companies": "Dataiku | Dataiku","speaker_titles": "SVP AI & Platform | Principal Ecosystem Architect","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI261","title": "WTF Is the Enterprise Context Layer? Demystified and Demoed","abstract": "Everyone's talking about context layers. Nobody agrees on what one is: A semantic layer with a better name? A knowledge graph in a trench coat? AI made data teams into janitors, cleaning up hallucinations and debugging agents. But the context agents need most is what data teams already own: The definitions. The lineage. The governance. The institutional knowledge. That's not a cost center; it's your most strategic asset. Join Prukalpa Sankar and Varun Banka to learn how the four levels of context map the gap. Then watch live as a dark Snowflake database becomes AI ready, with automated lineage, AI-bootstrapped definitions, a green Context Quality Score and a governed Cortex Agent response via MCP.","type": "Breakout Session","date": "2026-06-01","day_name": "Monday","start_time": "04:00 PM","end_time": "04:45 PM","duration_mins": "45.0","room": "Room 210 (Moscone South, Level 2)","capacity": "101","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "Catalogs / Discovery","features": "Snowflake ML","personas": "Data Engineer","industry": "Not industry-specific","department": "IT","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Prukalpa Sankar","speaker_companies": "Atlan","speaker_titles": "Co-Founder","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DH4","title": "User Group Meetup: EMEA","abstract": "Join us at the AI Hub for the EMEA User Group Meetup! This is a gathering for Snowflake community members across Europe, the Middle East and Africa. Connect with user group leaders and peers, share what you're building and hear how data teams across the region are putting AI into practice. Whether you lead a chapter or are discovering user groups for the first time, this is your space.","type": "AI Pop Up","date": "2026-06-01","day_name": "Monday","start_time": "04:15 PM","end_time": "05:15 PM","duration_mins": "60.0","room": "AI Pop Up (Basecamp, South, Hall D)","capacity": "0","track": "","session_type": "AI Pop Up","location": "","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "","delivery_method": "","speaker_names": "Christopher Marland | Douglas Day | Piers Batchelor","speaker_companies": "Aimpoint Digital | datalab | Astrato Analytics LTD.","speaker_titles": "Snowflake Practice Lead | Director of Engineering | Senior Product Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "K1","title": "Opening Keynote","abstract": "Start Snowflake Summit 26 with a look at what\u2019s next. Snowflake's CEO, Sridhar Ramaswamy, shares how organizations are turning AI\u2019s promise into real business transformation and how the Snowflake AI Data Cloud is enabling a new era of enterprise intelligence and agentic innovation with data at the center. Joined by industry leaders and luminaries, he explores how agentic AI is already reshaping global industries and the critical challenges and opportunities facing today\u2019s top business leaders.","type": "Keynote","date": "2026-06-01","day_name": "Monday","start_time": "05:00 PM","end_time": "06:15 PM","duration_mins": "75.0","room": "Keynote (Basecamp, North Hall F)","capacity": "5000","track": "","session_type": "Keynote","location": "","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "Introductory","delivery_method": "OnDemand","speaker_names": "Sridhar Ramaswamy | Julie Sweet | Manish Sharma | Daniela Amodei | Emmanuel Frenehard","speaker_companies": "Snowflake | Accenture | Accenture | Anthropic | Sanofi","speaker_titles": "Chief Executive Officer | Chair & CEO | Chief Strategy and Services Officer | President and Co-Founder | Chief Digital Officer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "ACT3","title": "Basecamp Welcome Reception","abstract": "Kick off Snowflake Summit with the Snowflake AI Data Cloud community. Meet peers, exchange ideas and start building connections in a welcoming setting designed to bring everyone together from the start.","type": "Activity","date": "2026-06-01","day_name": "Monday","start_time": "06:15 PM","end_time": "08:00 PM","duration_mins": "105.0","room": "Basecamp Expo Hall","capacity": "15000","track": "","session_type": "Activity","location": "","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "","delivery_method": "Live","speaker_names": "","speaker_companies": "","speaker_titles": "","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DH5","title": "Meet Your DSH @ Basecamp Reception","abstract": "Kick off Summit week at the AI Pop Up Basecamp Reception! This is your chance to meet our Data Superheroes in a relaxed, open setting. No agenda, no presentations \u2014 just great conversation. Ask them anything about what they\u2019re building on Snowflake, swap ideas and make connections with the community\u2019s most passionate practitioners.","type": "AI Pop Up","date": "2026-06-01","day_name": "Monday","start_time": "06:15 PM","end_time": "07:15 PM","duration_mins": "60.0","room": "AI Pop Up (Basecamp, South, Hall D)","capacity": "0","track": "","session_type": "AI Pop Up","location": "","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "","delivery_method": "","speaker_names": "Pooja Sahu Sahu | Ana Stefanska | Vivek Pant | Ruchi Soni | Pawel Potasinski | Karthik Raman | Rajiv Gupta | St\u00e9phane Burwash | Jan Laznicka | Jan Difko","speaker_companies": "Schroders | TUI | The Hartford | Accenture | Infinite Services | LTM | Kipi.ai | Infostrux | Billigence | Billigence","speaker_titles": "Data Engineer | Snowflake Data Superhero, Data Team Lead | Director-AI Data Engineering | Snowflake Global Practice Lead | CTO | Head of Snowflake Practice | VP of Technology | Lead Customer Solutions Architect | Data Engineering Practice Manager | Principal Data Architect","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "ACT1","title": "2026 Data Driver Awards","abstract": "The Data Drivers Awards is an annual awards program celebrating Snowflake customers (individuals and organizations) that are pushing the boundaries, driving innovation and delivering impact within their business and industry \u2014 using the Snowflake AI Data Cloud.","type": "Activity","date": "2026-06-01","day_name": "Monday","start_time": "06:30 PM","end_time": "07:00 PM","duration_mins": "30.0","room": "Builders Hub Theater (Basecamp, South Hall D)","capacity": "192","track": "","session_type": "Activity","location": "Builder's Hub Theater","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "","delivery_method": "OnDemand","speaker_names": "","speaker_companies": "","speaker_titles": "","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI303","title": "AI-Powered Conversations with Your Data Using Amazon Quick and Snowflake via MCP","abstract": "The enterprise data landscape is scattered. Teams are trapped in disconnected tools, business users wait days for insights, and engineers build fragile one-off integrations. This hands-on workshop shows how to integrate Amazon Quick MCP actions with Snowflake Cortex AI's MCP server to build AI agents that transform how teams interact with enterprise data. Business users can ask questions such as \"What are our top-performing products this quarter?\" without writing SQL, while IT maintains security and governance controls. Walk out with working code and production-ready patterns that support self-service analytics across your organization.","type": "Hands-on Lab","date": "2026-06-01","day_name": "Monday","start_time": "06:30 PM","end_time": "08:00 PM","duration_mins": "90.0","room": "Hands-on Labs 3 (Basecamp, Hall E)","capacity": "133","track": "Generative AI & Agents","session_type": "Hands-on Lab","location": "","topics": "Snowflake Partners","features": "Cortex Code","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Advanced","delivery_method": "Live","speaker_names": "Nithyashree Alwarsamy | James Sun Sun","speaker_companies": "AWS | Snowflake","speaker_titles": "Partner Solutions Architect | Sr. Partner Solution Engineer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI220","title": "Deploying Geospatial Solutions Using Cortex Code Skills","abstract": "Discover how Cortex Code skills can transform complex geospatial deployments into guided, repeatable workflows. This session demonstrates a real-world Fleet Intelligence solutions for retail, manufacturing, and travel and hospitality that perform sophisticated geospatial analytics, all deployed through an AI-assisted skill. Attendees will learn how to package domain expertise into reusable skills that handle template variables, validate prerequisites, execute idempotent SQL and provide self-healing error recovery, making advanced geospatial solutions accessible to any Snowflake user.","type": "Hands-on Lab","date": "2026-06-01","day_name": "Monday","start_time": "06:30 PM","end_time": "08:00 PM","duration_mins": "90.0","room": "Hands-on Labs 2 (Basecamp, Hall E)","capacity": "139","track": "BI & Analytics","session_type": "Hands-on Lab","location": "","topics": "Data Warehouse","features": "Geospatial functions","personas": "MLOps","industry": "Travel & Hospitality","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Becky O'Connor | Piotr Paczewski","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Principal Architect | Solutions Architect","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "GO229","title": "Secure by Default: Implementing Zero-Trust Identity and Access in Snowflake","abstract": "Managing static credentials and complex role hierarchies remains a leading cause of security incidents and operational fatigue. This 90-minute hands-on lab provides a deep dive into the next generation of Snowflake Identity and Access Management (IAM). Participants will gain hands-on experience with: Secretless connectivity: Configure Workload Identity Federation (WIF) for service-to-service auth without managed keys. Simplified access: Use new improvements to reduce role bloat and enforce least-privilege for AI workloads. Automated posture: Use Trust Center to identify risks and apply one-click remedial actions.","type": "Hands-on Lab","date": "2026-06-01","day_name": "Monday","start_time": "06:30 PM","end_time": "08:00 PM","duration_mins": "90.0","room": "Hands-on Labs 1 (Basecamp, Hall E)","capacity": "299","track": "Governance & Security","session_type": "Hands-on Lab","location": "","topics": "Data Mesh","features": "Other","personas": "Data Engineer","industry": "Not industry-specific","department": "IT","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Samir Kakkar Kakkar | Sharanya Ramakrishnan","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Senior Product Manager | Senior Product Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "K2","title": "Platform Keynote","abstract": "See how to move beyond AI experimentation and deliver measurable results in this keynote with Christian Kleinerman, Executive Vice President of Product at Snowflake. You\u2019ll discover how Snowflake is redefining what\u2019s possible with the Snowflake AI Data Cloud \u2014 and what that means for your organization. Hear directly from Snowflake leaders and customers transforming their businesses, and learn how to unify your data, govern AI with confidence and deploy secure, scalable agents that turn insight into action \u2014 making AI real for business at every scale.","type": "Keynote","date": "2026-06-02","day_name": "Tuesday","start_time": "09:00 AM","end_time": "11:00 AM","duration_mins": "120.0","room": "Keynote (Basecamp, North Hall F)","capacity": "5000","track": "","session_type": "Keynote","location": "","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "","delivery_method": "OnDemand","speaker_names": "Christian Kleinerman | Caitlin Halferty | Patrick Duroseau | Benoit Dageville | Dash Desai","speaker_companies": "Snowflake | Thomson Reuters | Under Armour | Snowflake | Snowflake","speaker_titles": "EVP, Product | Chief Data & Analytics Officer | Chief Data and AI Officer | Co-Founder and President, Product | Principal Developer Advocate","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DH6","title": "User Group Meetup: US / Dallas","abstract": "Join us at the AI Pop Up for the Dallas User Group Meetup! Connect with Snowflake community members from the Dallas-Fort Worth area and beyond. Swap stories on what you\u2019re building, learn what\u2019s working for other teams and discover how your local user group can accelerate your growth. Whether you\u2019re a seasoned pro or just getting started, this is your community.","type": "AI Pop Up","date": "2026-06-02","day_name": "Tuesday","start_time": "11:00 AM","end_time": "12:00 PM","duration_mins": "60.0","room": "AI Pop Up (Basecamp, South, Hall D)","capacity": "0","track": "","session_type": "AI Pop Up","location": "","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "","delivery_method": "","speaker_names": "Aran Sakzenian | Joyce Avila","speaker_companies": "Snowflake | DataWorthy.ai","speaker_titles": "Principal Solution Engineer | Chief Innovation Officer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI236","title": "Achieving Agentic AI ROI with Snowflake: Is Your Data Ready?","abstract": "As organizations build AI agents and autonomous workflows on Snowflake, many struggle to turn AI investment into real ROI. The challenge isn\u2019t the AI \u2014 it\u2019s the data. A growing gap in data trust limits what autonomous systems can reliably deliver. In this session, we break down the six data challenges that hold agentic AI back \u2014 and discuss what it takes to prepare your Snowflake data for agent-driven outcomes. You\u2019ll also see a demonstration of how Precisely is applying AI-driven automation and AI agents \u2014 delivered through interoperable services, APIs and data \u2014 to help accelerate the path to agentic-ready data for AI powered by Snowflake.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "11:30 AM","end_time": "11:50 AM","duration_mins": "20.0","room": "Basecamp South Theater 4 (Basecamp, South Hall C)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "General Theaters","topics": "Catalogs / Discovery","features": "Other","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Trey Wood","speaker_companies": "Precisely","speaker_titles": "Solutions Architect","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "PO210","title": "Advancing FinOps: Snowflake, JPMorgan and the FinOps Foundation","abstract": "Join Snowflake, JPMorgan Chase and the FinOps Foundation for a practitioner-focused discussion on maturing FinOps capabilities. Explore governance models, cost allocation frameworks and cultural shifts required aligning platform teams with financial accountability \u2014 while accelerating innovation.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "11:30 AM","end_time": "12:15 PM","duration_mins": "45.0","room": "Room 214 (Moscone South, Level 2)","capacity": "101","track": "Performance & Cost Optimization","session_type": "Breakout Session","location": "","topics": "Governance","features": "Gen 2 Warehouses","personas": "Data Engineer","industry": "Not industry-specific","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Ben Roberts | J.R. Storment | Douglas Gallagher","speaker_companies": "JP Morgan | FinOps Foundation | Snowflake","speaker_titles": "Director - Engineering, Data Platforms | Executive Director | Global Head of Value Advisory & Bid Mgmt","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI251","title": "AI Agents and Forward Deployed Engineering for Commercial Decision Intelligence","abstract": "Learn about Jarvis, Sanofi's AI sales adviser, bridging the gap between leadership strategy and field execution to drive a $1.5 billion annual revenue uplift. Powered by Snowflake Cortex Code, Cortex Search, Cortex Agents and SPCS, this Forward Deployed Engineering (FDE) engagement enables Sanofi to scale their commercial field force effectiveness agent across the globe for more than 10,000 employees. The system uses a hub-and-spoke model for global scale for deterministic compliance, ensuring data-driven clinical influence with zero human-in-the-loop.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "11:30 AM","end_time": "12:15 PM","duration_mins": "45.0","room": "Room 205 (Moscone South, Level 2)","capacity": "226","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Snowflake ML","personas": "Data Scientist","industry": "Other","department": "Other","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Mackenzie Allen | Dimitrije Jankovic","speaker_companies": "Snowflake | Sanofi","speaker_titles": "Global AI Deployment Director | SVP - Digital Strategy & Operations","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI135","title": "Building Agents on the Data Your Business Trusts","abstract": "Agents become far more useful when they can reason over the data, systems and context that run the business. In this session, OpenAI will show how enterprises can build and scale agents built with GPT 5.5 grounded on top of your Snowflake data that move beyond questions and summaries to support real workflows and produce reviewable work. Attendees will leave with a practical framework for choosing agent use cases, connecting them to trusted enterprise data, and scaling what works with evaluation, governance and human review.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "11:30 AM","end_time": "12:15 PM","duration_mins": "45.0","room": "Room 210 (Moscone South, Level 2)","capacity": "101","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Other","personas": "Business Executive","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Olivia Morgan | Shikhar Kwatra Kwatra","speaker_companies": "OpenAI | OpenAI","speaker_titles": "Solutions Engineer | Partner AI Deployment Engineering Lead","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DM211","title": "Building Multiparty Intelligence with AI-Native Data Clean Rooms","abstract": "The data you need lives in someone else's warehouse. This session provides the practical playbook for the fix. See how advertisers, publishers, healthcare networks and financial institutions are collaborating today: multiple parties, one neutral room, no exposed raw data. From setup to first result takes one business day, with partners already on Snowflake. We demo an overlap analysis with machine learning, then show how to get results out of the secure environment so you can actually use them, without leaving Snowflake's governance layer. No SQL required. Snowflake's agentic interface lets anyone configure a collaboration and run analysis in plain English.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "11:30 AM","end_time": "11:50 AM","duration_mins": "20.0","room": "Basecamp South Theater 3 (Basecamp, South Hall C)","capacity": "150","track": "Data Sharing & Marketplace","session_type": "Theater Session","location": "General Theaters","topics": "AI Agents / Data Agents","features": "Cortex Code","personas": "Data Engineer","industry": "Travel & Hospitality","department": "IT","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Spencer Janyk | Shivangi Tandon","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Product Manager | Product Manager, Data Clean Rooms","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "E22","title": "Executive Industry Summit Tour \u2014 Telecom","abstract": "Join an exclusive, guided tour of the Snowflake AI Data Cloud and its premier partner ecosystem, tailored for leaders in telecom. This immersive experience will take you through four curated stops that showcase the art of the possible \u2014 real-world solutions, cutting-edge AI use cases and data-driven innovations transforming your industry today. Gain direct access to experts, see industry-leading technology in action and leave with actionable inspiration to accelerate your data strategy. Space is extremely limited \u2014 registration is first come, first served. Please note that this experience includes walking between stops; comfortable footwear is recommended. Please note that the Executive Booth Tours are reserved for customers only \u2014 we kindly ask our partners not to register.","type": "Executive Content","date": "2026-06-02","day_name": "Tuesday","start_time": "11:30 AM","end_time": "01:00 PM","duration_mins": "90.0","room": "Vertical Village (Basecamp, South Hall B)","capacity": "15","track": "","session_type": "Executive Content","location": "","topics": "","features": "","personas": "","industry": "Telecom","department": "","technical_level": "","delivery_method": "","speaker_names": "","speaker_companies": "","speaker_titles": "","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "E14","title": "Executive Lunch Hosted by dbt Labs","abstract": "Hosted by dbt Labs, this partner-hosted lunch invites executive attendees to network and engage in conversation over a complimentary meal, available while supplies last.","type": "Executive Content","date": "2026-06-02","day_name": "Tuesday","start_time": "11:30 AM","end_time": "01:00 PM","duration_mins": "90.0","room": "Alpine Clubhouse (Moscone South, Level 3)","capacity": "200","track": "","session_type": "Executive Content","location": "","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "","delivery_method": "Live","speaker_names": "","speaker_companies": "","speaker_titles": "","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI101","title": "How Eutelsat Uses Data and AI to Manage Global Connectivity","abstract": "Running a satellite network isn\u2019t like running a terrestrial one: coverage is global, demand is volatile and orbital resources are finite. Eutelsat uses data and AI to build a unified intelligence layer that orchestrates satellite traffic across continents and ground stations. Forecasting anticipates spikes, optimizes capacity and latency, and uses analytics to strengthen resilience and sustainability \u2014 turning satellites into adaptive infrastructure for aviation, maritime, enterprise and government. This session shows how to manage at planetary scale, ensure reliability and convert insight into services and revenue.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "11:30 AM","end_time": "11:50 AM","duration_mins": "20.0","room": "Vertical Village Theater 2 (Basecamp, South Hall B)","capacity": "150","track": "BI & Analytics","session_type": "Theater Session","location": "Vertical Village","topics": "Interoperability","features": "Snowflake ML","personas": "Data Engineer","industry": "Telecom","department": "Operations","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Matteo Carucci | Pedro Jose Jose","speaker_companies": "Eutelsat | Snowflake","speaker_titles": "Head of Data & AI | Field CTO","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "E18","title": "How to Scale AI in the Enterprise: Lessons from Snowflake\u2019s CIO and CDO Teams","abstract": "AI is moving from experimentation to enterprisewide adoption, with CIO and CDO teams at the center of driving it forward. In this executive panel, Snowflake leaders share how we\u2019ve evolved our own Data & Analytics and Enterprise Engineering teams to keep pace with the speed of AI \u2014 shifting from dashboards and reports to enabling agentic AI across the business. Hear how we\u2019re aligning teams, redefining deliverables, and balancing speed, governance and trust. Walk away with a clear framework for how your data team should evolve and what to prioritize in the next 90 days.","type": "Executive Content","date": "2026-06-02","day_name": "Tuesday","start_time": "11:30 AM","end_time": "12:00 PM","duration_mins": "30.0","room": "Alpine Clubhouse Theater (Moscone South, Level 3)","capacity": "70","track": "","session_type": "Executive Content","location": "","topics": "AI Agents / Data Agents","features": "","personas": "Business Executive","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "James Isbell | Karthik Gopalakrishnan | Hamin Oh | Saba Mirza","speaker_companies": "Snowflake | Snowflake | Snowflake | Snowflake","speaker_titles": "Senior Director, Data and Analytics Eng | Senior Director, Enterprise Engineering | Director, Data, Analytics and AI | Sr Director, Product Marketing","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DM213","title": "Integrating Snowflake and Neo4j: Practical Graph Analytics for Your Data","abstract": "SQL is foundational to Snowflake, but layering relationship intelligence provides a competitive edge. In this workshop, discover how to extend SQL workflows by integrating Neo4j's graph analytics directly into the AI Data Cloud. Using a manufacturing risk scenario, you will model operational data into a graph and apply several different similarity algorithms to uncover systemic risks. Master a scalable, zero-ETL pattern applicable to any industry to enrich your SQL insights with graph-native power. Key learnings include how to: Merge SQL precision with graph depth Deploy Neo4j Graph Analytics in Snowflake Apply graph-based similarity Build scalable, relationship-aware intelligence","type": "Hands-on Lab","date": "2026-06-02","day_name": "Tuesday","start_time": "11:30 AM","end_time": "01:00 PM","duration_mins": "90.0","room": "Hands-on Labs 3 (Basecamp, Hall E)","capacity": "133","track": "Data Sharing & Marketplace","session_type": "Hands-on Lab","location": "","topics": "System Integrations / Synchronizations","features": "Marketplace","personas": "Data Engineer","industry": "Manufacturing","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Ben Lackey | Akmal Chaudhri","speaker_companies": "Neo4j | Neo4j","speaker_titles": "Senior Director, Partner Architecture | Technical Curriculum Developer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "ML209","title": "Itron Powerflow for Grid Planning on Snowflake ML\n","abstract": "Itron is redefining grid management by delivering structure-level Powerflow analysis for the world\u2019s largest energy utilities. Electrification is fundamentally reshaping demand. Learn how Itron is using Snowflake ML to generate granular, high-frequency insight across both load and generation to maintain reliability, manage congestion and control emissions.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "11:30 AM","end_time": "12:15 PM","duration_mins": "45.0","room": "Room 208 (Moscone South, Level 2)","capacity": "197","track": "Machine Learning","session_type": "Breakout Session","location": "","topics": "Interoperability","features": "Snowflake ML","personas": "MLOps","industry": "Other","department": "Operations","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Garrett Frere | Mitali Shah","speaker_companies": "Snowflake | Itron","speaker_titles": "Principal AI/ML, Applied Engineering | Senior Product Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "GO222","title": "Move Fast, Don't Break Trust: New Developer Blueprint for AI-Driven Governance","abstract": "Governance is often a finish line hurdle that slows delivery. This session introduces developer-native governance using Snowflake Cortex Code to move guardrails upstream. Learn how to embed AI-assisted peer reviews directly into Snowflake Workspaces, grounding LLMs in Snowflake Horizon Catalog metadata \u2014 including schemas, tags and masking policies. We demonstrate a \"shift-left\" workflow where Cortex identifies gaps and generates compliant DDL in real time. See how to automate policy mapping, produce human-readable audit justifications and reduce manual reviews by 60%. Transform governance from a bottleneck into an intelligent assistant for scalable, trusted data engineering.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "11:30 AM","end_time": "11:50 AM","duration_mins": "20.0","room": "Builders Hub Theater (Basecamp, South Hall D)","capacity": "192","track": "Governance & Security","session_type": "Theater Session","location": "Builder's Hub Theater","topics": "Catalogs / Discovery","features": "Apache Iceberg\u2122","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Badri Baindla | Mike Williams","speaker_companies": "Salesforce | Salesforce","speaker_titles": "Principal Engineer | Senior Member of Technical Staff","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE104","title": "Open Data Infrastructure: The Next Era of Data Architecture","abstract": "The modern data stack solved for siloed analytics, but AI and operational workloads demand a more adaptable foundation. In this thought leadership session, Fivetran and dbt Labs explore open data infrastructure, an evolution beyond the modern stack that separates storage from compute and applies open standards across layers. Learn how to preserve interoperability, avoid lock-in, and scale analytics and AI with control over cost and architecture \u2014 then see how they are building with ODI principles in mind.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "11:30 AM","end_time": "12:15 PM","duration_mins": "45.0","room": "Room 216 (Moscone South, Level 2)","capacity": "197","track": "Data Engineering & Pipelines","session_type": "Breakout Session","location": "","topics": "Data Warehouse","features": "Other","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "George Fraser | Tristan Handy","speaker_companies": "Fivetran | dbt Labs","speaker_titles": "CEO and Co-Founder | CEO","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DM214","title": "Sharing Data and AI on Snowflake Internal Marketplace","abstract": "Join this lab for a hands-on experience of sharing, requesting and consuming data and AI assets within your organization. You will share and govern not only basic data products including Apache Iceberg but also semantic models, AI agents and other artifacts. This lab teaches you how to publish such assets on Internal Marketplace, define governance controls and request and gain access. You will also exercise the latest Internal Marketplace features such as custom data product attributes to tailor the marketplace experience to your requirements.","type": "Hands-on Lab","date": "2026-06-02","day_name": "Tuesday","start_time": "11:30 AM","end_time": "01:00 PM","duration_mins": "90.0","room": "Hands-on Labs 2 (Basecamp, Hall E)","capacity": "139","track": "Data Sharing & Marketplace","session_type": "Hands-on Lab","location": "","topics": "Catalogs / Discovery","features": "Apache Iceberg\u2122","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Matthias Nicola | Henrik Nielsen","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Field CTO | Enterprise Data Architect","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AD213","title": "State Data Sharing for Government","abstract": "In Massachusetts state government, cross-agency analytics is as much a governance and legal challenge as a data one. This session shows how ODIA is enabling structured data sharing across agencies keeping data under agency stewardship while supporting enterprise insights. We\u2019ll cover a practical progression on Snowflake: secure internal data sharing, discovery and reuse via listings, and purpose-bound collaboration with Clean Rooms for aggregate-only analysis. You\u2019ll leave with a repeatable pattern for safer, auditable, revocable cross-agency analytics without centralizing sensitive data.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "11:30 AM","end_time": "11:50 AM","duration_mins": "20.0","room": "Vertical Village Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Application Development","session_type": "Theater Session","location": "Vertical Village","topics": "Catalogs / Discovery","features": "Data Clean Rooms","personas": "Data Engineer","industry": "Public Sector","department": "IT","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Joshua Merrill | Shravan Deolalikar","speaker_companies": "Commonwealth of Massachusetts - Executive Office of Technology Services and Security | Archetype Consulting","speaker_titles": "Director of Enterprise Data Analytics | Senior Director, Analytics & Insights","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI218","title": "Streaming into Interactive Tables with Interactive Warehouses","abstract": "In this session, you will learn how to build a real-time streaming solution based on Interactive tables and Interactive warehouses. You will develop and deploy an end-to-end solution using Python, Snowpipe Streaming High-Performance Architecture and other data engineering features, which ingests data, transforms it and queries in seconds.","type": "Hands-on Lab","date": "2026-06-02","day_name": "Tuesday","start_time": "11:30 AM","end_time": "01:00 PM","duration_mins": "90.0","room": "Hands-on Labs 1 (Basecamp, Hall E)","capacity": "299","track": "BI & Analytics","session_type": "Hands-on Lab","location": "","topics": "System Integrations / Synchronizations","features": "Interactive Tables","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Brad Culberson | Keith Gaputis","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Technical Director, Snowcat | Field CTO - Data Engineering","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "IN228","title": "The Future of HCLS: Modern Strategies for Interoperability and Agentic AI","abstract": "Navigating the next wave of interoperability and AI disruption across healthcare and life sciences means organizations need to ensure they are starting with the right foundational strategy, prioritizing the right use cases and demonstrating tangible ROI. Join the healthcare and life sciences keynote at Summit 2026 to hear directly from industry innovators on how they are partnering with Snowflake to create the right strategy to tap into their multimodal data, accelerate interoperability, unlock enterprise AI and solve their most critical business challenges. We\u2019ll discuss the latest Snowflake announcements and what they mean for the industry and show a live demo of Snowflake Intelligence.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "11:30 AM","end_time": "12:15 PM","duration_mins": "45.0","room": "Room 151 (Moscone South, Upper Mezzanine)","capacity": "204","track": "Industry Innovation","session_type": "Breakout Session","location": "","topics": "Interoperability","features": "Snowflake Openflow","personas": "Product Manager","industry": "Healthcare and Life Sciences","department": "Not department-specific","technical_level": "Introductory","delivery_method": "OnDemand","speaker_names": "Hiren Thakkar | Arun Verghese | Jeff Morrison Morrison | Jesse Cugliotta","speaker_companies": "Blue Cross Blue Shield of Massachusetts | Regeneron | Northeast Georgia Health System | Snowflake","speaker_titles": "Senior Director of Data & Analytics | Senior Director, Global Commercial IT | Chief Analytics and Data Mgmt Officer | RVP, Global Head of HCLS GTM","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "IN111","title": "The Future of Retail: Architecting for the Agentic Era with Snowflake","abstract": "Agentic commerce is the next wave of AI disruption in retail and travel that demands organizations to start with a solid technology foundation and focus on the right priorities. Join this retail and travel industry keynote at Snowflake Summit to hear directly from the leading innovators on how they leverage Snowflake and our partner ecosystem to solve business challenges, accelerate technical use cases and unlock the power of enterprise agentic AI. Whether you\u2019re a business executive, a technology leader or a Snowflake practitioner, this session is a must-attend for your Snowflake Summit experience.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "11:30 AM","end_time": "12:15 PM","duration_mins": "45.0","room": "Room 152 (Moscone South, Upper Mezzanine)","capacity": "204","track": "Industry Innovation","session_type": "Breakout Session","location": "","topics": "Snowflake Partners","features": "Cortex Code","personas": "Product Manager","industry": "Travel & Hospitality","department": "Not department-specific","technical_level": "Introductory","delivery_method": "OnDemand","speaker_names": "Jeff Greenfield | Ravi Kota | Amanda Cameron-Windsor | Paul Winsor","speaker_companies": "Chewy | Callaway Golf | Snowflake | Snowflake","speaker_titles": "Vice President, AI and Data Innovation | Sr. Director - Digital Consumer Data, AI | Global Retail CTO | Head of Retail","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI131","title": "The Patchwork Enterprise Is Holding Your AI Agents Back","abstract": "Every organization has invested in AI. But most enterprises' data isn't ready for what comes next. Data is scattered across hundreds of apps, governance can't keep pace with agents acting at machine speed and insights never reach the point of action. In this session, ServiceNow shows how to close the gap between AI potential and real business outcomes. Learn how a unified data fabric connects to 450+ systems without copying data, how autonomous governance keeps data trusted and discoverable for AI agents, and how embedded analytics turn signals into action where work actually happens.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "11:30 AM","end_time": "11:50 AM","duration_mins": "20.0","room": "Basecamp South Theater 2 (Basecamp, South Hall A)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "General Theaters","topics": "Catalogs / Discovery","features": "Snowpark / Snowpark Connect","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Melody Mileski | Juan Sequeda","speaker_companies": "ServiceNow | ServiceNow","speaker_titles": "Director Product Marketing, Workflow Data Management | Principal Data Strategist","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE101","title": "Trusting OT Data in Snowflake: How Devon Energy Ensures PI Data Quality at Scale","abstract": "Devon Energy is migrating large volumes of PI historian data to Snowflake to support analytics, AI and reporting. Ensuring data quality \u2014 completeness, timeliness and accuracy \u2014 at scale is a key challenge. Manual checks don\u2019t scale, so Devon partnered with Aperio to automate quality assurance. Aperio\u2019s machine learning models detect drift, flatlines, noise and anomalies at the source, while its consistency product validates data alignment between PI and Snowflake. This closed-loop system ensures trusted, high-quality OT data for downstream analytics and decision-making.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "11:30 AM","end_time": "11:50 AM","duration_mins": "20.0","room": "Basecamp South Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Data Engineering & Pipelines","session_type": "Theater Session","location": "General Theaters","topics": "System Integrations / Synchronizations","features": "Time-series functions","personas": "Data Engineer","industry": "Other","department": "Operations","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Don Morrison","speaker_companies": "Devon Energy","speaker_titles": "Real-time Systems Architect","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "MI204","title": "Under the Big Top: How Domo Drives Global Insights at Feld Entertainment","abstract": "Feld Entertainment \u2014 home to Monster Jam, Disney on Ice, Ringling and Supercross \u2014 runs live events in 80 countries, all while navigating a global supply chain, multiple NetSuite implementations and decades of legacy complexity. In less than 12 months, the team deployed Snowflake and Domo as a unified data intelligence and activation layer to transform operations. See how \u200bthe Feld team uses insights from data and AI to power global event logistics, analyze competition performance and guide financial decisions across its international subsidiaries.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "11:30 AM","end_time": "12:15 PM","duration_mins": "45.0","room": "Room 212 (Moscone South, Level 2)","capacity": "101","track": "Migrations & Modernization","session_type": "Breakout Session","location": "","topics": "System Integrations / Synchronizations","features": "Snowflake ML","personas": "Data Engineer","industry": "Retail & Consumer Goods","department": "Supply Chain","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Jason Longhurst | Scott Wruble","speaker_companies": "Domo | Feld Entertainment","speaker_titles": "Head of Product Marketing | CIO","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "WN202B","title": "What's New: Snowflake Intelligence and Cortex Agents for Real Business Impact","abstract": "AI is only as powerful as the context it understands. In this session, discover what\u2019s new in Snowflake Intelligence, the enterprise intelligence agent built to turn all your knowledge into trusted business decisions. Learn how organizations are moving beyond dashboards to uncover the critical \u201cwhy,\u201d grounded in governed enterprise data and shared business definitions. Discover how Snowflake Intelligence and Cortex Agents work together to move teams beyond static insights, enabling natural language intelligence, trusted reasoning and actionable workflows that help organizations analyze, act and drive outcomes with confidence.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "11:30 AM","end_time": "12:15 PM","duration_mins": "45.0","room": "Room 158 (Moscone South, Upper Mezzanine)","capacity": "583","track": "What's New in Snowflake","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Cortex AI Functions","personas": "Product Manager","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "OnDemand","speaker_names": "Unni Velayudhan | Effie Goenawan | Will Allen Allen","speaker_companies": "Wolfspeed | Snowflake | Snowflake","speaker_titles": "Sr Director - Data and Enterprise AI | Principal Product Manager | Senior Director, Product Management","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI101","title": "AI Readiness at Siemens: From Governed Semantics to Scalable Agents on Snowflake","abstract": "Discover how Siemens built a governed, enterprise-scale AI data stack on Snowflake to securely connect automated agents with core business data. This technical session dives into our version-controlled semantic layer that ensures data consistency, as well as our architecture for extending user-based access control to the AI agents themselves. We'll demonstrate a productive agent that combines \"talk to data\" with research tasks to automate complex business processes, providing a blueprint for building a scalable and secure foundation for enterprise AI.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "12:00 PM","end_time": "12:20 PM","duration_mins": "20.0","room": "Vertical Village Theater 2 (Basecamp, South Hall B)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "Vertical Village","topics": "System Integrations / Synchronizations","features": "Cortex AI Functions","personas": "Data Engineer","industry": "Not industry-specific","department": "Supply Chain","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Tom\u00e1s Corte Real | Vasco Feria","speaker_companies": "Siemens | Siemens","speaker_titles": "AI Engineer & Service Owner | AI Product Owner","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI125","title": "Booking.com's Data Travels: Platform Foundations to Agentic Analytics","abstract": "Booking.com is on a mission to remove friction from travel and now from data. In this session, discover how a robust Snowflake data platform is laying the foundations for scalable, trusted analytics across the business. Learn why enabling true self-service insights has become critical to unlocking faster decisions and operational efficiency. Hear how early pioneers in customer service are bringing this vision to life, going live with ThoughtSpot\u2019s agentic analytics to empower frontline teams with AI-driven answers in the flow of work. See how this new analytics operating model is turning trusted data into better employee experiences and more seamless journeys for travelers.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "12:00 PM","end_time": "12:45 PM","duration_mins": "45.0","room": "Room 206 (Moscone South, Level 2)","capacity": "101","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "Interoperability","features": "Snowflake ML","personas": "BI / Analyst","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Chris De Groot | Jay Stricks","speaker_companies": "Booking.com | Booking.com","speaker_titles": "Manager Data Engineering | Head of Product, Insights Platform","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI118","title": "How a Universal Semantic Layer Provides Context for AI","abstract": "As organizations deploy AI copilots and agents on enterprise data, a core challenge emerges: AI doesn\u2019t understand business meaning. Metrics, hierarchies and policies are often scattered across BI tools, data platforms and application logic. Humans can spot inconsistencies \u2014AI cannot. This session shows how a universal semantic layer on Snowflake provides the context AI needs. By defining business semantics once and routing AI queries through a semantic query engine, organizations can deliver governed, deterministic answers while extending existing BI semantics to power trusted AI experiences.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "12:00 PM","end_time": "12:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 3 (Basecamp, South Hall C)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "General Theaters","topics": "Snowflake Partners","features": "Semantic Views","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Dave Mariani Mariani","speaker_companies": "AtScale, Inc.","speaker_titles": "CTO","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AR224","title": "Interoperability without Complexity: Snowflake Storage for Iceberg Tables","abstract": "Running Apache Iceberg at scale often means managing buckets, IAM policies and background jobs. Interoperable storage removes that burden. In this session, learn how Snowflake brings native table simplicity to open Iceberg data. Snowflake handles compaction, metadata cleanup, security and lifecycle management. Tables remain fully interoperable and accessible to external engines through IRC APIs in Horizon. See how teams can migrate Iceberg workloads, support multi-engine access, and reduce operational complexity and total cost compared to customer-managed storage alternatives.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "12:00 PM","end_time": "12:20 PM","duration_mins": "20.0","room": "Builders Hub Theater (Basecamp, South Hall D)","capacity": "192","track": "Architectures & Interoperability","session_type": "Theater Session","location": "Builder's Hub Theater","topics": "Catalogs / Discovery","features": "Apache Polaris","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Kaushal Jain | SampathKumar Subramanian","speaker_companies": "Snowflake | Toyota Motor Europe","speaker_titles": "Senior Product Manager | Data & AI Engg, Platform Technical Owner","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI307","title": "Modernizing Enterprise Business Intelligence: PowerBI to Snowflake","abstract": "This case study demonstrates replacing Microsoft PowerBI with Snowflake AI Data Cloud, achieving 98.8% cost savings ($300K\u2192$3.6K annually) with superior performance. The platform leverages Snowflake Cortex AI Analyst for natural language queries, intelligence agents for autonomous analysis, Cortex Search and AI Functions, delivering advanced analytics through open-source technologies (React, FastAPI). This modernization eliminates vendor lock-in and proves cloud-native AI platforms can replace traditional BI tools at a fraction of the cost while providing enhanced capabilities and flexibility.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "12:00 PM","end_time": "12:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 4 (Basecamp, South Hall C)","capacity": "150","track": "BI & Analytics","session_type": "Theater Session","location": "General Theaters","topics": "Data Warehouse","features": "Gen 2 Warehouses","personas": "Data Engineer","industry": "Travel & Hospitality","department": "Supply Chain","technical_level": "Advanced","delivery_method": "Live","speaker_names": "Sid Prasad","speaker_companies": "Cox Automotive","speaker_titles": "Solution Architect","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DM101","title": "NHS London: Transforming Healthcare for 10M Patients Through Data Sharing\n\n","abstract": "London serves a population of 10 million patients. NHS OneLondon has embarked on an ambitious program with Snowflake to improve health outcomes for this population by enabling secure data sharing across NHS trusts, local authorities and research organizations. Learn how this program is breaking down data silos to improve patient outcomes and the health and well-being of London's citizens \u2014 and discover how these data-sharing patterns can be applied to your own multiparty collaboration challenges.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "12:00 PM","end_time": "12:45 PM","duration_mins": "45.0","room": "Room 209 (Moscone South, Level 2)","capacity": "197","track": "Data Sharing & Marketplace","session_type": "Breakout Session","location": "","topics": "Data for Good & Community","features": "Other","personas": "Product Manager","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Mark Kewley | Joe Zhang","speaker_companies": "One London | NHS (OneLondon)","speaker_titles": "Director, London Secure Data Environment | Chief Technology Officer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE217","title": "Powering Billions in Billing with Apache Iceberg on Snowflake at Datadog","abstract": "At Datadog, revenue engineering operates in the red zone, where billing failures directly impact revenue. We process every byte of product usage data to power invoices and internal analytics in Snowflake. For years, separate batch and streaming pipelines produced similar but inconsistent datasets, forcing downstream reconciliation. Analytics workloads querying this data through external tables at our scale led to expensive full scans and slow dashboards. In this talk, we show how we adopted Apache Iceberg to unify schemas and enable metadata-driven query pruning in Snowflake, reducing data processed and improving performance, along with lessons learned operating at scale.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "12:00 PM","end_time": "12:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 2 (Basecamp, South Hall A)","capacity": "150","track": "Data Engineering & Pipelines","session_type": "Theater Session","location": "General Theaters","topics": "System Integrations / Synchronizations","features": "Apache Iceberg\u2122","personas": "MLOps","industry": "Not industry-specific","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Sean Talia","speaker_companies": "Datadog","speaker_titles": "Software Engineering Lead","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI218","title": "Powering the Future of Merchant Experiences with Snowflake Cortex AI","abstract": "Learn how Global Payments is integrating a talk-to-your-data agent powered by Snowflake Cortex AI into its merchant portal. This innovation allows merchants to use natural language queries to instantly extract insights from complex business data, eliminating the need for reports or SQL. The customer value is instant, actionable insights for faster decision-making. Merchants can ask direct questions like \"sales trend last month?\" or \"highest dispute status?\" and receive reliable answers from both structured and unstructured data. This democratizes data access, accelerates daily operations, and offers a personalized, efficient self-service experience, freeing up merchant time for strategic growth","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "12:00 PM","end_time": "12:45 PM","duration_mins": "45.0","room": "Room 215 (Moscone South, Level 2)","capacity": "226","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "Open Lakehouse","features": "Apache Polaris","personas": "Data Engineer","industry": "Retail & Consumer Goods","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Mark Kubik | Billy Cummins","speaker_companies": "Global Payments Inc. | Global Payments","speaker_titles": "SVP of Data Engineering and Platforms | Head of Enterprise Data Platforms","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "MI103","title": "Security Benefit Achieves 4\u00d7 Faster Legacy Migration with Snowflake and Coalesce","abstract": "Security Benefit transformed its fragmented data stack by standardizing on Snowflake and Coalesce. Replacing legacy CDP pipelines built across AWS services, Python and SQL Server, the team rebuilt a critical process 75% faster, shrinking a two-month migration to two weeks. Engineers now test transformation approaches in 15-20 minutes instead of over a week, accelerating innovation while strengthening governance and lineage. Join this session to learn how Security Benefit modernized its pipelines, improved security with RBAC and dynamic masking, and built a scalable Snowflake foundation ready for AI.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "12:00 PM","end_time": "12:45 PM","duration_mins": "45.0","room": "Room 211 (Moscone South, Level 2)","capacity": "226","track": "Migrations & Modernization","session_type": "Breakout Session","location": "","topics": "Data Warehouse","features": "Cortex Code","personas": "Data Engineer","industry": "Not industry-specific","department": "IT","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Sachin Bathini | Brittany Young","speaker_companies": "Security Benefit | Security Benefit","speaker_titles": "Principal Data Integration Architect | Director, Data Platform Architecture/Ops","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "ML212","title": "Smaller, Smarter, Cheaper: Custom LLMs Built in Snowflake","abstract": "General-purpose LLMs are powerful but often expensive and not specialized for enterprise use. As AI scales, organizations need models that are cheaper, smaller and deeply aligned to proprietary data. In this session, we show you how to take advantage of comprehensive solutions for LLM customization, across all levels of complexity, directly in Snowflake. From APIs that simplify the workflow and provide easy experimentation loops to research-focused capabilities supporting reinforcement learning and advanced optimization, teams can start simple and evolve seamlessly, while ensuring they meet their quality, cost and latency goals.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "12:00 PM","end_time": "12:45 PM","duration_mins": "45.0","room": "Room 213 (Moscone South, Level 2)","capacity": "226","track": "Machine Learning","session_type": "Breakout Session","location": "","topics": "MLOps","features": "Snowflake ML","personas": "MLOps","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Vinay Sridhar","speaker_companies": "Snowflake","speaker_titles": "Product Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI212","title": "Snowflake-Hosted AI-Accelerated Analytics Catalog","abstract": "Centene Corporation presents the Enterprise Data Catalog Streamlit App, a solution to centralize metadata and analytics assets from Snowflake, Alation and Power BI to deliver consistent, governed data discovery. Features include searchable assets, AI-generated descriptions, data lineage visualization and a dataset/report review system. The platform's key innovation is a semantic model accessible via a natural language chatbot, enabling users to easily and quickly find the right enterprise dataset or report. This transformation accelerates data discovery, fosters governance, and empowers confident, data-backed decision-making across Centene.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "12:00 PM","end_time": "12:45 PM","duration_mins": "45.0","room": "Room 159 (Moscone South, Upper Mezzanine)","capacity": "213","track": "BI & Analytics","session_type": "Breakout Session","location": "","topics": "Catalogs / Discovery","features": "Cortex AI Functions","personas": "Data Scientist","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Jonathan Salmon | Ramon Rivera","speaker_companies": "Centene Corporation | Centene Corporation","speaker_titles": "Director of Enterprise Intelligence | Vice President, Business Intelligence","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "WN206B","title": "What\u2019s New: Optimize, Govern and Scale Your Snowflake Environment","abstract": "Stop managing your Snowflake environment \u2014 start architecting it. This session shows how to master complex, multi-account ecosystems at scale without administrative overhead. Explore how Organizations 2.0 enables multi-account visibility and control, and how the Well-Architected Framework drives platform health through automated blueprints and health checks. Discover the latest innovations for precise cost governance and see how Cortex AI transforms administration with intelligent automation to standardize best practices and streamline enterprise operations.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "12:00 PM","end_time": "12:45 PM","duration_mins": "45.0","room": "Room 160 (Moscone South, Upper Mezzanine)","capacity": "232","track": "What's New in Snowflake","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Cortex Code","personas": "Security Practitioner","industry": "Not industry-specific","department": "IT","technical_level": "Introductory","delivery_method": "OnDemand","speaker_names": "Zaki Bajwa | Pranav Pokharel | Srujana Kandimalla","speaker_companies": "Snowflake | Snowflake | Snowflake","speaker_titles": "VP, Solution Engineering | Staff Product Manager | Senior Product Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "E1","title": "The CDO Playbook in the Era of AI: The CDO Executive Panel","abstract": "The CDO organization sits at the center of today\u2019s AI transformation. But for many, measuring AI\u2019s business value has become the top barrier to implementation, as data teams and business peers often struggle to speak a common language or align on success metrics. This executive panel brings together seasoned data leaders to share a tactical \"playbook\" for proving AI ROI. Drawing from real-world transformations from companies across different verticals, this session explores how to transition from foundational metrics \u2014 such as throughput and speed \u2014 to the \"holy grail\" of measurable business impact.","type": "Executive Content","date": "2026-06-02","day_name": "Tuesday","start_time": "12:15 PM","end_time": "12:45 PM","duration_mins": "30.0","room": "Alpine Clubhouse Theater (Moscone South, Level 3)","capacity": "70","track": "","session_type": "Executive Content","location": "","topics": "AI Agents / Data Agents","features": "","personas": "Business Executive","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "David Haney | Maddy Want | Glenn Walker | Anahita Tafvizi","speaker_companies": "Cambia Health Solutions | Fanatics | Luminate Data | Snowflake","speaker_titles": "Vice President & Chief Data Officer | VP Data | Chief Data Officer | Chief Data & AI Officer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "PO208","title": "Behind the Scenes of Scaling Healthily at Disney Experiences","abstract": "Discover how Disney Experiences partnered with Snowflake to transform FinOps from a cost-cutting exercise into a frontline growth enabler. Learn how DX moved beyond basic billing to prioritize holistic account health, empowered business teams to scale sustainably, and laid the groundwork for FinOps excellence.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "12:30 PM","end_time": "01:15 PM","duration_mins": "45.0","room": "Room 210 (Moscone South, Level 2)","capacity": "101","track": "Performance & Cost Optimization","session_type": "Breakout Session","location": "","topics": "Observability","features": "Other","personas": "Data Engineer","industry": "Not industry-specific","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Michael Stead | Caleb Jones","speaker_companies": "Snowflake | Disney","speaker_titles": "Principal Value Advisor - FinOps | Sr. Manager - Data Architecture","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI230","title": "BI to Generative BI","abstract": "Learn how we built a data-to-AI pipeline using Snowflake Intelligence and Semantic Views, resulting in 10x faster data modeling and instantaneous insights for both our traditional BI dashboards and generative AI agents. We will detail the technical journey, how we solved the challenges of governance using Semantic Views to ground our AI, and the blueprints for building a data-driven organization where every decision is powered by trusted analytics and explainable generative AI.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "12:30 PM","end_time": "12:50 PM","duration_mins": "20.0","room": "Basecamp South Theater 2 (Basecamp, South Hall A)","capacity": "150","track": "BI & Analytics","session_type": "Theater Session","location": "General Theaters","topics": "Interoperability","features": "Snowflake ML","personas": "Marketing Practitioner","industry": "Technology","department": "Sales & Marketing","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Abby Liu","speaker_companies": "CrowdStrike","speaker_titles": "Director, Executive Analytics & AI","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE216","title": "Bridging the Gap: How BNC Migrated Legacy PySpark to Snowpark Unified Compute","abstract": "As data volumes scale, the friction between external Apache Spark clusters and cloud warehouses often creates latency and governance challenges. BNC (Banque Nationale du Canada / National Bank of Canada) addressed this by migrating PySpark pipelines directly into Snowflake
