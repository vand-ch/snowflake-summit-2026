Product Manager | Principal Product Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "PO202","title": "dbt Fusion Engine: What's New and How to Upgrade on Snowflake","abstract": "The dbt Fusion engine is here, and if you're running dbt on Snowflake, this is the upgrade you've been waiting for. With native Snowflake ADBC/Arrow integration, Fusion delivers faster query previews, snappier CI runs, and IDE-quality autocomplete and inline errors, all while generating rich semantic metadata that makes your dbt project understandable to both humans and LLMs. In this session, we'll walk through enabling Fusion in dbt on Snowflake and show you exactly what changes in your development experience \u2014 including the gotchas \u2014 to know before you flip the switch in production.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "03:30 PM","end_time": "03:50 PM","duration_mins": "20.0","room": "Vertical Village Theater 2 (Basecamp, South Hall B)","capacity": "150","track": "Performance & Cost Optimization","session_type": "Theater Session","location": "Vertical Village","topics": "Snowflake Partners","features": "Cortex Code","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Connie Carey","speaker_companies": "dbt Labs","speaker_titles": "Staff Product Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DM205","title": "From Legacy to Lift-Off: Fifth Third & TransUnion Reimagine Data for the AI Era","abstract": "Imagine a world where your team isn\u2019t held back by legacy systems or fragmented data. You operate with complete control, and clean, connected, AI-ready data flows instantly where needed. Models refresh and confidently improve. Decisions that took weeks now take minutes. Data teams no longer maintain the past \u2014 they build the future. The best part? It\u2019s not a far-fetched dream. Hear how Fifth Third and TransUnion are reimagining data architectures, moving from legacy to cloud-powered foundations, and how Fifth Third leverages TransUnion\u2019s TruIQ Data Enrichment to take more control over how critical data is accessed and linked and to power future-ready analytic and marketing processes.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "03:30 PM","end_time": "04:15 PM","duration_mins": "45.0","room": "Room 210 (Moscone South, Level 2)","capacity": "101","track": "Data Sharing & Marketplace","session_type": "Breakout Session","location": "","topics": "Data Warehouse","features": "Apache Iceberg\u2122","personas": "MLOps","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Michael Umlauf | Jay Budzik","speaker_companies": "TransUnion | Fifth Third","speaker_titles": "SVP Data Science & Analytics | SVP of AI/ML and Ops","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE309","title": "How OpenAI Keeps Petabyte-Scale LLM Sample Rollout Data Fresh in Snowflake","abstract": "In LLM sample rollouts, every sample produces a trajectory of events: prompt, model outputs, tool interactions, grading results, terminal outcomes and more. To support fast data analysis, it\u2019s critical to assemble these events into completed samples in real time. This session introduces a scalable, low-latency pipeline that continuously transforms raw rollout sample events into Snowflake-ready completed samples at production scale. We will show how the pipeline reconstructs sample lineage through event indexing, stateful stream processing and warehouse-oriented emission.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "03:30 PM","end_time": "03:50 PM","duration_mins": "20.0","room": "Builders Hub Theater (Basecamp, South Hall D)","capacity": "192","track": "Data Engineering & Pipelines","session_type": "Theater Session","location": "Builder's Hub Theater","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "Advanced","delivery_method": "OnDemand","speaker_names": "Yi Wang","speaker_companies": "OpenAI","speaker_titles": "Member of Technical Staff","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE241","title": "Inside Snowflake: How to Monitor, Alert and Stay Ahead","abstract": "Have you ever wondered what\u2019s really happening inside Snowflake and the workloads running on it? How do you move beyond treating the platform as a black box, proactively monitor what you run and stay informed as things change? This talk explores how Snowflake monitoring addresses these questions, including AI-driven alerting workflows that enable no-code alerts and notifications. Built on next-generation event tables with improved telemetry management and access, these capabilities help organizations monitor the platform more effectively, with a customer example showing how they are applied in practice.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "03:30 PM","end_time": "04:15 PM","duration_mins": "45.0","room": "Room 152 (Moscone South, Upper Mezzanine)","capacity": "204","track": "Data Engineering & Pipelines","session_type": "Breakout Session","location": "","topics": "Observability","features": "Other","personas": "MLOps","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Vaishnavi Venkatesan | Alice Leach","speaker_companies": "Snowflake | Whatnot","speaker_titles": "Staff Product Manager | Engineering Manager, Analytics Platform","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AR211","title": "Making Mainframe Data AI Ready: Hydrating Snowflake Data Lakes","abstract": "Many financial service enterprises still rely on mainframe systems to power critical financial and operational workloads. But activating that data for modern analytics and AI readiness often requires complex pipelines, replication or disruptive modernization. In this session, we walk through how we\u2019re helping enterprises bridge the mainframe and the Snowflake AI Data Cloud using IBM DataGate and modern data engineering patterns. Learn how organizations can securely hydrate Snowflake data lakes with trusted mainframe data, creating a foundation that enables cross-platform analytics and AI while preserving the stability of mission-critical systems.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "03:30 PM","end_time": "03:50 PM","duration_mins": "20.0","room": "Basecamp South Theater 2 (Basecamp, South Hall A)","capacity": "150","track": "Architectures & Interoperability","session_type": "Theater Session","location": "General Theaters","topics": "System Integrations / Synchronizations","features": "Gen 2 Warehouses","personas": "Data Engineer","industry": "Financial Services","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Anand Pandya","speaker_companies": "IBM-Hakkoda","speaker_titles": "Head of Financial Services","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "IN204","title": "Morgan Stanley\u2019s Journey to an AI-Driven Marketing Engine","abstract": "For years, Morgan Stanley Wealth Management's use of Snowflake was focused on analytics and reporting. Following a three-year martech modernization, the team transformed this platform into a foundation for omni-channel activation across its brands: E*TRADE, Morgan Stanley Online and MS@Work. With deep integration into Adobe and other martech platforms, leveraging predictive and generative AI models, the platform now provides data, marketing-accelerated campaign execution, improved targeting precision and increased revenue. Hear how the journey unfolded \u2014 and what\u2019s next in the year ahead.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "03:30 PM","end_time": "04:15 PM","duration_mins": "45.0","room": "Room 214 (Moscone South, Level 2)","capacity": "101","track": "Industry Innovation","session_type": "Breakout Session","location": "","topics": "Data Warehouse","features": "Snowflake Intelligence","personas": "Marketing Practitioner","industry": "Not industry-specific","department": "IT","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Frank Hong | Manoj Arora","speaker_companies": "Morgan Stanley | Morgan Stanley","speaker_titles": "Head of Wealth Management MarTech | Head of Wealth Mgmt MarTech Engineering","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE203","title": "NTT DOCOMO\u2019s Data Platform Evolution for the Agentic AI Era","abstract": "In the era of agentic AI, platforms must truly understand context. Last year, NTT DOCOMO presented an architecture for autonomous network operations built on scalable Apache Iceberg. We\u2019ll share how we built pipelines using Snowflake Openflow and Ray on Snowpark Container Services, and how Snowflake Intelligence and Cortex Agents bridge the semantic gap to analyze petabytes of structured mobile network data alongside unstructured files like base station documents. We\u2019ll also show our move from centralized storage to a decentralized data mesh, managed through an Internal Marketplace on Snowflake. Join us to see how this approach connects data and provides insights to diverse users.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "03:30 PM","end_time": "03:50 PM","duration_mins": "20.0","room": "Vertical Village Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Data Engineering & Pipelines","session_type": "Theater Session","location": "Vertical Village","topics": "Data Warehouse","features": "Snowflake Openflow","personas": "MLOps","industry": "Telecom","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Shogo Yasuda | Yuya Matsubara","speaker_companies": "NTT DOCOMO, INC. | NTT DOCOMO, INC.","speaker_titles": "Data Engineer | Principal Data Engineer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AD219","title": "Real-Time Geospatial at Scale: Roofstock\u2019s Journey with Hybrid Tables and H3","abstract": "Geospatial point-in-polygon queries are notoriously slow, often creating a bottleneck for real-time services. In this session, we explore how Roofstock overcame this challenge by consolidating their transactional services onto Snowflake. By pairing Unistore\u2019s Hybrid Tables with H3 hexagonal indexing, Roofstock transformed complex coordinate-to-census-tract lookups into blazing-fast integer comparisons. We will break down the technical architecture that allows for sub-100ms query performance and discuss the benefits of unifying transactional and analytical workloads on a single platform. Learn how to eliminate data silos and build high-concurrency geospatial services at web scale.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "03:30 PM","end_time": "04:15 PM","duration_mins": "45.0","room": "Room 208 (Moscone South, Level 2)","capacity": "197","track": "Application Development","session_type": "Breakout Session","location": "","topics": "Data Warehouse","features": "Geospatial functions","personas": "Data Engineer","industry": "Not industry-specific","department": "IT","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "David Lee | Shalaka Borker","speaker_companies": "Roofstock | Roofstock","speaker_titles": "Data Engineering Manager | Director of Data Engineering","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "IN227","title": "Scaling AI in the Public Sector Showcase: From Pilots to Real-World Impact","abstract": "Moving from AI \"potential\" to public sector reality requires more than just code \u2014 it requires a roadmap for scale. Join us for a showcase featuring public sector leaders who have successfully transitioned AI from proof of concepts to enterprise-grade production. We\u2019ll dive into key mission outcomes, outline a blueprint for architecture patterns and governance, and share key considerations for how other organizations should navigate the complexities of government environments. We will also outline how Snowflake\u2019s end-to-end AI value proposition \u2014 one founded on flexibility, security and ease of use \u2014 meet the specific needs of governments globally.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "03:30 PM","end_time": "04:15 PM","duration_mins": "45.0","room": "Room 151 (Moscone South, Upper Mezzanine)","capacity": "204","track": "Industry Innovation","session_type": "Breakout Session","location": "","topics": "Interoperability","features": "Geospatial functions","personas": "Business Executive","industry": "Public Sector","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Obaid Masih Masih | James Martinez | Stephen Moon","speaker_companies": "General Dynamics Mission Systems | University of Florida, UFIT | Snowflake","speaker_titles": "Principal Data Scientist  & AI Lead | Data Engineering Manager | Public Sector CTO","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI217","title": "The Evolving SaaS Data Platform: How AI Agents Are Consolidating Intelligence","abstract": "As enterprises accelerate AI adoption, the modern data stack is shifting from fragmented point tools to intelligence-driven platforms. AI agents are consolidating workflows that once required separate solutions for observability, profiling, lineage and governance \u2014 enabling faster decisions and automated remediation. In this session, we explore how Snowflake\u2019s AI-native platform accelerates this shift and how Acceldata\u2019s agentic data management (ADM) provides the governed automation layer that unifies trust, observability and action on top of Snowflake \u2014 scaling reliable, decision-ready data operation.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "03:30 PM","end_time": "03:50 PM","duration_mins": "20.0","room": "Basecamp South Theater 3 (Basecamp, South Hall C)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "General Theaters","topics": "Catalogs / Discovery","features": "Apache Spark\u2122","personas": "Data Engineer","industry": "Telecom","department": "Supply Chain","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Cam Davie","speaker_companies": "Acceldata","speaker_titles": "Sr. Solutions Engineer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "WN206T","title": "What\u2019s New: Optimize, Govern and Scale Your Snowflake Environment","abstract": "Stop managing your Snowflake environment \u2014 start architecting it. This session shows how to master complex, multi-account ecosystems at scale without administrative overhead. Explore how Organizations 2.0 enables multi-account visibility and control, and how the Well-Architected Framework drives platform health through automated blueprints and health checks. Discover the latest innovations for precise cost governance and see how Cortex AI transforms administration with intelligent automation to standardize best practices and streamline enterprise operations.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "03:30 PM","end_time": "03:50 PM","duration_mins": "20.0","room": "Basecamp South Theater 4 (Basecamp, South Hall C)","capacity": "150","track": "What's New in Snowflake","session_type": "Theater Session","location": "General Theaters","topics": "AI Agents / Data Agents","features": "Cortex Code","personas": "Security Practitioner","industry": "Not industry-specific","department": "IT","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Pranav Pokharel | Srujana Kandimalla","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Staff Product Manager | Senior Product Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE107","title": "Accelerating T.Rowe Price\u2019s Data Product Strategy with Modern MDM on Snowflake","abstract": "As T.Rowe Price grew its $1.78 trillion asset management business with new solutions, partners and enhanced digital + AI capabilities, the legacy master data management (MDM) became a bottleneck. The \u201ctrust and latency\u201d gap eroded confidence from business and executives while it increased TCO due to complex ETL pipelines, manual rework and unmanageable technical debt. In this session, T.Rowe Price will share their data product strategy vision and journey of migrating legacy MDM into a cloud-native \u201cParty Master 360\u201d using Semarchy on Snowflake.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "04:00 PM","end_time": "04:45 PM","duration_mins": "45.0","room": "Room 215 (Moscone South, Level 2)","capacity": "226","track": "Data Engineering & Pipelines","session_type": "Breakout Session","location": "","topics": "Snowflake Partners","features": "Marketplace","personas": "Data Engineer","industry": "Financial Services","department": "IT","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Sri Kanthadai","speaker_companies": "T. Rowe Price","speaker_titles": "Head of Enterprise Data Solutions CDO","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI305","title": "Blue Yonder: Accelerating Business Transformation with Agentic AI","abstract": "Blue Yonder embarked on a business transformation journey two years ago with a goal to complete the journey by Q1 2027. The goal is to change from a traditional ISV software company that has been in business for over 30 years into a best-of-breed SaaS provider, modeled after the Snowflake operating model. Chris Burchett, SVP of Generative AI at Blue Yonder, speak's about the company's journey and focuses on how it utilizes agentic technology \u2014 from Snowflake Cortex AI, to value-sell Blue Yonder's legacy on-premises customers to move, to its AI-enabled SaaS AI-driven supply chain platform.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "04:00 PM","end_time": "04:45 PM","duration_mins": "45.0","room": "Room 160 (Moscone South, Upper Mezzanine)","capacity": "232","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "Snowflake Partners","features": "Cortex Agents","personas": "Technical Executive","industry": "Retail & Consumer Goods","department": "Not department-specific","technical_level": "Advanced","delivery_method": "OnDemand","speaker_names": "Chris Burchett","speaker_companies": "Blue Yonder, Inc.","speaker_titles": "SVP GenAI","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "GO104","title": "Building Agents Inside the Knowledge Layer: A Financial Services Story","abstract": "Most organizations approach AI agents backwards, building the data foundation first, then figuring out what agents to deploy. But you're never done with your foundations, and the business can't wait. Join Satyen Sangani, CEO and co-founder of Alation, to explore how a leading financial institution took a different path: starting with critical business outcomes, building agents inside the knowledge layer to get there and letting governance compound along the way. From regulatory compliance to automation to business transformation, this session shows how agents operating on enterprise knowledge, not just data context, deliver measurable results and continuously improve over time.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "04:00 PM","end_time": "04:45 PM","duration_mins": "45.0","room": "Room 211 (Moscone South, Level 2)","capacity": "226","track": "Governance & Security","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Other","personas": "Business Executive","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Satyen Sangani","speaker_companies": "Alation","speaker_titles": "CEO and co-founder","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI310","title": "Building Snowflake Intelligence Agents: Hands-on Lab","abstract": "Learn how to bring Cortex Code and agents together to build intelligent workflows that combine structured and unstructured data. In this hands-on lab, you\u2019ll create agents that help a sales analyst answer product-related questions by leveraging both types of data retrieval. You\u2019ll use Cortex Code alongside MCP Servers to build the tools these agents rely on, implement agents using best practices, and set up evaluation systems to measure their performance. We\u2019ll also explore how to build these agents programmatically, and how to use evaluations and traces to assess and improve their effectiveness. By the end, you\u2019ll be familiar with best practices for building agents with Cortex Code and MCP Servers, and how to evaluate their performance with confidence.","type": "Hands-on Lab","date": "2026-06-03","day_name": "Wednesday","start_time": "04:00 PM","end_time": "05:30 PM","duration_mins": "90.0","room": "Hands-on Labs 1 (Basecamp, Hall E)","capacity": "299","track": "Generative AI & Agents","session_type": "Hands-on Lab","location": "","topics": "AI Agents / Data Agents","features": "Cortex AI Functions","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Advanced","delivery_method": "Live","speaker_names": "Carlos Carrero | Arun Agarwal","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Principal AI Specialist - EMEA | Product Marketing Lead, AI / ML","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI241","title": "Building the Block Data MCP: A Blueprint for Gen AI Insights and Analytics","abstract": "Your data warehouse holds the answers to your most important business questions. But without an AI-ready data architecture, the LLM can\u2019t access or use them. We solved this problem at Block by building the Block Data MCP, combining a governed semantic layer, a Snowflake client and AI agents (Goose), to map business questions to trusted metrics, layered with generative AI insights. In this session we share how we designed and implemented the underlying architecture, eliminated AI hallucinations through deterministic data flows, and scaled our Block Data MCP to support ~2,000 internal data users and various business use cases.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "04:00 PM","end_time": "04:45 PM","duration_mins": "45.0","room": "Room 213 (Moscone South, Level 2)","capacity": "226","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "Catalogs / Discovery","features": "Other","personas": "Data Engineer","industry": "Financial Services","department": "Finance","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Alyssa Ransbury | Zach Stanford","speaker_companies": "Block | Block","speaker_titles": "Data & ML Platform Tech Lead | AI Data Engineering Tech Lead","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI132","title": "Delivering Real-Time Context for AI with IBM Confluent and Snowflake","abstract": "AI agents deliver value when powered by real-time data with the right context. Yet, many organizations still rely on outdated or fragmented information, limiting AI impact and increasing risk. In this session, learn how to deliver real-time data as AI-ready context across structured and unstructured sources in hybrid environments to maximize the value of your Snowflake investments. See how streaming and historical data integration enable governed data to flow into and out of Snowflake, reducing data movement and supporting processing where data lives. Discover real-time integration, governance, and an open hybrid data foundation work together to power AI agents and your business.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "04:00 PM","end_time": "04:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "General Theaters","topics": "Snowflake Partners","features": "Snowflake Intelligence","personas": "MLOps","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Stephanie Valarezo","speaker_companies": "IBM","speaker_titles": "Program Director, Product, IBM","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE308","title": "From Star Schema to Snowflake Intelligence in Two JIRA Tickets","abstract": "Your raw data is in Snowflake. Your stakeholders want answers from Snowflake Intelligence. Between those facts sits the delivery problem: a dimensional model and semantic layer to configure. This session shows both delivered, via JIRA tickets.The first carries the model spec. Maia maps it to your raw schema and conventions, then generates and deploys the ELT pipelines in Snowflake. The second specifies how the model surfaces in Snowflake Intelligence. Maia deploys the semantic layer Cortex Analyst uses for natural-language queries.The result is two tickets that are fully queryable, no hand-coded logic or sprint negotiation required.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "04:00 PM","end_time": "04:20 PM","duration_mins": "20.0","room": "Vertical Village Theater 2 (Basecamp, South Hall B)","capacity": "150","track": "Data Engineering & Pipelines","session_type": "Theater Session","location": "Vertical Village","topics": "Data Warehouse","features": "Cortex Code","personas": "Data Engineer","industry": "Not industry-specific","department": "IT","technical_level": "Advanced","delivery_method": "Live","speaker_names": "Matt Farmer | Arawan Gajajiva","speaker_companies": "Matillion | Matillion","speaker_titles": "Director of Product | Principal Architect","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "ML223","title": "How AI Accelerates Ideas to Results with Snowflake Notebooks\n","abstract": "In this session, we showcase the latest AI capabilities in Snowflake Notebooks, which are integrated directly with Cortex Code. Learn how admins can leverage Cortex Code for unified notebooks governance and data teams can be 10x more productive in writing/reviewing code and delivering results and business impact.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "04:00 PM","end_time": "04:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 4 (Basecamp, South Hall C)","capacity": "150","track": "Machine Learning","session_type": "Theater Session","location": "General Theaters","topics": "AI Agents / Data Agents","features": "Snowflake ML","personas": "MLOps","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Aileen Lu | Raphael Hyde Hyde","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Senior Product Manager | Staff Designer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI128","title": "Move Faster with Cortex Code and Deloitte: From Data Discovery to Delivery","abstract": "Data engineering used to mean climbing from syntax up to intent. You wrote the code and hoped it expressed what you meant. Snowflake Cortex Code inverts that stack. You start with intent, and the AI handles the implementation. In this 90-minute hands-on lab, working directly in Snowsight interface against live data, you will move from raw curiosity to a deployed Streamlit dashboard \u2014 just you, your data and an AI that already knows your schema. You will leave with three things: a working Streamlit app you built during the session, a prompt pattern library of five reusable templates for data engineering work and a mental model for intent-first development that you can apply on Monday morning.","type": "Hands-on Lab","date": "2026-06-03","day_name": "Wednesday","start_time": "04:00 PM","end_time": "05:30 PM","duration_mins": "90.0","room": "Hands-on Labs 2 (Basecamp, Hall E)","capacity": "139","track": "Generative AI & Agents","session_type": "Hands-on Lab","location": "","topics": "AI Agents / Data Agents","features": "Cortex Code","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Rupesh Dandekar","speaker_companies": "Deloitte Consulting LLP","speaker_titles": "CTO","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "ML206","title": "PayPal: Merchant Fee Predictions in Snowflake ML","abstract": "At PayPal, third-party providers could predict interchange and scheme fees but granular transaction-level fees were arriving only at the end of the month. This would take one month for most cases and three days in best-case scenarios with an error-prone process. In this session, PayPal engineers explain how PayPal built a modern near real-time AI/ML pipeline in Snowflake to accurately predict merchant fees daily at the transaction level. Learn how this accelerates settlement times, saves costs and enables faster and more expansive merchant acquisition.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "04:00 PM","end_time": "04:20 PM","duration_mins": "20.0","room": "Vertical Village Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Machine Learning","session_type": "Theater Session","location": "Vertical Village","topics": "System Integrations / Synchronizations","features": "Snowflake ML","personas": "MLOps","industry": "Financial Services","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Marisa Tania | Garrett Frere","speaker_companies": "PayPal | Snowflake","speaker_titles": "Sofware Engineer | Principal AI/ML, Applied Engineering","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI129","title": "Preparing for the AI Future: 6 Domains Shaping Our Economic, Industrial Future","abstract": "The world is witnessing an unprecedented wave of AI innovation and adoption that is reshaping global dynamics along three major axes: growing technological and economic entanglement, intensifying competition among nations, and accelerating transformation across institutions, industries and governance itself. In this session, Atlantic Council\u2019s GeoTech Commission on Artificial intelligence will share the blueprint for an AI future that supports democratic values and strengthens global resilience. The panel will discuss the six interconnected domains \u2014 innovation, talent, governance, supply chain, energy and alliance \u2014 and the actionable recommendations on how enterprises can scale development, deployment and be ready for this next era of economic transformation.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "04:00 PM","end_time": "04:45 PM","duration_mins": "45.0","room": "Room 209 (Moscone South, Level 2)","capacity": "197","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "","personas": "Business Executive","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Graham Brookie | Matthew Rose","speaker_companies": "Atlantic Council | Snowflake","speaker_titles": "Vice President - ACTechnology Programs | Global Head Corporate & Gov Relations","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AR101","title": "Providence Health: How Data Mesh Architecture Unlocked an AI-Powered Future","abstract": "Over the past six years, Providence Health & Services has transformed the data and analytics strategy across the enterprise, implementing a data mesh architecture that focuses on a governed and trusted data foundation. This foundation is the crucial start to unlocking and accelerating value to be gained from expanding self-service analytics, AI capabilities and application development. Come hear Arek Kaczmarek, AVP of Data Engineering, Health Intelligence, and Kellie Larkin, VP of Identity Access Management, Enterprise Information & Security, as they share the journey to today and the path ahead.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "04:00 PM","end_time": "04:45 PM","duration_mins": "45.0","room": "Room 206 (Moscone South, Level 2)","capacity": "101","track": "Architectures & Interoperability","session_type": "Breakout Session","location": "","topics": "Data Warehouse","features": "Cortex Agents","personas": "IT / DBA","industry": "Healthcare and Life Sciences","department": "Supply Chain","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Arek Kaczmarek | Kellie Larkin","speaker_companies": "Providence Health & Services | Providence Health & Services","speaker_titles": "AVP Data Engineering | VP, Identity Access Management","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI214","title": "Unlocking RAG on Complex Documents: LandingAI Meets Snowflake Intelligence","abstract": "You can stand up a RAG pipeline in an afternoon. Getting it to work on real documents \u2014 dense tables, scientific figures and irregular layouts \u2014 takes months. This session cuts that gap. We'll walk through an end-to-end workflow using LandingAI's Agentic Document Extraction to parse complex, multimodal content and extract structured key-value pairs that break conventional tools. From there, you'll see how parsed output feeds the Snowflake Cortex AI stack \u2014 Cortex Search, Cortex Analyst and Cortex Agents \u2014 all surfaced through Snowflake Intelligence. The entire stack is created with one SQL script and can be versioned for your own use case in about half a day.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "04:00 PM","end_time": "04:45 PM","duration_mins": "45.0","room": "Room 159 (Moscone South, Upper Mezzanine)","capacity": "213","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Cortex AI Functions","personas": "MLOps","industry": "Not industry-specific","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Andrea Kropp","speaker_companies": "LandingAI","speaker_titles": "Applied AI Engineer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "WN208B","title": "What's New: Power Real-Time Apps and AI Without Complex Data Movement","abstract": "Stop wrestling with pipelines to move data between transactional and analytical silos. Discover how Snowflake is unifying these worlds into a single, high-performance platform where your data is seamlessly connected and ready for action. We\u2019ll dive into the latest breakthroughs in Snowflake Postgres and Unistore that allow you to build responsive, real-time apps and AI experiences without the friction of complex ETL. Join us to see live demos and hear from customers who are already leveraging Snowflake to reduce latency, slash architectural complexity and ship AI-native products faster than ever.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "04:00 PM","end_time": "04:45 PM","duration_mins": "45.0","room": "Room 158 (Moscone South, Upper Mezzanine)","capacity": "583","track": "What's New in Snowflake","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Snowflake Postgres","personas": "Data Engineer","industry": "Not industry-specific","department": "R&D","technical_level": "Introductory","delivery_method": "OnDemand","speaker_names": "Mike Willett | Christopher Heim | Phillip Coletti","speaker_companies": "Simcorp | Snowflake | Snowflake","speaker_titles": "Head/Architect of Data Platform | Staff Product Manager | Senior Manager, Product Management","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "WN212T","title": "What's New: Unify Your Lakehouse with Snowflake Simple Interoperability","abstract": "Pipeline sprawl and unnecessary data movement are the hidden taxes to your AI innovation. Discover how Snowflake\u2019s platform empowers you to work from a single governed copy of data, wherever it lives. Built on native support for Apache Polaris\u2122 and Apache Iceberg\u2122, this session explores how to power new use cases with Iceberg V3 support and virtually eliminate storage complexity with Snowflake Storage, all without vendor lock-in. We'll also cover strategies to reduce governance and security risks by building a metadata-driven universal governance model to fuel human and agentic intelligence with access to governed, live data.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "04:00 PM","end_time": "04:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 3 (Basecamp, South Hall C)","capacity": "150","track": "What's New in Snowflake","session_type": "Theater Session","location": "General Theaters","topics": "Catalogs / Discovery","features": "Apache Polaris","personas": "Data Engineer","industry": "Not industry-specific","department": "R&D","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Ashwin Kamath | Scott Teal | Kaushal Jain | Todd Greenstein","speaker_companies": "Snowflake | Snowflake | Snowflake | Snowflake","speaker_titles": "Staff Product Manager | Product Manager | Senior Product Manager | Product Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "WN204T","title": "What\u2019s New: Zero to a Trusted Semantic Layer in Snowflake","abstract": "Stop struggling with fragmented logic and start building a trusted data foundation in minutes. Join us to see how easy it is to create Snowflake Semantic Views that turn raw data into governed, actionable insights. We\u2019ll demonstrate how our connected ecosystem allows your business logic to flow seamlessly from your data cloud to your AI agents and BI tools. This session will feature a live demo of our latest easy-to-build semantic innovations.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "04:00 PM","end_time": "04:20 PM","duration_mins": "20.0","room": "Builders Hub Theater (Basecamp, South Hall D)","capacity": "192","track": "What's New in Snowflake","session_type": "Theater Session","location": "Builder's Hub Theater","topics": "Other","features": "Semantic Views","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "OnDemand","speaker_names": "Abhinav Vadrevu | Josh Klahr","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Product Management | Director of Product Management","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI280","title": "Zero to Agentic Analytics: Activate Snowflake Data with ThoughtSpot Agents","abstract": "Modern analytics shouldn\u2019t require stitching together models, dashboards and code. In this hands-on lab, you\u2019ll build an end-to-end analytics workflow on Snowflake using ThoughtSpot\u2019s AI agents. Starting with live Snowflake data, you\u2019ll create governed semantic models, auto-generate Liveboards, explore data with natural language and embed analytics into applications \u2014 each step powered by a specialized agent. Designed for data engineers, analysts and developers, this lab replaces manual workflows with an automated, agent-driven approach. You\u2019ll leave with a working, repeatable pattern to operationalize AI-powered analytics directly on Snowflake.","type": "Hands-on Lab","date": "2026-06-03","day_name": "Wednesday","start_time": "04:00 PM","end_time": "05:30 PM","duration_mins": "90.0","room": "Hands-on Labs 3 (Basecamp, Hall E)","capacity": "133","track": "Generative AI & Agents","session_type": "Hands-on Lab","location": "","topics": "System Integrations / Synchronizations","features": "Other","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Bill Back | Ali Alladin","speaker_companies": "ThoughtSpot | ThoughtSpot","speaker_titles": "Sr. Principal Technical Architect | Head of Partner Engineering","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "E16","title": "Zero to AI: How to Accelerate AI Implementation with Forward Deployed Engineers","abstract": "AI execution \u2014 not access \u2014 is the biggest challenge enterprises face today. In this session, hear from a panel of industry leaders on how they\u2019ve partnered with Snowflake's AI forward deployed engineering team. See how organizations have embedded AI engineers and researchers to deliver measurable outcomes. And hear about key outcomes, including how Snowflake is driving 10x efficiency gains through agentic workflow automation, intelligent analytics and custom model training.","type": "Executive Content","date": "2026-06-03","day_name": "Wednesday","start_time": "04:00 PM","end_time": "04:30 PM","duration_mins": "30.0","room": "Alpine Clubhouse Theater (Moscone South, Level 3)","capacity": "70","track": "","session_type": "Executive Content","location": "","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "","delivery_method": "","speaker_names": "Luv Kothari | Anahita Tafvizi | Durgesh Das","speaker_companies": "Snowflake | Snowflake | Intercontinental Exchange / New York Stock Exchange","speaker_titles": "Director, Product Management | Chief Data & AI Officer | Vice President,Data, Analytics and Governance","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "ACT2","title": "Snowbash","abstract": "Join the Summit community at Snowbash! It's an early evening gathering to connect, unwind and celebrate the day. Enjoy music and conversation in a vibrant setting designed to carry the momentum forward.","type": "Activity","date": "2026-06-03","day_name": "Wednesday","start_time": "05:00 PM","end_time": "07:00 PM","duration_mins": "120.0","room": "Esplanade (Yerba Buena Gardens)","capacity": "0","track": "","session_type": "Activity","location": "","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "","delivery_method": "Live","speaker_names": "","speaker_companies": "","speaker_titles": "","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DH14","title": "TechEquity Ai","abstract": "Join us at the AI Pop Up for a session with TechEquity Ai, with a mission to democratize AI knowledge for everyone. Learn about their community of founders, builders and leaders working to make AI accessible and equitable through summits, workshops and year-round programs. Whether you\u2019re new to AI or deep in the field, come discover how TechEquity Ai is removing barriers and creating opportunity for all.","type": "AI Pop Up","date": "2026-06-04","day_name": "Thursday","start_time": "09:00 AM","end_time": "10:00 AM","duration_mins": "60.0","room": "AI Pop Up (Basecamp, South, Hall D)","capacity": "0","track": "","session_type": "AI Pop Up","location": "","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "","delivery_method": "","speaker_names": "","speaker_companies": "","speaker_titles": "","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "TC3-TH","title": "Training // Track 3 - Snowflake Platform Training + Exam - Thursday","abstract": "This session is designed for individuals with limited experience using Snowflake and provides a walkthrough of the AI Data Cloud architecture through interactive labs, guiding learners how to unify, integrate and share previously siloed data with virtually unlimited scalability and concurrency.","type": "Snowflake Training","date": "2026-06-04","day_name": "Thursday","start_time": "09:00 AM","end_time": "03:00 PM","duration_mins": "360.0","room": "Room 153 (Moscone South, Upper Mezzanine)","capacity": "204","track": "","session_type": "Snowflake Training","location": "","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "","delivery_method": "Live","speaker_names": "","speaker_companies": "","speaker_titles": "","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "PO108","title": "A Seamless Path to Managing at Scale with Organizations 2.0","abstract": "Snowflake\u2019s Orgs 2.0 shifts to an organization-first model, enabling scalable multi-account management for the AI Data Cloud. It provides org-level visibility, unified security and streamlined data governance to simplify your Snowflake footprint. This session covers key innovations: AI-backed control with Org Hub and Command Center; enhanced security through centralized governance and proactive access monitoring; improved cost control via Org Usage Views, Org Tags and Budgets (private preview); and seamless migration using guided wizards and Coco skills for Org Users and Groups.","type": "Breakout Session","date": "2026-06-04","day_name": "Thursday","start_time": "10:00 AM","end_time": "10:45 AM","duration_mins": "45.0","room": "Room 216 (Moscone South, Level 2)","capacity": "197","track": "Performance & Cost Optimization","session_type": "Breakout Session","location": "","topics": "Snowflake Partners","features": "Data Clean Rooms","personas": "Product Manager","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Nareesh Komuravelly | Srujana Kandimalla | Yuki Yaguchi","speaker_companies": "LSEG | Snowflake | Mitsui & Co., Ltd.","speaker_titles": "Data Engineering Senior Manager | Senior Product Manager | General Manager, DDM Strategy Dept.","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI211","title": "Best Practices for Snowflake-Managed MCP Setup and Integration","abstract": "The introduction of the Snowflake-managed MCP server has generated significant customer interest and practical deployment questions. This session directly addresses the most common challenges we've observed across numerous customer engagements, specifically focusing on server setup, secure authentication, tool integration and establishing external client connectivity. Attendees will gain practical guidance and validated best practices derived from real-world deployments to ensure a seamless and successful MCP implementation.","type": "Breakout Session","date": "2026-06-04","day_name": "Thursday","start_time": "10:00 AM","end_time": "10:45 AM","duration_mins": "45.0","room": "Room 208 (Moscone South, Level 2)","capacity": "197","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "Interoperability","features": "Snowflake Intelligence","personas": "MLOps","industry": "Not industry-specific","department": "IT","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Okhtay Azarmanesh | Harshal Pimpalkhute","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Principal AI Architect | Principal PM, Gen AI","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE218","title": "Beyond the Landing Zone: From Raw Streams and Files to Governed Iceberg Tables","abstract": "Apache Iceberg is the standard for data sovereignty and interoperability, but building a high-performance lakehouse is often slowed by complex engineering. Modern data is fragmented across real-time streams, CDC and cloud files. Manually transforming these into a performant Iceberg architecture requires massive effort to manage maintenance, metadata and partitioning. This session shows how Snowflake acts as a universal engine for Iceberg. Learn how Snowflake automates the data lifecycle \u2014 from ingestion to continuous optimization \u2014 without manual intervention. See how to transform any raw source into governed, production-ready Iceberg tables that stay open and easy to manage at scale.","type": "Breakout Session","date": "2026-06-04","day_name": "Thursday","start_time": "10:00 AM","end_time": "10:45 AM","duration_mins": "45.0","room": "Room 152 (Moscone South, Upper Mezzanine)","capacity": "204","track": "Data Engineering & Pipelines","session_type": "Breakout Session","location": "","topics": "Catalogs / Discovery","features": "Snowflake Openflow","personas": "Data Engineer","industry": "Not industry-specific","department": "IT","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Michael Kohs | Scott Teal","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Sr. Product Manager | Product Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI266","title": "Braze Operator AI: Automating Business Reviews with Snowflake Cortex AI","abstract": "Braze's customer analytics team built an AI agent on Snowflake Cortex AI to automate data insights for its GTM teams \u2014 eliminating manual analysis bottlenecks. Leveraging Cortex Agents, Snowflake Intelligence and declarative sharing, the solution drives new revenue for the business through self-service analytics packages, strengthens sales propositions by delivering immediate value to stakeholders, and powers vertical-specific GTM playbooks. Nontechical teams at Braze gain Day 1 access to actionable insights \u2014 no data engineers required.","type": "Breakout Session","date": "2026-06-04","day_name": "Thursday","start_time": "10:00 AM","end_time": "10:45 AM","duration_mins": "45.0","room": "Room 210 (Moscone South, Level 2)","capacity": "101","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "System Integrations / Synchronizations","features": "Cortex AI Functions","personas": "Product Manager","industry": "Media, Entertainment & Advertising","department": "Other","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "kaitlyn wells | Fabio Rocca","speaker_companies": "Snowflake | Braze","speaker_titles": "Senior AI/ML Architect | Director, Analytics","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AR108","title": "Build an Iceberg Lakehouse with Snowflake and Microsoft Fabric OneLake","abstract": "As data volumes increase and AI workloads proliferate, copying and ETL-ing data across systems is no longer sustainable. This hands-on workshop walks through building a fully interoperable, open lakehouse by integrating Snowflake and Microsoft OneLake. Learn how to leverage Apache Iceberg\u2122 to create an open, governed data foundation that allows both Snowflake and Microsoft Fabric engines to operate on the same datasets without data duplication or complex pipelines. You will use sample data in Fabric, create an external volume and set up Microsoft OneLake as a catalog-linked database in Snowflake, create Iceberg tables in OneLake and query them both from Snowflake and Fabric.","type": "Hands-on Lab","date": "2026-06-04","day_name": "Thursday","start_time": "10:00 AM","end_time": "11:30 AM","duration_mins": "90.0","room": "Hands-on Labs 3 (Basecamp, Hall E)","capacity": "133","track": "Architectures & Interoperability","session_type": "Hands-on Lab","location": "","topics": "Catalogs / Discovery","features": "Apache Polaris","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Narendra Joshi | Eric Tolotti","speaker_companies": "Microsoft | Snowflake","speaker_titles": "Principal Cloud Solution Architect | Partner Solution Engineer, Microsoft","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI206","title": "Build Governed, Compliant AI Apps Faster with Semantic Views and Cortex Code","abstract": "In this 90-minute hands-on lab, you'll learn how to build governed, compliant AI applications faster using Snowflake Semantic Views and Cortex Code, a pattern applicable across any industry. Using Snowflake Semantic Views, Cortex AI, Cortex Search and Snowflake Intelligence, you'll deploy an AI-powered agent that lets anyone query both structured and unstructured data in natural language without writing code. The lab uses a concrete example, combining structured data (FEMA risk scores, CDC social vulnerability indices and 3.5 million building footprints from OvertureMaps) with unstructured policy documents from the State of Louisiana, but the skills translate directly to finance, healthcare, retail, logistics or any domain where structured records and unstructured content need to work together.","type": "Hands-on Lab","date": "2026-06-04","day_name": "Thursday","start_time": "10:00 AM","end_time": "11:30 AM","duration_mins": "90.0","room": "Hands-on Labs 1 (Basecamp, Hall E)","capacity": "299","track": "BI & Analytics","session_type": "Hands-on Lab","location": "","topics": "Catalogs / Discovery","features": "Snowflake Intelligence","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Abhinav Vadrevu | Fawad Qureshi","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Product Management | Field CTO","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DM204","title": "Building Open Source Native Apps: Johnson & Johnson's Drug Discovery Solution ","abstract": "Join this session to learn how research teams at Johnson & Johnson (J&J) brought chemical intelligence to Snowflake with RDKit, reducing operational complexity with zero data movement by leveraging Snowflake Python UDFs and Stored Procedures so chemical structures can be handled natively in SQL. Users can standardize and transform structures and run high-performance searches across tens of millions of molecules\u2014supporting registration systems, drug discovery platforms, supplier catalogs and chemistry-centric workflows. Discover how J&J and Snowflake are partnering to make J&J's solution available to the broader HCLS community as an open source Snowflake Native App on Snowflake Marketplace.","type": "Breakout Session","date": "2026-06-04","day_name": "Thursday","start_time": "10:00 AM","end_time": "10:45 AM","duration_mins": "45.0","room": "Room 212 (Moscone South, Level 2)","capacity": "101","track": "Data Sharing & Marketplace","session_type": "Breakout Session","location": "","topics": "Data Warehouse","features": "Other","personas": "Data Engineer","industry": "Not industry-specific","department": "R&D","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Dmitrii Rassokhin","speaker_companies": "Johnson & Johnson","speaker_titles": "Senior Manager - Lead Engineer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "L1","title": "Dev Day Opening","abstract": "Join us as Snowflake's CEO, Sridhar Ramaswamy, delivers opening remarks.","type": "Dev Day Luminary Talk","date": "2026-06-04","day_name": "Thursday","start_time": "10:00 AM","end_time": "10:05 AM","duration_mins": "5.0","room": "Builders Hub Theater (Basecamp, South Hall D)","capacity": "443","track": "Generative AI & Agents","session_type": "Dev Day Luminary Talk","location": "Builder's Hub Theater","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "","delivery_method": "OnDemand","speaker_names": "Sridhar Ramaswamy","speaker_companies": "Snowflake","speaker_titles": "Chief Executive Officer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DM213","title": "Integrating Snowflake and Neo4j: Practical Graph Analytics for Your Data","abstract": "SQL is foundational to Snowflake, but layering relationship intelligence provides a competitive edge. In this workshop, discover how to extend SQL workflows by integrating Neo4j's graph analytics directly into the AI Data Cloud. Using a manufacturing risk scenario, you will model operational data into a graph and apply several different similarity algorithms to uncover systemic risks. Master a scalable, zero-ETL pattern applicable to any industry to enrich your SQL insights with graph-native power. Key learnings include how to: Merge SQL precision with graph depth Deploy Neo4j Graph Analytics in Snowflake Apply graph-based similarity Build scalable, relationship-aware intelligence","type": "Hands-on Lab","date": "2026-06-04","day_name": "Thursday","start_time": "10:00 AM","end_time": "11:30 AM","duration_mins": "90.0","room": "Hands-on Labs 2 (Basecamp, Hall E)","capacity": "139","track": "Data Sharing & Marketplace","session_type": "Hands-on Lab","location": "","topics": "System Integrations / Synchronizations","features": "Marketplace","personas": "Data Engineer","industry": "Manufacturing","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Ben Lackey | Akmal Chaudhri","speaker_companies": "Neo4j | Neo4j","speaker_titles": "Senior Director, Partner Architecture | Technical Curriculum Developer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI224","title": "Open Semantic Interchange: Dimensions and Ontologies for Agents","abstract": "As data, BI and AI converge, enterprises need a shared semantic foundation that works across tools, models and workloads. This session introduces Open Semantic Interchange (OSI) \u2014 a minimal, expressive metadata standard built on three primitives: concepts, relationships and relational formulas. OSI supports both dimensional BI models and ontological application semantics, enabling interoperability across ecosystems like dbt, Legend, Palantir, custom applications and BI dashboards. We\u2019ll show how OSI enables a durable way to define semantics once and use them everywhere, while insulating models from schema drift and accelerating cross-system integration in Snowflake.","type": "Breakout Session","date": "2026-06-04","day_name": "Thursday","start_time": "10:00 AM","end_time": "10:45 AM","duration_mins": "45.0","room": "Room 151 (Moscone South, Upper Mezzanine)","capacity": "204","track": "BI & Analytics","session_type": "Breakout Session","location": "","topics": "Snowflake Partners","features": "Semantic Views","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Ankit Tandon | Josh Klahr","speaker_companies": "RelationalAI | Snowflake","speaker_titles": "Senior Director of Product | Director of Product Management","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "ML301","title": "Real-Time Lead Prioritization with Snowflake Model Serving Boosts Podium Sales","abstract": "Discover how Podium turned call-level data into real-time lead recommendations entirely inside Snowflake ML. Using the Snowflake Feature Store, we assembled a leakage-safe data set, trained an XGBoost model on a GPU compute pool and registered it in the Snowflake Model Registry \u2014 then deployed it through Snowpark Inference Services for real-time scoring. Our business app queries the REST API to prioritize outreach instantly, leveraging engagement momentum, appointment readiness and temporal patterns \u2014 driving measurable increases in lead conversion and showing how live, data-driven scoring can accelerate sales outcomes for any business.","type": "Breakout Session","date": "2026-06-04","day_name": "Thursday","start_time": "10:00 AM","end_time": "10:45 AM","duration_mins": "45.0","room": "Room 205 (Moscone South, Level 2)","capacity": "226","track": "Machine Learning","session_type": "Breakout Session","location": "","topics": "System Integrations / Synchronizations","features": "Snowflake ML","personas": "MLOps","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Advanced","delivery_method": "OnDemand","speaker_names": "Andrew Christensen | Collin Austad","speaker_companies": "Podium | Podium","speaker_titles": "Staff Data Scientist | Senior Manager, Analytics Engineering","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE103","title": "The Age of Data Exhaustion","abstract": "No one talks about it, but data teams are tired. They're tired of managing thousands of tables, brittle transformation logic and AI pilots built on foundations no one fully trusts. The problem isn\u2019t data volume. It\u2019s overload. Code overload demands disciplined transformation. Data overload demands intelligent cataloging. And chaos erodes trust. In this session, we\u2019ll show how modern data teams restore order with a metadata-driven data operating layer that standardizes transformation, connects governance to build-time and makes data quality proactive instead of reactive. Because AI doesn\u2019t fix disorder, it amplifies it.","type": "Theater Session","date": "2026-06-04","day_name": "Thursday","start_time": "10:00 AM","end_time": "10:20 AM","duration_mins": "20.0","room": "Vertical Village Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Data Engineering & Pipelines","session_type": "Theater Session","location": "Vertical Village","topics": "IT Operations","features": "Gen 2 Warehouses","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Michael Tantrum","speaker_companies": "Coalesce","speaker_titles": "Director, Sales Engineering - West","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "IN120","title": "The Hierarchy of Truth in Marketing Data","abstract": "Marketing runs on data \u2014 but not all data reflects real impact. Common metrics like impressions, reach and even conversions are easy to measure but often ambiguous or tied to delivery, not effectiveness. Meanwhile, higher-signal indicators \u2014 such as market share, customer behavior and direct feedback \u2014 are harder to capture and are underused. This session introduces a practical framework to understand the hierarchy of truth in marketing data, helping teams focus on what truly matters. We\u2019ll also explore how AI can help interpret qualitative signals and better connect marketing efforts to real-world outcomes..","type": "Theater Session","date": "2026-06-04","day_name": "Thursday","start_time": "10:00 AM","end_time": "10:20 AM","duration_mins": "20.0","room": "Vertical Village Theater 2 (Basecamp, South Hall B)","capacity": "150","track": "Industry Innovation","session_type": "Theater Session","location": "Vertical Village","topics": "Marketing & Customer 360","features": "","personas": "MLOps","industry": "Not industry-specific","department": "Operations","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Myles Younger","speaker_companies": "U of Digital","speaker_titles": "Chief Growth Officer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "MI205","title": "The Intelligence Stack: How NIQ + Snowflake Are Rewriting How Brands Act on Data","abstract": "NIQ and Snowflake reveal how they built a modern foundation to unlock an intelligence platform for trusted, autonomous AI agents. They migrated key analytics and harmonized NIQ's disaggregated data (retail measurement, consumer panel, omnishopper) creating a secure, collaborative surface with brand, retailer and 3P data partners. The result is a single environment for the industry to activate strategies securely, at scale, and in real time. Learn how Snowpark Connect for Apache Spark runs existing code at lower TCO, Cortex Code and Agents assist faster builds, and Clean Rooms securely link NIQ data with customer and third-party data.","type": "Breakout Session","date": "2026-06-04","day_name": "Thursday","start_time": "10:00 AM","end_time": "10:45 AM","duration_mins": "45.0","room": "Room 214 (Moscone South, Level 2)","capacity": "101","track": "Migrations & Modernization","session_type": "Breakout Session","location": "","topics": "Interoperability","features": "Gen 2 Warehouses","personas": "MLOps","industry": "Travel & Hospitality","department": "Supply Chain","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Rakesh Kumar Sikhapalli | Prabhath Nanisetty | Vamsidhar (Vamsi) Guntamukkala","speaker_companies": "NIQ | Snowflake | NielsenIQ","speaker_titles": "Senior Director, Engineering | Global Industry Leader - Technology & AI | VP, Technology","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "WN216B","title": "What's New: Build, Test and Deploy Data Workflows Faster with Cortex Code","abstract": "Transform your ideas into production-ready workflows faster by using the AI coding agent designed specifically for data to handle everything from admin, data engineering, machine learning and agent-building tasks. Learn how Cortex Code can simplify and automate your toughest tasks and help your team expedite time-to-value.","type": "Breakout Session","date": "2026-06-04","day_name": "Thursday","start_time": "10:00 AM","end_time": "10:45 AM","duration_mins": "45.0","room": "Room 158 (Moscone South, Upper Mezzanine)","capacity": "583","track": "What's New in Snowflake","session_type": "Breakout Session","location": "","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "","delivery_method": "OnDemand","speaker_names": "Siddharth Dwivedi | Aria Attar Attar | Alan Yu","speaker_companies": "Snowflake | Snowflake | Snowflake","speaker_titles": "AI Product Marketing, Snowflake | Sr. Product Manager | Staff Product Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "L2","title": "Opening Luminary Talk with \"Clawfather\" Peter Steinberger and Sridhar Ramaswamy","abstract": "A candid conversation between Snowflake CEO Sridhar Ramaswamy and Peter Steinberger, the creator of the viral open source project OpenClaw.","type": "Dev Day Luminary Talk","date": "2026-06-04","day_name": "Thursday","start_time": "10:05 AM","end_time": "10:30 AM","duration_mins": "25.0","room": "Builders Hub Theater (Basecamp, South Hall D)","capacity": "443","track": "Generative AI & Agents","session_type": "Dev Day Luminary Talk","location": "Builder's Hub Theater","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "","delivery_method": "OnDemand","speaker_names": "Sridhar Ramaswamy | Peter Steinberger","speaker_companies": "Snowflake | OpenAI","speaker_titles": "Chief Executive Officer | Creator of OpenClaw","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI278","title": "Agentic Coding for Data Teams: Claude Code","abstract": "As frontier models grow more capable, value is shifting from single-call LLM features to true agents that choose tools, execute multi-step work and adapt as they go. Nowhere is this clearer than in coding. This session shows how Claude Code lets data teams delegate complex analysis while keeping humans in control. And see a live demo using the official Snowflake Cortex Code plugin that turns natural-language intent into working data workflows in minutes.","type": "Theater Session","date": "2026-06-04","day_name": "Thursday","start_time": "10:30 AM","end_time": "10:50 AM","duration_mins": "20.0","room": "Basecamp South Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "General Theaters","topics": "Snowflake Partners","features": "Cortex AI Functions","personas": "Data Scientist","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Henrique Savelli","speaker_companies": "Anthropic","speaker_titles": "Applied AI Architect","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "GO239","title": "Best Practices for Protecting and Auditing Sensitive Data in an AI-First World","abstract": "In the AI-first world, privacy and compliance are nonnegotiable necessities, not optional add-ons. The rapid proliferation of sensitive data, coupled with the increasing reliance on AI and machine learning models, makes it critical to proactively address regulations like HIPAA, PCI-DSS, CCPA and GDPR. Failure to do so not only risks massive regulatory fines but also erodes customer trust. This makes privacy and compliance a strategic priority powered by intelligent automation. In this session, learn about how Snowflake addresses this challenge with Horizon Catalog's Sensitive Data Classification and new AI-driven capabilities for data governance and audit.","type": "Breakout Session","date": "2026-06-04","day_name": "Thursday","start_time": "10:30 AM","end_time": "11:15 AM","duration_mins": "45.0","room": "Room 213 (Moscone South, Level 2)","capacity": "226","track": "Governance & Security","session_type": "Breakout Session","location": "","topics": "Privacy","features": "Cortex AI Functions","personas": "Data Engineer","industry": "Travel & Hospitality","department": "IT","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Ankit Gupta | Anupriti Warade","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Staff Product Manager | Senior Product Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "GO220","title": "Beyond Passwords: Strong Authentication for Snowflake Workloads","abstract": "While strong authentication is essential for accessing Snowflake resources, implementing it across all users and services can be complex. This session will detail real-world customer transitions from traditional methods (passwords, keys) to robust, modern authentication solutions like Workload Identity Federation (secretless authentication). We will explore effective rollout strategies and migration procedures, enabling you to learn the latest techniques for modernizing authentication without disrupting critical workloads.","type": "Breakout Session","date": "2026-06-04","day_name": "Thursday","start_time": "10:30 AM","end_time": "11:15 AM","duration_mins": "45.0","room": "Room 211 (Moscone South, Level 2)","capacity": "226","track": "Governance & Security","session_type": "Breakout Session","location": "","topics": "Data Mesh","features": "Other","personas": "Data Engineer","industry": "Not industry-specific","department": "IT","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Eric Woroshow | Ved Prakash","speaker_companies": "Snowflake | Gitlab","speaker_titles": "Senior Principal Software Engineer | Principal Data Engineer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "GO201","title": "From Data Chaos to Clarity: The Intelligent Data Marketplace Blueprint","abstract": "Every enterprise is racing to turn data into intelligence, yet most struggle with fragmented tools and inconsistent governance. This session shares how we built an Intelligent Internal Marketplace powered by Snowflake Horizon Catalog for trust and governance and Cortex Code for AI-driven discovery. Learn how automated tagging, lineage and intelligent search make data instantly findable, reliable and ready for action. Attendees will explore a practical framework and real-world lessons to unify governance, AI and discovery \u2014 driving adoption, data literacy and faster, trusted business outcomes.","type": "Breakout Session","date": "2026-06-04","day_name": "Thursday","start_time": "10:30 AM","end_time": "11:15 AM","duration_mins": "45.0","room": "Room 160 (Moscone South, Upper Mezzanine)","capacity": "232","track": "Governance & Security","session_type": "Breakout Session","location": "","topics": "Catalogs / Discovery","features": "Snowflake Intelligence","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Rafique Awan | Youssef Abouelneaj","speaker_companies": "MFS Investment Management | Snowflake","speaker_titles": "VP & Director Solution Architecture | Solutions Engineer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DH15","title": "Meet a Data Superhero: AI-Ready Data","abstract": "Join us at the AI Pop Up to meet Data Superheroes and talk about making your data AI-ready. This is an open, informal session \u2014 no presentations, just real conversation about governance, data quality, and structuring data for LLMs and retrieval on Snowflake. Bring your toughest data challenges and connect with like-minded practitioners.","type": "AI Pop Up","date": "2026-06-04","day_name": "Thursday","start_time": "10:30 AM","end_time": "11:30 AM","duration_mins": "60.0","room": "AI Pop Up (Basecamp, South, Hall D)","capacity": "0","track": "","session_type": "AI Pop Up","location": "","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "","delivery_method": "","speaker_names": "Augusto Rosa | Arnaud Col | Rajiv Gupta | Sofia Pierini | Pooja Sahu Sahu | Ruchi Soni","speaker_companies": "Archetype Consulting | Keyrus | Kipi.ai | EY | Schroders | Accenture","speaker_titles": "Head of Data and Cloud Architecture | Snowflake Super Hero | VP of Technology | Data Engineer | Data Engineer | Snowflake Global Practice Lead","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AR234","title": "OpenTelemetry and Iceberg: Foundation for Observability at Scale","abstract": "AI-driven systems generate massive volumes of metrics, logs and traces with extreme cardinality and long retention needs. Traditional observability backends struggle to scale, govern and control costs. In this session, learn how Observe uses Snowflake as the backbone of an open observability architecture built on OpenTelemetry and Apache Iceberg. We\u2019ll show how telemetry flows from OTel-instrumented apps through collectors into user\u2019s own Iceberg data lakehouse, enabling open access, strong governance and analytics at petabyte scale. This approach lowers storage and query costs while delivering faster incident detection and resolution \u2014 without vendor lock-in.","type": "Breakout Session","date": "2026-06-04","day_name": "Thursday","start_time": "10:30 AM","end_time": "11:15 AM","duration_mins": "45.0","room": "Room 206 (Moscone South, Level 2)","capacity": "101","track": "Architectures & Interoperability","session_type": "Breakout Session","location": "","topics": "Open Lakehouse","features": "Apache Polaris","personas": "Data Engineer","industry": "Not industry-specific","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Jiayuan Chen | Kai Su","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Software Engineer | Software Engineering Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE301","title": "Real-Time Openflow Oracle CDC for Enterprise with Yes Energy's Story","abstract": "Oracle holds the most critical enterprise data and getting it into Snowflake in real time is the defining Oracle data engineering challenge. Every DBA asks before enabling CDC: will this hurt the database? We answer with data. Jakub Puchalski from Snowflake benchmarks XStream at 37,000+ TPS quantifying redo volume, CPU and commit latency. Dan Goodman from Yes Energy demos an Exadata deployment: billion-row CDC tables in production and a real recovery story that proves what \"resilient by design\" means. Join this session for a DBA-ready architecture blueprint, a checklist to protect your OLTP system, and confidence to move your most critical Oracle workloads to Snowflake Openflow.","type": "Breakout Session","date": "2026-06-04","day_name": "Thursday","start_time": "10:30 AM","end_time": "11:15 AM","duration_mins": "45.0","room": "Room 159 (Moscone South, Upper Mezzanine)","capacity": "213","track": "Data Engineering & Pipelines","session_type": "Breakout Session","location": "","topics": "System Integrations / Synchronizations","features": "Snowflake Openflow","personas": "Data Engineer","industry": "Not industry-specific","department": "IT","technical_level": "Advanced","delivery_method": "Live","speaker_names": "Jakub Puchalski | Dan Goodman","speaker_companies": "Snowflake | Yes Energy","speaker_titles": "Staff Product Manager | Staff Engineer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DM201","title": "Roche Panel: Global Self-Service Data Platform \u2014 Real-Time Ingestion, Visual AI","abstract": "F. Hoffmann-La Roche built a platform powered by Snowflake supporting pharma and diagnostics operations. This panel explores governance and Cortex AI in a data mesh architecture. At Pharma Technical Operations, near real-time PI/MQTT pipelines offer the strategic opportunity to standardize manufacturing sensor data across sites, reducing costs while enabling advanced analytics, root cause analysis and yield optimization. GenMark unifies out-of-spec detection into a complete lifecycle with ensemble models and AI agents, automating inspection to drastically reduce R&D cycle times. Discover how cross-domain collaboration and a reuse mindset embody Roche's purpose: Doing now what patients need next.","type": "Theater Session","date": "2026-06-04","day_name": "Thursday","start_time": "10:30 AM","end_time": "10:50 AM","duration_mins": "20.0","room": "Vertical Village Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Data Sharing & Marketplace","session_type": "Theater Session","location": "Vertical Village","topics": "Catalogs / Discovery","features": "Cortex AI Functions","personas": "Data Engineer","industry": "Not industry-specific","department": "Supply Chain","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Stephan Lobinger | Greg Chojeta | Myles Sumlin | Marianne Halloran","speaker_companies": "Snowflake | Roche | Genentech, Inc. | Roche","speaker_titles": "Global Senior Solution Engineer | Team Lead Engineering Data Warehouse | Head of Data Engineers | Data Science Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI124","title": "The New Shadow IT: What Happens When Everyone Ships Agents","abstract": "A decade ago, SaaS allowed teams to bypass IT, reshaping governance and security. The same pattern is happening with AI agents, only faster. Every platform now offers agent capabilities, but when agents are spread across systems, knowledge becomes siloed without compounding feedback loops to make agents more accurate over time. This creates a new form of shadow IT with higher stakes. This session m
