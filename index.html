ng data pipelines easier than ever, but hidden inefficiencies can quietly drive up costs. Redundant pipelines, oversized warehouses, forgotten workloads and slow queries can add up to serious Snowflake waste. In this session, you will learn a practical hygiene framework to identify and fix inefficiencies across your pipelines. We\u2019ll also show you how autonomous agents can make this a continuous process, turning cleanup from a one-time chore into an ongoing advantage.","type": "Theater Session","date": "2026-06-01","day_name": "Monday","start_time": "02:00 PM","end_time": "02:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 4 (Basecamp, South Hall C)","capacity": "150","track": "Data Engineering & Pipelines","session_type": "Theater Session","location": "General Theaters","topics": "Snowflake Partners","features": "dbt Projects on Snowflake","personas": "Data Engineer","industry": "Not industry-specific","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Mike Scherer","speaker_companies": "Keebo","speaker_titles": "Director of Engineering","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "GO208","title": "Regional Data Moves at Scale: Solving Data Locality Without Breaking Analytics","abstract": "As global SaaS platforms scale, data locality and regional compliance become continuous operational requirements. Customer data must move across regions safely and predictably, while analytics pipelines remain consistent and trustworthy. In this session, we share how Zendesk designed a Snowflake-native approach for cross-regional account moves by aligning operational cutovers with explicit UTC day boundaries. By introducing a preemptive data-processing lock coordinated with upstream cutover guarantees, downstream layers process only fully closed days. The result is a predictable, low-maintenance pattern for regional data moves at scale.","type": "Breakout Session","date": "2026-06-01","day_name": "Monday","start_time": "02:00 PM","end_time": "02:45 PM","duration_mins": "45.0","room": "Room 212 (Moscone South, Level 2)","capacity": "101","track": "Governance & Security","session_type": "Breakout Session","location": "","topics": "Data Warehouse","features": "Other","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Shahid Faiz | Priya Varadarajan","speaker_companies": "Zendesk | Zendesk","speaker_titles": "Principal Data Engineer | Senior Engineering Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI238","title": "The Blueprint for Building SCM Intelligence for Perishable Business on Snowflake","abstract": "Dominating 70% of the U.S. tofu market, Pulmuone unified more than 20,000 products by migrating fragmented ERP, SCM and WMS data to Snowflake. This session reveals how it achieved a real-time integrated view, syncing production and sales for instant S&OP analysis. By leveraging Snowflake, Pulmuone streamlined the entire supply chain \u2014 from manufacturing to CS. With AI-driven demand forecasting and trend analysis, the company reduced SCM costs by about 25%, boosted analyst productivity by 50% and improved forecast accuracy by 20%. Learn how Pulmuone transformed a complex global operation into a lean, data-driven engine, proving that Snowflake is the ultimate ingredient for scalable business growth.","type": "Breakout Session","date": "2026-06-01","day_name": "Monday","start_time": "02:00 PM","end_time": "02:45 PM","duration_mins": "45.0","room": "Room 208 (Moscone South, Level 2)","capacity": "197","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "Interoperability","features": "Snowflake ML","personas": "Business Executive","industry": "Retail & Consumer Goods","department": "Supply Chain","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Soonsik Ahn","speaker_companies": "Pulmuone / SCM (Supply Chain Management) div.","speaker_titles": "SCM Executive","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI304","title": "The Snowflake Search Stack: Unstructured Data for Agentic AI at Scale","abstract": "Unstructured data (text, images, audio and documents) is the most valuable and least activated layer of the enterprise data stack. This session covers unstructured data preparation and search at enterprise scale, including: The end-to-end data enablement pipeline: How OpenFlow, AI enrichment and Cortex Search compose into a production workflow that takes raw unstructured data to searchable, agent-ready assets in minutes. Snowflake Search Stack: Four modalities covering interactive RAG, batch matching, exhaustive analytical queries over unstructured corpora and federated retrieval from a single agent, all built on Snowflake and scaling to billion-sized indexes.","type": "Breakout Session","date": "2026-06-01","day_name": "Monday","start_time": "02:00 PM","end_time": "02:45 PM","duration_mins": "45.0","room": "Room 152 (Moscone South, Upper Mezzanine)","capacity": "204","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "Data Warehouse","features": "Snowflake Openflow","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Advanced","delivery_method": "OnDemand","speaker_names": "Nikolai Scholz","speaker_companies": "Snowflake","speaker_titles": "Staff Product Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "ML101","title": "Agentic ML in Action: Train, Deploy and Monitor Models with Cortex Code\n","abstract": "What if you could go from a blank notebook to a monitored production model using just natural language? Cortex Code brings agentic AI to the Snowflake ML lifecycle by training models, engineering features with Snowflake Feature Store, registering and versioning models in Model Registry, deploying real-time inference endpoints on Snowpark Container Services, running batch predictions at scale with ML jobs, tracking experiments and more. In this session, we demo the full journey: explore data, train a model, build feature pipelines, deploy to a GPU endpoint and set up monitoring \u2014 all driven by an AI agent through conversation. See how agentic ML development collapses weeks of MLOps into minutes.","type": "Breakout Session","date": "2026-06-01","day_name": "Monday","start_time": "02:30 PM","end_time": "03:15 PM","duration_mins": "45.0","room": "Room 209 (Moscone South, Level 2)","capacity": "197","track": "Machine Learning","session_type": "Breakout Session","location": "","topics": "System Integrations / Synchronizations","features": "Snowflake ML","personas": "MLOps","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Doris Lee","speaker_companies": "Snowflake","speaker_titles": "Product","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AR202","title": "AI-Ready Open Lakehouse with Apache Iceberg for AWS-Snowflake Interoperability","abstract": "In a world where AI adoption is accelerating, your data architecture determines whether you lead or lag. Traditional data lakes and warehouses create silos that slow decisions, duplicate costs and block AI agents from accessing unified data. This session shows how to build an open, secure data lakehouse with Apache Iceberg in Amazon SageMaker. Learn how to query Iceberg tables in SageMaker directly from Snowflake, access Snowflake Horizon Catalog data through AWS Glue Data Catalog federation, and empower LLMs and AI agents to interact with your data estate. Walk away with architectural patterns that accelerate time to insights.","type": "Theater Session","date": "2026-06-01","day_name": "Monday","start_time": "02:30 PM","end_time": "02:50 PM","duration_mins": "20.0","room": "Vertical Village Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Architectures & Interoperability","session_type": "Theater Session","location": "Vertical Village","topics": "Interoperability","features": "Apache Polaris","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Nidhi Gupta Gupta | Doug Mbaya","speaker_companies": "AWS | AWS","speaker_titles": "Sr. Partner SA, Data & Analytics | Sr Partner Solutions Architect","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI227","title": "Barclays Builds an Enterprisewide Observability Foundation on Snowflake","abstract": "Barclays delivers financial services across a global estate spanning thousands of applications and tens of thousands of servers. As part of a multi-year observability transformation, Barclays is building end-to-end visibility across critical customer journeys. Getting there meant overcoming the limits of its existing telemetry platform: as data volumes grew, Barclays\u2019 existing platform became harder to use at scale and required substantial effort to operate. Learn how Barclays is using Observe\u2019s Snowflake-native data lake to build a scalable observability foundation \u2014 reducing toil and cost while improving data access, correlation and faster decision-making across engineering and operations.","type": "Breakout Session","date": "2026-06-01","day_name": "Monday","start_time": "02:30 PM","end_time": "03:15 PM","duration_mins": "45.0","room": "Room 160 (Moscone South, Upper Mezzanine)","capacity": "232","track": "BI & Analytics","session_type": "Breakout Session","location": "","topics": "Open Lakehouse","features": "Other","personas": "DevOps","industry": "Financial Services","department": "Operations","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Chris Kozlowski","speaker_companies": "Barclays","speaker_titles": "Managing Director","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "PO222","title": "Building AI-Powered Cloud Spend Intelligence on Snowflake","abstract": "How does Snowflake manage its own cloud spend across a rapidly growing platform? In this session, we share how we built an internal, AI-powered FinOps system on Snowflake to unify cost visibility, detect anomalies and drive real-time decisions. See how Snowflake Intelligence, semantic models and AI agents enable conversational cost analysis and proactive optimization. We\u2019ll break down the architecture and design patterns behind our internal solution \u2014 and how you can replicate them to modernize cloud cost management.","type": "Theater Session","date": "2026-06-01","day_name": "Monday","start_time": "02:30 PM","end_time": "02:50 PM","duration_mins": "20.0","room": "Basecamp South Theater 2 (Basecamp, South Hall A)","capacity": "150","track": "Performance & Cost Optimization","session_type": "Theater Session","location": "General Theaters","topics": "AI Agents / Data Agents","features": "Cortex Code","personas": "","industry": "Not industry-specific","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Chetan Nakhate | Karthik Gopalakrishnan","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Cloud Infrastructure Engineer | Senior Director, Enterprise Engineering","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE242","title": "Building Real-Time, Multimodal AI Agents with Snowflake","abstract": "Generative AI often sits isolated in experimental notebooks, disconnected from the high-velocity data of the real world. In this session, we introduce a Snowflake architecture (Snowflake, NiFi, Apache Iceberg, Cortex, Kafka) that includes a blueprint for operationalizing AI on data in motion. We will demonstrate how to move beyond static RAG by building a live \"vision agent\" that ingests real-time video streams, performs autonomous image analysis using multimodal LLMs (Cortex) and triggers downstream actions instantly. Attendees will see a live blueprint where data ingestion, vectorization and inference happen in a unified, serverless loop, turning raw chaos into structured intelligence.","type": "Theater Session","date": "2026-06-01","day_name": "Monday","start_time": "02:30 PM","end_time": "02:50 PM","duration_mins": "20.0","room": "Builders Hub Theater (Basecamp, South Hall D)","capacity": "192","track": "Data Engineering & Pipelines","session_type": "Theater Session","location": "Builder's Hub Theater","topics": "Open Lakehouse","features": "Snowflake Openflow","personas": "Data Engineer","industry": "Financial Services","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Tim Spann","speaker_companies": "Snowflake","speaker_titles": "Senior Solutions Engineer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI247","title": "Context, Governance, Infrastructure: The Stack AI Data Agents Don't Have","abstract": "AI agents can build pipelines, generate dbt models, evolve Snowflake schemas and write quality tests. But, they lack three pieces essential for production-grade data engineering demands: 1) context about your data stack and business, 2) governance to enforce access controls, policies and cost constraints, and 3) infrastructure to validate changes before they hit your warehouse. Pradnesh Patil, Co-Founder of Altimate.ai, shares the missing stack for agentic data engineering. Watch agents catch schema drift, self-correct hallucinated models and enforce guardrails in Snowflake and across the entire data platform.","type": "Theater Session","date": "2026-06-01","day_name": "Monday","start_time": "02:30 PM","end_time": "02:50 PM","duration_mins": "20.0","room": "Basecamp South Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "General Theaters","topics": "AI Agents / Data Agents","features": "Other","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Ra Raman | Pradnesh Patil","speaker_companies": "Zscaler | Altimate AI","speaker_titles": "Senior Director, Enterprise Data & AI | Co-Founder & CEO","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "E17","title": "Future-Proofing the American Workforce: A Fireside Chat with Taylor Stockton","abstract": "As the global economy begins accelerating its adoption of AI, the U.S. Department of Labor is at the forefront of ensuring this technology serves as a catalyst for opportunity. Join Taylor Stockton, Chief Innovation Officer at the DOL, for a fireside chat exploring the administration's strategic approach to AI, leveraging it to strengthen worker welfare and ensure that the American workforce is AI-literate and equipped for the future. This session will dive into key AI priorities and initiatives from the administration, including programs that modernize workforce development and promote access to emerging high-growth careers. And hear how the collaboration between enterprises and the U.S. government can reduce barriers, accelerate growth and build a resilient, future-ready workforce for all.","type": "Executive Content","date": "2026-06-01","day_name": "Monday","start_time": "02:30 PM","end_time": "03:00 PM","duration_mins": "30.0","room": "Alpine Clubhouse Theater (Moscone South, Level 3)","capacity": "70","track": "","session_type": "Executive Content","location": "","topics": "AI Agents / Data Agents","features": "","personas": "Business Executive","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "","speaker_names": "Taylor Stockton | Matthew Rose","speaker_companies": "U.S. Department of Labor | Snowflake","speaker_titles": "Chief Innovation Officer | Global Head Corporate & Gov Relations","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE204","title": "Leveraging AI-Powered Analytics to Manage the Guest Experience with Fogo\u00a0de Ch\u00e3o","abstract": "Fogo de Ch\u00e3o is an internationally renowned restaurant from Brazil that elevates the culinary art of churrasco into a cultural dining experience. Fogo offers a continuous selection of high-quality proteins carved tableside and access to a market table with a selection of seasonal salads, exotic fruit, superfoods and more. Managing guest satisfaction and operational excellence at scale requires more than intuition \u2014 it demands data. Fogo de Ch\u00e3o's partnership with Domo is a cornerstone of their data strategy, enabling real-time insights. Discover how Fogo de Ch\u00e3o leverages AI-powered analytics to manage reputation and drive operational efficiency to make smarter decisions every day.","type": "Breakout Session","date": "2026-06-01","day_name": "Monday","start_time": "02:30 PM","end_time": "03:15 PM","duration_mins": "45.0","room": "Room 215 (Moscone South, Level 2)","capacity": "226","track": "Data Engineering & Pipelines","session_type": "Breakout Session","location": "","topics": "System Integrations / Synchronizations","features": "Snowflake Intelligence","personas": "Data Engineer","industry": "Travel & Hospitality","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Mohammed Aaser | Sashi Kommineni","speaker_companies": "Domo | Fogo De Ch\u00e3o","speaker_titles": "Chief Strategy Officer | VP, Analytics and Data Science","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "MI220","title": "Migration Journey from Databricks to Snowflake and Data Platform Consolidation","abstract": "Over the past two years, Petz has consolidated Snowflake as its central data platform, unifying ingestion, data engineering and analytics workloads. The session will also highlight key use cases leveraging Snowflake Cortex to enable AI-driven consumer experiences, including product availability and retail \u201cendless shelf\u201d scenarios integrated with logistics and store operations. Additionally, the presentation will cover the transition from a multi-component architecture (Open Source, Databricks, distributed ETL) to a unified Snowflake platform, emphasizing gains in efficiency, security and direct business value.","type": "Breakout Session","date": "2026-06-01","day_name": "Monday","start_time": "02:30 PM","end_time": "03:15 PM","duration_mins": "45.0","room": "Room 206 (Moscone South, Level 2)","capacity": "101","track": "Migrations & Modernization","session_type": "Breakout Session","location": "","topics": "Data Warehouse","features": "Snowflake ML","personas": "BI / Analyst","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Vini Gasparini | GUILHERME Kanagusku","speaker_companies": "Petz | Snowflake","speaker_titles": "Data Engineering Manager | Sales Executive","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE243","title": "Scaling AI: Leveraging Snowflake Data Products Through Context and Semantics","abstract": "As Workday accelerates its enterprise data and AI strategy, scaling trusted data products is a critical differentiator. In this session, Workday will share how it builds a modern data foundation with Snowflake to unify analytics, operational telemetry and AI-ready datasets under a governed framework. Workday's leadership will reveal how they deliver business value beyond migration. Attendees will learn how Workday manages the lifecycle of data products \u2014 leveraging zero-copy architecture, discoverability and governance for cross-functional teams. We will explore scalable governance, Secure Data Sharing, and how this foundation powers agentic AI workflows and self-service analytics worldwide.","type": "Breakout Session","date": "2026-06-01","day_name": "Monday","start_time": "02:30 PM","end_time": "03:15 PM","duration_mins": "45.0","room": "Room 213 (Moscone South, Level 2)","capacity": "226","track": "Data Engineering & Pipelines","session_type": "Breakout Session","location": "","topics": "Interoperability","features": "Apache Polaris","personas": "MLOps","industry": "Not industry-specific","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Joe DosSantos | Joel Rogers","speaker_companies": "Workday | Workday","speaker_titles": "VP, Enterprise Data & Analytics | Sr. Data Scientist","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "GO204","title": "Snowflake Intelligence for Trading and Risk Management","abstract": "Learn how ofi (Olam Food Ingredients) drives its decision-making processes by using Snowflake Intelligence agents. The agents have been built for sales, hedging and procurement insights, enabling teams to move from static reporting to proactive, insight-led decisions. These agents operate on top of historical, curated enterprise datasets combined with semantic data models, ensuring that insights are generated with consistent business context and shared definitions. As a result, they empower decision\u2011makers with timely, contextual and actionable insights \u2014 supporting better pricing and demand decisions in sales, more informed risk insights and improved optimization strategies in procurement.","type": "Theater Session","date": "2026-06-01","day_name": "Monday","start_time": "02:30 PM","end_time": "02:50 PM","duration_mins": "20.0","room": "Vertical Village Theater 2 (Basecamp, South Hall B)","capacity": "150","track": "Governance & Security","session_type": "Theater Session","location": "Vertical Village","topics": "AI Agents / Data Agents","features": "SnowConvert AI","personas": "BI / Analyst","industry": "Manufacturing","department": "Supply Chain","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Sreenivas Bollina Bollina","speaker_companies": "ofi","speaker_titles": "VP of Data & Analytics","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI202","title": "The AI-Ready Bank: How Peoples Bank Unified Core Systems on Snowflake","abstract": "Most regional banks run on fragmented systems \u2014 core banking, Salesforce, nCino \u2014 siloing customer data. As AI capabilities accelerate, banks without a unified data foundation risk missing the next wave of agentic automation and intelligence. Peoples Bank of Ohio, a $10 billion+ institution, partnered with Coastal to do something about it. It replaced a legacy SQL registry with Snowflake medallion architecture, used dbt to unify operational systems and turned its general ledger into a trusted customer 360. Get the blueprint: See how the bank delivered golden IDs and automated revenue monitoring and marketing segmentation via zero-copy integration while building an AI-ready foundation for Snowflake.","type": "Breakout Session","date": "2026-06-01","day_name": "Monday","start_time": "02:30 PM","end_time": "03:15 PM","duration_mins": "45.0","room": "Room 211 (Moscone South, Level 2)","capacity": "226","track": "BI & Analytics","session_type": "Breakout Session","location": "","topics": "System Integrations / Synchronizations","features": "Snowflake Intelligence","personas": "Technical Executive","industry": "Financial Services","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Priscilla Ellis | Ann Helmick","speaker_companies": "Coastal | Peoples Bank","speaker_titles": "Senior Director - Industry Advisor | SVP, Director of Client Experience","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI114","title": "Why the Future of Business AI Belongs to AI Context Engineers","abstract": "Many AI initiatives fail because they lack business context, providing technically correct but operationally wrong answers. Kapil Chhabra introduces the AI Context Engineer: a vital role for building trusted analytics on Snowflake. In this session, you\u2019ll learn: Why many AI analytics pilots stall before production The four layers of context AI needs for accurate answers How analysts can evolve into AI Context Engineers How semantic models, governance and business logic improve trust Why proactive AI agents are only as strong as the context beneath them","type": "Theater Session","date": "2026-06-01","day_name": "Monday","start_time": "02:30 PM","end_time": "02:50 PM","duration_mins": "20.0","room": "Basecamp South Theater 3 (Basecamp, South Hall C)","capacity": "150","track": "BI & Analytics","session_type": "Theater Session","location": "General Theaters","topics": "Data Warehouse","features": "Snowflake Intelligence","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Kapil Chhabra","speaker_companies": "WisdomAI","speaker_titles": "Co-founder & CPO","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI111","title": "Agentic CRM: AI Driving Real Transformation","abstract": "Learn about an agentic CRM experience to become sales reps\u2019 sidekicks and remove the operational overhead of traditional CRM applications. The future of CRM is not another application that needs you to manually make updates; it is an enabler that handles all of your busy work while being your proactive and supportive assistant. Align your agentic, sales and data strategies by running Elementum on your Snowflake instance.","type": "Theater Session","date": "2026-06-01","day_name": "Monday","start_time": "03:00 PM","end_time": "03:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 2 (Basecamp, South Hall A)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "General Theaters","topics": "Snowflake Partners","features": "Cortex Agents","personas": "Marketing Practitioner","industry": "Not industry-specific","department": "Sales & Marketing","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Dimitrije Jankovic","speaker_companies": "Sanofi","speaker_titles": "SVP - Digital Strategy & Operations","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI229","title": "AI-Powered Analytics and Data Discovery Using Snowflake at Booking.com","abstract": "Commercial, product and platform teams \u2014 from partnerships, trips and accommodations \u2013 are using Snowflake\u2019s AI capabilities to power self-service analytics and data discovery. Built on a multienvironment infrastructure, analytical semantics from multiple business units are integrated with Booking\u2019s data discovery and low-code AI application, enabling teams to ask product, performance and data management contextual questions using natural language in a variety of contexts. Snowflake Intelligence, semantic views and agents are reducing our dependence on dashboards and data tribal knowledge \u2014 freeing up analysts\u2019 time for complex experimentation, causal inference and strategic analysis.","type": "Breakout Session","date": "2026-06-01","day_name": "Monday","start_time": "03:00 PM","end_time": "03:45 PM","duration_mins": "45.0","room": "Room 208 (Moscone South, Level 2)","capacity": "197","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "System Integrations / Synchronizations","features": "Snowflake Intelligence","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Kiran Kodandoor | Paul Neustadt","speaker_companies": "Booking.com | booking.com","speaker_titles": "Principal Software Engineer | Senior Technical Product Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI112","title": "Analytics to AI Apps: Democratizing Agentic Workflows with Sigma and Snowflake","abstract": "Stop looking at data and start acting on it. Top organizations empower employees across all functions and levels to build intelligent AI apps that interpret data, automate workflows and drive immediate action. Join this hands-on lab to see how Sigma connects business users, live analytics and Snowflake Cortex Agents. Using a real-world retail loss prevention scenario, you'll replace legacy reporting with a custom AI app that runs Python machine learning and embeds Snowflake Cortex AI chat agents to investigate fraud in real time. Walk away with a replicable blueprint for deploying code-free AI apps across your enterprise, no specialized engineering resources required.","type": "Hands-on Lab","date": "2026-06-01","day_name": "Monday","start_time": "03:00 PM","end_time": "04:30 PM","duration_mins": "90.0","room": "Hands-on Labs 3 (Basecamp, Hall E)","capacity": "133","track": "BI & Analytics","session_type": "Hands-on Lab","location": "","topics": "Snowflake Partners","features": "Snowflake ML","personas": "Data Engineer","industry": "Not industry-specific","department": "Operations","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Raj Sridhar","speaker_companies": "Sigma","speaker_titles": "Partner SE","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AR105","title": "Apache Iceberg\u2122 v3 Tables in Snowflake: A Practical Guide","abstract": "The release of Apache Iceberg\u2122 v3 tables is a major step for open data architectures. But beyond a version number, what does v3 mean when managing an open lakehouse in Snowflake? This session introduces the Iceberg table format, its evolution and the key breakthroughs of v3. We\u2019ll highlight practical benefits \u2014 better CDC support, more efficient handling of semi-structured data and improved metadata management \u2014 and show how these features help solve real-world lakehouse challenges. Through a series of live demos, you\u2019ll learn how to get started with v3 features in Snowflake so you can hit the ground running with this new format version.","type": "Theater Session","date": "2026-06-01","day_name": "Monday","start_time": "03:00 PM","end_time": "03:20 PM","duration_mins": "20.0","room": "Builders Hub Theater (Basecamp, South Hall D)","capacity": "192","track": "Architectures & Interoperability","session_type": "Theater Session","location": "Builder's Hub Theater","topics": "System Integrations / Synchronizations","features": "Apache Iceberg\u2122","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "OnDemand","speaker_names": "Danica Fine | Gilberto Hernandez","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Sr. Manager, OSS Developer Relations | Lead Developer Advocate","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI111","title": "Bright Horizons Backup Care: Data\u2011Driven Transformation with Cognizant","abstract": "This joint session by Cognizant and Bright Horizons highlights a multiphase enterprise data platform transformation built on Snowflake. Attendees will see how modern cloud architecture enabled scalable data ingestion, governance and analytics across complex business domains. The session covers key delivery outcomes, architectural choices and business impact \u2014 showing how strong partnership, disciplined execution and platform modernization accelerate data\u2011driven decision\u2011making at scale.","type": "Theater Session","date": "2026-06-01","day_name": "Monday","start_time": "03:00 PM","end_time": "03:20 PM","duration_mins": "20.0","room": "Vertical Village Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "BI & Analytics","session_type": "Theater Session","location": "Vertical Village","topics": "MLOps","features": "Other","personas": "Security Practitioner","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Rakesh Saxena Jambukesar | Chendil Kumar","speaker_companies": "Cognizant | Bright Horizons","speaker_titles": "NA Delivery Head - TECH & EDU | Director , Analytics & AI products","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "E21","title": "Executive Industry Summit Tour \u2014 Media","abstract": "Join an exclusive, guided tour of the Snowflake AI Data Cloud and its premier partner ecosystem, tailored for leaders in media. This immersive experience will take you through five curated stops that showcase the art of the possible \u2014 real-world solutions, cutting-edge AI use cases and data-driven innovations transforming your industry today. Gain direct access to experts, see industry-leading technology in action and leave with actionable inspiration to accelerate your data strategy. Space is extremely limited \u2014 registration is first come, first served. Please note that this experience includes walking between stops; comfortable footwear is recommended. Please note that the Executive Booth Tours are reserved for customers only \u2014 we kindly ask our partners not to register.","type": "Executive Content","date": "2026-06-01","day_name": "Monday","start_time": "03:00 PM","end_time": "04:30 PM","duration_mins": "90.0","room": "Vertical Village (Basecamp, South Hall B)","capacity": "15","track": "","session_type": "Executive Content","location": "","topics": "","features": "","personas": "","industry": "Media, Entertainment & Advertising","department": "","technical_level": "","delivery_method": "","speaker_names": "","speaker_companies": "","speaker_titles": "","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DM212","title": "From 12 to 200: Scaling U.S. Bank\u2019s Data Product Strategy with Snowflake","abstract": "U.S. Bank is transforming data from a siloed asset into a scalable product, growing its internal marketplace from 12 to 200 AI-ready data products by 2027. This session explores how it's empowering domain teams to curate data products using Snowflake Internal Marketplace and Dynamic Tables, while aligning them with business outcomes such as revenue modeling and forecasting. Learn how the CDAO office uses \"data ambassadors\" to drive enterprise-wide adoption, and discover their roadmap for decentralizing data ownership while maintaining central governance.","type": "Breakout Session","date": "2026-06-01","day_name": "Monday","start_time": "03:00 PM","end_time": "03:45 PM","duration_mins": "45.0","room": "Room 216 (Moscone South, Level 2)","capacity": "197","track": "Data Sharing & Marketplace","session_type": "Breakout Session","location": "","topics": "Catalogs / Discovery","features": "Semantic Views","personas": "Product Manager","industry": "Not industry-specific","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Sunitha Varadhan | Coral Yan","speaker_companies": "US Bank | U.S. Bank","speaker_titles": "SVP, Head of Data Product Enablement | VP of Data Platform Engineering Lead","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI113","title": "From Proof to Production: Scaling AI with Confidence","abstract": "Most AI initiatives fail because organizations lack a structured path from proof of concept to enterprise-scale impact \u2014 leaving promising prototypes stranded as science projects. evolv's AI Value Realization Framework leverages Snowflake Cortex AI capabilities, guiding organizations through discovery, POC, scale-up planning and implementation. Cortex Code accelerates development cycles from months to weeks, while Snowflake Cortex AI provide enterprise-grade capabilities. This session demonstrates how the methodology transforms AI from experimental technology into core business capability, ensuring Snowflake AI investments deliver a sustained competitive advantage.","type": "Theater Session","date": "2026-06-01","day_name": "Monday","start_time": "03:00 PM","end_time": "03:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "General Theaters","topics": "System Integrations / Synchronizations","features": "Cortex Code","personas": "MLOps","industry": "Technology","department": "Supply Chain","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Courtney Livingstone | Jeremy Newhouse","speaker_companies": "evolv Consulting | evolv Consulting","speaker_titles": "Managing Director, Delivery | Head of AI Delivery","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE110","title": "Getting Your Data Cortex AI-Ready with Fivetran, Snowflake and dbt","abstract": "In 90 minutes, you'll go hands-on building a production-ready AI chatbot \u2014 taking raw data from ingestion all the way to an experience powered by Snowflake Intelligence using Fivetran and dbt Platform. Guided step by step, this lab is designed for all skill levels. Whether you're new to the modern data stack or a seasoned practitioner, you'll walk away with working knowledge of Snowflake Cortex AI and a repeatable blueprint you can take back to your organization.","type": "Hands-on Lab","date": "2026-06-01","day_name": "Monday","start_time": "03:00 PM","end_time": "04:30 PM","duration_mins": "90.0","room": "Hands-on Labs 1 (Basecamp, Hall E)","capacity": "299","track": "Data Engineering & Pipelines","session_type": "Hands-on Lab","location": "","topics": "Snowflake Partners","features": "Cortex Code","personas": "MLOps","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Luis Leon | Kelly Kohlleffel","speaker_companies": "dbt Labs | Fivetran","speaker_titles": "Partner Solution Architect | Sr. Director Global Partner Sales Eng","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "PO301","title": "How Canva Built a Petabyte-Scale Optimization Ecosystem","abstract": "Petabyte-scale environments require granular visibility and disciplined governance. This session explores cost attribution models, storage lifecycle management and compute segmentation strategies that drive accountability without slowing innovation. This session is ideal for large enterprises managing complex, multi-domain workloads.","type": "Breakout Session","date": "2026-06-01","day_name": "Monday","start_time": "03:00 PM","end_time": "03:45 PM","duration_mins": "45.0","room": "Room 151 (Moscone South, Upper Mezzanine)","capacity": "204","track": "Performance & Cost Optimization","session_type": "Breakout Session","location": "","topics": "Compliance","features": "Gen 2 Warehouses","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Advanced","delivery_method": "OnDemand","speaker_names": "Haoyang Cui | Anna Bisset","speaker_companies": "Canva | Canva","speaker_titles": "Senior Software Engineer | Senior Analytics Engineer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI227","title": "Identifying Chronic Conditions Using Snowflake Cortex AI","abstract": "Due to the high risk of their patient population and the strain on primary care physicians, chronic illnesses often go undiagnosed and untreated. Agilon's goal is to leverage LLMs and its massive patient data set to help uncover and diagnose such conditions, providing its patients a happier, healthier life. Agilon is utilizing its centralized clinical data with Snowflake Cortex AI to reason through millions of patient documents. This enables Agilon to instantly and accurately flag potential undiagnosed ICD-10 codes at scale for its 600,000-patient population.","type": "Breakout Session","date": "2026-06-01","day_name": "Monday","start_time": "03:00 PM","end_time": "03:45 PM","duration_mins": "45.0","room": "Room 152 (Moscone South, Upper Mezzanine)","capacity": "204","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Cortex AI Functions","personas": "DevOps","industry": "Technology","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Moiz Ahmed | Alex Trahey","speaker_companies": "Snowflake | Agilon Health","speaker_titles": "Senior Solution Engineer | Sr. Director of AI","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI231","title": "Powering Agentic Enterprise with AI-Ready Data from Informatica and Snowflake","abstract": "Agentic transformation requires a foundation of unified, accessible and context-rich data. This session explores how Informatica from Salesforce provides an end-to-end strategy to unlock and govern high-fidelity enterprise data with Snowflake Cortex AI. Through an architectural blueprint, learn how you can unlock connectivity across disparate systems, build trust via automated data quality and governance, and ground agents with reliable and relevant domain context. Discover how Paychex leverages Informatica\u2019s comprehensive data foundation to fuel is agentic transform with Snowflake Cortex AI to deliver an intelligent and enhanced customer experience.","type": "Breakout Session","date": "2026-06-01","day_name": "Monday","start_time": "03:00 PM","end_time": "03:45 PM","duration_mins": "45.0","room": "Room 212 (Moscone South, Level 2)","capacity": "101","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "Data Warehouse","features": "Cortex AI Functions","personas": "Data Engineer","industry": "Technology","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Rik Tamm-Daniels","speaker_companies": "Informatica from Salesforce","speaker_titles": "VP Ecosystems and ISV Alliances","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DM103","title": "SAP and Snowflake: Unlocking Data and AI Across the Enterprise","abstract": "SAP and Snowflake have formed a partnership that brings SAP\u2019s deep business process expertise and semantically rich data together with Snowflake\u2019s powerful AI, machine learning and analytics capabilities. This session introduces the SAP Business Data Cloud and explores how zero-copy, bidirectional data sharing enables seamless integration of trusted SAP data into Snowflake \u2014 without duplication. Learn how organizations can preserve business context, reduce data movement and unlock high-impact analytics and AI use cases. Discover how this collaboration enables a unified business data fabric to drive faster insights and scalable, enterprise-ready AI.","type": "Theater Session","date": "2026-06-01","day_name": "Monday","start_time": "03:00 PM","end_time": "03:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 4 (Basecamp, South Hall C)","capacity": "150","track": "Data Sharing & Marketplace","session_type": "Theater Session","location": "General Theaters","topics": "System Integrations / Synchronizations","features": "Snowflake ML","personas": "Data Engineer","industry": "Technology","department": "IT","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Kevin Poskitt","speaker_companies": "SAP","speaker_titles": "Product Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AR213","title": "Scaling Enterprise AI in a Multicloud Global Organization","abstract": "Danaher, a global science and technology leader in life sciences, diagnostics and biotechnology, operates through multiple independent companies worldwide. As the organization scaled, data became fragmented across clouds, regions and systems. To unlock enterprisewide intelligence, Danaher built a multicloud, multiregion enterprise data platform on Snowflake using a data product-centric approach. Delivered with Capgemini, the platform enables secure cross-company data sharing, unified governance and AI-driven insights at scale. Today, it supports financial optimization, commercial intelligence and advanced scientific analytics, accelerating AI adoption across the enterprise.","type": "Breakout Session","date": "2026-06-01","day_name": "Monday","start_time": "03:00 PM","end_time": "03:45 PM","duration_mins": "45.0","room": "Room 210 (Moscone South, Level 2)","capacity": "101","track": "Architectures & Interoperability","session_type": "Breakout Session","location": "","topics": "Interoperability","features": "Marketplace","personas": "Data Engineer","industry": "Technology","department": "Supply Chain","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Dawid Benski | Eugene Kabanov Kabanov","speaker_companies": "CAPGEMINI | Danaher","speaker_titles": "Chief Technology Officer | Director, AI Infrastructure","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "MI203","title": "See the Light: Migrating ETL to Snowflake with SnowConvert AI ","abstract": "ETL migration is complex. In this hands-on lab, you'll migrate a real ETL pipeline to Snowflake using SnowConvert AI. We'll demonstrate an agentic workflow, automated analysis, code conversion, AI verification, plus data migration and validation \u2014 so you can see what to automate. You'll work in SnowConvert AI and leave with a migration checklist.","type": "Hands-on Lab","date": "2026-06-01","day_name": "Monday","start_time": "03:00 PM","end_time": "04:30 PM","duration_mins": "90.0","room": "Hands-on Labs 2 (Basecamp, Hall E)","capacity": "139","track": "Migrations & Modernization","session_type": "Hands-on Lab","location": "","topics": "Data Warehouse","features": "SnowConvert AI","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Andr\u00e9s Aguilar | Fernando Cardoce","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Software Engineer | Senior Product Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "GO228","title": "Sony Interactive\u2019s Blueprint for Unified Data and Catalog Federation at Scale","abstract": "Sony Interactive Entertainment (SIE) is defining a new standard for technical leadership by embracing the open, interoperable data ecosystem. This visionary session frames catalog federation not as a future goal, but as a present necessity. SIE will detail the strategic architecture that leverages Snowflake\u2019s Iceberg tables and Horizon Catalog-linked databases to ensure every table \u2014 regardless of its open format \u2014 is universally discoverable and accessible by all compute engines, with an emphasis on advanced security and governance. This comprehensive blueprint provides technical leaders with a clear, actionable path to deliver an open, innovative data platform at scale.","type": "Theater Session","date": "2026-06-01","day_name": "Monday","start_time": "03:00 PM","end_time": "03:20 PM","duration_mins": "20.0","room": "Vertical Village Theater 2 (Basecamp, South Hall B)","capacity": "150","track": "Governance & Security","session_type": "Theater Session","location": "Vertical Village","topics": "Catalogs / Discovery","features": "Apache Iceberg\u2122","personas": "Technical Executive","industry": "Media, Entertainment & Advertising","department": "IT","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Ravi Bommu | Preet Kaur","speaker_companies": "Sony Interactive Entertainment | Sony Interactive Entertainment","speaker_titles": "Principal Platform Architect | Engineering Leader, Data and AI Platform","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "PO212","title": "The Snowflake Well-Architected Framework: Designing Efficiency","abstract": "A well-architected Snowflake environment balances agility, performance, security and cost efficiency. This session introduces the Snowflake Well-Architected Framework, outlining core design pillars, lenses and implementation patterns. Learn how to assess your environment and apply prescriptive guidance to drive sustainable platform excellence.","type": "Theater Session","date": "2026-06-01","day_name": "Monday","start_time": "03:00 PM","end_time": "03:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 3 (Basecamp, South Hall C)","capacity": "150","track": "Performance & Cost Optimization","session_type": "Theater Session","location": "General Theaters","topics": "Interoperability","features": "Interactive Tables","personas": "Data Engineer","industry": "Not industry-specific","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Zaki Bajwa | Aditi Sharma","speaker_companies": "Snowflake | Accennture","speaker_titles": "VP, Solution Engineering | Managing Director, AI & Data","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "GO101","title": "Trust by Design: How Toyota Motor Europe Governs Data and AI on Snowflake","abstract": "Toyota Motor Europe reveals how it uses the Snowflake AI Data Cloud to build the disciplined, trust-first foundations needed for responsible AI. Inspired by the principle that AI is \u201c20% fun, 80% hard work,\u201d Toyota shows how strong governance with Snowflake Horizon Catalog, GDPR alignment, consent management, and EU Data and AI Act readiness are embedded into every data product. Learn how Toyota\u2019s governed data mesh and data marketplace democratize high-quality, compliant data so teams can innovate confidently and sustainably across the organization.","type": "Breakout Session","date": "2026-06-01","day_name": "Monday","start_time": "03:00 PM","end_time": "03:45 PM","duration_mins": "45.0","room": "Room 205 (Moscone South, Level 2)","capacity": "226","track": "Governance & Security","session_type": "Breakout Session","location": "","topics": "Data Mesh","features": "Apache Iceberg\u2122","personas": "Data Engineer","industry": "Not industry-specific","department": "IT","technical_level": "Introductory","delivery_method": "OnDemand","speaker_names": "Lana Kern | Thierry Martin","speaker_companies": "Toyota Germany | Toyota Motor Europe","speaker_titles": "Data & Analytics Manager | Head Of Data & AI","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DH3","title": "User Group Meetup: Japan","abstract": "Join us at the AI Hub for the Japan User Group Meetup! Connect with fellow Snowflake practitioners from across Japan. Whether you're exploring AI workloads, scaling your data platform or simply want to meet peers tackling similar challenges, this session is for you. Share experiences, discuss what's working in your environment and strengthen the bonds of the Japan Snowflake community.","type": "AI Pop Up","date": "2026-06-01","day_name": "Monday","start_time": "03:00 PM","end_time": "04:00 PM","duration_mins": "60.0","room": "AI Pop Up (Basecamp, South, Hall D)","capacity": "0","track": "","session_type": "AI Pop Up","location": "","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "","delivery_method": "","speaker_names": "Grace Fujima | Ryuta Saito","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Marketing Specialist | Head of Marketing, Japan","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "IN105","title": "Where Data Meets Innovation: Redefining Enterprise Intelligence","abstract": "Ready to move beyond dashboards and give business users answers they can trust in seconds? Join NTT DATA to see how Snowflake Cortex and Snowflake Intelligence power an enterprise-scale cognitive analytics platform that unifies structured and unstructured data, dynamically governs the semantic layer, and accelerates decision-making. You\u2019ll leave with a blueprint for democratizing analytics, lessons for deploying gen AI at scale, and practical ways to deliver faster, explainable, business-ready insights.","type": "Breakout Session","date": "2026-06-01","day_name": "Monday","start_time": "03:00 PM","end_time": "03:45 PM","duration_mins": "45.0","room": "Room 214 (Moscone South, Level 2)","capacity": "101","track": "Industry Innovation","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Snowflake Intelligence","personas": "MLOps","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Francois Beyleveld | Sean Li","speaker_companies": "NTT DATA Inc | NTT DATA","speaker_titles": "Head of Data Analytics | Solution Architecture Consultant","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "E7","title": "Trusted by Design: Scaling Enterprise AI Without Scaling Your Risk","abstract": "Enterprise AI's next frontier isn't about building smarter agents \u2014 it's about giving the ones you have a trusted foundation. dbt Labs' 2026 State of Analytics Engineering Report makes the stakes clear: 71% of data teams remain concerned about incorrect or hallucinated outputs reaching stakeholders. Organizations are accelerating. Accountability isn't keeping pace. dbt Labs' Ryan Segar argues that enterprises pulling ahead built the right foundation first. Snowflake Cortex Agents, backed by a governed, tested and semantically consistent data layer, reach their full potential \u2014 transforming AI from a promising investment into a confidently scaled competitive advantage.","type": "Executive Content","date": "2026-06-01","day_name": "Monday","start_time": "03:15 PM","end_time": "03:45 PM","duration_mins": "30.0","room": "Alpine Clubhouse Theater (Moscone South, Level 3)","capacity": "70","track": "","session_type": "Executive Content","location": "","topics": "AI Agents / Data Agents","features": "Cortex AI Functions","personas": "BI / Analyst","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Ryan Segar","speaker_companies": "dbt Labs","speaker_titles": "Chief Product Technology Officer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "GO245","title": "Banking on Uptime: Morgan Stanley Achieves Resilience at Scale with Snowflake","abstract": "In an always-on economy, resilience is nonnegotiable for mission-critical data platforms. This session explores how Snowflake delivers enterprise-grade disaster recovery and business continuity \u2014 from failover groups to account replication, client redirect, and immutable backups that safeguard against cloud outages and ransomware attacks while meeting compliance mandates. Snowflake experts will share the latest innovations in resilience and best practices, followed by a deep dive from Morgan Stanley on how they architect resilience at global scale to meet stringent regulatory, RTO and RPO requirements.","type": "Breakout Session","date": "2026-06-01","day_name": "Monday","start_time": "03:30 PM","end_time": "04:15 PM","duration_mins": "45.0","room": "Room 206 (Moscone South, Level 2)","capacity": "101","track": "Governance & Security","session_type": "Breakout Session","location": "","topics": "System Integrations / Synchronizations","features": "Other","personas": "MLOps","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Boris Serebrinskiy | Sid Ramadoss","speaker_companies": "Morgan Stanley | Snowflake","speaker_titles": "Distinguished Engineer | Staff Product Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AD205","title": "Bridging the Gap: Powering Real-Time Apps with Snowflake and Postgres","abstract": "Managing a 6 TB install base in Snowflake is ideal for analytics, but how do you serve that same data to high-performance web applications? Ericsson faced this challenge: needing to move from massive analytical queries to sub-second, small-result lookups for UI users. Enter Snowflake Postgres. This session explores how we mirror 6 TB of data using advanced data movement capabilities to bridge the gap between the Data Cloud and the application layer. Learn how we achieve rapid UI responsiveness while ensuring all application changes flow seamlessly back into Snowflake for a unified, bidirectional data ecosystem.","type": "Breakout Session","date": "2026-06-01","day_name": "Monday","start_time": "03:30 PM","end_time": "04:15 PM","duration_mins": "45.0","room": "Room 160 (Moscone South, Upper Mezzanine)","capacity": "232","track": "Application Development","session_type": "Breakout Session","location": "","topics": "System Integrations / Synchronizations","features": "Snowflake Postgres","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Brian Pace pace | Dean Soc","speaker_companies": "Snowflake | Ericsson AB","speaker_titles": "Senior Data Platform Architect, Applied Field Engineer | Software Developer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AR229","title": "Build a Unified Metadata Catalog with Iceberg in DoorDash's Lakehouse Platform","abstract": "Join us as DoorDash shares their battle-tested blueprint for turning Iceberg interoperability into a repeatable, production-grade lakehouse platform. Get insights from their real-world journey adopting Apache Iceberg as the lakehouse table format. Learn about query performance, catalog latency and data optimization, including VARIANT, deletion vectors, CDF/CDC patterns, operationalization via Snowflake catalog-linked databases and Iceberg table replication. We'll cover the \u201cgotchas\u201d of multi-engine architecture patterns, including feature parity gaps, type/schema mismatches and SQL behavior differences.","type": "Theater Session","date": "2026-06-01","day_name": "Monday","start_time": "03:30 PM","end_time": "03:50 PM","duration_mins": "20.0","room": "Builders Hub Theater (Basecamp, South Hall D)","capacity": "192","track": "Architectures & Interoperability","session_type": "Theater Session","location": "Builder's Hub Theater","topics": "System Integrations / Synchronizations","features": "Apache Polaris","personas": "Data Engineer","industry": "Technology","department": "Supply Chain","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Sergey Zavgorodni | Ruotian Wang","speaker_companies": "DoorDash | Doordash","speaker_titles": "Data architect | Software Engineer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI213","title": "Build Better Semantic Views Using Cortex Code and Glean","abstract": "This session shows how Glean, the Work AI platform, connects to Cortex Code via MCP to bring enterprise context directly into Snowflake builders\u2019 dev workflows. We cover the value of Glean and Snowflake for conversational analytics, then demo Glean\u2019s integration with Cortex Code using a finance schema spanning subscriptions, customers, invoices and MRR snapshots. We\u2019ll show how a semantic view optimizer in Cortex Code inspects DDL, searches finance SOPs and Slack via Glean, refines metrics such as active customers and churn, and then compares the original and optimized views in Snowflake Cortex Analyst.","type": "Theater Session","date": "2026-06-01","day_name": "Monday","start_time": "03:30 PM","end_time": "03:50 PM","duration_mins": "20.0","room": "Basecamp South Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "General Theaters","topics": "Snowflake Partners","features": "Cortex AI Functions","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Jess Eurich | Randy Pettus","speaker_companies": "Glean | Snowflake","speaker_titles": "Head of Partner Solutions, ISVs Glean | Principal Partner Solution Engineer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE213","title": "Context Is the New Code: AI Engineering with Snowflake Cortex AI","abstract": "As AI becomes capable of writing SQL and building data pipelines, the real bottleneck is no longer code \u2014 it\u2019s context. Many enterprise AI initiatives struggle not because the models are weak, but because they lack the business logic, definitions and operational nuance that reside within human expertise. In this session, we\u2019ll explore a practical approach to encoding both business and technical context so Snowflake Cortex AI can generate reliable, enterprise-grade data workflows. The result: AI that doesn\u2019t just write code, but operates like a true enterprise data engineer.","type": "Theater Session","date": "2026-06-01","day_name": "Monday","start_time": "03:30 PM","end_time": "03:50 PM","duration_mins": "20.0","room": "Basecamp South Theater 2 (Basecamp, South Hall A)","capacity": "150","track": "Data Engineering & Pipelines","session_type": "Theater Session","location": "General Theaters","topics": "AI Agents / Data Agents","features": "Cortex AI Functions","personas": "MLOps","industry": "Retail & Consumer Goods","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Karthik Raman | Pallavi Sharma","speaker_companies": "LTM | Snowflake","speaker_titles": "Head of Snowflake Practice | Senior Data Cloud Architect - Partners","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI210","title": "Data Governance to AI Innovation: Camden Bank ROI with Qlik and Cortex in FS AI","abstract": "Camden National Bank is launching Snowflake Cortex AI to cut insight cycles from weeks to minutes and deliver real-time customer growth insights for executives and frontline teams. But the bank started out on Snowflake with a data team of two. Learn how Camden National Bank modernized its platform using Snowflake on AWS and Qlik, using Passerelle\u2019s Data Rocket to migrate over 600 million records. Hear how it built success, including a 250% increase in analytics output, certified data marts validating 99% of enterprise data and efficiencies that freed resources and funded new analytics roles. Then, discover how Camden National Bank is operationalizing Snowflake Intelligence across the organization.","type": "Theater Session","date": "2026-06-01","day_name": "Monday","start_time": "03:30 PM","end_time": "03:50 PM","duration_mins": "20.0","room": "Vertical Village Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "BI & Analytics","session_type": "Theater Session","location": "Vertical Village","topics": "Data Warehouse","features": "Gen 2 Warehouses","personas": "BI / Analyst","industry": "Financial Services","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Josh Nash","speaker_companies": "Camden National Bank","speaker_titles": "SVP & Director of Technology & Analytics","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE212","title": "Dynamic Tables Deep Dive","abstract": "Dynamic Tables is the new default for change data and incremental processing. Join us to learn about the latest features and innovations powering Snowflake\u2019s declarative data pipelines \u2014 breaking the boundaries between batch and streaming pipelines. This session will provide an overview of Dynamic Tables and explore its key benefits, top use cases, latest improvements and newest capabilities. It will also feature a customer sharing their experience deploying Dynamic Tables and exploring the latest innovations.","type": "Breakout Session","date": "2026-06-01","day_name": "Monday","start_time": "03:30 PM","end_time": "04:15 PM","duration_mins": "45.0","room": "Room 209 (Moscone South, Level 2)","capacity": "197","track": "Data Engineering & Pipelines","session_type": "Breakout Session","location": "","topics": "System Integrations / Synchronizations","features": "Snowpipe Streaming / Dynamic Tables","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Sergey Labetsik | PD Dutta","speaker_companies": "Wind Creek Hospitality | Snowflake","speaker_titles": "Senior Data Engineer | Product Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "PO206","title": "How DTCC Created a Cultural Shift Around Proactive Visibility and Governance","abstract": "DTCC, a leading financial market infrastructure company, depends on data to support securities clearing and settlement. Managing large cloud data sets can make spend visibility and forecasting difficult. This session explains how DTCC improved insight into Snowflake usage and costs, set proactive alerts for spikes, unified data into a single view, and fostered a culture of monitoring and optimization with Capital One Slingshot. We\u2019ll share best practices and how DTCC improved unit economics across 87% of workloads.","type": "Theater Session","date": "2026-06-01","day_name": "Monday","start_time": "03:30 PM","end_time": "03:50 PM","duration_mins": "20.0","room": "Basecamp South Theater 4 (Basecamp, South Hall C)","capacity": "150","track": "Performance & Cost Optimization","session_type": "Theater Session","location": "General Theaters","topics": "Snowflake Partners","features": "Gen 2 Warehouses","personas": "Data Engineer","industry": "Financial Services","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "John Conrad | Edward Rips","speaker_companies": "Capital One Software | DTCC","speaker_titles": "Solution Architect | Associate Director Data Engineering","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI260","title": "Prophecy: Claude Code for Data Analysts?","abstract": "AI agents are transforming data prep and analysis. Instead of building workflows and dashboards manually, you now validate what agents create. In this session, we demonstrate how agentic workflows enable teams to accelerate delivery and boost productivity. Discover how Claude-powered agents empower analysts to build visual data workflows like engineers, with the strict governance and security your data platform requires.","type": "Theater Session","date": "2026-06-01","day_name": "Monday","start_time": "03:30 PM","end_time": "03:50 PM","duration_mins": "20.0","room": "Basecamp South Theater 3 (Basecamp, South Hall C)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "General Theaters","topics": "AI Agents / Data Agents","features": "Cortex AI Functions","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Nathan Tong","speaker_companies": "Prophecy","speaker_titles": "Lead Forward Deployed Engineer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "PO211","title": "Scaling to 11M Receipts Daily While Improving Margins by 30% at Fetch ","abstract": "Processing 11 million receipts per day requires both scale and efficiency. Fetch shares how they redesigned ingestion, transformation and compute strategies to reduce cost per transaction\u2014improving margins by 30%. Learn the architectural optimizations and operational guardrails that made high-throughput processing economically sustainable.","type": "Theater Session","date": "2026-06-01","day_name": "Monday","start_time": "03:30 PM","end_time": "03:50 PM","duration_mins": "20.0","room": "Vertical Village Theater 2 (Basecamp, South Hall B)","capacity": "150","track": "Performance & Cost Optimization","session_type": "Theater Session","location": "Vertical Village","topics": "Data Warehouse","features": "Gen 2 Warehouses","personas": "Data Engineer","industry": "Technology","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Ankit Gupta","speaker_companies": "Fetch Awards","speaker_titles": "VP Data","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "MI102","title": "Siemens: Scaling Enterprise Data Sharing with Snowflake","abstract": "At Siemens, we're building the future of industrial AI by enabling data sharing, discovery and consumption at scale. This session shares our journey in building the Siemens Data and AI Cloud, a unified data ecosystem powered by Snowflake with a data mesh architecture. We'll outline our strategic vision and technical foundations, explaining how federated data domains publish data as products for thousands of consumers to access trusted data. Learn how we democratize data access through the Siemens Data Cloud Marketplace, reducing time-to-value and transforming collaboration. We'll explore how this scalable, governed data-sharing approach accelerates industrial AI.","type": "Breakout Session","date": "2026-06-01","day_name": "Monday","start_time": "03:30 PM","end_time": "04:15 PM","duration_mins": "45.0","room": "Room 213 (Moscone South, Level 2)","capacity": "226","track": "Migrations & Modernization","session_type": "Breakout Session","location": "","topics": "Data Mesh","features": "Snowflake ML","personas": "Data Engineer","industry": "Manufacturing","department": "Other","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Arun Narayan | Sonia Sohanpall","speaker_companies": "Siemens | Siemens","speaker_titles": "Director Data Analytics | Head of Advanced Analytics","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AR208","title": "The Converged Enterprise: Closing the Gap Between SAP Ops and AI Intelligence","abstract": "SAP enterprises have invested billions in operational data. Most cannot activate that data for AI at scale, not because the technology is missing, but because two organizations own the problem and neither owns the seam between them. In this session, we explore why the COO/CFO and CIO/CTO divide is the real barrier to enterprise AI returns, and how the convergence of SAP Business Data Cloud and the Snowflake AI Data Cloud creates both the technical foundation and the organizational window to close it. Attendees will leave with a framework for unified governance, a model for co-funded AI data programs and a clear view of the cost of waiting.","type": "Breakout Session","date": "2026-06-01","day_name": "Monday","start_time": "03:30 PM","end_time": "04:15 PM","duration_mins": "45.0","room": "Room 215 (Moscone South, Level 2)","capacity": "226","track": "Architectures & Interoperability","session_type": "Breakout Session","location": "","topics": "System Integrations / Synchronizations","features": "Snowflake Intelligence","personas": "Product Manager","industry": "Not industry-specific","department": "Supply Chain","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Matt Florian | Elton Martins","speaker_companies": "IBM-Hakkoda | Breakthru Beverage Group","speaker_titles": "Head of SAP Hybrid Cloud Analytics | VP, Data & AI","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE111","title": "Turn Your Data into Revenue: How to Achieve Real-Time Marketing and AI","abstract": "Want more impact from your data team without adding tools, people or complexity? Learn how Fivetran Activations turns analytics-ready Snowflake data into real-time action. Operationalize trusted data for LLM workflows, power efficient go-to-market motions and personalize marketing, all without manual work. Hear how BraunAbility scaled AI across the U.S. and Europe by unifying data from multiple ERPs and Salesforce instances, simplifying their stack, accelerating integrations and empowering revenue teams with timely insights.","type": "Breakout Session","date": "2026-06-01","day_name": "Monday","start_time": "03:30 PM","end_time": "04:15 PM","duration_mins": "45.0","room": "Room 159 (Moscone South, Upper Mezzanine)","capacity": "213","track": "Data Engineering & Pipelines","session_type": "Breakout Session","location": "","topics": "Snowflake Partners","features": "Other","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Alex Hauer | Marty Goode","speaker_companies": "Fivetran | BraunAbility","speaker_titles": "Principal Product Marketing Manager | Director Global AI & Data Architecture","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AR235","title": "Unlocking Live Data at WHOOP: A CDC-Powered Lakehouse on Snowflake","abstract": "WHOOP rebuilt its CDC pipeline to deliver 2-minute Postgres-to-Snowflake freshness across thousands of tables. We'll show how Flink streams changed data into append-only Iceberg tables, with Snowflake Open Catalog and Catalog Linked Databases making every table queryable the moment it's written.","type": "Breakout Session","date": "2026-06-01","day_name": "Monday","start_time": "03:30 PM","end_time": "04:15 PM","duration_mins": "45.0","room": "Room 211 (Moscone South, Level 2)","capacity": "226","track": "Architectures & Interoperability","session_type": "Breakout Session","location": "","topics": "Catalogs / Discovery","features": "Apache Polaris","personas": "MLOps","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Dan Kilcoyne | Peter Belanger","speaker_companies": "WHOOP | WHOOP","speaker_titles": "Senior Data Engineer | Senior Manager, Data Platform","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI259","title": "Agentic Data Access: Booking.com\u2019s Agentic Travel Experience, Secured by Immuta","abstract": "AI agents are becoming top-level data consumers, and they need governed access at machine speed. In this session, Booking.com and Immuta share how Booking is extending Snowflake to support both humans and agents across structured and unstructured data in Snowflake and S3. You\u2019ll learn how policy-driven provisioning, request-based workflows and an on-behalf-of access model help scale secure, auditable access without slowing down analytics or AI innovation.","type": "Theater Session","date": "2026-06-01","day_name": "Monday","start_time": "04:00 PM","end_time": "04:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 3 (Basecamp, South Hall C)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "General Theaters","topics": "Snowflake Partners","features": "Apache Polaris","personas": "MLOps","industry": "Not industry-specific","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Steve Touw Touw | Abhro Bhaduri Bhaduri","speaker_companies": "Immuta | Booking.com","speaker_titles": "CTO | Group Product Manager Data & AI Platform","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DM210","title": "A Practical Guide to Building Marketplace Data Products","abstract": "Sharing data is harder than it should be. Permissions tell you who gets access, but they don't help people use the data effectively. For data to be truly valuable, you need to package it right. This session explores practical strategies for transforming raw data sets into compelling marketplace products. You'll learn how to bundle tables with context, create dashboards that tell a story and build assistants that understand your data. We'll cover publishing workflows for Snowflake Marketplace, real-world examples and ways to maintain control without bottlenecks. Whether sharing internally or building revenue streams via external sharing, learn to make your data valuable, not just available.","type": "Theater Session","date": "2026-06-01","day_name": "Monday","start_time": "04:00 PM","end_time": "04:20 PM","duration_mins": "20.0","room": "Builders Hub Theater (Basecamp, South Hall D)","capacity": "192","track": "Data Sharing & Marketplace","session_type": "Theater Session","location": "Builder's Hub Theater","topics": "Catalogs / Discovery","features": "Cortex Agents","personas": "Software Developer","industry": "Not industry-specific","department": "IT","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Daniel Myers Myers","speaker_companies": "Snowflake","speaker_titles": "Director, Developer Relations","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "GO203","title": "BlackRock Aladdin Powered by Snowflake, Governed by DataHub","abstract": "When BlackRock wanted to modernize Aladdin\u2019s data governance capabilities, it needed software that could scale with one of the largest platforms on Wall Street. In this fireside chat, BlackRock's Managing Director for Data Factory & Enterprise Data Platforms joins DataHub's Co-Founder & CTO to share the real story: how they evaluated and selected an enterprise data catalog, integrated it with the Aladdin Data Cloud (powered by the Snowflake Marketplace) and scaled across one of finance's most demanding systems. Whether you're driving a platform decision, architecting a governance solution or building pipelines at scale, you'll leave with concrete lessons from a team that's done it.","type": "Theater Session","date": "2026-06-01","day_name": "Monday","start_time": "04:00 PM","end_time": "04:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 2 (Basecamp, South Hall A)","capacity": "150","track": "Governance & Security","session_type": "Theater Session","location": "General Theaters","topics": "Snowflake Partners","features": "Marketplace","personas": "Data Engineer","industry": "Financial Services","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Jeff Miller","speaker_companies": "BlackRock","speaker_titles": "Managing Director","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AD210","title": "From Chaos to Consistency: Using Snowflake Cortex to Standardize Fraud Labels","abstract": "At BioCatch, confirmed fraud labels provided by customers underpin our reporting, research and machine learning models. With over 200 customers across multiple regions and languages, these labels arrive in highly varied and inconsistent forms, creating significant operational challenges. In this session, we demonstrate how we use Snowflake Cortex AI in a multistage pipeline to automatically reclassify customer-provided fraud labels into standardized taxonomies. This approach enables scalable automation, improves downstream model training and introduces objective measures of label quality to help identify and address weaknesses in customer fraud processes.","type": "Theater Session","date": "2026-06-01","day_name": "Monday","start_time": "04:00 PM","end_time": "04:20 PM","duration_mins": "20.0","room": "Vertical Village Theater 2 (Basecamp, South Hall B)","capacity": "150","track": "Application Development","session_type": "Theater Session","location": "Vertical Village","topics": "Catalogs / Discovery","features": "Cortex AI Functions","personas": "MLOps","industry": "Not industry-specific","department"
