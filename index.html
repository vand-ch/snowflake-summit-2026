ession","date": "2026-06-03","day_name": "Wednesday","start_time": "01:30 PM","end_time": "01:50 PM","duration_mins": "20.0","room": "Vertical Village Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "Vertical Village","topics": "Catalogs / Discovery","features": "Cortex AI Functions","personas": "Data Scientist","industry": "Not industry-specific","department": "Supply Chain","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Jeff Leineweber","speaker_companies": "Under Armour","speaker_titles": "Director of Data Platform Engineering","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI217","title": "Hex: Under the Hood of the World's Most Advanced AI Data Agent","abstract": "Go under the hood of what it takes to build an AI agent for real-world data analysis. Hex's Head of Product Carlos Aguilar shares lessons learned from developing an analytics agent that works across deep dive and conversational analytics. He'll break down the core challenges that cause inaccuracies and the practical system design choices that make agents reliable in production. The session closes with a candid view on evaluation and governance for analytics agents, including why there\u2019s no unit test for analytical truth and why human-in-the-loop feedback and compounding organizational context are essential for trustworthy AI in data teams.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "01:30 PM","end_time": "01:50 PM","duration_mins": "20.0","room": "Basecamp South Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "BI & Analytics","session_type": "Theater Session","location": "General Theaters","topics": "AI Agents / Data Agents","features": "Workspaces / Notebooks","personas": "Data Engineer","industry": "Financial Services","department": "Supply Chain","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Carlos Aguilar","speaker_companies": "Hex","speaker_titles": "Head of Product","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AR203","title": "How Siemens Energy Plans to Eliminate Data Copies: Iceberg, Zero-Copy, SAP BDC","abstract": "Our strategy for maximizing data value creation centers on the synergistic combination of cutting-edge technologies to build a unified data platform across the entire Siemens Energy business ecosystem. Apache Iceberg ensures governance and lakehouse agility and the data supply chain is revolutionized by zero-copy SAP integration. Come learn from Siemens' team \u2014 one of only five worldwide BDC test customers \u2014 that accessed data directly and leverages Dynamic Tables to eliminate complexity and redundant copies and democratizes access to data via \"talk to data\" with AI strategy. Learn how this architecture drastically reduces time-to-insight and secures a sustainable competitive advantage.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "01:30 PM","end_time": "02:15 PM","duration_mins": "45.0","room": "Room 205 (Moscone South, Level 2)","capacity": "226","track": "Architectures & Interoperability","session_type": "Breakout Session","location": "","topics": "Open Lakehouse","features": "Snowflake Intelligence","personas": "MLOps","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Marcel Klaetsch | Tina Klaus","speaker_companies": "Siemens Energy | INFOMOTION GmbH","speaker_titles": "Head of Data Platforms and Services | Principal Consultant","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "IN203","title": "Prep Exposure\u2011Level Advertising Data for Enterprise AI with Snowflake Cortex","abstract": "Exposure\u2011level advertising data is one of the most powerful \u2014 and most difficult \u2014 assets to operationalize analytics and AI. In this session, The Trade Desk shows how it transforms trillions of granular exposure logs into a governed, AI\u2011ready data product in Snowflake that can be used by clients, analytics teams and Snowflake Intelligence. Attendees will learn how exposure logs can be modeled, enriched and governed in Snowflake to support interactive analytics, real\u2011time inference and agent\u2011driven workflows \u2014 while maintaining enterprise\u2011grade trust, privacy and scalability.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "01:30 PM","end_time": "01:50 PM","duration_mins": "20.0","room": "Basecamp South Theater 2 (Basecamp, South Hall A)","capacity": "150","track": "Industry Innovation","session_type": "Theater Session","location": "General Theaters","topics": "Snowflake Partners","features": "Snowflake ML","personas": "MLOps","industry": "Travel & Hospitality","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Nat Kansteiner","speaker_companies": "The Trade Desk","speaker_titles": "Senior Director, Identity and Platforms","status": "Accepted","modified": "2026-05-22T17:24:52Z"},{"code": "IN101","title": "The Future of Manufacturing: Agentic Transformation","abstract": "The manufacturing industry has reached an inflection point, when AI agents can reason across plant-floor telemetry, maintenance logs and ERP systems to predict equipment failures and manage supply chain disruptions. Yet, how do organizations build a data foundation that enables agents to operate securely and autonomously across the enterprise? Learn how Eaton and United Rentals are moving beyond pilots to deploy agentic workflows. This session highlights how AI agents are being used to transform supply chains, modernize shop floors and perfect the product lifecycle to deliver high-impact business results and operational resilience.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "01:30 PM","end_time": "02:15 PM","duration_mins": "45.0","room": "Room 152 (Moscone South, Upper Mezzanine)","capacity": "204","track": "Industry Innovation","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Cortex AI Functions","personas": "Product Manager","industry": "Manufacturing","department": "Not department-specific","technical_level": "Introductory","delivery_method": "OnDemand","speaker_names": "Tim Long | Tony Leopold | Ross Schalmo","speaker_companies": "Snowflake | United Rentals | Eaton","speaker_titles": "Global Head of Manufacturing | Chief Technology and Strategy Officer | VP, Chief Data & AI Officer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "IN115","title": "The Future of Marketing: Turning Big Moments into Measurable ROI","abstract": "Super Bowl. Olympics. Global stages where millions are invested \u2014 and impact is notoriously hard to prove. In this session, hear how Viral Nation uses Snowflake to measure real-time Super Bowl performance through social sentiment and \u201cviral velocity,\u201d and how Snowflake\u2019s own marketing team quantifies the long-term brand impact of its Olympic partnership. Discover how AI in the Snowflake AI Data Cloud turns high-stakes moments into measurable outcomes \u2014 transforming prestige, attention and sponsorships into defensible ROI.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "01:30 PM","end_time": "02:15 PM","duration_mins": "45.0","room": "Room 216 (Moscone South, Level 2)","capacity": "197","track": "Industry Innovation","session_type": "Breakout Session","location": "","topics": "Snowflake Partners","features": "Snowflake Intelligence","personas": "Product Manager","industry": "Not industry-specific","department": "Sales & Marketing","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Erin Foxworthy Foxworthy | Richelle Batuigas Batuigas | Christine Okubo | Dash Desai","speaker_companies": "Snowflake | Viral Nation | Snowflake | Snowflake","speaker_titles": "Industry Principal | Executive Vice President, Data | VP, Brand Markting | Principal Developer Advocate","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DH12","title": "User Group Meetup: Women on Snowflake","abstract": "Join us at the AI Pop Up for a session hosted by Women on Snowflake and Data For Good \u2014 a space to connect and talk honestly about what it takes to grow in tech when AI is reshaping everything. We\u2019ll discuss career journeys, real experiences with AI, and how tools like Cortex Code are lowering the barrier for people who never saw themselves as technical. Access to technology shouldn\u2019t depend on where you started. Whether you\u2019re deep in data or just starting out, leave with practical perspectives, connections and a next step: your local Snowflake user group.","type": "AI Pop Up","date": "2026-06-03","day_name": "Wednesday","start_time": "01:30 PM","end_time": "02:30 PM","duration_mins": "60.0","room": "AI Pop Up (Basecamp, South, Hall D)","capacity": "0","track": "","session_type": "AI Pop Up","location": "","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "","delivery_method": "","speaker_names": "Pooja Sahu Sahu | Ana Stefanska | Ruchi Soni | Sofia Pierini","speaker_companies": "Schroders | TUI | Accenture | EY","speaker_titles": "Data Engineer | Snowflake Data Superhero, Data Team Lead | Snowflake Global Practice Lead | Data Engineer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "WN203T","title": "What's New: Swiftly Take Your Ideas to Production with Cortex Code ","abstract": "Transform your ideas into production-ready workflows faster by using the AI coding agent designed specifically for data to handle everything from admin, data engineering, machine learning and agent-building tasks. Learn how Cortex Code can simplify and automate your toughest tasks and help your team expedite time-to-value.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "01:30 PM","end_time": "01:50 PM","duration_mins": "20.0","room": "Builders Hub Theater (Basecamp, South Hall D)","capacity": "192","track": "What's New in Snowflake","session_type": "Theater Session","location": "Builder's Hub Theater","topics": "AI Agents / Data Agents","features": "Cortex Code","personas": "MLOps","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "OnDemand","speaker_names": "Aria Attar Attar | Alan Yu","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Sr. Product Manager | Staff Product Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AD208","title": "Your Data Platform Is Now Your App Platform: 300% ROI with Snowflake, Sigma, dbt","abstract": "Building customer applications used to require buying and maintaining an entire application stack \u2014 cost, complexity and technical debt included. Lumelight, a national employee benefits firm, skipped all of that. Working with Coastal, Lumelight used Snowflake, Sigma and dbt to turn its own claims and reporting data into two revenue-generating applications, delivering 300% ROI. In this session, see how they built it and how you can turn your own data into a product your customers will pay for.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "01:30 PM","end_time": "01:50 PM","duration_mins": "20.0","room": "Basecamp South Theater 3 (Basecamp, South Hall C)","capacity": "150","track": "Application Development","session_type": "Theater Session","location": "General Theaters","topics": "Snowflake Partners","features": "Snowflake Intelligence","personas": "Product Manager","industry": "Technology","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Jesse King | Ben Hardin","speaker_companies": "Lumelight | Coastal","speaker_titles": "Chief Operating Officer | Data Architect","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AR232","title": "Building an Interoperable Lakehouse with Snowflake Horizon and Cortex Code","abstract": "Multiple engines and catalogs make governance hard and AI\u2011ready data even harder. In this session, we will show how to use Snowflake Horizon and Cortex Code to build an interoperable lakehouse that is secure, well-governed and easy to extend. We will start by designing Iceberg-based lakehouse, then use Horizon to centralize discovery and policy enforcement across engines. On top of this governed foundation, we will introduce Cortex Code as the developer copilot that generates and refactors the data lake objects. Attendees will leave with patterns and code templates to operationalize an interoperable data lake on Snowflake.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "02:00 PM","end_time": "02:20 PM","duration_mins": "20.0","room": "Builders Hub Theater (Basecamp, South Hall D)","capacity": "192","track": "Architectures & Interoperability","session_type": "Theater Session","location": "Builder's Hub Theater","topics": "Catalogs / Discovery","features": "Apache Spark\u2122","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Piotr Paczewski | Frans van Dortmont","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Solutions Architect | Sr. Solution Architect","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI249","title": "Building Context-Aware Agents with Snowflake and Google Cloud Vertex AI","abstract": "In the race to deploy generative AI, the biggest hurdle isn't the model \u2014 it\u2019s the context. Accessing data in the Snowflake AI Data Cloud is often blocked by security silos and complex pipelines, but the seamless integration between Snowflake and Google Cloud eliminates this barrier. Join our session to explore the synergy of Snowflake\u2019s governed data and Google\u2019s Gemini models on Vertex AI. We will use our Quickstart integration to demonstrate secure data flows for context-aware AI agents capable of nuanced reasoning over your enterprise data. This session delivers a proven blueprint to advance from AI experimentation to production-grade intelligence, without the architectural overhead.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "02:00 PM","end_time": "02:45 PM","duration_mins": "45.0","room": "Room 209 (Moscone South, Level 2)","capacity": "197","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "Snowflake Partners","features": "Gen 2 Warehouses","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Don Tirsell","speaker_companies": "Google","speaker_titles": "Head of Global Partnerships","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI216","title": "Context at Scale: Building Workflows and Bringing Them to Life With Hex and Ramp","abstract": "Context management bridges the gap between evolving business logic and real-time answers. Keeping that layer fresh is what makes AI reliable at scale. Hex and Ramp explore what managing context looks like in an AI-driven world. Ramp will share how they build and maintain their context layer using Context Studio and CLI, turning data from something analysts produce into something everyone can access. You'll leave with a framework for treating context as a living system that gets more reliable with every interaction.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "02:00 PM","end_time": "02:45 PM","duration_mins": "45.0","room": "Room 211 (Moscone South, Level 2)","capacity": "226","track": "BI & Analytics","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Workspaces / Notebooks","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Barry McCardel | Ricky Meyers","speaker_companies": "Hex | Ramp","speaker_titles": "CEO, Co-Founder | Product Data Scientist","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI209","title": "DaaS on Snowflake: Designing for Scale, Governance and Decision Intelligence","abstract": "As analytics adoption within Comcast Supply Chain scaled from hundreds to more than 1,000 users, traditional data products revealed limitations in reuse, consistency and governance. We implemented data as a service (DaaS) on Snowflake, enabling governed, scalable data consumption across a diverse user base. We walk through the architecture, operating model and lessons learned, showing how DaaS provides a resilient foundation for intelligent decision workflows and future agent-based capabilities \u2014 while maintaining flexibility, trust and strong governance.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "02:00 PM","end_time": "02:45 PM","duration_mins": "45.0","room": "Room 206 (Moscone South, Level 2)","capacity": "101","track": "BI & Analytics","session_type": "Breakout Session","location": "","topics": "Catalogs / Discovery","features": "Cortex AI Functions","personas": "Data Engineer","industry": "Telecom","department": "Supply Chain","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Bonny Joy","speaker_companies": "Comcast","speaker_titles": "Director Analytics & BI","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI277","title": "Enterprise Orchestration: Building Multi-Persona Agents via MCP and Snowflake","abstract": "Snowflake is using AI agents to connect systems, automate workflows and deliver seamless employee experiences across the enterprise. In this session, we showcase internal use cases like our HR assistant, built on Snowflake to provide conversational access to governed data and orchestrate cross-functional processes. We\u2019ll break down the architecture and patterns behind these systems \u2014 and how you can apply them to eliminate silos and unify operations.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "02:00 PM","end_time": "02:20 PM","duration_mins": "20.0","room": "Vertical Village Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "Vertical Village","topics": "System Integrations / Synchronizations","features": "Cortex Code","personas": "Data Engineer","industry": "Not industry-specific","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Sridhar Kalaga Kalaga | Hamin Oh","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Director, Enterprise AI Applications | Director, Data, Analytics and AI","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE108","title": "Golden Records: AI-Ready Data Products with Snowflake Native Apps","abstract": "Master data management (MDM) is the missing link between Medallion lakehouses and reliable AI/BI outcomes. In this session, you\u2019ll see how Semarchy runs as a Snowflake Native App to unify trusted golden records directly in the Snowflake AI Data Cloud \u2014 with no egress costs and no extra infrastructure. We\u2019ll walk through an end-to-end certification design pattern to: Ingest and match, choose field survivorship, workflow-driven stewardship and publishing of governed data products. We\u2019ll also cover hybrid patterns that support both analytical and transactional needs using Snowflake Hybrid Tables and Snowflake Postgres.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "02:00 PM","end_time": "02:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 2 (Basecamp, South Hall A)","capacity": "150","track": "Data Engineering & Pipelines","session_type": "Theater Session","location": "General Theaters","topics": "IT Operations","features": "Snowflake Postgres","personas": "Data Engineer","industry": "Not industry-specific","department": "Operations","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Benny Garner","speaker_companies": "Semarchy","speaker_titles": "Solutions Consultant Architect","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DM102","title": "How Amperity Helped the Seahawks Build a Unified Fan Identity in Three Minutes","abstract": "The Seattle Seahawks couldn't identify their highest-value fans. Fan identity was limited to email addresses, ticket data was siloed to single-game purchases, and there was no way to connect across departments. By building a unified fan data ecosystem on Amperity, the Seahawks replaced fragmented profiles with rich fan views, including lifetime value scores, top-fan segmentation and passholder flags. Snowflake Bridge cut data sharing to three minutes with automatic daily updates. The outcome: 5,000 previously unidentifiable fans, now fully visible and reachable. Hear what this means for your own fan and customer data strategy.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "02:00 PM","end_time": "02:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 3 (Basecamp, South Hall C)","capacity": "150","track": "Data Sharing & Marketplace","session_type": "Theater Session","location": "General Theaters","topics": "Snowflake Partners","features": "Marketplace","personas": "Data Engineer","industry": "Travel & Hospitality","department": "IT","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Marcus Owens","speaker_companies": "Amperity","speaker_titles": "Lead Solutions Consultant","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "MI211","title": "How Jotun Built a Governed Data Foundation on Snowflake and Informatica","abstract": "Global paint provider Jotun operates 40 factories, serving 100+ countries, all while navigating complex regulatory requirements. Faced with a rigid on-premises data environment and fragmented data governance, Jotun chose to modernize data management to Informatica and data warehouse from SQL to Snowflake. The result? A centralized, governed data hub that unified compliance reporting and unlocked self-serve data access for teams globally. In this session, learn how Informatica's broad platform integrations for Snowflake \u2014 spanning data cataloging, lineage and AI-powered governance \u2014 are powering Jotun's next chapter: becoming a data-driven, AI-ready enterprise.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "02:00 PM","end_time": "02:20 PM","duration_mins": "20.0","room": "Vertical Village Theater 2 (Basecamp, South Hall B)","capacity": "150","track": "Migrations & Modernization","session_type": "Theater Session","location": "Vertical Village","topics": "Data Warehouse","features": "Other","personas": "Data Engineer","industry": "Healthcare and Life Sciences","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Bill Voyiatzis","speaker_companies": "Informatica from Salesforce","speaker_titles": "Sales Director - Informatica","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "MI302","title": "Migration of Legacy Platforms to Snowflake Through AI-Led Automation","abstract": "Modernizing legacy data platforms is often slow, risky and expensive. In this session, learn how the DE.AI Modernization Factory approach automates assessment, code conversion and migration of legacy data estates to the Snowflake AI Data Cloud. Discover how AI-led automation, Snowflake Cortex AI capabilities and Infosys accelerators enable faster migrations, reduce manual effort and deliver scalable, verifiable business outcomes. Think of it as a standardized modernization factory for automated inventory, conversion, validation and FinOps guardrails.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "02:00 PM","end_time": "02:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Migrations & Modernization","session_type": "Theater Session","location": "General Theaters","topics": "AI Agents / Data Agents","features": "SnowConvert AI","personas": "MLOps","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Advanced","delivery_method": "Live","speaker_names": "Dhanus Kodi Paulraj | Vikas Agarwal","speaker_companies": "Infosys Ltd | Citizens Financial Group","speaker_titles": "Principal Technology Architect Data & AI | SVP - Head of Data Platforms","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "E3","title": "The C-Suite AI Mandate: The Executive Blueprint for Organizational Success","abstract": "We are in a period of seismic change that is fundamentally redefining the nature of work and enterprise leadership. For the C-suite, AI is no longer a technical roadmap item; it is a strategic reset of the entire business engine. This cross-vertical panel of executives explores the transition from defensive risk management to high-velocity value creation. Key areas of focus will be on how organizations can scale AI adoption, lean in on transformation, build a more enabled workforce and capture business value.","type": "Executive Content","date": "2026-06-03","day_name": "Wednesday","start_time": "02:00 PM","end_time": "02:30 PM","duration_mins": "30.0","room": "Alpine Clubhouse Theater (Moscone South, Level 3)","capacity": "70","track": "","session_type": "Executive Content","location": "","topics": "AI Agents / Data Agents","features": "","personas": "","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Diane Brady | Makenna Ralston | Denise Persson","speaker_companies": "Fortune | CommBank iQ | Snowflake","speaker_titles": "Executive Editorial Director | Chief Executive Officer, CommBank iQ | (CMO) Chief Marketing Officer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AD302","title": "Under the Hood of Snowflake Hybrid Tables","abstract": "Peek under the hood to learn how hybrid table architecture delivers mission-critical performance and reliability for your applications while reducing build time and complexity through full native Snowflake database integration. We also dive into recent optimizations that have delivered a 10x improvement in transactional workload performance.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "02:00 PM","end_time": "02:45 PM","duration_mins": "45.0","room": "Room 213 (Moscone South, Level 2)","capacity": "226","track": "Application Development","session_type": "Breakout Session","location": "","topics": "Data Warehouse","features": "Hybrid Tables","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Advanced","delivery_method": "Live","speaker_names": "Josh Slocum | Nikos Katsipoulakis","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Principal Software Engineer | Principal Software Engineer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "GO217","title": "Using the Org Account to Protect Data Products in the Internal Marketplace","abstract": "Sharing data internally doesn\u2019t compromise on security or speed. This session showcases a hands-on approach to protecting sensitive data products using Snowflake Organization User Groups. We\u2019ll show how centralized governance via the organization account can be pushed down to local accounts seamlessly and how to use this to protect your sensitive data. Learn how to architect row-access and masking policies that reference org-level groups, ensuring consistent protection across your entire data mesh to automate data privacy and scale your internal marketplace with confidence.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "02:00 PM","end_time": "02:45 PM","duration_mins": "45.0","room": "Room 215 (Moscone South, Level 2)","capacity": "226","track": "Governance & Security","session_type": "Breakout Session","location": "","topics": "Catalogs / Discovery","features": "Other","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Matthias Nicola | Nicole Vollmer","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Field CTO | Solution Architect","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "WN205T","title": "What's New: Simplify Warehouse Management with Snowflake Compute Capabilities","abstract": "Experience the next generation of the Snowflake engine as it evolves into a single, adaptive compute layer. This session explores how this unified architecture drives price performance, delivering the latest hardware and software innovation to run more queries for the same cost with operational ease and lower TCO. Discover how Interactive tables and warehouses eliminate manual tuning for sub-second, high-concurrency analytics, and how Snowpipe Streaming and CDC simplify production-ready pipelines \u2014 all with the ease and zero operational overhead of a fully managed platform.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "02:00 PM","end_time": "02:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 4 (Basecamp, South Hall C)","capacity": "150","track": "What's New in Snowflake","session_type": "Theater Session","location": "General Theaters","topics": "Data Warehouse","features": "Gen 2 Warehouses","personas": "Product Manager","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Anoop Gupta","speaker_companies": "Snowflake","speaker_titles": "Software Engineering Director","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "WN212B","title": "What's New:\u00a0Unify Your Lakehouse with Snowflake Simple Interoperability","abstract": "Pipeline sprawl and unnecessary data movement are the hidden taxes to your AI innovation. Discover how Snowflake\u2019s platform empowers you to work from a single governed copy of data, wherever it lives. Built on native support for Apache Polaris\u2122 and Apache Iceberg\u2122, this session explores how to power new use cases with Iceberg V3 support and virtually eliminate storage complexity with Snowflake Storage, all without vendor lock-in. We'll also cover strategies to reduce governance and security risks by building a metadata-driven universal governance model to fuel human and agentic intelligence with access to governed, live data.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "02:00 PM","end_time": "02:45 PM","duration_mins": "45.0","room": "Room 160 (Moscone South, Upper Mezzanine)","capacity": "232","track": "What's New in Snowflake","session_type": "Breakout Session","location": "","topics": "Catalogs / Discovery","features": "Apache Polaris","personas": "Data Engineer","industry": "Not industry-specific","department": "R&D","technical_level": "Introductory","delivery_method": "OnDemand","speaker_names": "Kaushal Jain | Scott Teal | Ashwin Kamath | Todd Greenstein","speaker_companies": "Snowflake | Snowflake | Snowflake | Snowflake","speaker_titles": "Senior Product Manager | Product Manager | Staff Product Manager | Product Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE240","title": "A Sure Bet: Openflow, Entain\u2019s Blueprint for Data Ingestion","abstract": "Learn how Entain leverages Openflow connectors to simplify their ingestion stack, reduce operational overhead, and achieve reliable, governed data delivery from multiple source systems into Snowflake. This session covers how a global enterprise can deploy a combination of Snowflake Openflow connectors plus self-developed connectors to power custom flows, resulting in increased acceleration of business critical AI/ML and personalization use cases.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "02:30 PM","end_time": "03:15 PM","duration_mins": "45.0","room": "Room 205 (Moscone South, Level 2)","capacity": "226","track": "Data Engineering & Pipelines","session_type": "Breakout Session","location": "","topics": "Interoperability","features": "Snowflake Openflow","personas": "Data Engineer","industry": "Media, Entertainment & Advertising","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Dev Bhalla | Vyas Chintakunta","speaker_companies": "Entain | Entain","speaker_titles": "Global Head of Data & BI | Global Head of Data Engineering","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "ML302","title": "Best Practices for Enterprise-Ready MLOps with Snowflake","abstract": "In this session we'll dive deep on best practices for managing enterprise-ready machine learning pipelines at scale in Snowflake. We'll cover the orchestration of training and inference workflows, model lifecycle management, administrative best practices, RBAC models, CI/CD pipelines and more. January Technologies will share how it used these tools to take its machine learning projects from experimentation to deployment.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "02:30 PM","end_time": "02:50 PM","duration_mins": "20.0","room": "Builders Hub Theater (Basecamp, South Hall D)","capacity": "192","track": "Machine Learning","session_type": "Theater Session","location": "Builder's Hub Theater","topics": "MLOps","features": "Cortex Code","personas": "MLOps","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Advanced","delivery_method": "OnDemand","speaker_names": "Allie Feras | Thomas Brink","speaker_companies": "Snowflake | January","speaker_titles": "ML Architect - Applied Field Engineering | Senior Data Scientist, Machine Learning","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "PO105","title": "Capital One Software: Using Context and AI for Cost Optimization and Security","abstract": "Managing data systems at scale often leads to hidden inefficiencies and risks that can impact business performance. Capital One will share research on how to leverage context-aware AI to drive significant cost savings compared to manual optimization and strengthen data security posture of large-scale systems. Attendees will gain actionable insights into the role and impact of context on data cloud optimization and security.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "02:30 PM","end_time": "03:15 PM","duration_mins": "45.0","room": "Room 210 (Moscone South, Level 2)","capacity": "101","track": "Performance & Cost Optimization","session_type": "Breakout Session","location": "","topics": "Observability","features": "Other","personas": "Data Engineer","industry": "Not industry-specific","department": "Operations","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Jeff Chou","speaker_companies": "Capital One Software","speaker_titles": "VP of AI and Head of Product","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI204","title": "Deliver Reliable, Explainable, Traceable Agents with dbt","abstract": "Agents can generate outputs in seconds, but without visibility into their reasoning, data sources and logic, teams can't trust them in production. This session shows how dbt powers trusted Cortex Agents through a governed context layer and high-precision retrieval \u2014 ensuring agents start from the right models and metrics, cite their sources, align to approved definitions and fail safely when context is unavailable. Using dbt agent workflows, you can deploy autonomous agents with traceable, reviewable outputs. Leave with a practical framework for moving from agent demos to production-ready deployments you can trust.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "02:30 PM","end_time": "02:50 PM","duration_mins": "20.0","room": "Vertical Village Theater 2 (Basecamp, South Hall B)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "Vertical Village","topics": "Interoperability","features": "Snowflake Intelligence","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Chakshu Mehta | Sam Ferguson","speaker_companies": "dbt Labs | dbt Labs","speaker_titles": "Staff Product Marketing Manager | Staff Product Designer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "MI104","title": "End\u2011to\u2011End Data Management for Snowflake: From Design to Delivered Value","abstract": "Most organizations don\u2019t struggle with data \u2014 they struggle with the upstream work required to make data usable. This session shows how to close the gaps between design-before-ingest, modeling, pipeline construction, governance and productization so what enters Snowflake is already clean, structured and aligned to business meaning. You\u2019ll learn how to streamline the flow from upstream definition to downstream consumption, automate delivery of governed data products, and gain visibility into performance, cost and usage so Snowflake runs as cleanly as the pipelines feeding it.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "02:30 PM","end_time": "02:50 PM","duration_mins": "20.0","room": "Basecamp South Theater 3 (Basecamp, South Hall C)","capacity": "150","track": "Migrations & Modernization","session_type": "Theater Session","location": "General Theaters","topics": "Catalogs / Discovery","features": "Marketplace","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Mark Gowdy","speaker_companies": "Quest Software","speaker_titles": "Chief Partner Technologist","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "E27","title": "Executive Industry Summit Tour \u2014 Healthcare and Life Sciences","abstract": "Join an exclusive, guided tour of the Snowflake AI Data Cloud and its premier partner ecosystem, tailored for leaders in healthcare and life sciences. This immersive experience will take you through five curated stops that showcase the art of the possible \u2014 real-world solutions, cutting-edge AI use cases and data-driven innovations transforming your industry today. Gain direct access to experts, see industry-leading technology in action and leave with actionable inspiration to accelerate your data strategy. Space is extremely limited \u2014 registration is first come, first served. Please note that this experience includes walking between stops; comfortable footwear is recommended. Please note that the Executive Booth Tours are reserved for customers only \u2014 we kindly ask our partners not to register.","type": "Executive Content","date": "2026-06-03","day_name": "Wednesday","start_time": "02:30 PM","end_time": "04:00 PM","duration_mins": "90.0","room": "Vertical Village (Basecamp, South Hall B)","capacity": "15","track": "","session_type": "Executive Content","location": "","topics": "","features": "","personas": "","industry": "Financial Services","department": "","technical_level": "","delivery_method": "","speaker_names": "","speaker_companies": "","speaker_titles": "","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "IN221","title": "From Legacy to AI-Ready: Public Sector Data Modernization Panel","abstract": "In the era of AI, modernizing data is now a mission-critical imperative. While moving off legacy systems is challenging, it is a necessity to improve efficiency, reduce costs and accelerate mission outcomes. In this session, public sector leaders share how they are building a cloud-native, organizational data strategy with a secure and governed foundation. Discover how these modern architectures enable better decision-making and cross-agency collaboration. We will move beyond the \"why\" to the \"how,\" providing a roadmap to transform technical debt into a scalable runway for future generative AI and agentic initiatives.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "02:30 PM","end_time": "03:15 PM","duration_mins": "45.0","room": "Room 151 (Moscone South, Upper Mezzanine)","capacity": "204","track": "Industry Innovation","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Snowflake ML","personas": "Business Executive","industry": "Public Sector","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Daniel Sklar | James Ferguson | Erica Reuter | Soumya Kalra Kalra","speaker_companies": "Georgia Department of Community Health | Met Office | Snowflake | City and County of San Francisco (DataSF)","speaker_titles": "Program Manager | Principal Architect | RVP, US PubSec Solutions Engineers | Chief Data Officer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DM206","title": "How JPMC Built a Self-Service, Interoperable Data Ecosystem with Snowflake","abstract": "Faced with the challenge of scaling data access across six major lines of business, from consumer and community banking to asset and wealth management, JPMC leveraged Snowflake's secure sharing and governance capabilities to build a collaborative data ecosystem and drive insights across the entire enterprise. This session discusses how to establish a secure, private and thriving data ecosystem to achieve enterprise-wide interoperability by standardizing on open formats, accelerate data discovery and delivery for AI and analytics, and enable a self-service, curated data platform, significantly reducing time to insight for data collaborators across LOBs.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "02:30 PM","end_time": "03:15 PM","duration_mins": "45.0","room": "Room 208 (Moscone South, Level 2)","capacity": "197","track": "Data Sharing & Marketplace","session_type": "Breakout Session","location": "","topics": "Snowflake Partners","features": "Semantic Views","personas": "Data Engineer","industry": "Not industry-specific","department": "Operations","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Shobhit Gupta Gupta | El Diawlol","speaker_companies": "Snowflake | JPMorgan Chase","speaker_titles": "Product Leader | Executive Director AI & Machine Learning","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DM208","title": "How Nokia Turns Telecom Data into Shareable Analytical Products on Snowflake","abstract": "Discover how Nokia transforms siloed telecom data \u2014 CDRs, network telemetry, and subscriber KPIs \u2014 into governed, shareable analytical data products on Snowflake. Learn how they use Secure Data Sharing and Native Apps to deliver real-time insights directly into operator environments without data movement and enable CSPs to query complex telecom data through shared semantic models. See how Nokia's architecture turns static network data sets into interactive, AI-enriched tools that service providers can operationalize immediately.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "02:30 PM","end_time": "02:50 PM","duration_mins": "20.0","room": "Vertical Village Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Data Sharing & Marketplace","session_type": "Theater Session","location": "Vertical Village","topics": "Catalogs / Discovery","features": "Cortex AI Functions","personas": "Marketing Practitioner","industry": "Telecom","department": "R&D","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Kemal Parlar | Luciano Hara","speaker_companies": "Nokia | Nokia","speaker_titles": "Sales Director, Analytics | Technical Sales Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AR204","title": "How Truist Is Building the Data Foundation That Makes Cortex AI Possible","abstract": "In a regulated bank, AI is only as reliable as the data feeding it. Truist is building that foundation on Snowflake with Ataccama, starting with FDIC regulatory reporting, and embedding a data trust layer into the Snowflake medallion architecture. Now they're expanding further, migrating more of their data estate into Snowflake, rolling the architecture across additional regulatory programs, and building toward the point where Cortex AI runs on data they already trust. Their team shares what they built, where they're taking it and what any regulated institution needs to prioritize to get there.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "02:30 PM","end_time": "03:15 PM","duration_mins": "45.0","room": "Room 212 (Moscone South, Level 2)","capacity": "101","track": "Architectures & Interoperability","session_type": "Breakout Session","location": "","topics": "Data Warehouse","features": "Cortex AI Functions","personas": "Data Engineer","industry": "Technology","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Anish Abraham | Jessie Smith","speaker_companies": "Truist | Ataccama","speaker_titles": "Head of Data Management | VP of Product Management","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "IN114","title": "Scaling AI in Manufacturing: Executive Panel","abstract": "The AI conversation in manufacturing has shifted from \"if\" to \"how fast.\" This executive panel explores how industry giants leverage Snowflake to move beyond experimental pilots into scalable, production-ready AI. Core discussion pillars: Value realization: Moving past the \"pilot trap\" and aligning AI initiatives with core business KPIs. Unified data architecture: Consolidating IT/OT/IoT data for real-time operational transparency. Trust and governance: Upskilling the workforce and establishing governance to balance automation with human oversight. Join us to ensure your industry 4.0 roadmap transforms data and AI into a competitive advantage.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "02:30 PM","end_time": "03:15 PM","duration_mins": "45.0","room": "Room 152 (Moscone South, Upper Mezzanine)","capacity": "204","track": "Industry Innovation","session_type": "Breakout Session","location": "","topics": "Interoperability","features": "Cortex Code","personas": "Product Manager","industry": "Manufacturing","department": "Not department-specific","technical_level": "Introductory","delivery_method": "OnDemand","speaker_names": "Unni Velayudhan | Tim Long | Thierry Martin | Vishwa Ram","speaker_companies": "Wolfspeed | Snowflake | Toyota Motor Europe | Penske Logistics","speaker_titles": "Sr Director - Data and Enterprise AI | Global Head of Manufacturing | Head Of Data & AI | VP Data & AI","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "MI101","title": "Smarter Modernization: How SnowConvert AI Is Redefining Migration to Snowflake","abstract": "Over the past year, SnowConvert AI has transformed from a code translation tool into a fully intelligent modernization engine. In this session, the SnowConvert AI team reveals what\u2019s new: deeper AI integration, support for partial and incremental migrations, smarter schema mapping, and a completely reimagined user experience designed for speed and transparency. Learn how these innovations make migrations to Snowflake faster, more flexible and more predictable than ever before \u2014 helping organizations modernize with confidence and unlock the full power of the Snowflake Data Cloud.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "02:30 PM","end_time": "02:50 PM","duration_mins": "20.0","room": "Basecamp South Theater 2 (Basecamp, South Hall A)","capacity": "150","track": "Migrations & Modernization","session_type": "Theater Session","location": "General Theaters","topics": "System Integrations / Synchronizations","features": "Cortex Code","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Federico Zoufaly Boldrini | Venky Ganti","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Director, Migrations & Modernizations | Sr. Director Product Management","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI237","title": "Trusted Agents: Delivering Reliable Data and AI Systems at Scale","abstract": "In 2026, data and AI leaders will be measured by the success of AI initiatives. So how can teams move beyond failing pilots and toward reliable, production-grade AI at scale? In this session, Barr Moses, CEO and Co-Founder of Monte Carlo, will explore how enterprise teams should monitor the most critical components of agents \u2014 inputs, operational metrics and outputs \u2014 to ensure they\u2019re trusted and well adopted. Attendees will learn best practices for operationalizing data and AI observability and leveraging Snowflake as a critical nexus to close the loop between data inputs and AI outputs.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "02:30 PM","end_time": "02:50 PM","duration_mins": "20.0","room": "Basecamp South Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "General Theaters","topics": "AI Agents / Data Agents","features": "Cortex Agents","personas": "MLOps","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Barr Moses","speaker_companies": "Monte Carlo","speaker_titles": "CEO & Co-founder","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "WN214T","title": "What's New: Agentic ML in Snowflake","abstract": "Learn how the latest agentic capabilities in Snowflake ML accelerate productivity for your ML teams. Join us for new feature overviews and a live demo showcasing our latest innovations.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "02:30 PM","end_time": "02:50 PM","duration_mins": "20.0","room": "Basecamp South Theater 4 (Basecamp, South Hall C)","capacity": "150","track": "What's New in Snowflake","session_type": "Theater Session","location": "General Theaters","topics": "AI Agents / Data Agents","features": "Cortex Code","personas": "MLOps","industry": "Not industry-specific","department": "R&D","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Pavan Pothukuchi | Jeffrey Geevarghese","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Director, Product Management | Sr Engineering Manager, AI/ML Platforms","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "WN204B","title": "What\u2019s New: Zero to a Trusted Semantic Layer in Snowflake","abstract": "Stop struggling with fragmented logic and start building a trusted data foundation in minutes. Join us to see how easy it is to create Snowflake Semantic Views that turn raw data into governed, actionable insights. We\u2019ll demonstrate how our connected ecosystem allows your business logic to flow seamlessly from your data cloud to your AI agents and BI tools. This session also features a live demo of our latest \"easy-to-build\" semantic innovations.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "02:30 PM","end_time": "03:15 PM","duration_mins": "45.0","room": "Room 158 (Moscone South, Upper Mezzanine)","capacity": "583","track": "What's New in Snowflake","session_type": "Breakout Session","location": "","topics": "Other","features": "Semantic Views","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "OnDemand","speaker_names": "Abhinav Vadrevu | Josh Klahr","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Product Management | Director of Product Management","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DM105","title": "$14T+ Asset Manager's Data Transformation: BlackRock's Golden Source Strategy","abstract": "Data is the lifeblood of modern finance. For BlackRock, which manages over $14 trillion in assets, high-fidelity data is the foundation of its Aladdin platform. To centralize and distribute massive third-party data sets, BlackRock has engineered the Aladdin Data Factory to govern thousands of complex incoming feeds. By leveraging Snowflake\u2019s data-sharing capabilities, BlackRock maintains an elite ecosystem of automated pipelines, metadata management and granular entitlements, delivering \"intelligence as a service\" to both internal teams and global clients.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "03:00 PM","end_time": "03:20 PM","duration_mins": "20.0","room": "Vertical Village Theater 2 (Basecamp, South Hall B)","capacity": "150","track": "Data Sharing & Marketplace","session_type": "Theater Session","location": "Vertical Village","topics": "Catalogs / Discovery","features": "Marketplace","personas": "Data Engineer","industry": "Not industry-specific","department": "Operations","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Subin Menon","speaker_companies": "Blackrock","speaker_titles": "Global Head Data Products&3rd Party Data","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "GO212","title": "20-Minute Threat Hunt: Building and Deploying a Cybersecurity Agent with Cortex","abstract": "Stop building custom data pipelines for AI. Start solving threats in minutes. This session covers the end-to-end process to rapidly deploy a production-ready, investigative generative AI agent for cybersecurity using Snowflake Intelligence: Unifying security logs (access, audit, vulns) Using Semantic Views to apply governance and context with Snowflake Horizon Catalog Configuring the agent with specialized tools like Cortex Analyst (for structured data queries) and Cortex Search (for unstructured threat intelligence) See a live demo of the agent performing a complex threat hunt, all running securely inside your security perimeter.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "03:00 PM","end_time": "03:20 PM","duration_mins": "20.0","room": "Builders Hub Theater (Basecamp, South Hall D)","capacity": "192","track": "Governance & Security","session_type": "Theater Session","location": "Builder's Hub Theater","topics": "Catalogs / Discovery","features": "Cortex AI Functions","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Vince luongo | Jake Berkowsky","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Cybersecurity Architect | Applied Cybersecurity And Observability","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI245","title": "Beyond Chat: Activating Snowflake Cortex Agents for Enterprise Productivity","abstract": "Is your AI stuck in a chat box? To drive real ROI, Snowflake Cortex Agents must be governed and integrated into your broader business processes. This session introduces the Boomi Agent Control Tower, the central hub for managing agents from Snowflake, Bedrock and beyond. Learn how to fuel agents with real-time data and business context for maximum accuracy; move from \"passive assistants\" to \"active workflows\" that trigger tasks in Salesforce, SAP and others; and sync Cortex Agents into a multiprovider governance plane for agent trust. Ready to move from isolated bots to a high-performing, governed agentic workforce that turns Snowflake data into enterprise impact? Join us.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "03:00 PM","end_time": "03:45 PM","duration_mins": "45.0","room": "Room 213 (Moscone South, Level 2)","capacity": "226","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "Snowflake Partners","features": "Other","personas": "MLOps","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Amy McNee","speaker_companies": "Boomi","speaker_titles": "SVP Solution Engineering and Data Management GTM","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DM207","title": "Beyond Customer 360: Extending Identity for Clean Room Collaboration","abstract": "Join us in exploring this unprecedented session on how Kargo leverages Snowflake Data Clean Rooms and TransUnion\u2019s identity resolution to deliver high-quality, privacy-centric ad segments for publishers and retail media networks. By bringing together publisher IP/MAID data and TransUnion identity with marketing attributes inside Snowflake\u2019s multiparty clean room, Kargo runs more secure, policy-enforced three-way joins that minimize the risk of PII exposure. Attendees will learn how multiparty clean rooms with data access policies and identity enrichment drive improved match rates and benefit from minimal data movement and more efficient ad targeting across the ecosystem.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "03:00 PM","end_time": "03:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Data Sharing & Marketplace","session_type": "Theater Session","location": "General Theaters","topics": "AI Agents / Data Agents","features": "Data Clean Rooms","personas": "Data Engineer","industry": "Travel & Hospitality","department": "Sales & Marketing","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Don Black | Diana Koshy","speaker_companies": "TransUnion | Kargo","speaker_titles": "Sr. Director, TruAudience Identity | Sr. Director of Data Engineering","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI219","title": "Cortex Code for Full Lifecycle Development","abstract": "Cortex Code is superb for \"help me build a Snowflake object.\" In this session, we prove that Cortex Code enables data engineers to achieve a true 50% or more improvement every day; show how it works with DataOps.live's Metis capabilities to extend the ask to \"help me deliver something into production\"; and demonstrate how, with the right tooling and workflow around Cortex Code, productivity can improve by 400%. We demonstrate building and deploying complete applications and data products onto Snowflake, all the way into production, covering development, QA and production. We'll also show how debugging, troubleshooting and bug fixing become trivial with Cortex Code and DataOps.live.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "03:00 PM","end_time": "03:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 2 (Basecamp, South Hall A)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "General Theaters","topics": "AI Agents / Data Agents","features": "Cortex Code","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Guy Adams","speaker_companies": "DataOps.live","speaker_titles": "CTO and Co Founder","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AR212","title": "Honda\u2019s Data Mesh Strategy: Apache Iceberg, Cortex AI and Horizon Catalog","abstract": "As the mobility industry undergoes a once-in-a-century transformation, Honda drives rapid software-defined vehicle innovation by redefining its data platform. To match this pace, we established a foundational strategy that balances agility with governance. This session unveils our hybrid data architecture, seamlessly integrating centralized governance with a flexible Data Mesh. Learn how we harness Snowflake to build an AI-ready data mesh, utilizing innovations like Snowflake Horizon, Iceberg Tables and Cortex AI capabilities to create a vehicle platform that continuously evolves.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "03:00 PM","end_time": "03:45 PM","duration_mins": "45.0","room": "Room 159 (Moscone South, Upper Mezzanine)","capacity": "213","track": "Architectures & Interoperability","session_type": "Breakout Session","location": "","topics": "Catalogs / Discovery","features": "Snowflake Intelligence","personas": "Data Engineer","industry": "Manufacturing","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Tadafumi Nogawa | Masaki Nakano","speaker_companies": "Honda R&D Co., Ltd.  /SDV R&D Center | Honda R&D Co., Ltd.","speaker_titles": "Head of Digital Platform Strategy Dev | Assistant Chief Engineer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI256","title": "How GitLab Saved 90% in Engineering Costs by Keeping AI Inside Snowflake","abstract": "GitLab had more than 75,000 sensitive Zendesk tickets full of valuable feedback that were inaccessible due to governance constraints, and manual review wasn\u2019t scalable. An external AI pipeline seemed viable until we uncovered its real cost: complex setup, ongoing maintenance and over $73,000 a year in operational burden. Instead, we chose the simpler path: Snowflake Cortex AI. By keeping all processing inside Snowflake\u2019s governance boundary, we eliminated infrastructure overhead and processed all 75,000+ tickets for about $1,500 without any data leaving our account.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "03:00 PM","end_time": "03:45 PM","duration_mins": "45.0","room": "Room 215 (Moscone South, Level 2)","capacity": "226","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Cortex AI Functions","personas": "Data Engineer","industry": "Not industry-specific","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Ved Prakash | Radovan Bacovic Bacovic","speaker_companies": "Gitlab | GitLab","speaker_titles": "Principal Data Engineer | Staff Data Engineer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI123","title": "How Sigma Makes Snowflake AI Safe and Scalable for Every Business User","abstract": "Snowflake is rapidly advancing its AI capabilities \u2014 from Snowflake Cortex AI to LLM-powered analytics. But for most organizations, making that innovation accessible to everyday business users in a way that\u2019s intuitive, governed and scalable remains a challenge. Sigma activates Snowflake AI to build intelligent, user-facing workflows that accelerate productivity. Learn how teams use natural language querying, assistants and agents to analyze data, automate decisions and take action directly on live Snowflake data. Through real-world examples, including Love\u2019s Travel Stops\u2019 planning workflows, discover how organizations are operationalizing AI \u2014 turning investment into measurable outcomes.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "03:00 PM","end_time": "03:45 PM","duration_mins": "45.0","room": "Room 211 (Moscone South, Level 2)","capacity": "226","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "System Integrations / Synchronizations","features": "Cortex AI Functions","personas": "Data Engineer","industry": "Not industry-specific","department": "Operations","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Heath Arstingstall | Zalak Trivedi","speaker_companies": "Love's | Sigma","speaker_titles": "Senior Manager of Data Engineering | Director, Product Management","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI207","title": "Neo4j and Snowflake: Turn Flat Tables into Graph Intelligence","abstract": "Learn how Neo4j unlocks graph insights from relational Snowflake tables. Use Graph Analytics for Snowflake to run graph algorithms directly on Snowflake data \u2014 no ETL required. With Snowflake Cortex AI integration, you can describe a business problem in plain language and generate graph-powered insights written back to a Snowflake table. Graph analytics help solve problems like fraud detection, customer 360, recommendations and supply chain optimization by revealing relationships hidden in tabular data. When a full property graph is the best fit, Neo4j\u2019s Data Importer makes it to bring Snowflake data into Neo4j with gen AI-assisted graph model generation and simple point-and-click schema editing.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "03:00 PM","end_time": "03:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 3 (Basecamp, South Hall C)","capacity": "150","track": "BI & Analytics","session_type": "Theater Session","location": "General Theaters","topics": "Data Warehouse","features": "Cortex Agents","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Corydon Baylor","speaker_companies": "Neo4j","speaker_titles": "Technical Product Marketer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI104","title": "Snow in San Diego: Operational Efficiency and Passenger Safety at SAN","abstract": "San Diego International Airport (SAN) is partnering with Snowflake to architect the next generation of Fleet Intelligence, turning high-volume telemetry from aircraft and ground equipment into actionable foresight. Beyond monitoring the present, SAN applies time series and geospatial analytics to fuse real-time data with forward-looking flight operations. For this busy, single-runway airport, the shift is from reactive tracking to predictive resource orchestration. Learn how SAN uses this pilot to surface bottlenecks before they occur, optimize asset allocation and keep passenger flow smooth \u2014 transforming raw, third-party enriched data into operational insight in minutes at scale.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "03:00 PM","end_time": "03:45 PM","duration_mins": "45.0","room": "Room 209 (Moscone South, Level 2)","capacity": "197","track": "BI & Analytics","session_type": "Breakout Session","location": "","topics": "System Integrations / Synchronizations","features": "Geospatial functions","personas": "Data Engineer","industry": "Travel & Hospitality","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Andre Bruckner | Daria Rostovtseva","speaker_companies": "San Diego Co Regional Airport Authority | Snowflake","speaker_titles": "Director of Business Intelligence  / CDO | Principal Solution Engineer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "E10","title": "The Frontier of Agentic Enterprise: Founders, VCs and Snowflake","abstract": "AI agents are moving from demo to deployment \u2014 and the implications for enterprise leaders are massive. Hear directly from Jo\u00e3o Moura (CEO and Founder at CrewAI), Madison Faulkner (Partner at NEA Ventures and Head of Strategy at Factory.ai), Spiros Xanthos (CEO and Founder at Resolve.ai) and Anahita Tafvizi (Chief Data and AI Officer at Snowflake) on how they are enabling the era of the Agentic Enterprise through AI agents. Moderated by Chris Yeh (GP at Blitzscaling Ventures), this panel explores what it means to bring agentic AI to the Agentic Enterprise, why trusted data is the foundation agents need and how forward-thinking enterprises are already putting agents to work. A candid conversation at the frontier of enterprise AI.","type": "Executive Content","date": "2026-06-03","day_name": "Wednesday","start_time": "03:00 PM","end_time": "03:30 PM","duration_mins": "30.0","room": "Alpine Clubhouse Theater (Moscone South, Level 3)","capacity": "70","track": "","session_type": "Executive Content","location": "","topics": "AI Agents / Data Agents","features": "","personas": "Business Executive","industry": "","department": "Not department-specific","technical_level": "Introductory","delivery_method": "","speaker_names": "Chris Yeh | Jo\u00e3o Moura | Madison Faulkner | Anahita Tafvizi","speaker_companies": "Blitzscaling Ventures | CrewAI | NEA | Snowflake","speaker_titles": "General Partner | CEO & CoFounder | NEA Partner & Head of Strategy | Chief Data & AI Officer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE209","title": "Uniting SAP and Snowflake for a Zero-Copy and AI-Driven Enterprise","abstract": "Discover how organizations are seamlessly connecting SAP and Snowflake with zero-copy bidirectional data sharing, unlocking governed and real-time data for every workload, from analytics to enterprise AI. Get a first look at how bringing governed, semantically rich SAP data together with Snowflake is empowering teams to break down silos, accelerate decisions and fuel the next generation of intelligent business, all through the power of an open and collaborative data ecosystem.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "03:00 PM","end_time": "03:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 4 (Basecamp, South Hall C)","capacity": "150","track": "Data Engineering & Pipelines","session_type": "Theater Session","location": "General Theaters","topics": "Snowflake Partners","features": "Snowflake Openflow","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Gopal Raghavan","speaker_companies": "Snowflake","speaker_titles": "Global Snowflake SAP SE Leader","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DH13","title": "User Group Meetup: US / Boston","abstract": "Join us at the AI Pop Up for the Boston User Group Meetup! Whether you\u2019re from the city or the broader New England area, this is your chance to connect with local Snowflake practitioners. Talk about what\u2019s working, what you\u2019re experimenting with and how the community can support your next move. Come for the conversation, stay for the connections.","type": "AI Pop Up","date": "2026-06-03","day_name": "Wednesday","start_time": "03:00 PM","end_time": "04:00 PM","duration_mins": "60.0","room": "AI Pop Up (Basecamp, South, Hall D)","capacity": "0","track": "","session_type": "AI Pop Up","location": "","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "","delivery_method": "","speaker_names": "","speaker_companies": "","speaker_titles": "","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "ML305","title": "VideoAmp\u2019s Unified MLOps Architecture on Snowflake","abstract": "For many enterprises, the barrier to ML value isn't a lack of data; it\u2019s the \"operational tax\" of fragmented environments. VideoAmp has overcome this by consolidating the entire ML lifecycle \u2014 from feature engineering to real-time inference \u2014 within the Snowflake AI Data Cloud. This session provides a technical deep dive into VideoAmp\u2019s environment design, focusing on how it eliminated egress costs and cross-platform silos to build a production-ready home for diverse ML use cases at scale.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "03:00 PM","end_time": "03:20 PM","duration_mins": "20.0","room": "Vertical Village Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Machine Learning","session_type": "Theater Session","location": "Vertical Village","topics": "System Integrations / Synchronizations","features": "Snowflake ML","personas": "MLOps","industry": "Media, Entertainment & Advertising","department": "Not department-specific","technical_level": "Advanced","delivery_method": "Live","speaker_names": "Andrew Harding","speaker_companies": "VideoAmp","speaker_titles": "Principal Machine Learning Engineer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "WN211B","title": "What\u2019s New: Innovate at Scale: Powering a Secure and Resilient AI Estate","abstract": "This session unveils Snowflake innovations designed to protect sensitive AI assets and ensure continuity. Explore what\u2019s new in security for AI, featuring capabilities to secure Cortex flows, Snowflake Intelligence and Cortex Code. We\u2019ll cover AI security posture in the Trust Center, adaptive guardrails against prompt injection and sandboxing to mitigate local risks. Learn about new data movement policies to prevent exfiltration and seamless agent access via agentic identity and JIT provisioning as well as Account Replication 2.0, the next evolution of our BCDR engine. Join us to see these features in action and build a bulletproof, AI-ready estate.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "03:00 PM","end_time": "03:45 PM","duration_mins": "45.0","room": "Room 160 (Moscone South, Upper Mezzanine)","capacity": "232","track": "What's New in Snowflake","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Gen 2 Warehouses","personas": "Security Practitioner","industry": "Not industry-specific","department": "R&D","technical_level": "Introductory","delivery_method": "OnDemand","speaker_names": "Radhika Janardanan | Nitika Gupta","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Sr Product Marketing Manager Platform | Director of Product Management","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI234","title": "Agentic Analytics: From Proof of Concept to Enterprise Rollout","abstract": "HubSpot is building HubScout, an agentic analytics platform serving as the infrastructure for AI-powered BI experiences across its organization. What started with an MCP server connecting Claude to Snowflake, generating semantic models and enabling conversational data access, quickly revealed the challenge of enterprise-grade AI BI: How do you ensure AI-generated insights are trustworthy, governed and accurate at scale? When LLMs can query any data source, plausible-sounding but fundamentally wrong answers become a real risk. This session covers the journey from POC excitement to production reality, tackling the technical and organizational challenges of deploying AI-powered BI at enterprise scale.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "03:30 PM","end_time": "04:15 PM","duration_mins": "45.0","room": "Room 212 (Moscone South, Level 2)","capacity": "101","track": "BI & Analytics","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Snowflake Intelligence","personas": "Product Manager","industry": "Technology","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Nina Schuchman | Youssef Abouelneaj","speaker_companies": "Hubspot | Snowflake","speaker_titles": "Engineering Lead -- Data and AI Strategy | Solutions Engineer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI283","title": "AI at Scale: How Nestl\u00e9 Is Transforming Supply Chain and Finance with Snowflake","abstract": "Nestl\u00e9 runs most of its data foundation on Snowflake. In this session, join us in learning how Nestl\u00e9 and Accenture moved beyond proof-of-concept to deploy production-grade AI across two critical domains: an AI-powered financial foresights engine that predicts performance variances before they occur, and PULSE \u2014 a prescriptive supply chain intelligence system that detects disruptions, simulates mitigations, and executes recommendations through automated decision intelligence platform. You will leave with a concrete playbook for building a common data foundation, accelerating multi-use-case AI delivery and achieving the developer scale needed to run it all globally.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "03:30 PM","end_time": "03:50 PM","duration_mins": "20.0","room": "Basecamp South Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "General Theaters","topics": "AI Agents / Data Agents","features": "Cortex Code","personas": "Data Engineer","industry": "Retail & Consumer Goods","department": "Supply Chain","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Leonid Ore | Phil Botterill","speaker_companies": "Nestle | Nestl\u00e9","speaker_titles": "Data Architect | Data & AI Technology","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "GO247","title": "Data Discovery and Semantic Context for Agentic AI with Horizon Catalog","abstract": "Agentic AI can turn data into action, but only if it can find the right data and understand it. That's a challenge since most enterprise data isn\u2019t sufficiently self-describing. In this session, we\u2019ll define what AI-ready data looks like and show how Horizon Catalog provides the critical context layer that helps AI know your data. Horizon Catalog delivers quality-aware context directly to AI agents \u2014 so they don\u2019t just access data, they understand it. It also catalogs data from external systems, captures end-to-end lineage and usage patterns, and automates documentation and semantic modeling. Join us to see how a strong metadata foundation enables AI that\u2019s more accurate and trustworthy.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "03:30 PM","end_time": "04:15 PM","duration_mins": "45.0","room": "Room 205 (Moscone South, Level 2)","capacity": "226","track": "Governance & Security","session_type": "Breakout Session","location": "","topics": "Catalogs / Discovery","features": "Semantic Views","personas": "Data Engineer","industry": "Travel & Hospitality","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Riccardo Muti | Shinji Kim","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Principal
