 that deliver personalized experiences and drive fan engagement across a global sports ecosystem.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "02:30 PM","end_time": "02:50 PM","duration_mins": "20.0","room": "Vertical Village Theater 2 (Basecamp, South Hall B)","capacity": "150","track": "Data Engineering & Pipelines","session_type": "Theater Session","location": "Vertical Village","topics": "System Integrations / Synchronizations","features": "Data Clean Rooms","personas": "MLOps","industry": "Media, Entertainment & Advertising","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Colin Bowers","speaker_companies": "National Basketball Association","speaker_titles": "Senior Staff Data Engineer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "E24","title": "Executive Industry Summit Tour \u2014 Public Sector","abstract": "Join an exclusive, guided tour of the Snowflake AI Data Cloud and its premier partner ecosystem, tailored for leaders in public sector. This immersive experience will take you through five curated stops that showcase the art of the possible \u2014 real-world solutions, cutting-edge AI use cases and data-driven innovations transforming your industry today. Gain direct access to experts, see industry-leading technology in action and leave with actionable inspiration to accelerate your data strategy. Space is extremely limited \u2014 registration is first come, first served. Please note that this experience includes walking between stops; comfortable footwear is recommended. Please note that the Executive Booth Tours are reserved for customers only \u2014 we kindly ask our partners not to register.","type": "Executive Content","date": "2026-06-02","day_name": "Tuesday","start_time": "02:30 PM","end_time": "04:00 PM","duration_mins": "90.0","room": "Vertical Village (Basecamp, South Hall B)","capacity": "15","track": "","session_type": "Executive Content","location": "","topics": "","features": "","personas": "","industry": "Public Sector","department": "","technical_level": "","delivery_method": "","speaker_names": "","speaker_companies": "","speaker_titles": "","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "GO206","title": "Governed Zero-Copy Data with Horizon Catalog and Iceberg Catalog Federation","abstract": "Enterprises need analytics platforms that support multiple query engines, open table formats and governed data exchange across clouds without being tied to a single engine. Booking.com\u2019s data team shares how they standardized on Snowflake Horizon Catalog as a central Iceberg catalog using Open APIs (Iceberg REST + Apache Polaris) to govern metadata and enable interoperability across Spark, Snowflake and federated compute.The session covers discovery and governed access using Iceberg catalog federation and catalog-linked databases, along with multi-engine governance patterns such as Immuta-backed fine-grained access control, enforcement limits and read-write trade-offs in multi-cloud environments.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "02:30 PM","end_time": "02:50 PM","duration_mins": "20.0","room": "Basecamp South Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Governance & Security","session_type": "Theater Session","location": "General Theaters","topics": "Catalogs / Discovery","features": "Apache Polaris","personas": "Data Engineer","industry": "Technology","department": "IT","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Mike Ogren | Regis Siqueira","speaker_companies": "Booking.com | Booking.com","speaker_titles": "Senior Software Engineer I | Software Engineering Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DM217","title": "How to Build and Share AI-Powered Multimodal Data Products ","abstract": "Organizations are increasingly looking for cohesive AI-powered data products that combine structured, semi-structured and unstructured data. This session details how to build, package and securely share AI-powered multimodal data products. We define \"interoperable AI-powered multimodal data products\" and discuss architectural considerations for reliable product evolution with live demonstrations. Learn how to leverage catalog-linked databases with open table formats, multimodality features and AI layering (semantic views, Snowflake Cortex Search, managed MCP server and so forth) alongside industry-leading AI and data collaboration capabilities to deliver comprehensive data products at scale.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "02:30 PM","end_time": "03:15 PM","duration_mins": "45.0","room": "Room 211 (Moscone South, Level 2)","capacity": "226","track": "Data Sharing & Marketplace","session_type": "Breakout Session","location": "","topics": "Catalogs / Discovery","features": "Apache Iceberg\u2122","personas": "Product Manager","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Jeevan Rag | Jwala Vedantam","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Principal Industry Architect | Field CTO - Collaboration","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AR220","title": "Just Ask the Robots!","abstract": "Most enterprise data platforms are designed to be queried. Snowflake Intelligence is designed to be asked \u2014 and that shift fundamentally changes who can access data, how quickly answers surface, and whether business questions require an analyst in the loop. This session explores what it actually takes to make Snowflake Intelligence work in real enterprise environments. It will highlight CDW\u2019s Intelligence deployment framework, the governance and semantic foundations required for trusted results, and the business case for natural language data access as an organizational capability rather than just another platform feature.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "02:30 PM","end_time": "02:50 PM","duration_mins": "20.0","room": "Basecamp South Theater 2 (Basecamp, South Hall A)","capacity": "150","track": "Architectures & Interoperability","session_type": "Theater Session","location": "General Theaters","topics": "AI Agents / Data Agents","features": "Snowflake Intelligence","personas": "BI / Analyst","industry": "Not industry-specific","department": "Supply Chain","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Jay Brophy | Dan Csoke","speaker_companies": "CDW | CDW","speaker_titles": "Principal Consultant | Managing Solutions Architect","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "ML222","title": "Real-Time Inference Endpoints on Snowflake ML: Model Registry to Production API","abstract": "Real-time applications need real-time predictions \u2014 but production serving often introduces extra infrastructure, data movement and governance gaps. In this session, learn how to operationalize low-latency inference on Snowflake by deploying models with Snowflake ML and exposing them through secure external endpoints. We cover reference architectures for request/response serving and feature retrieval patterns and techniques for scaling concurrency while managing latency and cost. You\u2019ll also hear from customer VALID Systems on how it powered real-time financial decision-making in Snowflake in under 100 ms.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "02:30 PM","end_time": "03:15 PM","duration_mins": "45.0","room": "Room 215 (Moscone South, Level 2)","capacity": "226","track": "Machine Learning","session_type": "Breakout Session","location": "","topics": "MLOps","features": "Snowflake ML","personas": "MLOps","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Michael Ring | Sumit Das","speaker_companies": "VALID Systems | Snowflake","speaker_titles": "CTO/CIO | Principal Software Engineer II","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AR214","title": "Samsung Ads: Building Open Analytics on a Single Data Copy with Apache Iceberg","abstract": "Samsung Ads launched a unified, Iceberg-centric lakehouse via Snowflake Managed Iceberg Tables and Open Catalog. This shift solves the siloed data problem that hindered cross-system interoperability and slowed global workflows. With Apache Iceberg, they\u2019ve enabled a global data mesh featuring cross-engine synchronization and automated, self-service ingestion. Some of the key results include 20-30% reduction in data processing costs and TCO, faster vendor onboarding and streamlined SLA-driven analytics, and global interoperability across all analytics teams. This architecture accelerates time-to-insight while drastically lowering operational overhead.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "02:30 PM","end_time": "03:15 PM","duration_mins": "45.0","room": "Room 209 (Moscone South, Level 2)","capacity": "197","track": "Architectures & Interoperability","session_type": "Breakout Session","location": "","topics": "Interoperability","features": "Apache Polaris","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Ramnath Jayachandran | Swati Goel Goel","speaker_companies": "Samsung Ads | Snowflake","speaker_titles": "Sr. Chief Engineer | Solutions Architect","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "IN109","title": "The Intelligent Travel Enterprise: From Data to Decisions at Scale","abstract": "Travel and hospitality is data-intensive, yet silos stall progress. AI winners won\u2019t just have data; they\u2019ll have the \"foundation of verified truth\" to automate decisions at scale. This session features a visionary keynote on architecting the intelligent travel enterprise, followed by a candid panel of global leaders on the realities of AI execution. Leave with: A roadmap to pivot from reactive to intelligence-first Operational blueprints from peers scaling AI in production The architecture for forecast accuracy and \"agentic trust\" Strategies for digital twins to simulate policy and promotion impact","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "02:30 PM","end_time": "03:15 PM","duration_mins": "45.0","room": "Room 206 (Moscone South, Level 2)","capacity": "101","track": "Industry Innovation","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Cortex Code","personas": "Product Manager","industry": "Travel & Hospitality","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Rahul Todkar | Anirvan Mukherjee | Whitnee Hawthorne | Amit Gupta","speaker_companies": "Tripadvisor | Wynn Resorts | Snowflake | Snowflake","speaker_titles": "Head of Data and AI | Vice President - Data, AI & Martech | Global Head of Travel and Hospitality | Global Field CTO","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AR219","title": "Unlock Full Data and AI Potential with a Truly Open and Interoperable Lakehouse","abstract": "Apache Iceberg is the foundation for open lakehouses, but consistent governance and true interoperability remain a challenge. This dedicated session cuts through the noise to detail Horizon Catalog\u2019s competitive differentiation. Learn how bringing Polaris inside Horizon creates a truly open ecosystem and why our Iceberg REST Catalog supports secure read/write access across engines. We showcase our leadership in extending fine-grained governance, including enforcing row and column policies on external engines like Apache Spark. Snowflake Horizon is the only catalog that is fully interoperable, future-proof beyond Iceberg and offers zero lock-in for your evolving AI workloads.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "02:30 PM","end_time": "03:15 PM","duration_mins": "45.0","room": "Room 213 (Moscone South, Level 2)","capacity": "226","track": "Architectures & Interoperability","session_type": "Breakout Session","location": "","topics": "Catalogs / Discovery","features": "Apache Polaris","personas": "MLOps","industry": "Not industry-specific","department": "","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Manoj Arora | Ashwin Kamath | Anupriti Warade","speaker_companies": "Salesforce.com | Snowflake | Snowflake","speaker_titles": "PMTS, Data Engineering | Staff Product Manager | Senior Product Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "WN209B","title": "What's New: Smart Pipeline Development","abstract": "Data engineering is at a crossroads: AI is both the product to build and the tool to use. It's reshaping what data engineers do and how they work. To keep up, engineering teams must move beyond manual pipeline management. This session provides a roadmap to the next generation of data engineering on Snowflake. Join us to see how you can spend less time managing infrastructure and more time building high-value data products.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "02:30 PM","end_time": "03:15 PM","duration_mins": "45.0","room": "Room 160 (Moscone South, Upper Mezzanine)","capacity": "232","track": "What's New in Snowflake","session_type": "Breakout Session","location": "","topics": "System Integrations / Synchronizations","features": "Apache Spark\u2122","personas": "Data Engineer","industry": "Not industry-specific","department": "R&D","technical_level": "","delivery_method": "OnDemand","speaker_names": "Abhishek Kashyap | Anita Thomas","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Director, Product Management | Staff Product Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "WN202T","title": "What's New: Snowflake Intelligence and Cortex Agents for Real Business Impact","abstract": "AI is only as powerful as the context it understands. In this session, discover what\u2019s new in Snowflake Intelligence, the enterprise intelligence agent built to turn all your knowledge into trusted business decisions. Learn how organizations are moving beyond dashboards to uncover the critical \u201cwhy,\u201d grounded in governed enterprise data and shared business definitions. Discover how Snowflake Intelligence and Cortex Agents work together to move teams beyond static insights, enabling natural language intelligence, trusted reasoning and actionable workflows that help organizations analyze, act and drive outcomes with confidence.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "02:30 PM","end_time": "02:50 PM","duration_mins": "20.0","room": "Builders Hub Theater (Basecamp, South Hall D)","capacity": "192","track": "What's New in Snowflake","session_type": "Theater Session","location": "Builder's Hub Theater","topics": "AI Agents / Data Agents","features": "Cortex AI Functions","personas": "Product Manager","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "OnDemand","speaker_names": "Effie Goenawan | Reza Akhavan","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Principal Product Manager | Sr. Manager Engineering","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AD207","title": "AI Agents, Snowflake and Domo: Running a Product Team of One","abstract": "In this session, we show how a single developer built a full production application by combining AI agents, Snowflake and Domo. Snowflake powers the intelligence layer \u2014 ML scoring, Cortex AI Functions and data pipelines \u2014 while Domo provides the application framework and user experience for the business. Using AI agents as engineering teammates, the project followed a structured development process with shaping, sprints and iteration to deliver a deal intelligence platform in just weeks. Learn the operating model, architecture and development pattern that enables developers to turn Snowflake data into real AI-powered business applications.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "03:00 PM","end_time": "03:20 PM","duration_mins": "20.0","room": "Vertical Village Theater 2 (Basecamp, South Hall B)","capacity": "150","track": "Application Development","session_type": "Theater Session","location": "Vertical Village","topics": "Data Warehouse","features": "Snowflake ML","personas": "MLOps","industry": "Not industry-specific","department": "IT","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Dan Wentworth","speaker_companies": "Domo","speaker_titles": "Solution Engineering Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "IN225","title": "AI in Action: Real-World FSI Production Showcases","abstract": "Leading financial institutions are already deploying AI to drive measurable ROI. This curated collection showcases the most impactful AI stories currently in production across the industry. Explore how your peers are moving from pilot to scale, leveraging the Snowflake AI Data Cloud to solve complex challenges in risk, customer experience and employee efficiency.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "03:00 PM","end_time": "03:45 PM","duration_mins": "45.0","room": "Room 152 (Moscone South, Upper Mezzanine)","capacity": "204","track": "Industry Innovation","session_type": "Breakout Session","location": "","topics": "Data Warehouse","features": "Snowflake ML","personas": "Business Executive","industry": "Financial Services","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Henry Chiang | Sri Kanthadai | Jonathan Regenstein","speaker_companies": "S&P Global Market Intelligence | T. Rowe Price | Snowflake","speaker_titles": "Lead Quantitative Researcher | Head of Enterprise Data Solutions CDO | Head of Wealth and Asset Management","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "MI206","title": "AI-Powered Hedge Fund Transformation: Optimizing Snowflake with Cortex Code","abstract": "This discussion with Verition Fund will focus on how an AI-enabled data platform drives efficiency, speed and competitive advantage in a hedge fund environment. We will explore the collaboration between Verition and BlueCloud to design and optimize a Snowflake environment \u2014 covering architecture, data pipelines, governance and cost controls. We will also highlight how Snowflake Cortex AI, including Cortex Code, enables natural language querying, automated SQL generation and faster development.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "03:00 PM","end_time": "03:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 2 (Basecamp, South Hall A)","capacity": "150","track": "Migrations & Modernization","session_type": "Theater Session","location": "General Theaters","topics": "System Integrations / Synchronizations","features": "Cortex Code","personas": "Data Engineer","industry": "Not industry-specific","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Mike Siswanto | Wyatt Mullins","speaker_companies": "Verition Fund Management | BlueCloud","speaker_titles": "Head of Equities Technology | Director, Sales","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AD303","title": "Building an Operational Data Store Using Snowflake PostGres","abstract": "We present a scalable architecture for a near real-time operational data store (ODS) on Snowflake using PostgreSQL as the source. By leveraging change data capture (CDC) via the PostgreSQL Write-Ahead Log (WAL), the system captures row-level changes with minimal source impact. The framework uses Snowflake Dynamic Tables and Streams to automate incremental ingestion and materialization. This creates a high-concurrency, low-latency environment for operational reporting and real-time apps, eliminating the overhead of traditional batch ETL.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "03:00 PM","end_time": "03:20 PM","duration_mins": "20.0","room": "Builders Hub Theater (Basecamp, South Hall D)","capacity": "192","track": "Application Development","session_type": "Theater Session","location": "Builder's Hub Theater","topics": "System Integrations / Synchronizations","features": "Snowflake Postgres","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Advanced","delivery_method": "OnDemand","speaker_names": "Sam Gupta","speaker_companies": "Snowflake","speaker_titles": "Sr. Data Cloud Architect","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI248","title": "Driving Advanced Supply Chain AI Use Cases with Snowflake at AT&T","abstract": "The age of agentic AI depends upon solid business strategies fueled by data. AT&T Transformation & Supply Chain (TSC) has been on a multi-year journey using Snowflake and AI models to wrangle and transform data from third-party suppliers and corporate systems across the company to create a single version of truth for TSC data and turn it into actionable insights and recommendations. This session dives into that mission, and how we are building a robust, AI-focused semantic layer and data governance oversight program using Snowflake features and graph databasing to drive decision intelligence for value delivery.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "03:00 PM","end_time": "03:20 PM","duration_mins": "20.0","room": "Vertical Village Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "Vertical Village","topics": "AI Agents / Data Agents","features": "Snowflake Intelligence","personas": "Data Engineer","industry": "Telecom","department": "Supply Chain","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "April Stanbary","speaker_companies": "AT&T","speaker_titles": "Principal Solution Architecture","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI121","title": "Everyone Has AI \u2014 so Who Actually Outcreates?","abstract": "AI adoption is accelerating across every industry. But while many organizations are experimenting with AI, only a few are turning it into real business advantage. So what separates those who simply use AI from those who truly outcreate with it? In this panel discussion, data and AI leaders explore how organizations are moving beyond experimentation to drive smarter decisions, faster innovation and measurable outcomes. Join us as we discuss the role of trusted data, intelligent platforms and decision-driven strategies in helping businesses outcreate in the age of AI.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "03:00 PM","end_time": "03:45 PM","duration_mins": "45.0","room": "Room 214 (Moscone South, Level 2)","capacity": "101","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "Data Warehouse","features": "Snowflake Intelligence","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Narayan Kamat | Kundan Kishore | Thani Sokka","speaker_companies": "LTM Limited | OnSemi | Snowflake","speaker_titles": "Global Head Data & Analytics | VP Data & Analytics | Enterprise Apps. | Managing Director, Global AI/ML GTM","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "E12","title": "Executive Happy Hour Hosted by Wisdom AI","abstract": "Hosted by Wisdom AI, this partner-hosted happy hour invites executive attendees to network in a casual setting over drinks and light refreshments, available while supplies last.","type": "Executive Content","date": "2026-06-02","day_name": "Tuesday","start_time": "03:00 PM","end_time": "05:00 PM","duration_mins": "120.0","room": "Alpine Clubhouse (Moscone South, Level 3)","capacity": "200","track": "","session_type": "Executive Content","location": "","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "","delivery_method": "Live","speaker_names": "","speaker_companies": "","speaker_titles": "","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI127","title": "From Fog to Foothold: Connecting AI to Your Data's Core to Empower Human Teams","abstract": "\"We had the vision, talent and tooling, but AI transformation stalled because it missed our core data.\" Hear how Makenna Ralston's team at CommBank iQ cut through the \"fog\" by leveraging Snowflake to connect AI to Australia's largest transaction banking data set. This move provided a human \"foothold,\" evolving teams into critical \"problem experts.\" Explore three real-world examples, in which data quality teams significantly uplift their domain expertise; client consultants gain immediate, complex query resolution; and senior data scientists multiply their reach using virtual analysts (Cortex Code). This session shows technology leaders how connecting AI to the core business data is the only way to move from fog to foothold.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "03:00 PM","end_time": "03:45 PM","duration_mins": "45.0","room": "Room 205 (Moscone South, Level 2)","capacity": "226","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Cortex Code","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Makenna Ralston","speaker_companies": "CommBank iQ","speaker_titles": "Chief Executive Officer, CommBank iQ","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI244","title": "From Ingestion to Agents: How Leading AI Teams Build on Document Intelligence","abstract": "The agents of tomorrow are only as good as the context they reason on \u2014 yet most real-world data lives in messy, unstructured documents. In this session, we reveal the patterns that separate AI teams shipping reliable, production-grade agents from those stuck debugging pipelines. Drawing on patterns we've seen from AI-native startups to Fortune 10 enterprises, we'll cover what it takes to transform complex documents into clean, accurate context at scale across legal, finance, healthcare and more. From ingestion architecture to agent-ready outputs, walk away with the strategies top teams use to turn document chaos into competitive advantage.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "03:00 PM","end_time": "03:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 3 (Basecamp, South Hall C)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "General Theaters","topics": "System Integrations / Synchronizations","features": "Other","personas": "MLOps","industry": "Other","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Adit Abraham","speaker_companies": "Reducto","speaker_titles": "CEO and Co-Founder","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI115","title": "SAP and Snowflake: Build a Business Data Fabric to Fuel Enterprise AI","abstract": "Make enterprise AI work in practice by unifying SAP and Snowflake into a governed, business-context-driven data foundation. This session introduces SAP Business Data Cloud and explores how the SAP and Snowflake partnership helps enable high-impact use cases across analytics, planning and AI. Learn how zero-copy, bidirectional data sharing connects trusted SAP data products with Snowflake\u2019s capabilities. Discover how to preserve business context, maintain governance and accelerate enterprise AI with a scalable, unified data foundation.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "03:00 PM","end_time": "03:45 PM","duration_mins": "45.0","room": "Room 212 (Moscone South, Level 2)","capacity": "101","track": "BI & Analytics","session_type": "Breakout Session","location": "","topics": "System Integrations / Synchronizations","features": "Snowflake ML","personas": "BI / Analyst","industry": "Technology","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Niclas Schlautkoetter","speaker_companies": "SAP","speaker_titles": "SVP, General Manager \u2013 SAP Data & AI","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI102","title": "Tableau and Snowflake: Demystifying the Open Semantic Interchange","abstract": "Explore how Tableau and the Open Semantic Interchange (OSI) provide the essential metadata layer that ensures your metrics remain consistent and trusted for both humans and agents. You will learn how our current analytics integration and future roadmap for semantic interoperability allow agents to work seamlessly inside the systems that run your business.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "03:00 PM","end_time": "03:45 PM","duration_mins": "45.0","room": "Room 216 (Moscone South, Level 2)","capacity": "197","track": "BI & Analytics","session_type": "Breakout Session","location": "","topics": "Interoperability","features": "Snowflake Openflow","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Tara Morton | Erik Teutsch","speaker_companies": "Salesforce | Salesforce","speaker_titles": "Director, Product Management | Distinguished Analytics SE","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI264","title": "The Enterprise Context Layer: Atlan's Thesis, Workday's Proof in Production","abstract": "Most enterprise AI projects stall before production \u2014 not because Snowflake Intelligence or Cortex Agents aren't powerful, but because agents don't know which \"revenue\" definition to use, which tables to trust, or what the business actually means. The gap between pilot and production isn't a model problem. It's a context problem. Workday is closing it and they're here to show you how. Join Prukalpa Sankar of Atlan and Joe DosSantos, CDO at Workday, to learn what the Enterprise Context Layer is and why production AI needs it, how Workday's shared language \u2014 built for people \u2014 is now being leveraged for AI via Atlan's MCP, and what it takes to go from cool demo to AI trusted at scale.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "03:00 PM","end_time": "03:45 PM","duration_mins": "45.0","room": "Room 210 (Moscone South, Level 2)","capacity": "101","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "Catalogs / Discovery","features": "Cortex AI Functions","personas": "MLOps","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Joe DosSantos | Prukalpa Sankar","speaker_companies": "Workday | Atlan","speaker_titles": "VP, Enterprise Data & Analytics | Co-Founder","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI232","title": "Turning Data into Decisions: How to Stop Paying the Reporting Tax","abstract": "Public sector contact centers face high demand, strict regulation and fragmented data. Capita, a leading UK AI-enabled outsourcer, partnered with Snowflake to unify operations and create a governed, real-time intelligence layer. Within four months, teams unlocked natural-language access to insights across siloed functions, reduced manual reporting and shifted from reactive dashboards to faster decisions. The result: managers freed to focus on coaching, training and agent well-being, and a clear model for operationalizing AI safely in live, regulated services.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "03:00 PM","end_time": "03:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 4 (Basecamp, South Hall C)","capacity": "150","track": "BI & Analytics","session_type": "Theater Session","location": "General Theaters","topics": "Snowflake Partners","features": "Cortex Code","personas": "Data Engineer","industry": "Other","department": "","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Sameer Vuyyuru","speaker_companies": "Capita","speaker_titles": "Chief AI and Product Officer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI229","title": "Unlocking Value with Synthetic Data: Privacy Preserving at Scale","abstract": "This presentation introduces a privacy-first synthetic data platform designed to break data access bottlenecks in measurement, AI and experimentation. We demonstrate how aggregated, household-level data combined with synthetic data modeling enables scalable, high\u2011fidelity synthetic data sets that preserve real\u2011world statistical relationships without exposing sensitive data. The platform supports measurement validation, clean room onboarding, AI/agent testing and experimentation, enabling teams to build, test and innovate faster in a controlled, production\u2011ready environment.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "03:00 PM","end_time": "03:45 PM","duration_mins": "45.0","room": "Room 208 (Moscone South, Level 2)","capacity": "197","track": "BI & Analytics","session_type": "Breakout Session","location": "","topics": "Interoperability","features": "Snowflake Intelligence","personas": "Data Scientist","industry": "Media, Entertainment & Advertising","department": "Sales & Marketing","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Gavin Zhu Zhu | Natalie Mellon","speaker_companies": "NBCUniversal | NBCU","speaker_titles": "Sr. Director of Data Science | VP Identity and Data Products","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "IN202","title": "Using MCP to Orchestrate Composable Identity Resolution at Scale","abstract": "Enterprise\u2011scale identity resolution demands coordinated matching, enrichment and hygiene across regions and compliance boundaries. This session shows how Model Context Protocol (MCP) enables composable architectures that link Snowflake\u2019s native capabilities with region\u2011specific identity engines. Using dentsu\u2019s approach with Cortex Search and intelligent routing, we\u2019ll illustrate how MCP orchestrates complex workflows without moving sensitive data, scaling globally while preserving sovereignty and accelerating insight.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "03:00 PM","end_time": "03:45 PM","duration_mins": "45.0","room": "Room 151 (Moscone South, Upper Mezzanine)","capacity": "204","track": "Industry Innovation","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Cortex AI Functions","personas": "Data Engineer","industry": "Not industry-specific","department": "Sales & Marketing","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Morten Lileng","speaker_companies": "Merkle, a Dentsu Company","speaker_titles": "Global Head of Engineering","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "WN203B","title": "What's New: Swiftly Take Your Ideas to Production with Cortex Code","abstract": "Transform your ideas into production-ready workflows faster by using the AI coding agent designed specifically for data to handle everything from admin, data engineering, machine learning and agent-building tasks. Learn how Cortex Code can simplify and automate your toughest tasks and help your team expedite time-to-value.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "03:00 PM","end_time": "03:45 PM","duration_mins": "45.0","room": "Room 158 (Moscone South, Upper Mezzanine)","capacity": "583","track": "What's New in Snowflake","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Cortex Code","personas": "MLOps","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "OnDemand","speaker_names": "Siddharth Dwivedi | Matt Luizzi | Aria Attar Attar","speaker_companies": "Snowflake | WHOOP | Snowflake","speaker_titles": "AI Product Marketing, Snowflake | VP, Analytics | Sr. Product Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE207","title": "Your AI Strategy Has a Context Problem. Orchestration Solves It.","abstract": "Every enterprise has an AI strategy. Few have the foundation to deliver on it. Most treat context as something defined upfront and consumed downstream. Semantic layers define metrics. Ontologies model relationships. Neither captures what actually ran. Enterprise context is not static. It is evidence that accumulates continuously: which pipelines ran, what changed upstream, what humans corrected. Orchestration is the only layer where that evidence accumulates naturally, not as declared truth, but as a continuous record of what actually happened. That is what production AI runs on. This talk outlines the architectural pattern that makes it possible.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "03:00 PM","end_time": "03:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Data Engineering & Pipelines","session_type": "Theater Session","location": "General Theaters","topics": "Interoperability","features": "Other","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Steven Hillion","speaker_companies": "Astronomer","speaker_titles": "SVP, Data and AI","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "MI301","title": "AI-Guided Migration: From Manual Rewrites to Automation","abstract": "Manual migration rewrites consume valuable engineering time. SnowConvert AI shifts the focus from labor-intensive code conversion to intelligent automation and orchestration. This session highlights innovations including Semantic Conversion (AST + Cortex AI) for high-fidelity SQL translation, AI-driven verification to resolve complex issues, automated data validation for schema and metrics parity, ETL conversion to dbt on Snowflake, and ecosystem repointing for tools like Power BI. Learn how AI-guided automation accelerates modernization and frees engineers to build, not fix.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "03:30 PM","end_time": "04:15 PM","duration_mins": "45.0","room": "Room 215 (Moscone South, Level 2)","capacity": "226","track": "Migrations & Modernization","session_type": "Breakout Session","location": "","topics": "Snowflake Partners","features": "SnowConvert AI","personas": "Data Engineer","industry": "Travel & Hospitality","department": "Supply Chain","technical_level": "Advanced","delivery_method": "Live","speaker_names": "Pallavi Sharma","speaker_companies": "Snowflake","speaker_titles": "Senior Data Cloud Architect - Partners","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI130","title": "AI-Ready Data for Reinvention: An Accenture Fireside Chat with Intel CIO","abstract": "Join senior technology and business leaders from Intel alongside Accenture for a candid fireside conversation on leading AI transformation as a true business imperative \u2014 not a technology project. Intel is undergoing one of its most ambitious reinventions, with IT at the center \u2014 driving startup speed at enterprise scale, deploying agentic AI where it creates measurable business value, and building an enterprisewide foundation that spans corporate, product and foundry. This session moves beyond architecture and infrastructure to the leadership decisions, organizational tradeoffs and business priorities that determine whether AI transformation actually delivers.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "03:30 PM","end_time": "04:15 PM","duration_mins": "45.0","room": "Room 213 (Moscone South, Level 2)","capacity": "226","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "System Integrations / Synchronizations","features": "Cortex Code","personas": "Data Engineer","industry": "Technology","department": "Operations","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Cindy Stoddard | Teresa Tung","speaker_companies": "Intel Corporation | Accenture","speaker_titles": "SVP & CIO | Senior Managing Director, Data Capability Lead","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI220","title": "Better Together: When AI Data Agents Collaborate with AI Coding Agents","abstract": "Watch autonomous agents build a production data pipeline live. Watch as Genesis Computing shows how Cortex Code and Genesis Data Agents run the entire data operations as one unified stack to ingest, map, code, test, deploy, monitor and self-heal data pipelines autonomously. Multiple concurrently working agents build and utilize context graphs while collaborating in real time end-to-end. This is the \"better together\" story \u2014 with proof. Walk away with: A replicable blueprint for agentic AI on Snowflake Real enterprise impact, with enterprise agentic AI building and use of context graphs to perform end-to-end data engineering","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "03:30 PM","end_time": "03:50 PM","duration_mins": "20.0","room": "Basecamp South Theater 3 (Basecamp, South Hall C)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "General Theaters","topics": "AI Agents / Data Agents","features": "Cortex Code","personas": "MLOps","industry": "Not industry-specific","department": "Supply Chain","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Matt Glickman","speaker_companies": "Genesis Computing","speaker_titles": "CEO, Co-founder","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE244","title": "Bridging the Dev/Data Divide with AI: Lessons from RudderStack and Glassdoor","abstract": "At data-driven companies like Glassdoor, AI is raising the bar for data quality across the stack. Join Venkat Nagaswamy (COO, RudderStack) and Jeremy Echols (Director of Digital Analytics, Glassdoor) for a discussion on why clean, reliable data is nonnegotiable for AI and what it takes to build and maintain that foundation at scale. They\u2019ll explore the cost of misalignment between dev and data teams, and what it takes to close that gap in practice: instrumentation, event tracking and governance frameworks designed to support analytics, automation and AI-driven systems. Attendees will also get a first look at how RudderStack is evolving the CDP for the AI era.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "03:30 PM","end_time": "03:50 PM","duration_mins": "20.0","room": "Basecamp South Theater 2 (Basecamp, South Hall A)","capacity": "150","track": "Data Engineering & Pipelines","session_type": "Theater Session","location": "General Theaters","topics": "AI Agents / Data Agents","features": "Secure Data Sharing","personas": "Data Engineer","industry": "Travel & Hospitality","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Jeremy Echols | Venkat Nagaswamy","speaker_companies": "Glassdoor | RudderStack","speaker_titles": "Director of Digital Analytics | COO","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE226","title": "Connect InfluxDB to Snowflake: How Capella Space Uses Snowpark Data Source APIs","abstract": "Learn how Capella Space used Snowpark DB-API to build a Python-based connector to InfluxDB and break the data silos between operational telemetry and analytics in Snowflake. We\u2019ll walk through the architecture, show how developers used a standard DB-API pattern to move key time-series data into Snowflake, and share lessons learned that you can apply to your own data sources.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "03:30 PM","end_time": "03:50 PM","duration_mins": "20.0","room": "Basecamp South Theater 4 (Basecamp, South Hall C)","capacity": "150","track": "Data Engineering & Pipelines","session_type": "Theater Session","location": "General Theaters","topics": "System Integrations / Synchronizations","features": "Time-series functions","personas": "Data Engineer","industry": "Technology","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Qinyi Ding | Travis Niemczyk","speaker_companies": "Snowflake | Capella Space (an IONQ Company)","speaker_titles": "Senior Product Manager | Senior Data Analytics Architect","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI133","title": "Get More Done with OpenAI Agents Powered by Snowflake Data","abstract": "What does it take to get more done with agents built on OpenAI and Snowflake? In this live demo, see Codex use governed Snowflake data to turn a customer signal into product action: analyze demand, spot a growth opportunity, plan the response, and build an app feature a team can preview, review and ship.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "03:30 PM","end_time": "03:50 PM","duration_mins": "20.0","room": "Vertical Village Theater 2 (Basecamp, South Hall B)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "Vertical Village","topics": "AI Agents / Data Agents","features": "Other","personas": "Product Manager","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Evan Weise","speaker_companies": "OpenAI","speaker_titles": "Demo Studio Lead","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "PO103","title": "Industry Use Cases: Data Modeling for Enterprise Scale and AI Readiness","abstract": "Join us for a C-level discussion on how Snowflake unifies product data, enables real-time analytics and drives measurable business impact. Attendees will learn how centralized product intelligence can transform decision-making at the executive level, supporting faster go-to-market strategies, operational efficiency and cross-functional collaboration.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "03:30 PM","end_time": "04:15 PM","duration_mins": "45.0","room": "Room 209 (Moscone South, Level 2)","capacity":
