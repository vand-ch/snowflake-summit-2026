le, governed cloud platform for student and staff data, submissions and analytics. On Snowflake, the NJ DOE now loads weekly deltas and EOY snapshots, runs nine major SLEDS submissions (including student, staff and course rosters), and utilizes production integrations (Tableau, dbt). The result is streamlined data collection, improved quality, and accelerated statewide reporting and analytics.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "03:30 PM","end_time": "03:50 PM","duration_mins": "20.0","room": "Vertical Village Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Migrations & Modernization","session_type": "Theater Session","location": "Vertical Village","topics": "System Integrations / Synchronizations","features": "Snowflake ML","personas": "Data Scientist","industry": "Public Sector","department": "Other","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Shashi Yellambhatla","speaker_companies": "New Jersey Department of Education","speaker_titles": "Chief Information Officer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "ML215","title": "Powering Intelligent Customer Recommendations at David Yurman with Snowflake ML","abstract": "Learn how David Yurman\u2019s DM&A team leveraged Snowflake and dbt to build their first in-house, enterprise-scale recommendation system. To deliver personalized suggestions across diverse segments, the team developed high-fidelity analytical marts using a hybrid of content-based and collaborative filtering. By using dbt for orchestration and Snowflake as the ML serving layer, they eliminated external platforms, reduced complexity and improved performance. This modern architecture now serves as a scalable foundation for continuous innovation in customer personalization and eliminated the need for external ML platforms.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "03:30 PM","end_time": "03:50 PM","duration_mins": "20.0","room": "Basecamp South Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Machine Learning","session_type": "Theater Session","location": "General Theaters","topics": "Data Warehouse","features": "Snowflake ML","personas": "MLOps","industry": "Retail & Consumer Goods","department": "IT","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Ashish Nachane","speaker_companies": "David Yurman","speaker_titles": "Sr. Director of Data & Analytics","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI211","title": "Reinventing FP&A at NOV: From Excel Sprawl to Governed Analytics with Sigma","abstract": "National Oilwell Varco (NOV) is a $9 billion global energy technology company operating across a complex landscape shaped by decades of acquisitions and more than 100 ERP systems. Historically, finance teams relied on spreadsheets, Access databases and siloed reporting processes \u2014 spending more time assembling data than analyzing it. By adopting Sigma on Snowflake, NOV built a governed finance data model that allows FP&A teams to explore data, drill from financial metrics into ERP transactions and collaborate on a shared source of truth. With this foundation in place, NOV is positioning its finance organization to move beyond reporting and toward AI-powered analysis and decision support.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "03:30 PM","end_time": "04:15 PM","duration_mins": "45.0","room": "Room 159 (Moscone South, Upper Mezzanine)","capacity": "213","track": "BI & Analytics","session_type": "Breakout Session","location": "","topics": "Snowflake Partners","features": "Snowflake Intelligence","personas": "BI / Analyst","industry": "Not industry-specific","department": "Finance","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Robbie Prejean","speaker_companies": "NOV","speaker_titles": "Vice President, FP&A","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE304","title": "The Investigation Runs Itself","abstract": "The anomaly lived for three weeks between the QBR metric definition and pipeline logic. Nobody caught it until the number was in the board pack. The alternative is Maia: a system where context builds as your team works. The Context Engine captures institutional knowledge from Slack, analyst notes and BRDs, building context around metrics, rules, exceptions and naming conventions. Mission Control runs agents that monitor data movements against that context, spots mismatches and starts the investigation. We\u2019ll show Maia catching a data movement, explaining what changed, then handing Snowflake Intelligence a structured path for deeper exploration.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "03:30 PM","end_time": "04:15 PM","duration_mins": "45.0","room": "Room 206 (Moscone South, Level 2)","capacity": "101","track": "Data Engineering & Pipelines","session_type": "Breakout Session","location": "","topics": "Snowflake Partners","features": "Cortex Code","personas": "Data Engineer","industry": "Not industry-specific","department": "IT","technical_level": "Advanced","delivery_method": "Live","speaker_names": "Liam Morrison Morrison | Julian Wiffen","speaker_companies": "Matillion | Matillion","speaker_titles": "Vice President, Field Engineering | Chief of AI & Data Science","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DH9","title": "User Group Meetup: APAC","abstract": "Join us at the AI Pop Up for the APAC User Group Meetup! Connect with Snowflake practitioners from across the Asia-Pacific region. Share how your teams are leveraging Snowflake, discuss regional challenges and build relationships that extend well beyond Summit. This is your space to strengthen the APAC Snowflake community together.","type": "AI Pop Up","date": "2026-06-02","day_name": "Tuesday","start_time": "03:30 PM","end_time": "04:30 PM","duration_mins": "60.0","room": "AI Pop Up (Basecamp, South, Hall D)","capacity": "0","track": "","session_type": "AI Pop Up","location": "","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "","delivery_method": "","speaker_names": "Karthik Raman","speaker_companies": "LTM","speaker_titles": "Head of Snowflake Practice","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "WN201T","title": "What\u2019s New: AI-Powered Observability at Scale with Observe by Snowflake","abstract": "Snowflake is redefining observability with Observe by Snowflake, a lakehouse-native observability platform. Learn how organizations can scale cost-effectively to hundreds of terabytes of telemetry per day and share data across business and operational contexts using Apache Iceberg on a telemetry lakehouse foundation. We will demo AI SRE, an AI agent that accelerates enterprise reliability workflows, and show how teams can engage with it through the Observe UI or coding agents to boost engineering productivity.","type": "Theater Session","date": "2026-06-02","day_name": "Tuesday","start_time": "03:30 PM","end_time": "03:50 PM","duration_mins": "20.0","room": "Builders Hub Theater (Basecamp, South Hall D)","capacity": "192","track": "What's New in Snowflake","session_type": "Theater Session","location": "Builder's Hub Theater","topics": "Observability","features": "Other","personas": "DevOps","industry": "Not industry-specific","department": "IT","technical_level": "Introductory","delivery_method": "OnDemand","speaker_names": "Kevin Leong | Gabriel Tavridis","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Sr. Director, Product Marketing | Head of Product, Observability","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "WN210B","title": "What's New: Innovations in Data and AI Governance","abstract": "Maintain rigorous control while scaling your AI enterprise. In this session, we dive into the latest innovations within Snowflake Horizon Catalog, our universal AI catalog with context and governance for AI over all data. Learn how Horizon Catalog powers the semantic layer to bridge the gap between technical metadata and business meaning. We also cover enhancements to interoperability and embedded open APIs (Apache Polaris and Iceberg REST Catalog), ensuring consistent policy enforcement across your entire data estate. Finally, we explore core governance, including external lineage updates, automated data classification and data quality monitoring.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "03:30 PM","end_time": "04:15 PM","duration_mins": "45.0","room": "Room 160 (Moscone South, Upper Mezzanine)","capacity": "232","track": "What's New in Snowflake","session_type": "Breakout Session","location": "","topics": "Catalogs / Discovery","features": "Cortex Code","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "OnDemand","speaker_names": "Suresh Thiru Thiru","speaker_companies": "Snowflake","speaker_titles": "Senior Director, Product Management","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI233","title": "Agentic Procurement: Accelerating Drug Development at Sanofi","abstract": "We\u2019re accelerating time to market for new medicines by removing enterprise friction. Learn how we\u2019re transforming procurement by combining Elementum AI workflows and agent orchestration with Snowflake to reinvent source\u2011to\u2011pay, freeing scientists and clinical teams to focus on life\u2011saving research. We\u2019ll show how agentic intelligence moves beyond rules\u2011based bots to interpret policy, resolve exceptions and use near real\u2011time signals to drive faster cycle times, fewer touchpoints, smarter buying and aligned metrics. We\u2019ll cover the journey, design principles, operating model changes and ways to scale responsibly toward autonomous enterprise operations.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "04:00 PM","end_time": "04:45 PM","duration_mins": "45.0","room": "Room 212 (Moscone South, Level 2)","capacity": "101","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Snowflake Intelligence","personas": "Data Engineer","industry": "Healthcare and Life Sciences","department": "Supply Chain","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Josh Waite | Amadeusz Andrzejewski | Yasmin Zaimi","speaker_companies": "Elementum AI | Deloitte | Sanofi","speaker_titles": "VP, Software Engineering | Partner, AI & Data | Global Product Line Owner - AI Workflows","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "ACT4","title": "Basecamp Happy Hour","abstract": "Head to Basecamp Happy Hour to recharge and connect. Grab a drink, explore the ecosystem and engage with attendees, partners and Snowflake experts in a relaxed, social setting.","type": "Activity","date": "2026-06-02","day_name": "Tuesday","start_time": "04:00 PM","end_time": "06:00 PM","duration_mins": "120.0","room": "Basecamp Expo Hall","capacity": "15000","track": "","session_type": "Activity","location": "","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "","delivery_method": "Live","speaker_names": "","speaker_companies": "","speaker_titles": "","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "IN119","title": "How Sanofi Scales AI Across 80 Countries with Dataiku and Snowflake","abstract": "What does it take to scale AI across 80 countries in a highly regulated industry? Join Jacob Kuijpers, Head of Data Operations at Sanofi, and Conor Jensen, Field CDO at Dataiku, for a candid conversation on turning AI ambition into enterprisewide execution. Discover how Sanofi uses Snowflake as its global data foundation and Dataiku to connect business and IT, operationalize governance and accelerate the shift from pilots to production. Learn practical lessons on data quality, platform strategy and operating model decisions for scaling AI in a complex, regulated organization.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "04:00 PM","end_time": "04:45 PM","duration_mins": "45.0","room": "Room 205 (Moscone South, Level 2)","capacity": "226","track": "Industry Innovation","session_type": "Breakout Session","location": "","topics": "MLOps","features": "Snowflake ML","personas": "MLOps","industry": "Not industry-specific","department": "Sales & Marketing","technical_level": "Introductory","delivery_method": "OnDemand","speaker_names": "Jacob Kuijpers | Conor Jensen","speaker_companies": "Sanofi | Dataiku","speaker_titles": "Global Head of Commercial Data | Global Field CDO","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI306","title": "Powering Agentic AI with Snowflake Intelligence, Snowflake Cortex, Infosys Topaz","abstract": "From AI to agentic AI in production: There's a playbook for adopting and deploying governed enterprise agents for integrated data orchestration. Agentic AI on the Snowflake AI Data Cloud enables organizations to move beyond dashboards and leverage intelligent, autonomous data agents to deliver real-time insights across structured and unstructured data. Powered by Snowflake Intelligence, Snowflak Cortex AI and Infosys Topaz, it accelerates decision-making, boosts productivity and ensures secure, governed, enterprise-scale AI adoption.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "04:00 PM","end_time": "04:45 PM","duration_mins": "45.0","room": "Room 214 (Moscone South, Level 2)","capacity": "101","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "Catalogs / Discovery","features": "SnowConvert AI","personas": "Product Manager","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Advanced","delivery_method": "Live","speaker_names": "GOPAL Sugavanam | Amit Patel","speaker_companies": "Infosys | Truist","speaker_titles": "SVP - Data AI Business Head | Chief Data Officer - Wholesale Banking","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "IN207","title": "TF1 and Netflix: Deploy ML Models in a Data Clean Room to Reinvent Media Collab","abstract": "Learn how TF1 and Netflix are building a data clean room on Snowflake to collaborate on audience insights without exposing underlying data. We\u2019ll walk through the end-to-end architecture, from data residency to deploying ML-trained models inside the clean room. You\u2019ll see how strict governance, code validation and cost controls enable privacy-safe activation and measurement across broadcaster and streaming workloads.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "04:00 PM","end_time": "04:45 PM","duration_mins": "45.0","room": "Room 151 (Moscone South, Upper Mezzanine)","capacity": "204","track": "Industry Innovation","session_type": "Breakout Session","location": "","topics": "Privacy","features": "Snowflake ML","personas": "MLOps","industry": "Media, Entertainment & Advertising","department": "Operations","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Francois-Xavier Pierrel","speaker_companies": "Groupe TF1","speaker_titles": "Group Chief Data & Adtech Officer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI275","title": "The Agentic Enterprise: How Snowflake Builds AI Apps For Its Own Business Units","abstract": "What does an \u201cagentic enterprise\u201d look like in practice? At Snowflake, we\u2019re building it ourselves. In this session, we share how internal teams across finance, marketing and operations are deploying AI agents on Snowflake to automate decisions and workflows. Learn how we design multi-agent systems that reason, act and collaborate on a shared data foundation. We\u2019ll walk through real internal use cases, architectures and orchestration patterns \u2014 so you can bring the same agentic approach to your own organization.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "04:00 PM","end_time": "04:45 PM","duration_mins": "45.0","room": "Room 216 (Moscone South, Level 2)","capacity": "197","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "Interoperability","features": "Cortex Code","personas": "Data Engineer","industry": "Not industry-specific","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Gaurav Singodia | Abyakta Lenka | Nirmal Raisoni","speaker_companies": "Snowflake | Snowflake | Snowflake","speaker_titles": "Director, Cloud Platform Engineering & Reliability | Principal Engineer | Director, Enterprise Engineering","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "IN224","title": "The Financial Services AI, Apps and Data Guide with Snowflake","abstract": "Data sharing has evolved from simple access to the essential fuel for autonomous execution. The new mandate is \"data for agency\" \u2014 transforming static shares into the intelligence that powers agentic workflows. This session brings to life Snowflake\u2019s AI Data Cloud for Financial Services, moving beyond retrieval to delivering AI-ready data products and governed semantic views. Hear how industry leaders tap into this ecosystem to drive operational leverage and measurable outcomes. Learn how Snowflake enables institutions to securely share the contextualized data required to accelerate agent-driven use cases across banking, insurance, capital markets and payments.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "04:00 PM","end_time": "04:45 PM","duration_mins": "45.0","room": "Room 152 (Moscone South, Upper Mezzanine)","capacity": "204","track": "Industry Innovation","session_type": "Breakout Session","location": "","topics": "System Integrations / Synchronizations","features": "Snowflake Intelligence","personas": "Business Executive","industry": "Financial Services","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Jay Dermody | Kelley Conway | John Heisler | Raghu Gadamsetty","speaker_companies": "MSCI | Northern Trust | Snowflake | Invesco","speaker_titles": "Managing Director | Chief Data and Analytics Officer | Head of AI for Financial Services | Global Head of Data and Analytics","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI203","title": "The Future of Data Is Semantics: How BlackRock and Snowflake Will Lead the Way","abstract": "A modern data ecosystem requires not just good quality, governed data, but semantic capabilities to empower business users in their BI tools of choice to drive AI. But what exactly are semantics? How are large companies like BlackRock incorporating semantics into their strategy? And what products is Snowflake building to empower our clients to meet their business needs? Join BlackRock and Snowflake for lively discussion on the future of semantics in data.","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "04:00 PM","end_time": "04:45 PM","duration_mins": "45.0","room": "Room 208 (Moscone South, Level 2)","capacity": "197","track": "BI & Analytics","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Semantic Views","personas": "Data Engineer","industry": "Financial Services","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Jeff Miller | Josh Klahr","speaker_companies": "BlackRock | Snowflake","speaker_titles": "Managing Director | Director of Product Management","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI201","title": "What Powers Your Platform? How Composability Fuels Marketing at Capital One","abstract": "Financial services marketers must balance speed and security. Capital One shows the way: by giving marketers self-serve access to unified data with a Composable CDP, they can reduce time to market while maintaining a high degree of well-managed data governance. In this session, learn how Capital One: Centralized customer 360 data in Snowflake to connect customer actions to marketing efforts Democratized access with Hightouch\u2019s Composable CDP, while maintaining strict governance and security Activated data across campaigns to drive more cross-sells, more efficient paid media and more personalized customer experiences","type": "Breakout Session","date": "2026-06-02","day_name": "Tuesday","start_time": "04:00 PM","end_time": "04:45 PM","duration_mins": "45.0","room": "Room 210 (Moscone South, Level 2)","capacity": "101","track": "BI & Analytics","session_type": "Breakout Session","location": "","topics": "System Integrations / Synchronizations","features": "Apache Iceberg\u2122","personas": "Data Engineer","industry": "Not industry-specific","department": "Sales & Marketing","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Bill Tenbusch","speaker_companies": "Capital One","speaker_titles": "Vice President - Marketing","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI239","title": "Eval-Driven Agent Optimization with Cortex Code CLI","abstract": "Transform agent debugging from guesswork into a measurable process. Using Cortex Code's agent-optimization skill and native Snowflake Cortex Agent Evaluations, you'll curate evaluation data sets from production logs, run benchmarks with metrics such as answer_correctness and tool_selection_accuracy, analyze failure patterns and iterate on agent instructions \u2014 all from the CLI. You'll practice the closed-loop workflow: benchmark \u2192 analyze failures \u2192 improve \u2192 validate. Walk away with a repeatable methodology for taking any Cortex Agents from prototype to production readiness.","type": "Hands-on Lab","date": "2026-06-02","day_name": "Tuesday","start_time": "04:30 PM","end_time": "06:00 PM","duration_mins": "90.0","room": "Hands-on Labs 1 (Basecamp, Hall E)","capacity": "299","track": "Generative AI & Agents","session_type": "Hands-on Lab","location": "","topics": "AI Agents / Data Agents","features": "Other","personas": "MLOps","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Elliott Botwick","speaker_companies": "Snowflake","speaker_titles": "Principal AI/ML Architect","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE215","title": "Hands-on Lab: Apache Spark on Snowflake","abstract": "In this hands-on lab, you will learn how to develop, deploy, orchestrate and monitor PySpark applications on Snowflake. Discover how to execute heavy-lifting Apache Spark jobs directly where your data lives, eliminating siloed platforms and risky data movement. You will migrate existing code, automate pipelines and apply unified governance. Join us to see how our fully managed runtime simplifies your architecture, allowing you to focus on insights rather than infrastructure management.","type": "Hands-on Lab","date": "2026-06-02","day_name": "Tuesday","start_time": "04:30 PM","end_time": "06:00 PM","duration_mins": "90.0","room": "Hands-on Labs 2 (Basecamp, Hall E)","capacity": "139","track": "Data Engineering & Pipelines","session_type": "Hands-on Lab","location": "","topics": "Data Warehouse","features": "Apache Spark\u2122","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Jason Freeberg | Brandon Carver","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Senior Product Manager | Senior Product Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "GO243","title": "Implement Sensitive Data Governance in Snowflake Using AI","abstract": "Safeguarding sensitive data at scale is nonnegotiable for regulatory compliance. Join this essential hands-on lab to master the art of automated sensitive data discovery and protection. You will leverage the power of AI to instantly generate robust data protection policies, learn to troubleshoot policy issues and establish an airtight audit trail for access to sensitive data. Achieve compliance confidence with advanced data governance.","type": "Hands-on Lab","date": "2026-06-02","day_name": "Tuesday","start_time": "04:30 PM","end_time": "06:00 PM","duration_mins": "90.0","room": "Hands-on Labs 3 (Basecamp, Hall E)","capacity": "133","track": "Governance & Security","session_type": "Hands-on Lab","location": "","topics": "AI Agents / Data Agents","features": "Cortex AI Functions","personas": "Data Engineer","industry": "Travel & Hospitality","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Ankit Gupta | Raghav Ram","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Staff Product Manager | Principal Software Engineer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE112","title": "Build Supportable Data Pipelines with AI in Coalesce","abstract": "This hands-on lab shows you how to build powerful data pipelines in Coalesce using AI. Learn how Coalesce unlocks Snowflake by combining standardized components with rapid, AI-generated code. You\u2019ll explore the interface, use natural language to transform and model data, and practice generating, building, reviewing and refining pipelines. Along the way, you\u2019ll gain confidence reading and supporting your pipelines while experimenting with rich column-level metadata, all in a workflow designed for data engineers.","type": "Hands-on Lab","date": "2026-06-02","day_name": "Tuesday","start_time": "06:30 PM","end_time": "08:00 PM","duration_mins": "90.0","room": "Hands-on Labs 3 (Basecamp, Hall E)","capacity": "133","track": "Data Engineering & Pipelines","session_type": "Hands-on Lab","location": "","topics": "Data Warehouse","features": "Cortex Code","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Doug Barrett","speaker_companies": "Coalesce","speaker_titles": "Field CTO","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "PO214","title": "Hands-On Lab: Performance Tuning and Cost Optimization","abstract": "In this interactive lab, participants will diagnose real-world performance bottlenecks and apply optimization techniques to reduce cost and improve query efficiency. Explore clustering strategies, warehouse right-sizing and query profile analysis in a guided, practical environment.","type": "Hands-on Lab","date": "2026-06-02","day_name": "Tuesday","start_time": "06:30 PM","end_time": "08:00 PM","duration_mins": "90.0","room": "Hands-on Labs 1 (Basecamp, Hall E)","capacity": "299","track": "Performance & Cost Optimization","session_type": "Hands-on Lab","location": "","topics": "Other","features": "Gen 2 Warehouses","personas": "Data Scientist","industry": "Not industry-specific","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Pranav Pokharel | Anoop Gupta","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Staff Product Manager | Software Engineering Director","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AR103","title": "Lakehouse Transformations: Build Production Pipelines for Your Iceberg Tables","abstract": "Stop pipeline sprawl and the cost of data duplication. In this advanced lab, you will learn to perform secure, in-place transformations across your entire data estate. You will connect externally managed Iceberg tables with Catalog Linked Databases to always work on fresh data without ETL, build efficient and declarative pipelines with Dynamic Tables for Iceberg preserving multi-engine access to your data, and implement business continuity to ensure your production data is always available.","type": "Hands-on Lab","date": "2026-06-02","day_name": "Tuesday","start_time": "06:30 PM","end_time": "08:00 PM","duration_mins": "90.0","room": "Hands-on Labs 2 (Basecamp, Hall E)","capacity": "139","track": "Architectures & Interoperability","session_type": "Hands-on Lab","location": "","topics": "Catalogs / Discovery","features": "Apache Iceberg\u2122","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Kamesh Sampath | Gilberto Hernandez","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Lead Developer Advocate | Lead Developer Advocate","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "C1","title": "AI in Production: What Breaks, What Scales","abstract": "AI is moving from experimentation to real-world deployment, and the challenges shift fast at scale. This session brings together engineering leaders to explore what it takes to operationalize AI in production. Expect a range of insights drawn from building and scaling complex platforms, and what those lessons mean for AI today.","type": "CTO Circle","date": "2026-06-03","day_name": "Wednesday","start_time": "09:00 AM","end_time": "10:30 AM","duration_mins": "90.0","room": "Room 201 - 203 (Moscone South, Level 2)","capacity": "290","track": "","session_type": "CTO Circle","location": "","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "","delivery_method": "Live","speaker_names": "David Nicholson | Vivek Raghunathan | Jon McNeill | Jeremy Burton","speaker_companies": "The Futurum Group | Snowflake | DVX | Snowflake","speaker_titles": "Chief Advisor | SVP of Engineering | CEO, DVx Ventures | General Manager, Observability","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "K3","title": "Builders Keynote","abstract": "AI is transforming what (and how) you build on Snowflake. From designing self-serve intelligence and architecting AI-ready data infrastructure to shipping production agents, builders are at the center of the biggest shift in data since the cloud. Through demos and customer stories, we'll learn how data practitioners are adapting and delivering more impact than ever before.","type": "Keynote","date": "2026-06-03","day_name": "Wednesday","start_time": "09:00 AM","end_time": "10:30 AM","duration_mins": "90.0","room": "Keynote (Basecamp, North Hall F)","capacity": "5000","track": "","session_type": "Keynote","location": "","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "","delivery_method": "OnDemand","speaker_names": "Carl Perry | Guillermo Rauch | Durgesh Das | Ana Stefanska | Ravi Achukola | James Cha-Earley","speaker_companies": "Snowflake | Vercel | Intercontinental Exchange / New York Stock Exchange | TUI | Medtronic | Snowflake","speaker_titles": "Head of Analytics | Chief Executive Officer, | Vice President,Data, Analytics and Governance | Snowflake Data Superhero, Data Team Lead | Executive IT Director, D&A | Senior Developer Advocate","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "TC3-W","title": "Training // Track 3 - Snowflake Platform Training + Exam - Wednesday","abstract": "This session is designed for individuals with limited experience using Snowflake and provides a walkthrough of the AI Data Cloud architecture through interactive labs, guiding learners how to unify, integrate and share previously siloed data with virtually unlimited scalability and concurrency.","type": "Snowflake Training","date": "2026-06-03","day_name": "Wednesday","start_time": "09:00 AM","end_time": "03:00 PM","duration_mins": "360.0","room": "Room 153 (Moscone South, Upper Mezzanine)","capacity": "204","track": "","session_type": "Snowflake Training","location": "","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "","delivery_method": "Live","speaker_names": "","speaker_companies": "","speaker_titles": "","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DH10","title": "User Group Meetup: US / Atlanta","abstract": "Join us at the AI Pop Up for the Atlanta User Group Meetup! Connect with fellow Snowflake community members from the Atlanta metro and the greater Southeast. Share what you\u2019re building, hear what\u2019s working for others and tap into a network of practitioners who can help you level up. Your local user group is one of the best resources you have \u2014 come see why.","type": "AI Pop Up","date": "2026-06-03","day_name": "Wednesday","start_time": "10:30 AM","end_time": "11:30 AM","duration_mins": "60.0","room": "AI Pop Up (Basecamp, South, Hall D)","capacity": "0","track": "","session_type": "AI Pop Up","location": "","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "","delivery_method": "","speaker_names": "Andy Brown","speaker_companies": "Everforth Apex Systems","speaker_titles": "Snowflake Data and AI Architect","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AD103","title": "Activating Enterprise Audience Intelligence with Snowflake Intelligence","abstract": "Acxiom receives inbound customer feeds that are transformed into a trusted, activation-ready Gold layer in Snowflake, enriched and identity-resolved into a governed customer/entity view, and protected with encrypted sensitive data controls. The business challenge isn\u2019t whether we store and govern the data, it\u2019s how fast leaders can turn data into decisions that improve campaign ROI while reducing risk. In this session, we show how Snowflake Intelligence enables marketers, analytics leads and executives to interact with governed Gold data in plain language to get board-ready answers and recommended actions without waiting on backlogs or writing SQL.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "11:00 AM","end_time": "11:45 AM","duration_mins": "45.0","room": "Room 205 (Moscone South, Level 2)","capacity": "226","track": "Application Development","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Snowflake Intelligence","personas": "Marketing Practitioner","industry": "Media, Entertainment & Advertising","department": "IT","technical_level": "Introductory","delivery_method": "OnDemand","speaker_names": "Srikanth Manduri | Ankur Jain","speaker_companies": "Anblicks | Acxiom","speaker_titles": "Managing Director, Retail & Media Branding | Chief Cloud & Data Modernization Officer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI303","title": "AI-Powered Conversations with Your Data Using Amazon Quick and Snowflake via MCP","abstract": "The enterprise data landscape is scattered. Teams are trapped in disconnected tools, business users wait days for insights, and engineers build fragile one-off integrations. This hands-on workshop shows how to integrate Amazon Quick MCP actions with Snowflake Cortex AI's MCP server to build AI agents that transform how teams interact with enterprise data. Business users can ask questions such as \"What are our top-performing products this quarter?\" without writing SQL, while IT maintains security and governance controls. Walk out with working code and production-ready patterns that support self-service analytics across your organization.","type": "Hands-on Lab","date": "2026-06-03","day_name": "Wednesday","start_time": "11:00 AM","end_time": "12:30 PM","duration_mins": "90.0","room": "Hands-on Labs 2 (Basecamp, Hall E)","capacity": "139","track": "Generative AI & Agents","session_type": "Hands-on Lab","location": "","topics": "Snowflake Partners","features": "Cortex Code","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Advanced","delivery_method": "Live","speaker_names": "Nithyashree Alwarsamy | James Sun Sun","speaker_companies": "AWS | Snowflake","speaker_titles": "Partner Solutions Architect | Sr. Partner Solution Engineer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "GO246","title": "AI-Ready Data: Quality, Lineage and Root Cause at Scale","abstract": "When your consumers were dashboards, a stale number meant a wrong decision. When your consumers are agents, a stale number means a wrong action \u2014 at machine speed, across thousands of decisions per minute. AI-ready data isn't cleaner data. It is data that carries trust into every agent that consumes it. In this session, we will show how to build a continuous column-aware trust signal across your warehouse using native Snowflake Data Metric Functions, cross-platform lineage and Cortex, turning detection and root cause analysis into a closed loop that runs in minutes. We'll show how this signal becomes the runtime contract between your data and the agents that act on it.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "11:00 AM","end_time": "11:45 AM","duration_mins": "45.0","room": "Room 208 (Moscone South, Level 2)","capacity": "197","track": "Governance & Security","session_type": "Breakout Session","location": "","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Purvaja Narayanaswamy Narayanaswamy","speaker_companies": "Snowflake","speaker_titles": "Sr. Engineering Manager - AI Governance","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AR303","title": "AT&T\u2019s Interoperable Iceberg Journey","abstract": "AT&T is transitioning its data ecosystem to the Iceberg open-table format, aiming to achieve a single version of truth and seamless data interoperability across platforms including Snowflake, which reduces data duplication and operational costs. This architecture separates data, compute and metadata planes, allowing different compute engines to efficiently access and manage Iceberg tables while maintaining strict access controls and supporting both human and AI data consumers. This migration, supported by automation and platform partnerships, will cover 75% of AT&T\u2019s analytic data by the end of 2026, simplifying data access, improving governance and accelerating business growth.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "11:00 AM","end_time": "11:45 AM","duration_mins": "45.0","room": "Room 152 (Moscone South, Upper Mezzanine)","capacity": "204","track": "Architectures & Interoperability","session_type": "Breakout Session","location": "","topics": "Snowflake Partners","features": "Apache Iceberg\u2122","personas": "Data Engineer","industry": "Telecom","department": "Not department-specific","technical_level": "Advanced","delivery_method": "OnDemand","speaker_names": "Mark Holcomb Holcomb","speaker_companies": "AT&T","speaker_titles": "DISTINGUISHED SOLUTION ARCHITECT","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI258","title": "Building Agentic Enterprise Workflows with Trusted Data","abstract": "Agentic workflows \u2014 where AI agents operate autonomously to enhance enterprise productivity \u2014 rely on trustworthy, high-quality and well-governed data. This session explores how Informatica from Salesforce unlocks context across fragmented enterprise systems, establishes trust through automated data quality, and grounds Snowflake Cortex Agents with reliable, relevant context. Through an architectural blueprint, learn how to leverage enterprise-grade data management via MCPs to build and scale agentic workflows on Snowflake.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "11:00 AM","end_time": "11:20 AM","duration_mins": "20.0","room": "Basecamp South Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "General Theaters","topics": "System Integrations / Synchronizations","features": "Cortex AI Functions","personas": "Data Engineer","industry": "Technology","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Rajeev Srinivasan Srinivasan","speaker_companies": "Informatica","speaker_titles": "Director, Technical Alliances","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI109","title": "Building Enterprise AI Agents Using Snowflake Intelligence","abstract": "In mid 2025, we launched the Snowflake GTM AI Assistant to 6,000 users across Snowflake sales and marketing organizations \u2014 our first full-scale enterprise deployment of Snowflake Intelligence. By year-end, the assistant had already answered more than 330,000 questions, helping users work faster and make better decisions. Since launch, we got so many questions about how to successfully develop, launch and scale reliable enterprise AI assistants for thousands of users. This session is about sharing our best practices so others can easily build similar enterprise agents that users love.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "11:00 AM","end_time": "11:20 AM","duration_mins": "20.0","room": "Basecamp South Theater 3 (Basecamp, South Hall C)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "General Theaters","topics": "AI Agents / Data Agents","features": "Snowflake Intelligence","personas": "Data Engineer","industry": "Other","department": "Sales & Marketing","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Sait Izmit","speaker_companies": "Snowflake","speaker_titles": "Principal Product Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI110","title": "Built to Perform: Elementum and Snowflake for Agentic Retail Support","abstract": "Under Armour transformed Level 1 IT support into an always-on digital workforce that powers performance across retail and corporate teams worldwide. In-store teammates get immediate support through Teams or voice, keeping critical systems available and the floor moving at peak intensity. Built on Elementum orchestration, Elementum AI agents and Snowflake Intelligence, high-volume requests are resolved autonomously, with seamless handoff to experts when needed. Snowflake Cortex AI \u2014 using search, complete and Claude Sonnet \u2014 delivers trusted, real-time answers at scale, reducing cost per interaction while protecting store productivity and revenue.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "11:00 AM","end_time": "11:45 AM","duration_mins": "45.0","room": "Room 216 (Moscone South, Level 2)","capacity": "197","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "Snowflake Partners","features": "Cortex Agents","personas": "Product Manager","industry": "Not industry-specific","department": "IT","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Porter Hoskins | Alexander Miller","speaker_companies": "Elementum AI | Under Armour","speaker_titles": "Principle Forward Deployed Engineer | Senior Manager, Agentic & Automation Engineering","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE225","title": "Deploy, Version, Test and Manage Snowflake Openflow Connectors Using Cortex Code","abstract": "Join us to learn and see recommended ways for addressing DevOps requirements when it comes to Snowflake Openflow Connectors. A demo will show how it is possible to deploy an Snowflake Openflow Connector using a Cortex Code agent, make changes in the connector based on specific business requirements, version control the changes, configure GitHub automated testing and automate deployment of the new version of the connector in a production environment. See the entire process from a flow problem statement, to development, all the way up to production using the Cortex Code agent.","type": "Hands-on Lab","date": "2026-06-03","day_name": "Wednesday","start_time": "11:00 AM","end_time": "12:30 PM","duration_mins": "90.0","room": "Hands-on Labs 1 (Basecamp, Hall E)","capacity": "299","track": "Data Engineering & Pipelines","session_type": "Hands-on Lab","location": "","topics": "AI Agents / Data Agents","features": "Snowflake Openflow","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Pierre Villard | Dan Chaffelson","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Senior Software Engineer | Principal Data Engineer, FCTO","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "E25","title": "Executive Industry Summit Tour \u2014 Retail","abstract": "Join an exclusive, guided tour of the Snowflake AI Data Cloud and its premier partner ecosystem, tailored for leaders in retail. This immersive experience will take you through five curated stops that showcase the art of the possible \u2014 real-world solutions, cutting-edge AI use cases and data-driven innovations transforming your industry today. Gain direct access to experts, see industry-leading technology in action and leave with actionable inspiration to accelerate your data strategy. Space is extremely limited \u2014 registration is first come, first served. Please note that this experience includes walking between stops; comfortable footwear is recommended. Please note that the Executive Booth Tours are reserved for customers only \u2014 we kindly ask our partners not to register.","type": "Executive Content","date": "2026-06-03","day_name": "Wednesday","start_time": "11:00 AM","end_time": "12:30 PM","duration_mins": "90.0","room": "Vertical Village (Basecamp, South Hall B)","capacity": "15","track": "","session_type": "Executive Content","location": "","topics": "","features": "","personas": "","industry": "Retail & Consumer Goods","department": "","technical_level": "","delivery_method": "","speaker_names": "","speaker_companies": "","speaker_titles": "","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "IN230","title": "From First Principles: The Ideas That Built Snowflake \u2014 and What Comes Next","abstract": "This fireside chat revisits the first principles that shaped Snowflake\u2019s cloud-native data platform \u2014 from unifying structured and semi-structured data to separating compute and storage and embracing elastic scale. Joined by a customer who has been with Snowflake for over a decade, Snowflake\u2019s co-founders will reflect on how revolutionary ideas years ago have evolved into becoming the industry standard, the lessons learned from real-world adoption, and how Snowflake is powering the shift to the agentic enterprise. We\u2019ll close by exploring the next frontier: connecting data, intelligence and action to unlock AI at scale.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "11:00 AM","end_time": "11:45 AM","duration_mins": "45.0","room": "Room 158 (Moscone South, Upper Mezzanine)","capacity": "583","track": "Industry Innovation","session_type": "Breakout Session","location": "","topics": "Data Warehouse","features": "Cortex Code","personas": "Data Engineer","industry": "Not industry-specific","department": "Other","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Jay Benach | S Muralidhar | Benoit Dageville | Thierry Cruanes","speaker_companies": "Human Security | Snowflake | Snowflake | Snowflake","speaker_titles": "General Manager, Media Security | Chief Technology Officer | Co-Founder and President, Product | Co-Founder","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI113","title": "Gallus Insights: AI-Powered Embedded Analytics for the Mortgage Industry","abstract": "The most ambitious AI goals live or die by the quality of the underlying data. To truly harness AI, organizations must ensure they have a high-performance data foundation. See how Gallus Insights has built a robust, scalable architecture on Snowflake and seamlessly integrated ThoughtSpot Embedded to power customer experience. By leveraging cutting-edge agentic analytics, they deliver self-service insights to clients who can ask natural language questions and understand not just what's happening\u2014but why. By combining Snowflake and ThoughtSpot, Gallus is experiencing 10x faster performance and reduced data costs and turning complex data into a competitive advantage.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "11:00 AM","end_time": "11:20 AM","duration_mins": "20.0","room": "Vertical Village Theater 2 (Basecamp, South Hall B)","capacity": "150","track": "BI & Analytics","session_type": "Theater Session","location": "Vertical Village","topics": "Snowflake Partners","features": "Secure Data Sharing","personas": "BI / Analyst","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Agustin Del Rio","speaker_companies": "Gallus Insights","speaker_titles": "Founder & CEO","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI228","title": "Get ROI from Your Agents with Amazon Bedrock AgentCore, MCP and Snowflake","abstract": "AI agents are no longer a research experiment. They are running in production, closing support tickets, managing data pipelines and making decisions at enterprise scale. This session shows you how to architect, deploy and operate production-grade AI agents on AWS, from a single agent to complex multiagent systems. Using Amazon Bedrock AgentCore, walk through real-world design patterns covering secure serverless deployment, tool and API integration via MCP, persistent memory, identity and access management, and end-to-end observability. See how AgentCore Gateway integrates with a Snowflake managed MCP server to orchestrate specialized subagents across your enterprise data ecosystem.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "11:00 AM","end_time": "11:45 AM","duration_mins": "45.0","room": "Room 210 (Moscone South, Level 2)","capacity": "101","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Cortex Agents","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Nidhi Gupta Gupta","speaker_companies": "AWS","speaker_titles": "Sr. Partner SA, Data & Analytics","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE110","title": "Getting Your Data Cortex AI-Ready with Fivetran, Snowflake and dbt","abstract": "In 90 minutes, you'll go hands-on building a production-ready AI chatbot \u2014 taking raw data from ingestion all the way to an experience powered by Snowflake Intelligence using Fivetran and dbt Platform. Guided step by step, this lab is designed for all skill levels. Whether you're new to the modern data stack or a seasoned practitioner, you'll walk away with working knowledge of Snowflake Cortex AI and a repeatable blueprint you can take back to your organization.","type": "Hands-on Lab","date": "2026-06-03","day_name": "Wednesday","start_time": "11:00 AM","end_time": "12:30 PM","duration_mins": "90.0","room": "Hands-on Labs 3 (Basecamp, Hall E)","capacity": "133","track": "Data Engineering & Pipelines","session_type": "Hands-on Lab","location": "","topics": "Snowflake Partners","features": "Cortex Code","personas": "MLOps","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Luis Leon | Kelly Kohlleffel","speaker_companies": "dbt Labs | Fivetran","speaker_titles": "Partner Solution Architect | Sr. Director Global Partner Sales Eng","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "ML303","title": "Improving Forecast Accuracy for\u00a0Supply Chain Planning in Snowflake ML","abstract": "Owens & Minor, a Fortune 500 healthcare distributor, needed to unify supply chain planning across multiple non-SAP ERPs and break free from SAP IBP\u2019s black-box forecasting. In this session, learn how the company used Snowflake as a central data lake and ML platform, with bidirectional integration to SAP IBP, to modernize demand forecasting at scale. We cover migrating ARIMA/SARIMA models to Snowflake, achieving greater transparency and automated hyperparameter tuning across more than 500,000 product-location pairs, resolving a six-year data integration challenge and improving forecast accuracy, speed and cost efficiency in a low-margin business.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "11:00 AM","end_time": "11:20 AM","duration_mins": "20.0","room": "Vertical Village Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Machine Learning","session_type": "Theater Session","location": "Vertical Village","topics": "MLOps","features": "Snowflake ML","personas": "MLOps","industry": "Healthcare and Life Sciences","department": "Supply Chain","technical_level": "Advanced","delivery_method": "Live","spe the conversation will examine how organizations maintain visibility, enforce standards and ensure systems behave as expected. Speakers will share lessons learned on balancing speed with stability, and what it takes to scale both in modern engineering environments.","type": "CTO Circle","date": "2026-06-03","day_name": "Wednesday","start_time": "11:00 AM","end_time": "12:30 PM","duration_mins": "90.0","room": "Room 201 - 203 (Moscone South, Level 2)","capacity": "290","track": "","session_type": "CTO Circle","location": "","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "","delivery_method": "","speaker_names": "Caitlin Colgrove | Chris Kozlowski | David Gildeh | Shruti Bhat | Corey Burke","speaker_companies": "Hex | Barclays | Netflix | Snowflake | Dialpad","speaker_titles": "CTO | Managing Director | Telemetry Engineering Lead | Head of Marketing, Observability | SVP Engineering","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DM202","title": "Salesforce and Snowflake: Maximize Your Data Investments with Zero-Copy","abstract": "Learn how Salesforce Data 360 leverages zero-copy to unify and activate customer data directly from Snowflake without the cost or risk of traditional ETL. This bidirectional integration provides a trusted data foundation that fuels your agents with real-time, governed insights directly from the Snowflake AI Data Cloud.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "11:00 AM","end_time": "11:45 AM","duration_mins": "45.0","room": "Room 214 (Moscone South, Level 2)","capacity": "101","track": "Data Sharing & Marketplace","session_type": "Breakout Session","location": "","topics": "System Integrations / Synchronizations","features": "Apache Iceberg\u2122","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Varun Dewan | Vijay Gopalakrishnan","speaker_companies": "Salesforce | Salesforce","speaker_titles": "Sr Director Product Management | Director, Product Management","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "MI210","title": "The Data Gap Holding AI Back: Lessons from LPL Financial and Morgan Stanley","abstract": "AI is only as powerful as the data platform behind it \u2014 and legacy architectures are holding financial services back. In this session, leaders from LPL Financial and Morgan Stanley share how they are transforming legacy data platforms into AI\u2011enabled foundations for enterprise innovation. The discussion highlights how modern data architectures unlock business value, improve operational efficiency, and accelerate advanced analytics and AI\u2011driven insights. Attendees will learn how Snowflake Intelligence activates data as a strategic asset to deliver personalized client experiences and competitive advantage, along with practical lessons from real\u2011world transformation challenges.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "11:00 AM","end_time": "11:20 AM","duration_mins": "20.0","room": "Basecamp South Theater 2 (Basecamp, South Hall A)","capacity": "150","track": "Migrations & Modernization","session_type": "Theater Session","location": "General Theaters","topics": "AI Agents / Data Agents","features": "Cortex Code","personas": "Data Engineer","industry": "Financial Services","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Vick Patel | Krithika Venkat | Ashish Shahjee","speaker_companies": "CAPGEMINI | Morgan Stanley | LPL Financial","speaker_titles": "Data & Analytics Technology Leader | Managing Director | Vice President II","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "WN213B","title": "What's New: Analytics in the Age of AI","abstract": "Modern analytics is being reshaped by AI. In this session, we'll share what's new in analytics on Snowflake and how these innovations are changing how organizations explore, understand and act on their data. Discover how teams are delivering sub-second analytics with high concurrency using Interactive Analytics and using semantic views to let anyone gain value from AI on all the data Snowflake has access to. We'll also cover the latest in performance and AI-powered migration tools that make analytics accessible to every user. You'll leave with a clear view of Snowflake's analytics vision, how it's evolving, what's possible today, and how to build data experiences that are faster, more flexible and ready for the age of AI.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "11:00 AM","end_time": "11:45 AM","duration_mins": "45.0","room": "Room 151 (Moscone South, Upper Mezzanine)","capacity": "204","track": "What's New in Snowflake","session_type": "Breakout Session","location": "","topics": "System Integrations / Synchronizations","features": "Cortex Code","personas": "Data Engineer","industry": "Not industry-specific","department": "Operations","technical_level": "Introductory","delivery_method": "OnDemand","speaker_names": "Rima Mutreja | Carl Perry","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Principal Product Manager | Head of Analytics","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "WN207T","title": "What's New: Connectivity for AI-Ready Pipelines, with AI","abstract": "To power AI, your data needs a nerve system. For data engineers, the challenge is going beyond the cost of moving data to focus on the instant value of AI activation. This session explores how Snowflake\u2019s connectivity offerings act as the connective tissue for your entire data estate, transforming pipelines from a bottleneck into a strategic enabler. We\u2019ll dive into our AI-driven approach to automation and the latest engineering breakthroughs including Openflow, streaming, file processing and zero-copy integration. Learn how to build the connective tissue required to light up AI across the enterprise.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "11:00 AM","end_time": "11:20 AM","duration_mins": "20.0","room": "Basecamp South Theater 4 (Basecamp, South Hall C)","capacity": "150","track": "What's New in Snowflake","session_type": "Theater Session","location": "General Theaters","topics": "System Integrations / Synchronizations","features": "Snowflake Openflow","personas": "Data Engineer","industry": "Not industry-specific","department": "Operations","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Saptarshi Mukherjee | Michael Waller","speaker_companies": "Snowflake | ExodusPoint","speaker_titles": "Senior Director of Product Management | Global Head of Data","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "WN209T","title": "What's New: Smart Pipeline Development","abstract": "Data engineering is at a crossroads: AI is both the product to build and the tool to use. It's reshaping what data engineers do and how they work. To keep up, engineering teams must move beyond manual pipeline management. This session provides a roadmap to the next generation of data engineering on Snowflake. Join us to see how you can spend less time managing infrastructure and more time building high-value data products.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "11:00 AM","end_time": "11:20 AM","duration_mins": "20.0","room": "Builders Hub Theater (Basecamp, South Hall D)","capacity": "192","track": "What's New in Snowflake","session_type": "Theater Session","location": "Builder's Hub Theater","topics": "System Integrations / Synchronizations","features": "Cortex Code","personas": "Data Engineer","industry": "Not industry-specific","department": "R&D","technical_level": "Introductory","delivery_method": "OnDemand","speaker_names": "Abhishek Kashyap | Anita Thomas","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Director, Product Management | Staff Product Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE105","title": "Beyond Ingestion: How Zendesk Scales Global Insights with Fivetran and Snowflake","abstract": "To power AI-driven customer insights, Zendesk needed to unify product telemetry and enterprise data. Legacy pipelines meant a single connector could take months to deliver value. By replacing a homegrown Airflow and custom connector stack with a Snowflake-powered data platform, Zendesk dramatically accelerated delivery. Insights that once took months now take weeks. In this session, learn how Zendesk achieved a 4x increase in connector output and scaled to more than 30 data sources with a lean team. We\u2019ll explore the shift from siloed systems to a unified semantic layer \u2014 and how to prepare your data stack for custom SDK connectors, automated transformations and unstructured data.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "11:30 AM","end_time": "11:50 AM","duration_mins": "20.0","room": "Vertical Village Theater 2 (Basecamp, South Hall B)","capacity": "150","track": "Data Engineering & Pipelines","session_type": "Theater Session","location": "Vertical Village","topics": "Snowflake Partners","features": "Other","personas": "Data Engineer","industry": "Technology","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Chinmay Vaidya | Akshay Agrawal","speaker_companies": "Zendesk | Zendesk","speaker_titles": "Data Engineering Manager | Director, Data Engineering","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI267","title": "Building Powerful AI Data Tools with AI Functions and Agentic Search","abstract": "Building AI applications in the age of agents demands a platform that turns vast enterprise data into real business outcomes. Snowflake Cortex AI Functions deliver the core primitives \u2014 classify, extract, summarize and analyze \u2014 to build powerful AI pipelines directly in Snowflake. AI Function Studio accelerates time to value with managed quality optimizations, multimodal support and built-in cost controls. Add agentic search, and intelligent systems can now orchestrate analytical workflows across thousands of documents that traditional RAG can't handle. One platform. Enterprise-grade AI, end to end.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "11:30 AM","end_time": "12:15 PM","duration_mins": "45.0","room": "Room 159 (Moscone South, Upper Mezzanine)","capacity": "213","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Cortex Code","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Jessie E Felix Felix","speaker_companies": "Snowflake","speaker_titles": "Staff Product Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI223","title": "Causality Data for Marketing: Deploy Valuable AI Personalization on Snowflake","abstract": "Marketing teams run thousands of experiments, but the learnings don\u2019t always translate into better results. Why? We\u2019re scaling our campaigns on the wrong data. This session introduces the agentic context graph built on the Snowflake AI Data Cloud. It\u2019s a warehouse-native learning layer that continuously captures customer context, actions and outcomes to power AI decision-making. Walk away with a blueprint for turning results from thousands of experiments into compounding intelligence, helping you scale smarter campaigns and guarantee growth.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "11:30 AM","end_time": "11:50 AM","duration_mins": "20.0","room": "Basecamp South Theater 4 (Basecamp, South Hall C)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "General Theaters","topics": "Data Warehouse","features": "Cortex Code","personas": "Data Engineer","industry": "Travel & Hospitality","department": "Sales & Marketing","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Anthony Rotio","speaker_companies": "GrowthLoop","speaker_titles": "Co-CEO","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI222","title": "Cummins Supply Chain Modernization and Chatbots","abstract": "Cummins, a global power technology leader, executed a six-month supply chain data modernization on Snowflake, consolidating 50+ source systems and 2,777 tables from legacy platforms like SQL Server and Oracle into a unified enterprise data platform. This reduced complexity by 94% and enabled a governed semantic layer for BI, analytics and supply chain use cases. We highlight our \u201cIngest Once, Govern Centrally, Consume Everywhere\u201d architecture and evolution from manual SQL workflows to a conversational AI layer, including Gen 1 (Streamlit + Cortex) and next-gen chatbots that enable governed, self-service insights for faster, cross-functional decision-making.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "11:30 AM","end_time": "11:50 AM","duration_mins": "20.0","room": "Vertical Village Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "Vertical Village","topics": "Data Warehouse","features": "SnowConvert AI","personas": "BI / Analyst","industry": "Manufacturing","department": "Supply Chain","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Sushrutha Pokala | Sunitha Girirajan","speaker_companies": "Cummins Inc | Cummins Inc.","speaker_titles": "Principal Product Manager | Leader - Supply Chain BI and Analytics","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "E15","title": "Executive Lunch Hosted by Kumo","abstract": "Hosted by Kumo, this partner-hosted lunch brings executive attendees together to network and recharge over a complimentary meal, available while supplies last.","type": "Executive Content","date": "2026-06-03","day_name": "Wednesday","start_time": "11:30 AM","end_time": "01:00 PM","duration_mins": "90.0","room": "Alpine Clubhouse (Moscone South, Level 3)","capacity": "200","track": "","session_type": "Executive Content","location": "","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "","delivery_method": "Live","speaker_names": "","speaker_companies": "","speaker_titles": "","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI273","title": "From AI Hype to Enterprise Value: Closing the Gap","abstract": "Organizations have invested heavily in AI, yet many struggle to show tangible value. Despite strong strategies, major spend and numerous pilots, outcomes often fall short \u2014 productivity gains are uneven, impact is hard to measure and transformation hasn\u2019t scaled as expected. In this candid panel, industry and technology leaders move beyond success stories to examine real AI value creation, sharing where investments delivered results, where they stalled and what enabled some to break through. This EY discussion explores how data readiness, operating models, governance and platform choices determine whether AI becomes lasting business value or remains an experiment.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "11:30 AM","end_time": "12:15 PM","duration_mins": "45.0","room": "Room 211 (Moscone South, Level 2)","capacity": "226","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "Catalogs / Discovery","features": "Cortex
