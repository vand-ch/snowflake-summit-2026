skew and data drift between provider and consumer. In this session, we walk through how our data engineering team replatformed 161 highly customized property and analytics products from file-based delivery to Snowflake using secure views and private listings. We\u2019ll cover the architecture, operational decisions and governance patterns that preserved customization, protected intellectual property and supported cross-region distribution \u2014 while reducing customer time-to-value from weeks to hours.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "11:30 AM","end_time": "12:15 PM","duration_mins": "45.0","room": "Room 213 (Moscone South, Level 2)","capacity": "226","track": "Migrations & Modernization","session_type": "Breakout Session","location": "","topics": "Interoperability","features": "Snowpipe Streaming / Dynamic Tables","personas": "Data Engineer","industry": "Technology","department": "R&D","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Felix Tom","speaker_companies": "Attom Data Solutions","speaker_titles": "Data Platform Architect","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI285","title": "Resideo's AI-Assisted Snowflake Development Journey","abstract": "Resideo partnered with evolv to adopt Cortex Code and Cortex Analyst on production-grade Snowflake workloads from Day 1. The team refactored a 3,000-line stored procedure to ~1,500 lines in under 60 minutes, cut development iteration cycles from 4-6 to 1-2, and built a governed semantic foundation enabling self-service analytics \u2014 targeting a 50% reduction in ad-hoc data requests within six months. This session shares the deployment guardrails, prompt governance practices and lessons learned that made AI-assisted development stick.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "11:30 AM","end_time": "12:15 PM","duration_mins": "45.0","room": "Room 206 (Moscone South, Level 2)","capacity": "101","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "Data Warehouse","features": "Cortex Code","personas": "Data Engineer","industry": "Not industry-specific","department": "IT","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Trent Foley Foley | Sai Kesanapalli","speaker_companies": "evolv Consulting | ADI Global Distribution","speaker_titles": "CTO | Chief Data Officer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "PO216","title": "Scaling Smart: Optimization Framework Behind Samsung Ads DMP's 73% Cost Savings ","abstract": "Samsung Ads achieved a 73% cost reduction by implementing a structured optimization framework across compute, storage and workload governance. This session breaks down the methodology, monitoring mechanisms and cultural changes that sustained those gains \u2014 without sacrificing performance.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "11:30 AM","end_time": "11:50 AM","duration_mins": "20.0","room": "Basecamp South Theater 3 (Basecamp, South Hall C)","capacity": "150","track": "Performance & Cost Optimization","session_type": "Theater Session","location": "General Theaters","topics": "Data Warehouse","features": "Gen 2 Warehouses","personas": "Data Engineer","industry": "Not industry-specific","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Kapil Malviya","speaker_companies": "Samsung","speaker_titles": "Chief Engineer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "GO210","title": "Trusted Data, Smarter AI: Enterprise Governance for Snowflake","abstract": "Every AI initiative runs on data \u2013 but most enterprises don\u2019t know if that data is trustworthy, especially when it spans Snowflake, SAP and beyond. In this session, learn how leading organizations use Collibra and Snowflake together to build a governed data foundation that teams can find, trust and deploy into AI workflows with confidence. We\u2019ll cover how Collibra\u2019s active governance layer \u2014 integrated with Snowflake Semantic Views and the Open Semantic Interchange \u2014 ensures every metric means the same thing across dashboards, AI models and agents. Walk away with a blueprint for turning your Snowflake environment into a trusted foundation for AI \u2014 faster, with less risk.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "11:30 AM","end_time": "11:50 AM","duration_mins": "20.0","room": "Basecamp South Theater 2 (Basecamp, South Hall A)","capacity": "150","track": "Governance & Security","session_type": "Theater Session","location": "General Theaters","topics": "Snowflake Partners","features": "Semantic Views","personas": "Data Engineer","industry": "Not industry-specific","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Anand Akella | Charles Mae","speaker_companies": "Collibra | Collibra","speaker_titles": "Senior Partnership Account Manager | Staff Customer Engineer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "WN214B","title": "What's New: Agentic ML in Snowflake","abstract": "Learn how the latest agentic capabilities in Snowflake ML accelerate productivity for your ML teams. Join us for new feature overviews and a live demo showcasing our latest innovations.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "11:30 AM","end_time": "12:15 PM","duration_mins": "45.0","room": "Room 160 (Moscone South, Upper Mezzanine)","capacity": "232","track": "What's New in Snowflake","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Cortex Code","personas": "MLOps","industry": "Not industry-specific","department": "R&D","technical_level": "Introductory","delivery_method": "OnDemand","speaker_names": "Pavan Pothukuchi | Jeffrey Geevarghese","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Director, Product Management | Sr Engineering Manager, AI/ML Platforms","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "WN210T","title": "What's New: Innovations in Data and AI Governance","abstract": "Maintain rigorous control while scaling your AI enterprise. In this session, we dive into the latest innovations within Snowflake Horizon Catalog, our universal AI catalog with context and governance for AI over all data. Learn how Horizon Catalog powers the semantic layer to bridge the gap between technical metadata and business meaning. We also cover enhancements to interoperability and embedded open APIs (Apache Polaris and Iceberg REST Catalog), ensuring consistent policy enforcement across your entire data estate. Finally, we explore core governance, including external lineage updates, automated data classification and data quality monitoring.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "11:30 AM","end_time": "11:50 AM","duration_mins": "20.0","room": "Builders Hub Theater (Basecamp, South Hall D)","capacity": "192","track": "What's New in Snowflake","session_type": "Theater Session","location": "Builder's Hub Theater","topics": "Catalogs / Discovery","features": "Cortex Code","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "OnDemand","speaker_names": "Suresh Thiru Thiru","speaker_companies": "Snowflake","speaker_titles": "Senior Director, Product Management","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI119","title": "When AI Runs the Journey: How MoneyLion Simplified Marketing at Scale","abstract": "AI isn\u2019t a tool: It\u2019s an opportunity to reinvent business models, team roles and relationships with customers. In this session, hear from leaders at MoneyLion who have transformed their business with AI. They\u2019ll share: How they\u2019ve replaced thousands of fragmented journeys and competing product priorities with customer-first marketing via AI Decisioning on Snowflake How marketing, analytics, engineering and data science teams are collaborating and redefining their roles as AI allows them to delegate manual tasks The pragmatic playbook they\u2019ve developed to test and adopt impactful AI within Snowflake and the larger martech ecosystem","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "11:30 AM","end_time": "11:50 AM","duration_mins": "20.0","room": "Basecamp South Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "General Theaters","topics": "AI Agents / Data Agents","features": "Snowflake Intelligence","personas": "Data Engineer","industry": "Not industry-specific","department": "Sales & Marketing","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Peter Grimm | Emily Carlo","speaker_companies": "Gen Digital - MoneyLion | MoneyLion","speaker_titles": "Head of Martech | Senior Manager, Strategy and BI","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI208","title": "AI-Powered R and Python Data Science You Can Actually Trust","abstract": "Your AI coding agent can query data and generate apps. But can it match how data scientists actually work \u2014 and can your team inspect the work, reproduce it and run it anywhere? The Posit Team Snowflake Native App brings a governed, code-first data science platform directly into Snowflake \u2014 supporting both Python and R, including the only managed R runtime. See how AI-assisted workflows backed by Snowflake Cortex AI LLMs help data scientists explore data grounded in semantic models, build interactive data products and move to production \u2014 all without sacrificing reproducibility or portability. It's AI-assisted, open source-powered and production-ready on Snowflake.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "12:00 PM","end_time": "12:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 2 (Basecamp, South Hall A)","capacity": "150","track": "BI & Analytics","session_type": "Theater Session","location": "General Theaters","topics": "Snowflake Partners","features": "Cortex AI Functions","personas": "Data Scientist","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Chetan Thapar","speaker_companies": "Posit","speaker_titles": "Sr Product Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AR221","title": "Apache Iceberg at Scale: Lessons from Affirm, Booking.com, DoorDash and Indeed","abstract": "What does it take to run Apache Iceberg at the scale of Affirm, Booking.com, DoorDash and Indeed? Join data leaders from all four companies as they share the architecture decisions, cost wins and hard-won lessons from modernizing their data platforms with Iceberg \u2014 including how an open lakehouse foundation is accelerating their AI and ML workloads. Walk away with practical frameworks, a clear view of where these teams are investing next and insights you can apply immediately.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "12:00 PM","end_time": "12:45 PM","duration_mins": "45.0","room": "Room 212 (Moscone South, Level 2)","capacity": "101","track": "Architectures & Interoperability","session_type": "Breakout Session","location": "","topics": "Catalogs / Discovery","features": "Apache Polaris","personas": "Product Manager","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Dimitar Nedev | Ankit Singh | Sergey Zavgorodni | David Schwarz | Saurin Shah","speaker_companies": "Booking.com | Affirm | DoorDash | Indeed | Snowflake","speaker_titles": "Principal Data Engineer | Infrastructure Platform Engineering | Data architect | Manager, Software Engineering | Principal Product manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI243","title": "Architecting Semantic Memory: Scaling Domain Wisdom with Snowflake Intelligence","abstract": "In dynamic SaaS environments, domain context is the ultimate bottleneck. Our team found that data scientists were trapped in request queues as consumers struggled to keep pace with shifting product schemas and reporting nuances. This session shares our journey of using Snowflake Intelligence to scale domain wisdom through building \u201csemantic memory.\u201d We share the practical lessons learned from extracting scientist-level nuance into reusable metadata to create AI \"digital twins\" in Snowflake Intelligence. We share practical tips and learnings in architecting a \"memory\" layer and our ongoing efforts to ensure agent reliability as our product and its data evolve.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "12:00 PM","end_time": "12:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 4 (Basecamp, South Hall C)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "General Theaters","topics": "AI Agents / Data Agents","features": "Snowflake Intelligence","personas": "Data Engineer","industry": "Not industry-specific","department": "IT","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Marcus Poh | Dave Ramsden","speaker_companies": "Xero | Xero","speaker_titles": "Head of Analytics Engineering | Staff Analytics Engineer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI207","title": "Automating Governed Analytics with Qlik MCP and Snowflake Cortex Code","abstract": "Learn how to deliver governed, explainable AI-assisted analytics on Snowflake by pairing Qlik MCP with Snowflake Cortex Code. We\u2019ll show how to encode analytics standards as reusable \u201cskills\u201d that guide LLMs to generate consistent master dimensions and measures, then automatically assemble analytics app assets \u2014 KPIs, tables and filters \u2014 all driven by AI. You\u2019ll see robust load-script patterns (naming, date/time handling, verification) and a metadata-first approach that keeps KPIs stable with set analysis.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "12:00 PM","end_time": "12:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "General Theaters","topics": "Data Warehouse","features": "Cortex Code","personas": "MLOps","industry": "Not industry-specific","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Dalton Ruer","speaker_companies": "Qlik","speaker_titles": "Chief Question Officer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AR207","title": "Building a Cross-Cloud Data Platform with Iceberg, Horizon Catalog and Pulsar","abstract": "Toyota Motor Europe (TME) set out to unify vehicle profile data across multiple clouds without duplicating it. This session shows how TME built a cross-cloud data strategy using Snowflake Open Catalog and Iceberg tables, integrating managed Apache Pulsar as a streaming backbone. Learn how TME connected cloud environments through external Iceberg tables for a zero-copy approach, and how separate maintenance jobs complemented Open Catalog by compacting metadata for consistency and governance. We also explain why migrating to Horizon Catalog improved interoperability and scalability, and the steps TME followed to combine Pulsar, Iceberg and Open Catalog to power the vehicle profile.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "12:00 PM","end_time": "12:20 PM","duration_mins": "20.0","room": "Builders Hub Theater (Basecamp, South Hall D)","capacity": "192","track": "Architectures & Interoperability","session_type": "Theater Session","location": "Builder's Hub Theater","topics": "Catalogs / Discovery","features": "Apache Polaris","personas": "Data Engineer","industry": "Telecom","department": "Operations","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Tomer Steinberg | SampathKumar Subramanian","speaker_companies": "Snowflake | Toyota Motor Europe","speaker_titles": "Principal Solution Engineer | Data & AI Engg, Platform Technical Owner","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "PO203","title": "Cost Optimization at Scale: Booking.com\u2019s Journey with SELECT","abstract": "In this session, Ian Whitestone, co-founder and CEO of SELECT, and Adam Healy, Senior Data Platform Engineer at Booking.com, will share how Booking.com has scaled their Snowflake data platform to thousands of users and millions of workloads processed per day, all while keeping costs in check and measuring ROI.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "12:00 PM","end_time": "12:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 3 (Basecamp, South Hall C)","capacity": "150","track": "Performance & Cost Optimization","session_type": "Theater Session","location": "General Theaters","topics": "Catalogs / Discovery","features": "Other","personas": "Business Executive","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Adam Healy | Ian Whitestone","speaker_companies": "Booking.com | SELECT by DoiT","speaker_titles": "Senior Data Engineer I | GM of SELECT","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE214","title": "Data Engineering for AI: dbt Projects, Semantic Views and Cortex Code","abstract": "Make your data AI-ready with the powerful combination of dbt Projects and Snowflake Semantic Views. This session demonstrates how to leverage both SQL and Python DataFrame models in dbt for flexible data engineering that appeals to Spark developers and SQL practitioners alike. Explore semantic layers, the Open Semantic Initiative (OSI) and best practices for managing semantic view lifecycles in Snowflake. Watch Cortex Code's AI coding agent accelerate dbt Project development in real time, and learn to automate deployments with Snowflake CLI. Walk away with a complete, modern approach to building AI-ready data pipelines that empower both AI models and analytics tools.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "12:00 PM","end_time": "12:45 PM","duration_mins": "45.0","room": "Room 208 (Moscone South, Level 2)","capacity": "197","track": "Data Engineering & Pipelines","session_type": "Breakout Session","location": "","topics": "Data Warehouse","features": "Semantic Views","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Jeremiah Hansen","speaker_companies": "Snowflake","speaker_titles": "Principal Architect, Field CTO Office","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "GO230","title": "Data Exfiltration and Ransomware Protection: Guardrails for Regulated Industries","abstract": "Implement a robust zero trust architecture to safeguard highly regulated data from contemporary threats. This session focuses on establishing advanced guardrails, network and identity boundaries to prevent data exfiltration at its origin. Attain superior cyber resilience and proactive ransomware protection by neutralizing unauthorized access. We will demonstrate the integration of DSPM for comprehensive visibility, leveraging insights to inform the new data movement policies and restrict high-risk information to approved zones. Conclude by exploring how the trust center serves as your unified security analytics hub for real-time risk monitoring and an audit-ready security posture.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "12:00 PM","end_time": "12:45 PM","duration_mins": "45.0","room": "Room 214 (Moscone South, Level 2)","capacity": "101","track": "Governance & Security","session_type": "Breakout Session","location": "","topics": "System Integrations / Synchronizations","features": "Horizon Catalog","personas": "Data Engineer","industry": "Public Sector","department": "Other","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Prasoon Shukla","speaker_companies": "Snowflake","speaker_titles": "Staff Product Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE302","title": "Data Ingestion for the AI Era: Efficiency, Apache Iceberg and Petabyte Scale","abstract": "Your AI strategy is only as powerful as the data pipelines feeding it. Join us to explore the four mandates of modern file ingestion. We'll unpack Snowflake\u2019s new volume-based pricing for Snowpipe that delivers predictable costs and drastically lower TCO. Beyond economics, discover how Snowflake makes it easy to build resilient, petabyte-scale pipelines for writing to Apache Iceberg tables. We'll also unveil new platform capabilities built for AI scale. Finally, learn how HUMAN Security transformed their ingestion pipelines to process 20 billion daily events, leveraging our new economics to focus entirely on engineering innovation and business value.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "12:00 PM","end_time": "12:45 PM","duration_mins": "45.0","room": "Room 152 (Moscone South, Upper Mezzanine)","capacity": "204","track": "Data Engineering & Pipelines","session_type": "Breakout Session","location": "","topics": "System Integrations / Synchronizations","features": "Apache Iceberg\u2122","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Advanced","delivery_method": "Live","speaker_names": "Ankit Gupta | Boris Trofimov","speaker_companies": "Snowflake | Human Security","speaker_titles": "Staff Product Manager | Director of Engineering, Enterprise","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI221","title": "From Evaluation to Co-Innovation: How SoFi Built a Semantic Layer with Snowflake","abstract": "In 2024, SoFi chose to co-develop a semantic layer directly with Snowflake rather than buying a third-party tool. Join us to learn how this strategic partnership transformed our data strategy. This session goes beyond the standard implementation story. We\u2019ll share how we deployed the semantic layer within the SoFi data platform to establish a \"single source of truth\" and create the backbone for our gen AI and self-serve capabilities. We will unpack our real-world architecture, the challenges we faced and tactical lessons learned so you can accelerate your own journey.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "12:00 PM","end_time": "12:45 PM","duration_mins": "45.0","room": "Room 216 (Moscone South, Level 2)","capacity": "197","track": "BI & Analytics","session_type": "Breakout Session","location": "","topics": "Data Warehouse","features": "Snowflake Intelligence","personas": "Data Engineer","industry": "Technology","department": "Finance","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Harsh Langalia | Sreekanth Pendli","speaker_companies": "SoFi Inc | SoFi Inc","speaker_titles": "Staff Data Engineer | Sr Engineering Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AR217","title": "Full Throttle from Day One","abstract": "This fast-paced executive conversation takes different positions on how organizations should activate the Snowflake platform. Through structured debate across five platform pillars and the governance framework connecting them, the session surfaces the real decisions leaders face when building an AI-ready data platform. The discussion contrasts the urgency to deliver AI outcomes with the architectural discipline required to avoid long-term technical debt. The session provides a balanced perspective, equipping technical leaders with language to communicate business value and giving executives the architectural insight needed to make stronger platform decisions.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "12:00 PM","end_time": "12:45 PM","duration_mins": "45.0","room": "Room 210 (Moscone South, Level 2)","capacity": "101","track": "Architectures & Interoperability","session_type": "Breakout Session","location": "","topics": "Snowflake Partners","features": "Cortex Code","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Christopher Marcolis | Paul Zajdel","speaker_companies": "CDW | CDW","speaker_titles": "Head of Presales, Data | VP Data & Analytics","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI201","title": "How Chime Uses Call Transcripts to Reduce Customer Churn with Cortex AI","abstract": "Discover how Chime leverages Snowflake Cortex AI to transform unstructured call transcripts into actionable insights that predict and reduce customer churn. This session explores how Chime built a scalable AI pipeline within the Snowflake Data Cloud to process voice data, extract sentiment and behavioral signals, and integrate churn predictions into customer engagement workflows \u2014 all while maintaining security, governance and performance.","type": "Breakout Session","date": "2026-0 Z"},{"code": "IN116","title": "The Future of Telecom: Agentic Workflows on Intelligent Infrastructure","abstract": "AI-driven automation, decision intelligence, cloud/edge computing and open architectures are transforming telecom networks into intelligent infrastructure \u2014 shifting connectivity from a cost center to a value platform. Navigating this requires a unified data foundation, a clear AI strategy and high-value use cases with measurable ROI. See how telcos unify network, OSS/BSS and enterprise data in the Snowflake AI Data Cloud. Learn how to reduce cost, monetize connectivity, hit sustainability targets, speed up rollout, improve resilience and enhance customer experience. Discover how Snowflake transforms network operations, optimizes investments and powers agentic workflows.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "12:00 PM","end_time": "12:45 PM","duration_mins": "45.0","room": "Room 151 (Moscone South, Upper Mezzanine)","capacity": "204","track": "Industry Innovation","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Cortex Code","personas": "Product Manager","industry": "Telecom","department": "Not department-specific","technical_level": "","delivery_method": "OnDemand","speaker_names": "Sinan Akkaya | Keisuke Suzuki | Joji Philip | Gheorghe Spiride","speaker_companies": "AT&T | NTT DOCOMO | Snowflake | Ericsson","speaker_titles": "Director of Radio Access Network | Director of Operation Support System | Global Industry GTM Lead - Telecom | VP, Head of Technology Operations and AI","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "E5","title": "The SaaSpocalypse: Why Sigma and Snowflake Win the Next Decade","abstract": "The 10% drop in B2B software stocks and the Economist's \"SaaSpocalypse\" headline pointed to one shift: AI made it cheaper to build what enterprises used to buy. Best-of-breed is giving way to end-to-end platforms, but, like any foundation, the platform is what makes scale sustainable and provides security, governance, cost and access that reaches everyone. Get the foundation right, and every app and agent built on top inherits that strength. Sigma CEO Mike Palmer walks leaders through a clear path for building, buying and retiring your SaaS spend.","type": "Executive Content","date": "2026-06-03","day_name": "Wednesday","start_time": "12:00 PM","end_time": "12:45 PM","duration_mins": "45.0","room": "Alpine Clubhouse Theater (Moscone South, Level 3)","capacity": "70","track": "Generative AI & Agents","session_type": "Executive Content","location": "","topics": "Snowflake Partners","features": "Cortex Code","personas": "Product Manager","industry": "Not industry-specific","department": "Supply Chain","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Mike Palmer","speaker_companies": "Sigma","speaker_titles": "CEO","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI103","title": "Zero Copy, Zero Friction: Build Agentforce Agents at IDE Speed","abstract": "The role of the developer is shifting from manual configuration to directing AI coding agents that build for you. Join us to see a new, high-velocity developer experience for Agentforce that replaces traditional setup with a fluid, AI-native workflow. We\u2019ll demonstrate how to use AI coding agents (such as Claude Code) to rapidly design and iterate on agents that activate your Snowflake data via zero-copy.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "12:00 PM","end_time": "12:20 PM","duration_mins": "20.0","room": "Vertical Village Theater 2 (Basecamp, South Hall B)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "Vertical Village","topics": "Interoperability","features": "Other","personas": "Data Engineer","industry": "Not industry-specific","department": "IT","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Shane May","speaker_companies": "Salesforce","speaker_titles": "Software Engineering SMTS","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI205","title": "12 Million Queries, 2,500 Users: How Siemens Energy Scales AI with Alteryx","abstract": "Siemens Energy needed to scale analytics across a global enterprise \u2014 not just access but governance and performance across more than 2,500 users and 12 million queries a year. Learn how it built an architecture where Alteryx pushes analytics directly into Snowflake, eliminating extraction and keeping compute where the data lives. The centerpiece: custom Alteryx workflows that call Snowflake Cortex AI natively, embedding generative AI into production pipelines without rebuilding workflows or bypassing governance. Walk away with a concrete model for scaling self-service analytics, integrating Cortex AI through Alteryx, and giving business teams a path from data to AI-driven decisions.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "12:30 PM","end_time": "12:50 PM","duration_mins": "20.0","room": "Basecamp South Theater 3 (Basecamp, South Hall C)","capacity": "150","track": "BI & Analytics","session_type": "Theater Session","location": "General Theaters","topics": "System Integrations / Synchronizations","features": "Cortex AI Functions","personas": "Data Scientist","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Alex Gross","speaker_companies": "Siemens Energy","speaker_titles": "Data Science & ML Expert | Alteryx ACE","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "ML204","title": "Accelerate and Automate: Mastering Snowflake ML with Cortex Code","abstract": "Experience the next level of MLE productivity. This session provides a deep dive into Cortex Code, a massive accelerator designed to automate Snowflake ML pipelines from ingestion to production. We will demonstrate how Cortex Code meets machine learning engineers in their preferred environments to simplify the full lifecycle of enterprise models. Whether you are looking to reduce technical debt or scale your ML operations, join us to see how to build faster, smarter and more resilient pipelines at scale.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "12:30 PM","end_time": "12:50 PM","duration_mins": "20.0","room": "Builders Hub Theater (Basecamp, South Hall D)","capacity": "192","track": "Machine Learning","session_type": "Theater Session","location": "Builder's Hub Theater","topics": "AI Agents / Data Agents","features": "Cortex Code","personas": "MLOps","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Caleb Baechtold | Ghazaleh Kazeminejad","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Sr Manager, Applied AI Field Engineering | Senior AI/ML Architect - AFE","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI109","title": "Batch to Breakthrough: How Coinbase Built Growth Marketing on Snowflake for C360","abstract": "Coinbase reimagined growth marketing by moving customer 360 analytics, campaign targeting and execution directly onto Snowflake. Previously, batch exports to a third-party marketing platform introduced latency, fragility and high operational cost for large-scale email and SMS campaigns. By building IRIS, a Snowflake-native growth marketing system, Coinbase eliminated batch pipelines, enabled near real-time audience targeting driven by governed BI metrics, and simplified operations for its highest-volume CRM workloads. In this session, learn how Coinbase uses Snowflake as the backbone for scalable campaign execution and closed-loop marketing analytics.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "12:30 PM","end_time": "12:50 PM","duration_mins": "20.0","room": "Basecamp South Theater 4 (Basecamp, South Hall C)","capacity": "150","track": "BI & Analytics","session_type": "Theater Session","location": "General Theaters","topics": "System Integrations / Synchronizations","features": "Other","personas": "Data Engineer","industry": "Not industry-specific","department": "IT","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Deno Demartino | Betty Westrik","speaker_companies": "Coinbase | Coinbase","speaker_titles": "Group Manager, Global CRM and Lifecycle | Staff Software Engineer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI126","title": "Beyond Manual Traps: How Thrive Learning Scaled 54K Users with Agentic Analytics","abstract": "Manual reporting is a bottleneck to scale. Edtech leader Thrive Learning was trapped in a \"maintenance nightmare\" of 207 bespoke report versions. By migrating to Snowflake and ThoughtSpot Embedded, it evolved into a governed, live data architecture. In just one month, Thrive consolidated these versions into a single platform, scaling to more than 54,000 users querying 7 billion rows of data. Today, users spend 170,000 monthly minutes analyzing data. Learn how Thrive moved from static dashboards to agentic analytics, using ThoughtSpot on a Snowflake foundation to replace manual \"chasing\" with AI-driven natural-language insights that deliver instant, actionable outcomes.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "12:30 PM","end_time": "01:15 PM","duration_mins": "45.0","room": "Room 209 (Moscone South, Level 2)","capacity": "197","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "Snowflake Partners","features": "Semantic Views","personas": "BI / Analyst","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Frankie Woodhead","speaker_companies": "Thrive Learning","speaker_titles": "Chief Product & Technology Officer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "GO209","title": "Context Layer in Practice: How Workday Builds Trustworthy AI Agents | Atlan","abstract": "Agents without context don't fail gracefully \u2014 they answer confidently with the wrong data. Workday manages HR, finance and payroll for 60 million workers. At that scale, it's a production risk. Their solution: a context model covering what data means, who owns it and how it's used, so every agent knows what it knows and when to stop. Join Jon Chen, Director of Enterprise AI Solutions at Workday, and Austin Kronz of Atlan to learn how Workday structures context across meaning, ownership and usage for production agents, how they build agents that surface uncertainty rather than paper over it, and how this runs on Snowflake Cortex with Atlan's Context Engineering Studio.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "12:30 PM","end_time": "12:50 PM","duration_mins": "20.0","room": "Vertical Village Theater 2 (Basecamp, South Hall B)","capacity": "150","track": "Governance & Security","session_type": "Theater Session","location": "Vertical Village","topics": "Catalogs / Discovery","features": "Apache Iceberg\u2122","personas": "MLOps","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Jonathan Chen | Austin Kronz","speaker_companies": "Workday | Atlan","speaker_titles": "Director, Enterprise AI/ML Solutions | Director of AI and Data Strategy","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE229","title": "Exploding the BOM: Advanced Analytics for Manufacturing Decision-Making","abstract": "Are you ready to unlock the full potential of your Bill of Materials (BOM) data? Join us to discover how L3Harris Technologies revolutionized BOM management for its core product portfolio using Snowflake\u2019s cutting-edge features. We\u2019ll explore how recursive SQL, Dynamic Tables and elastic compute scaling can transform static BOMs into a dynamic, time-aware, fully exploded data asset \u2014 delivering insights that were previously out of reach. Learn how this approach empowers manufacturing teams to spot engineering change patterns, track component obsolescence and proactively address supply chain risks.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "12:30 PM","end_time": "12:50 PM","duration_mins": "20.0","room": "Vertical Village Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Data Engineering & Pipelines","session_type": "Theater Session","location": "Vertical Village","topics": "Data Warehouse","features": "Snowpipe Streaming / Dynamic Tables","personas": "Data Engineer","industry": "Public Sector","department": "Supply Chain","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Luke Bamburoski","speaker_companies": "L3Harris Technologies","speaker_titles": "Specialist, Data Architecture","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI232","title": "How WHOOP Uses Cortex Code as an AI Control Plane for Agentic Intelligence","abstract": "WHOOP's use of Cortex Code has quickly improved how it builds and operates AI across Snowflake, from day-to-day development to the production-grade agents it delivers to its teams. Cortex Code operates as the AI control plane by incorporating WHOOP's enterprise data and context alongside AI models and applications in a fully governed manner, translating intelligence into authorized enterprise action. This has accelerated how WHOOP turns knowledge into usable AI experiences for all employees, both business and technical, while maintaining operational rigor across the company.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "12:30 PM","end_time": "01:15 PM","duration_mins": "45.0","room": "Room 206 (Moscone South, Level 2)","capacity": "101","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Snowflake Intelligence","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Brendan Farley | Carolyn Chambers","speaker_companies": "Snowflake | WHOOP","speaker_titles": "Senior Solutions Engineer | Analytics Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI117","title": "Snowflake Intelligence: Your Team's Most Complex 'Whys' at Your Fingertips","abstract": "Snowflake Intelligence has evolved from conversational Q&A to an end-to-end insights platform. This session unveils capabilities reshaping how enterprises consume data. See how we move beyond \"what happened\" to answer complex \"why\" questions with root cause analysis for actionable insights. Explore our new visualization experience: charts you can save, subscribe to and share, replacing static dashboards with a seamless conversational workflow. We'll demo high-IQ features including zero-shot forecasting, anomaly detection with proactive alerts and memory for personalized answers. Whether you're a business user or data team, discover how SI is becoming the hub for enterprise intelligence.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "12:30 PM","end_time": "01:15 PM","duration_mins": "45.0","room": "Room 211 (Moscone South, Level 2)","capacity": "226","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Snowflake Intelligence","personas": "Product Manager","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Effie Goenawan | Arun Agarwal | Andie George","speaker_companies": "Snowflake | Snowflake | Fanatics","speaker_titles": "Principal Product Manager | Product Marketing Lead, AI / ML | Manager, Strategic Operations","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "MI105","title": "Truist and Cognizant: Operationalizing AI at Scale with Trusted Enterprise Data","abstract": "As enterprises shift from AI experimentation to scaled production, trusted and well\u2011governed data becomes essential. In this session, Truist and Cognizant share how they are modernizing their data ecosystem on the Snowflake AI Data Cloud to enable secure, governed, real\u2011time access for analytics, machine learning and generative AI. Learn how unified data, strengthened governance and cloud\u2011native architecture accelerate AI adoption, ensure compliance, and deliver responsible, explainable and enterprise\u2011grade AI at scale.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "12:30 PM","end_time": "12:50 PM","duration_mins": "20.0","room": "Basecamp South Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Migrations & Modernization","session_type": "Theater Session","location": "General Theaters","topics": "Data Warehouse","features": "Other","personas": "Product Manager","industry": "Financial Services","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Srinidhi Kadasinghanahalli","speaker_companies": "Truist","speaker_titles": "Head of Data, AI and Automation Tech","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI257","title": "Trusted AI at Scale: How Salesforce, Dropbox & 3M Build AI-Ready Data Platforms","abstract": "As organizations scale AI and real-time analytics, ensuring trusted, high-quality data is a business-critical priority. In this panel, Vinay Gupta, VP and GM of Data Platform Services at Salesforce, Philip Zelitchenko, VP of Data Science and AI Platform at Dropbox, and Nithin Ramachandran, Global VP of Data Analytics, MDM and AI at 3M, share how they're modernizing their data and AI platforms to deliver reliable data with and end-to-end observability at enterprise scale. From building data meshes and semantic layers to monitoring models and metrics, they discuss how leading teams are shifting to proactive reliability and bulding the architecture for the next generation of AI products.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "12:30 PM","end_time": "01:15 PM","duration_mins": "45.0","room": "Room 159 (Moscone South, Upper Mezzanine)","capacity": "213","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Cortex Agents","personas": "MLOps","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Naveen Chhajer Jain | Nithin Ramachandran | Barr Moses | Philip Zelitchenko","speaker_companies": "Salesforce | 3M | Monte Carlo | Dropbox","speaker_titles": "Senior Director, Trust & Discovery | Global VP, Data Analytics, MDM & AI | CEO & Co-founder | VP, Data Science & AI Platform","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "WN215B","title": "What\u2019s New: Build and Deploy Apps at Lightning Speed","abstract": "Bring your code to your data, and go from ideas to apps in minutes. Snowflake Apps is evolving to bridge the gap between your code and the enterprise data ecosystem. We\u2019ll unveil the launch of native support for modern frontend frameworks like React and showcase new integrations with AI-powered development workflows. Discover how to move from a natural language prompt to a secure, production-ready app in record time, and hear from companies that are already building faster on Snowflake.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "12:30 PM","end_time": "01:15 PM","duration_mins": "45.0","room": "Room 160 (Moscone South, Upper Mezzanine)","capacity": "232","track": "What's New in Snowflake","session_type": "Breakout Session","location": "","topics": "Data Warehouse","features": "SnowConvert AI","personas": "Product Manager","industry": "Not industry-specific","department": "R&D","technical_level": "Introductory","delivery_method": "OnDemand","speaker_names": "Dinesh Kulkarni | Abhi Saini","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Product Manager | Manager of Product Management","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "WN205B","title": "What's New: Simplify Warehouse Management with Snowflake Compute Capabilities","abstract": "Experience the next generation of the Snowflake engine as it evolves into a single, adaptive compute layer. This session explores how this unified architecture drives price performance, delivering the latest hardware and software innovation to run more queries for the same cost with operational ease and lower TCO. Discover how Interactive tables and warehouses eliminate manual tuning for sub-second, high-concurrency analytics, and how Snowpipe Streaming and CDC simplify production-ready pipelines \u2014 all with the ease and zero operational overhead of a fully managed platform.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "12:30 PM","end_time": "01:15 PM","duration_mins": "45.0","room": "Room 158 (Moscone South, Upper Mezzanine)","capacity": "583","track": "What's New in Snowflake","session_type": "Breakout Session","location": "","topics": "Data Warehouse","features": "Gen 2 Warehouses","personas": "Product Manager","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "OnDemand","speaker_names": "Anoop Gupta","speaker_companies": "Snowflake","speaker_titles": "Software Engineering Director","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI305","title": "Zero Latency Analytics on Demand: Scaling BI Expertise with Agentic AI","abstract": "Whatnot is the fastest-growing online marketplace ever. It's a live shopping platform where users spend 80 to 90 minutes per day, and sellers host over 20 million minutes of live content every week. Data and BI teams find themselves buried in ad-hoc reporting requests: \"Can you check this query?\" \"What happened with this seller?\" Every answer pulled them away from strategic partnership with business leaders. Whatnot will show how the team escaped this \"help desk\" trap by building an agentic Slackbot powered by Snowflake Cortex Analyst and Semantic Views. The company reduced time-to-answer to sub-minute latency and cut analyst distractions to a minimum, replacing manual triage with governed AI.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "12:30 PM","end_time": "01:15 PM","duration_mins": "45.0","room": "Room 213 (Moscone South, Level 2)","capacity": "226","track": "BI & Analytics","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Snowflake Postgres","personas": "MLOps","industry": "Not industry-specific","department": "Other","technical_level": "Advanced","delivery_method": "Live","speaker_names": "Stephen Bailey | Evan Hou","speaker_companies": "Whatnot | Whatnot","speaker_titles": "Engineering Manager, Data Platforms | Head of Analytics","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "E9","title": "AI and the New Software Lifecycle: From Code to Production","abstract": "AI is changing how software is built and operated, from generating and reviewing code to testing, deployment and reliability. But the impact is uneven and introduces new risks. This panel brings CTOs together to examine how the software lifecycle is actually evolving. Where does AI meaningfully accelerate delivery and where does it create new bottlenecks? How do CI/CD, debugging and incident response change when AI generates code? Expect candid perspectives on what\u2019s working, where it breaks down and how engineering leaders should adapt.","type": "Executive Content","date": "2026-06-03","day_name": "Wednesday","start_time": "01:00 PM","end_time": "01:30 PM","duration_mins": "30.0","room": "Alpine Clubhouse Theater (Moscone South, Level 3)","capacity": "70","track": "","session_type": "Executive Content","location": "","topics": "AI Agents / Data Agents","features": "","personas": "","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "","speaker_names": "Corey Burke | Parvez Naqvi | Jeremy Burton","speaker_companies": "Dialpad | Capital One | Snowflake","speaker_titles": "SVP Engineering | Managing Vice President | General Manager, Observability","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI212","title": "AI Techniques That Boost Social, Marketing and Live Event Performance","abstract": "Media and entertainment, marketing and social teams need deeper insight into how audiences engage with video. Snowflake Cortex AI Video Processing enables hook-strength prediction, live-event retention analysis and ad-break optimization, helping organizations reduce drop-off, improve message impact and make smarter content decisions directly in the Snowflake AI Data Cloud.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "01:00 PM","end_time": "01:20 PM","duration_mins": "20.0","room": "Builders Hub Theater (Basecamp, South Hall D)","capacity": "192","track": "Generative AI & Agents","session_type": "Theater Session","location": "Builder's Hub Theater","topics": "AI Agents / Data Agents","features": "Cortex AI Functions","personas": "Product Manager","industry": "Technology","department": "R&D","technical_level": "Intermediate","delivery_method": "OnDemand","speaker_names": "Jessie E Felix Felix | James Cha-Earley","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Staff Product Manager | Senior Developer Advocate","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AR104","title": "Beyond the Silo: AI-Driven Manufacturing with Snowflake, SAP and AWS","abstract": "Manufacturing leaders are trapped in data silos, unable to connect SAP's business context with the speed AI-powered operations demand. This session shows how leading manufacturers are unifying SAP S/4HANA, Snowflake and AWS into an AI-ready data foundation. Walk through the architecture for zero-copy data sharing and multi-source harmonization, eliminating ETL pipelines while preserving SAP's business semantics. See how static ERP records become dynamic, closed-loop outcomes: real-time scenario modeling, automated SAP write-backs and AI-optimized make-to-order workflows. Leave with a practical blueprint that turns enterprise data into a competitive advantage.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "01:00 PM","end_time": "01:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Architectures & Interoperability","session_type": "Theater Session","location": "General Theaters","topics": "System Integrations / Synchronizations","features": "Snowflake Openflow","personas": "Data Engineer","industry": "Manufacturing","department": "Supply Chain","technical_level": "Introductory","delivery_method": "Live","speaker_names": "Sunil Krishnan Krishnan","speaker_companies": "AWS","speaker_titles": "PDM- Industry GTM","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "ML219","title": "Building Real-Time Fraud Detection with Agentic ML in Snowflake","abstract": "Moving ML from experimentation to production shouldn't require rebuilding from scratch or navigating lengthy development cycles. In this hands-on session, you'll build an end-to-end fraud detection model using an agentic approach in Snowflake. Starting with natural language prompts in Cortex Code from Snowflake Notebooks, you'll train a model, register it to the Snowflake Model Registry and deploy it for real-time inference, all without leaving Snowflake. Walk away with practical techniques for creating production-ready prediction endpoints and scaling online inference workloads for fraud detection and beyond.","type": "Hands-on Lab","date": "2026-06-03","day_name": "Wednesday","start_time": "01:00 PM","end_time": "02:30 PM","duration_mins": "90.0","room": "Hands-on Labs 2 (Basecamp, Hall E)","capacity": "139","track": "Machine Learning","session_type": "Hands-on Lab","location": "","topics": "System Integrations / Synchronizations","features": "Cortex Code","personas": "MLOps","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Chanin Nantasenamat | Sho Tanaka","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Lead Developer Advocate | Lead Developer Advocate","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE205","title": "Ditch DIY, Build with AI: Leverage Agents and SDK for Custom Connectors","abstract": "Building custom data connectors often requires weeks of engineering effort, ongoing maintenance and complex API integrations. In this demo, see how Fivetran\u2019s AI Connector Agent and Connector SDK use AI to generate production-ready connectors for REST API-based sources \u2014 automatically handling authentication, pagination and schema mapping \u2014 and deliver data into Snowflake in minutes. Learn how data teams can quickly connect unsupported or custom sources without writing integration code or managing fragile pipelines. Discover how Fivetran's AI Connector Agent provides a faster, more reliable alternative to DIY builds, reducing engineering overhead so teams can focus on unlocking value from data.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "01:00 PM","end_time": "01:20 PM","duration_mins": "20.0","room": "Vertical Village Theater 2 (Basecamp, South Hall B)","capacity": "150","track": "Data Engineering & Pipelines","session_type": "Theater Session","location": "Vertical Village","topics": "Snowflake Partners","features": "Other","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "David Hrncir","speaker_companies": "Fivetran","speaker_titles": "Lead Partner Sales Engineer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "E26","title": "Executive Industry Summit Tour \u2014 Financial Services","abstract": "Join an exclusive, guided tour of the Snowflake AI Data Cloud and its premier partner ecosystem, tailored for leaders in financial services. This immersive experience will take you through five curated stops that showcase the art of the possible \u2014 real-world solutions, cutting-edge AI use cases and data-driven innovations transforming your industry today. Gain direct access to experts, see industry-leading technology in action and leave with actionable inspiration to accelerate your data strategy. Space is extremely limited \u2014 registration is first come, first served. Please note that this experience includes walking between stops; comfortable footwear is recommended. Please note that the Executive Booth Tours are reserved for customers only \u2014 we kindly ask our partners not to register.","type": "Executive Content","date": "2026-06-03","day_name": "Wednesday","start_time": "01:00 PM","end_time": "02:30 PM","duration_mins": "90.0","room": "Vertical Village (Basecamp, South Hall B)","capacity": "15","track": "","session_type": "Executive Content","location": "","topics": "","features": "","personas": "","industry": "Financial Services","department": "","technical_level": "","delivery_method": "","speaker_names": "","speaker_companies": "","speaker_titles": "","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DM209","title": "From Tankers to Tickers: Spot Market Stress Earlier with Connected Data","abstract": "Geopolitical disruption does not stay contained. It ripples through trade routes, commodity flows, supplier networks and market expectations, often creating signals before the full impact is obvious. In this session, we show how connected S&P Global data on Snowflake, queryable with AI, helps teams trace those effects from the physical world to financial markets more quickly. See how connected shipping and cargo data can reveal stress building across critical trade routes, and how supplier momentum can help anticipate downstream pressure on companies and markets. We also demo how Snowflake enables efficient processing of large supply chain data sets at scale.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "01:00 PM","end_time": "01:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 4 (Basecamp, South Hall C)","capacity": "150","track": "Data Sharing & Marketplace","session_type": "Theater Session","location": "General Theaters","topics": "Snowflake Partners","features": "Cortex AI Functions","personas": "Data Engineer","industry": "Not industry-specific","department": "Supply Chain","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Liam Hynes","speaker_companies": "S&P Global Market Intelligence","speaker_titles": "Global Head of New Product Development","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE238","title": "Hands-on Lab: Autonomous SQL Pipelines for AI Agents","abstract": "Modern data engineering is no longer just about moving data or building static data pipelines; it\u2019s about making data AI ready at scale. In this hands-on workshop, we'll build an end-to-end data pipeline to power an AI agent in Snowflake. We'll use Snowflake Openflow to ingest REST API data and semi-structured documents into Snowflake. We'll define our pipeline objects declaratively, implement Dynamic Tables to quickly transform raw data into structured assets, and use Cortex Code along to way to generate new data models and objects. Finally, we'll build a Cortex Agents and use it with Snowflake Intelligence to extract insights from the data via a conversational interface.","type": "Hands-on Lab","date": "2026-06-03","day_name": "Wednesday","start_time": "01:00 PM","end_time": "02:30 PM","duration_mins": "90.0","room": "Hands-on Labs 1 (Basecamp, Hall E)","capacity": "299","track": "Data Engineering & Pipelines","session_type": "Hands-on Lab","location": "","topics": "Data Warehouse","features": "Snowflake Openflow","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Gilberto Hernandez | Ovi Hutuleac","speaker_companies": "Snowflake | Snowflake","speaker_titles": "Lead Developer Advocate | Solutions Architect","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "GO211","title": "Move Beyond Prototypes to High-Velocity AI Products Using Snowflake Intelligence","abstract": "To deliver enterprise AI at scale, speed must be matched by reliability. This session explores how Novo Nordisk moves beyond prototypes to high-velocity AI products using Snowflake Intelligence. We detail a proven four-pillar framework NovoMind uses to bring data and innovation together, which includes scoping, data, technology and governance to ensure measurable leadership outcomes. We will walk through successful commercial AI products that directly impact our field for improved commercial execution, along with how specialized agents, including Cortex Analyst and Search, provide the precision and commercial agility required for global operations.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "01:00 PM","end_time": "01:20 PM","duration_mins": "20.0","room": "Vertical Village Theater 1 (Basecamp, South Hall A)","capacity": "150","track": "Governance & Security","session_type": "Theater Session","location": "Vertical Village","topics": "AI Agents / Data Agents","features": "Cortex AI Functions","personas": "Data Engineer","industry": "Not industry-specific","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Loic Giraud | SHANKHA Bhattachary","speaker_companies": "Novo Nordisk | Novo Nordisk","speaker_titles": "VP - AI Foundation | Associate Director","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI302","title": "Scale AI Capabilities with Genpact\u2019s Autonomous AI Platform on Snowflake","abstract": "Explore how Genpact\u2019s Snowflake native autonomous AI platform, powered by Snowflake Cortex AI, supports enterprise-scale AI enablement. Built on AI Maestro\u2122, Genpact\u2019s advanced platform for managing AI workflows, and delivered through the Genpact AI Gigafactory model, this solution enhances the delivery and deployment of AI systems. It supports AI CoE setup with governed ecosystems designed to foster enterprise-wide AI adoption and deliver measurable business value. Learn actionable strategies to scale AI, enhance intelligent enterprise operations and achieve meaningful business outcomes. Explore this opportunity to stay at the forefront of AI innovation.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "01:00 PM","end_time": "01:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 3 (Basecamp, South Hall C)","capacity": "150","track": "Generative AI & Agents","session_type": "Theater Session","location": "General Theaters","topics": "System Integrations / Synchronizations","features": "Snowflake ML","personas": "Data Engineer","industry": "Not industry-specific","department": "Supply Chain","technical_level": "Advanced","delivery_method": "Live","speaker_names": "Vimal Endiran Endiran | Dip Kharod","speaker_companies": "Genpact | Genpact","speaker_titles": "Senior Vice President | VP, Data Architecture & Engineering","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI214","title": "The Builder\u2019s Guide to Sigma AI Apps: Workflows, Cortex Agents and AI Functions","abstract": "What separates an AI app from a chatbot? Action tools that write data, control the UI and send notifications. This lab teaches data professionals to build code-free agentic workflows. Step into the shoes of a Sigma AI app developer to build a \"Sales Pipeline Analyzer\" similar to the one that Sigma uses internally. You will orchestrate Snowflake Cortex Agents to parse unstructured transcripts and extract insights like deal health and risks. Using Cortex AI Functions and Sigma's native writeback, you will land newly structured data securely in your warehouse. Finally, configure action tools to escalate at-risk deals via email and dynamically reconfigure the dashboard.","type": "Hands-on Lab","date": "2026-06-03","day_name": "Wednesday","start_time": "01:00 PM","end_time": "02:30 PM","duration_mins": "90.0","room": "Hands-on Labs 3 (Basecamp, Hall E)","capacity": "133","track": "BI & Analytics","session_type": "Hands-on Lab","location": "","topics": "Snowflake Partners","features": "Cortex AI Functions","personas": "Data Engineer","industry": "Not industry-specific","department": "IT","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Shah Gill","speaker_companies": "Sigma","speaker_titles": "Senior Solution Engineer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "IN231","title": "Trusted Data at Speed: 50% Faster Executive Reporting","abstract": "Learn how a leading financial institution partnered with Anomalo to automate data quality, enabling them to deliver critical executive reporting more than 50% faster. We will discuss their journey in building a foundation of trusted data to support advanced initiatives like agentic AI. Attendees will learn how to scale quality checks across a modern data stack, eliminate manual bottlenecks and provide leadership with full confidence in their data for proactive, executive-level decision-making.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "01:00 PM","end_time": "01:20 PM","duration_mins": "20.0","room": "Basecamp South Theater 2 (Basecamp, South Hall A)","capacity": "150","track": "Industry Innovation","session_type": "Theater Session","location": "General Theaters","topics": "AI Agents / Data Agents","features": "Horizon Catalog","personas": "Data Engineer","industry": "Financial Services","department": "Operations","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "David Russell","speaker_companies": "Anomalo","speaker_titles": "Vice President","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE222","title": "190B Rows a Day: How Cboe Powers Real-Time Market Data with Snowpipe Streaming","abstract": "Cboe's engineering team had a requirement to replace a legacy system that relied on proprietary wire protocols and end-of-day batch ETL. The goal was to provide internal teams with near real-time access to market data, requiring both high-ingest throughput and immediate data availability for queries. Using the new Snowpipe Streaming High-Performance Architecture, Cboe built a pipeline that directly ingests market data into Snowflake. The production workload achieved the following metrics: Ingest throughput: The pipeline processes over 100 TB of uncompressed data daily. Row velocity: The ingestion rate is over 190 billion rows per day.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "01:30 PM","end_time": "02:15 PM","duration_mins": "45.0","room": "Room 212 (Moscone South, Level 2)","capacity": "101","track": "Data Engineering & Pipelines","session_type": "Breakout Session","location": "","topics": "System Integrations / Synchronizations","features": "Cortex Agents","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Advanced","delivery_method": "Live","speaker_names": "Chase Thomas | Ivan Kepes Kepes","speaker_companies": "Snowflake | Cboe Global Markets","speaker_titles": "Sr. Product Manager | Software Engineering Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "DE307","title": "8:47 a.m. Request, 9:30 a.m. Production: Agentic Data Teams on Snowflake","abstract": "It's 8:47 a.m. Monday. Your analyst Slacks, \"Can we get active-customer churn by tier for the board deck at 10?\" In most data teams, that\u2019s a sprint ticket. For a team running Maia on Snowflake, it\u2019s live by 9:30 a.m. This session walks through a day in the life of a data engineer who moves from request handler to operator. Maia reads Snowflake schemas, dbt models and team context, so \u201cactive customer\u201d means what finance means. It handles urgent requests, clears Jira backlog, converts PowerCenter to Snowflake-native ELT, and hands governed data products to Cortex and Snowflake Intelligence. Live build, proven at Cisco, Docusign and Mercedes F1.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "01:30 PM","end_time": "01:50 PM","duration_mins": "20.0","room": "Vertical Village Theater 2 (Basecamp, South Hall B)","capacity": "150","track": "Data Engineering & Pipelines","session_type": "Theater Session","location": "Vertical Village","topics": "Snowflake Partners","features": "Cortex Code","personas": "Data Engineer","industry": "Not industry-specific","department": "IT","technical_level": "Advanced","delivery_method": "Live","speaker_names": "Cyril Sonnefraud | Mia McMillan","speaker_companies": "Matillion | Matillion","speaker_titles": "Principal Product Manager | Senior Product Manager","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI254","title": "AI Applied Mastery: Skill-Based AI Engineering Curriculum in the Agentic World","abstract": "From knowledge to measurable skills and impact, this session explores how Snowflake Academia and Northeastern University are redefining AI education for the agentic era. We start with imparting AI knowledge and then move on to project-driven mastery, where students solve realistic problems by building knowledge graphs and agentic AI and data engineering workflows on Snowflake\u2019s free-to-academic AI platform. Enhanced by industry guest lecture, mentorship and iterative innovation, this model bridges the gap between classroom and career. Learn how to empower students to architect real-world solutions using contextual engineering and the latest AI skills. The future is skills based; let\u2019s build it.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "01:30 PM","end_time": "02:15 PM","duration_mins": "45.0","room": "Room 214 (Moscone South, Level 2)","capacity": "101","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "AI Agents / Data Agents","features": "Other","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Kishore Aradhya | Seeling Cheung","speaker_companies": "Frontdoor Inc., | Snowflake","speaker_titles": "Director | Technical Director, Head of Global Academia","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI107","title": "Built for Humans, Ready for Agents: A Data Stack That Serves Everyone","abstract": "The next wave of self-serve analytics won't be driven by better dashboards. It'll be driven by agents that find, interpret and act on data autonomously. But most data stacks weren't built for this. In this session, you'll learn how agentic workloads differ from analytical ones and what that means for your tooling, models, freshness SLAs and access patterns. We'll cover the decisions that create optionality versus lock-in \u2014 storage formats, compute separation, semantic layers and metadata richness \u2014 and see how open source changes the calculus. Drawing on real trade-offs from Airbyte, you'll leave with a practical framework to assess your own stack.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "01:30 PM","end_time": "02:15 PM","duration_mins": "45.0","room": "Room 210 (Moscone South, Level 2)","capacity": "101","track": "Generative AI & Agents","session_type": "Breakout Session","location": "","topics": "Data Warehouse","features": "Cortex AI Functions","personas": "Data Engineer","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Introductory","delivery_method": "Live","speaker_names": "AJ Steers","speaker_companies": "Airbyte","speaker_titles": "Staff Engineer, AI Engineering","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "BI310","title": "Consistency Before Intelligence: The Hidden Work Behind AI Analytics","abstract": "We\u2019re at a moment in the industry where every data professional is trying to reach the AI-powered future of analytics: where reliable insights are generated instantly on demand, freeing our analysts from ad hoc data requests to pursue more strategic work. However, many of us have found that simply plugging an AI to our data warehouse won\u2019t magically get us there. At Canva, we\u2019ve identified three big things that need to happen first: an AI-ready data warehouse architecture, a semantic layer to assist and govern our LLM assistants, and a solution to metric consistency. In this session, we dive into each of those three major aspects of our journey toward the future of analytics.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "01:30 PM","end_time": "02:15 PM","duration_mins": "45.0","room": "Room 208 (Moscone South, Level 2)","capacity": "197","track": "BI & Analytics","session_type": "Breakout Session","location": "","topics": "Data Warehouse","features": "Snowflake Intelligence","personas": "MLOps","industry": "Not industry-specific","department": "Not department-specific","technical_level": "Advanced","delivery_method": "OnDemand","speaker_names": "Nicholas Preema | Sida Yuan | Vincey Au","speaker_companies": "Canva | Canva | Canva","speaker_titles": "Analytics Engineer | Senior Analytics Engineer | Software Engineer","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "IN106","title": "Delivering Mission AI at Scale: Enterprise Lessons and Public Sector Realities","abstract": "The AI mandate is now a defining priority for the public sector. The technology is reshaping how agencies approach their most critical priorities \u2014 from enhancing citizen services to improving security postures to increasing government efficiencies. But implementing AI requires a unified data foundation, clear strategy and alignment to measurable outcomes. Join the public sector keynote to hear how leaders are modernizing legacy systems, unifying data and embedding AI into critical workflows. We'll highlight the latest Snowflake innovations, showcase real customer success stories and outline a blueprint for how organizations can leverage AI today.","type": "Breakout Session","date": "2026-06-03","day_name": "Wednesday","start_time": "01:30 PM","end_time": "02:15 PM","duration_mins": "45.0","room": "Room 151 (Moscone South, Upper Mezzanine)","capacity": "204","track": "Industry Innovation","session_type": "Breakout Session","location": "","topics": "Interoperability","features": "Cortex Code","personas": "Product Manager","industry": "Public Sector","department": "Not department-specific","technical_level": "Introductory","delivery_method": "OnDemand","speaker_names": "Alan Sim | Jennifer Chronis | Murari Selvakesavan | Jonah Ong | Joe Larson","speaker_companies": "Leidos | Snowflake | CMS | Land Transport Authority (LTA) Singapore | OpenAI","speaker_titles": "Chief Data and Analytics Officer | VP, US PubSec Sales | Director | Director, AI & Digital Platforms | Vice President, OpenAI for Government","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "C3","title": "Designing Engineering Teams for AI","abstract": "AI isn\u2019t just changing how software gets built, it\u2019s reshaping how teams are structured and led. This session explores how engineering organizations adapt in an AI-driven world, from team design and ownership models to the evolving role of leadership. As workflows shift and the boundaries of the engineering role become less defined, leaders are rethinking how to align teams, measure effectiveness and guide organizations through uncertainty.","type": "CTO Circle","date": "2026-06-03","day_name": "Wednesday","start_time": "01:30 PM","end_time": "03:00 PM","duration_mins": "90.0","room": "Room 201 - 203 (Moscone South, Level 2)","capacity": "290","track": "","session_type": "CTO Circle","location": "","topics": "","features": "","personas": "","industry": "","department": "","technical_level": "","delivery_method": "","speaker_names": "Jeremy Burton | Harjot Gill | Parvez Naqvi | Jordan Topoleski | Qi Jin","speaker_companies": "Snowflake | CodeRabbit Inc. | Capital One | Cursor | Cerebras AI","speaker_titles": "General Manager, Observability | CEO & Co-founder | Managing Vice President | Chief Operating Officer | EVP Cerebras","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "MI215","title": "Driving Efficiency and Cost Savings with Snowflake Native to Iceberg","abstract": "Enterprises often run Snowflake native tables alongside open formats, driving duplicate storage, complex governance and higher costs. Capital One partnered with Slalom and Snowflake to migrate Collaboration and Sandbox workloads from Snowflake native to Iceberg tables in OneLake (S3). This session covers the target architecture, migration and automation patterns, and how defaulting table creation to Iceberg simplified adoption. Attendees will learn how this approach reduced vendor lock-in, eliminated redundant storage and delivered measurable cost savings at scale.","type": "Theater Session","date": "2026-06-03","day_name": "Wednesday","start_time": "01:30 PM","end_time": "01:50 PM","duration_mins": "20.0","room": "Basecamp South Theater 4 (Basecamp, South Hall C)","capacity": "150","track": "Migrations & Modernization","session_type": "Theater Session","location": "General Theaters","topics": "Snowflake Partners","features": "Apache Iceberg\u2122","personas": "Data Engineer","industry": "Financial Services","department": "IT","technical_level": "Intermediate","delivery_method": "Live","speaker_names": "Temesgen (Teme) Meheret | Karpagam Balakrishnan","speaker_companies": "Capital One | Slalom","speaker_titles": "Director, Data Platform | Architect","status": "Accepted","modified": "2026-05-22T17:24:51Z"},{"code": "AI224","title": "From Data to Dialogue: Making AI Useful in the Business","abstract": "As AI capabilities become native within Snowflake, the challenge shifts from experimentation to real-world application. In this session, Under Armour shares how it is enabling conversational access to data across sales, product and consumer domains. Learn how users interact with both structured and unstructured data through natural language powered by Snowflake Cortex AI. The session focuses on the patterns, data foundations and governance approaches supporting these solutions today, along with practical considerations for teams looking to apply Snowflake\u2019s AI capabilities to real business use cases.","type": "Theater S
